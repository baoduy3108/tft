    {l:'Từ chối.',act:()=>setResult('Ngươi từ chối nhiệm vụ, chấp sự lắc đầu bỏ đi.')}]};
  return{title:'NHIỆM VỤ · Trực Ban',narr:'Một nhiệm vụ tạp dịch nhàm chán: canh giữ Tàng Kinh Các một thời gian.',choices:[
    {l:'Nhận việc, tiện thể lén học lỏm.',cls:'primary',act:()=>{s.contrib+=15;advance(1);if(RNG.chance(0.25)){S.cmp=Math.round((S.cmp+0.05)*100)/100;setResult('+15 cống hiến. Lén đọc trộm được vài trang tâm pháp, ngộ tính tăng chút ít.');}else setResult('+15 cống hiến. Một năm trực ban trôi qua tẻ nhạt.');}},
    {l:'Bỏ trực, trốn đi tu luyện.',act:()=>{s.contrib=Math.max(0,s.contrib-10);setResult('Ngươi bỏ trực. Bị phát hiện, trừ 10 cống hiến.');}}]};}
function sectPromote(){const s=S.sect;const req=sectPromoteReq();if(!req){log('Ngươi đã là Tông Chủ — không còn gì để thăng.','lore');return;}
  if(s.contrib<req.contrib||S.ri<req.ri){log(`Chưa đủ điều kiện thăng chức (cần ${req.contrib} cống hiến & cảnh giới ${req.ri>0?REALMS[req.ri-1].name:'—'}).`,'warn');return;}
  s.contrib-=req.contrib;s.pos++;s.posName=SECT_POS[s.pos];log(`✦ Thăng chức! Ngươi nay là ${s.posName} của ${s.name}.`,'good');
  if(s.pos>=4){S.att+=4;log('Địa vị càng cao, ánh mắt ghen ghét và dã tâm nhắm vào ngươi càng nhiều.','warn');}}
// Sự kiện tông môn (gọi từ rollEvent khi đang ở trong tông môn)
function evSect(){const s=S.sect;const roll=RNG.next();
  // Đoạt xá: thiên tài vị trí cao, nguyên thần yếu → bị nhắm chiếm thân xác
  if((s.pos>=3||talentScore()>=13)&&S.soul<S.ri*0.5&&roll<0.4){return{title:'TÔNG MÔN · Nguy Cơ Đoạt Xá',narr:`Một trưởng lão Hồn tu của ${s.name} lâu nay vẫn nhìn ngươi bằng ánh mắt tham lam khó hiểu. Đêm nay, thần thức lão lặng lẽ vươn tới, định chiếm lấy thân xác thiên tài của ngươi làm của riêng — cấm thuật ĐOẠT XÁ!`,choices:[
    {l:'Liều mạng phản kháng bằng nguyên thần.',hint:'Nguyên thần yếu thì cực nguy.',act:()=>{const p=0.3+S.soul*0.06+(S.dao-50)*0.004;if(RNG.chance(clamp(p,0.1,0.9))){s.contrib+=0;S.soul+=1;log('Ngươi đẩy lùi được thần thức lão, nguyên thần tôi luyện thêm cứng cỏi.','good');setResult('Trong sát na sinh tử, ngươi cắn răng phản kích, đánh bật thần thức trưởng lão ra! Lão hậm hực rút lui — nhưng mối họa này chưa dứt.');}else{S.alive=false;S.cause=`Bị một trưởng lão Hồn tu của ${s.name} đoạt xá. Linh hồn ngươi bị nghiền nát, thân xác thành lồng giam cho kẻ khác.`;setResult(S.cause);}}},
    {l:'Bỏ chạy khỏi tông môn ngay trong đêm.',act:()=>{S.att+=3;const old=s.name;S.sect=null;setResult(`Ngươi vứt bỏ tất cả, liều chết đào tẩu khỏi ${old} trong đêm. Từ nay là kẻ phản đồ bị truy sát, nhưng ít ra linh hồn còn là của ngươi.`);}},
    {l:'Cầu cứu Tông Chủ / phe cánh của mình.',show:()=>s.pos>=4,act:()=>{if(RNG.chance(0.6)){log('Tông Chủ ra mặt trấn áp, lão trưởng lão bị phế.','good');setResult('Thân phận Thánh Tử phát huy tác dụng — Tông Chủ đích thân ra mặt, phế bỏ lão trưởng lão dám động vào ngươi. Lần này, địa vị đã cứu mạng ngươi.');}else{S.alive=false;S.cause='Ngươi cầu cứu, nhưng phe trưởng lão mạnh hơn. Không ai tới kịp. Ngươi bị đoạt xá.';setResult(S.cause);}}}]};}
  if(roll<0.4){const rival=makeNPC(RNG.int(0,2));rival.traits=['đố kỵ'];remember(rival,'ganh ghét địa vị của ngươi',-40);return{title:'TÔNG MÔN · Tranh Đấu Nội Bộ',narr:`${rival.name}, một đồng môn ganh ghét ngươi, công khai khiêu chiến tỉ thí — và đưa ra một tờ SINH TỬ TRẠNG. Trong ${s.name}, đệ tử giết nhau trên đài tỉ thí là hợp pháp.`,choices:[
    {l:'Ký sinh tử trạng, quyết một trận.',cls:'primary',act:()=>{const r=fight({name:rival.name,ri:rival.ri,si:rival.si,mightBonus:0.1});if(r==='win'){S.stats.kills++;s.contrib+=30;S.fame=clamp(S.fame+5,-100,1000);setResult('Ngươi hạ gục '+rival.name+' trên đài, danh chấn nội môn. +30 cống hiến. Không ai dám coi thường ngươi nữa.');}else setResult(r==='dead'?('Ngươi bỏ mạng trên đài tỉ thí. '+S.cause):('Ngươi bại trận ('+r+'), mất mặt trước toàn môn.'));}},
    {l:'Từ chối tỉ thí, nuốt nhục.',act:()=>{S.fame=clamp(S.fame-5,-100,1000);remember(rival,'ngươi hèn nhát né tránh',-10);setResult('Ngươi từ chối. Giữ được mạng nhưng mất mặt; '+rival.name+' càng lấn tới, đồng môn xì xào khinh thường.');}}]};}
  if(roll<0.62){return{title:'TÔNG MÔN · Ban Thưởng',narr:`Nhờ biểu hiện gần đây, ${s.name} ban thưởng cho ngươi.`,choices:[
    {l:'Bái tạ nhận thưởng.',cls:'primary',act:()=>{s.contrib+=25;if(RNG.chance(0.5)){const k=RNG.pick(['pha_canh','ho_menh','ngo_dao']);S.inv[k]=(S.inv[k]||0)+1;setResult('+25 cống hiến và một viên '+PILL_DEF[k].n+'.');}else{S.linhThach+=Math.round(Math.pow(10,1+S.ri*0.25));setResult('+25 cống hiến và một túi linh thạch.');}}}]};}
  // Tông môn đại chiến
  return{title:'TÔNG MÔN · Tông Chiến',narr:`${s.name} khai chiến với một tông môn địch. Toàn môn đệ tử buộc phải ra trận — kể cả ngươi.`,choices:[
    {l:'Xông pha tiền tuyến lập công.',cls:'primary',hint:'Công lớn, nhưng dễ chết.',act:()=>{const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(0,2));const r=fight(b);if(r==='win'){s.contrib+=60;S.fame=clamp(S.fame+10,-100,1000);setResult('Ngươi chém tướng địch giữa vạn quân, đại công! +60 cống hiến, danh vang khắp môn.');}else setResult(r==='dead'?('Ngươi tử trận. '+S.cause):('Ngươi trọng thương lui về ('+r+'), nhưng giữ được mạng giữa loạn chiến.'));}},
    {l:'Nấp phía sau, giữ mạng là chính.',act:()=>{s.contrib+=5;S.fame=clamp(S.fame-3,-100,1000);setResult('Ngươi nấp sau lưng đồng môn, sống sót qua trận chiến nhưng bị coi là hèn nhát (+5 cống hiến gọi là).');}}]};}

/* ===== BẢNG THIÊN KIÊU — danh hiệu theo danh tiếng + tư chất ===== */
function geniusTitle(){const f=S.fame,t=talentScore();if(f>=800||t>=18)return{n:'Đệ Nhất Nhân của thời đại',rank:1};if(f>=500)return{n:'Yêu Nghiệt Bảng · Top 10',rank:10};if(f>=250)return{n:'Thiên Kiêu Bảng · Top 100',rank:100};if(f>=100)return{n:'Tuấn Kiệt hữu danh một vùng',rank:1000};if(f>=30)return{n:'Tiểu hữu danh khí',rank:9999};return null;}
/* ===== BẢN MỆNH PHÁP BẢO ===== */
function sceneNatal(){const list=S.treasures.slice().sort((a,b)=>b.grade-a.grade);const t=list[0];
  return{title:'BẢN MỆNH PHÁP BẢO',narr:`Ngươi có thể dùng tinh huyết & nguyên thần tế luyện một pháp bảo thành BẢN MỆNH PHÁP BẢO — vật này sẽ cùng ngươi sinh tử tương liên, lớn mạnh theo ngươi, uy lực vượt xa pháp bảo thường. Nhưng một khi nó vỡ, nguyên thần ngươi trọng thương.\n\nPháp bảo mạnh nhất trong túi: ${t?esc(t.name)+' ('+t.gradeName+')':'(không có)'}.`,choices:[
    {l:'Tế luyện '+(t?t.name:'—')+' thành bản mệnh pháp bảo.',show:()=>!!t&&!S.natal,hint:'Hao 5 năm thọ + nguyên thần.',act:()=>{deductLife(5,'tế luyện bản mệnh');const idx=S.treasures.indexOf(t);if(idx>=0)S.treasures.splice(idx,1);t.bond=0;S.natal=t;log('Ngươi tế luyện '+t.name+' thành BẢN MỆNH PHÁP BẢO!','good');setResult('Từ nay '+t.name+' và ngươi tâm ý tương thông, sinh tử tương liên. Nó sẽ lớn mạnh cùng ngươi trên đại đạo.');}},
    {l:'Thôi, chưa vội.',act:()=>{S.scene=null;render();save();}}]};}
/* ===== ĐẠO LỮ / SONG TU ===== */
function evDaolu(){if(S.daolu)return evReward();const npc=makeNPC(RNG.int(-1,1));npc.relation=45;
  return{title:'HỒNG TRẦN · Người Trong Mộng',narr:`Trên đường tu hành cô độc, ngươi gặp ${npc.name} (${esc(realmName(npc.ri,npc.si))}) — hai người tâm đầu ý hợp, cùng chung chí hướng đại đạo. Đối phương ngỏ ý kết làm ĐẠO LỮ, song tu cùng tiến.`,choices:[
    {l:'Kết đạo lữ, song tu cùng tiến.',cls:'primary',hint:'Tu nhanh hơn, nhưng có thêm điểm yếu.',act:()=>{S.daolu={name:npc.name,ri:npc.ri,si:npc.si,love:60};remember(npc,'kết làm đạo lữ với ngươi',60);log('Ngươi và '+npc.name+' kết làm đạo lữ.','good');setResult('Ngươi và '+npc.name+' kết làm đạo lữ. Song tu giúp cả hai tu luyện nhanh hơn — nhưng trong tu tiên giới tàn khốc, người ngươi yêu cũng là điểm yếu kẻ khác nhắm vào.');}},
    {l:'Đạo tâm ta chỉ có một mình một đạo.',act:()=>{addKarma(1,'giữ đạo tâm cô tịch');setResult('Ngươi lắc đầu. Đường tu vốn cô độc, ngươi chọn bước đi một mình — không vướng bận, cũng không sơ hở.');}}]};}
function evDaoluPeril(){const d=S.daolu;if(!d)return evReward();
  return{title:'ĐẠO LỮ LÂM NẠN',narr:`${d.name}, đạo lữ của ngươi, bị một cường địch bắt giữ để uy hiếp ngươi. "Muốn cứu nàng/chàng? Nộp hết bảo vật, tự phế tu vi!"`,choices:[
    {l:'Liều mạng cứu đạo lữ!',cls:'primary',act:()=>{const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(0,2));const r=fight(b);if(r==='win'){log('Ngươi cứu được '+d.name+'!','good');d.love=Math.min(100,d.love+15);setResult('Ngươi liều chết đánh bại kẻ bắt cóc, cứu được '+d.name+'. Tình cảm hai người càng thêm sâu đậm.');}else if(r==='dead')setResult(S.cause);else{S.daolu=null;S.dao=Math.max(0,S.dao-15);setResult('Ngươi bại trận ('+r+'). '+d.name+' bị giết ngay trước mắt ngươi. Đạo tâm ngươi rạn vỡ, ôm một mối hận thấu xương.');addKarma(-1,'mất đạo lữ, gieo hận');}}},
    {l:'Nuốt hận bỏ đi — người tu tiên không thể vướng bận.',act:()=>{S.daolu=null;S.dao=Math.max(0,S.dao-8);addKarma(-2,'bỏ rơi đạo lữ');setResult('Ngươi quay lưng bỏ đi, mặc '+d.name+' gào tên ngươi. Ngươi giữ được mạng và bảo vật, nhưng đạo tâm vấy một vết nhơ không bao giờ rửa sạch.');}}]};}
/* ===== PHƯỜNG THỊ / ĐẤU GIÁ ===== */
function sceneMarket(){const goods=[];for(let i=0;i<3;i++){const kind=RNG.pick(['tech','treasure','pill','herb']);let it,price;if(kind==='tech'){it=genTech(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier)));price=Math.round(Math.pow(10,1+S.ri*0.28)*it.grade);}else if(kind==='treasure'){it=genTreasure(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier)+1));price=Math.round(Math.pow(10,1+S.ri*0.3)*it.grade);}else if(kind==='pill'){const k=RNG.pick(Object.keys(PILL_DEF));it={pill:k,name:PILL_DEF[k].n,grade:PILL_DEF[k].g};price=Math.round(Math.pow(10,1+S.ri*0.2)*it.grade);}else{it=genHerb(S.world.tier);price=Math.round(Math.pow(10,1+S.ri*0.18)*it.grade);}goods.push({kind,it,price});}
  const c=goods.map(g=>({l:`Mua ${g.it.name} (${g.it.grade?'phẩm '+g.it.grade:''}) — ${g.price.toLocaleString('vi-VN')} linh thạch`,show:()=>S.linhThach>=g.price,act:()=>{S.linhThach-=g.price;if(g.kind==='tech')S.techs.push(g.it);else if(g.kind==='treasure')S.treasures.push(g.it);else if(g.kind==='pill')S.inv[g.it.pill]=(S.inv[g.it.pill]||0)+1;else{S.inv['herb_'+g.it.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+g.it.uid]=g.it;}setResult('Ngươi mua được '+g.it.name+'. Tiền trao cháo múc, phường thị chẳng ai hỏi lai lịch.');}}));
  if(S.treasures.length)c.push({l:'Bán pháp bảo yếu nhất lấy linh thạch',act:()=>{const t=S.treasures.slice().sort((a,b)=>a.grade-b.grade)[0];const idx=S.treasures.indexOf(t);S.treasures.splice(idx,1);const g=Math.round(Math.pow(10,1+S.ri*0.28)*t.grade*0.5);S.linhThach+=g;setResult('Ngươi bán '+t.name+' được '+g.toLocaleString('vi-VN')+' linh thạch.');}});
  c.push({l:'Rời phường thị.',act:()=>{S.scene=null;render();save();}});
  return{title:'PHƯỜNG THỊ',narr:`Ngươi bước vào một tòa phường thị nhộn nhịp. Linh thạch hiện có: ${fmtExp(Math.log10(Math.max(1,S.linhThach)))}. Vài món đang bày bán:`,choices:c};}
/* ===== HUYẾT MẠCH GIÁC TỈNH ===== */
function evBloodline(){const b=RNG.pick([['Thượng cổ thần long',{atk:1.3,hp:1.2}],['Cửu u huyền phượng',{cmp:1.3,soul:1.2}],['Thái cổ chiến thần',{atk:1.4}],['Bất tử kim ô',{hp:1.4}],['Hỗn độn dị thú',{cult:1.3,atk:1.15}]]);
  return{title:'HUYẾT MẠCH GIÁC TỈNH',narr:`Giữa cơn hấp hối sinh tử, một dòng huyết mạch cổ xưa ngủ vùi trong thân ngươi bỗng bừng tỉnh — HUYẾT MẠCH ${b[0].toUpperCase()}! Sức mạnh tổ tiên chảy ngược trong huyết quản.`,choices:[
    {l:'Thuận theo, dung hợp huyết mạch.',cls:'primary',hint:'Sức mạnh lớn, nhưng thân dần hóa dị.',act:()=>{for(const k in b[1]){if(k==='atk')S.atkMul*=b[1][k];else if(k==='hp'){S.hpMul*=b[1][k];S.hpMax=Math.round(S.hpMax*b[1][k]);}else if(k==='cult')S.cultMul*=b[1][k];else if(k==='cmp')S.cmp*=b[1][k];else if(k==='soul')S.soul+=2;}S.mutations.push('Huyết mạch '+b[0]+' giác tỉnh');S.flags.bloodline=b[0];log('Huyết mạch '+b[0]+' giác tỉnh! Sức mạnh tăng vọt.','good');setResult('Ngươi dung hợp huyết mạch '+b[0]+', thực lực tăng vọt — nhưng thân thể bắt đầu mang dấu ấn của một chủng tộc không còn là người.');}},
    {l:'Cưỡng ép đè nén huyết mạch.',act:()=>{deductLife(3,'đè nén huyết mạch phản phệ');setResult('Ngươi sợ mất nhân tính, gắng đè nén dòng huyết mạch. Nó tạm lắng xuống, nhưng cơ hội nghịch thiên có lẽ đã vụt qua.');}}]};}
function sceneChooseProf(){return{title:'CHỨC NGHIỆP · Bái Sư Học Nghề',narr:'Một nghề phụ có thể nuôi sống ngươi giữa tu tiên giới khắc nghiệt, mở ra một con đường sức mạnh khác ngoài tu vi. Ngươi muốn học nghề gì? (Chỉ chọn một — chuyên một nghề mới mong đạt Nhất phẩm.)',choices:PROFS.map(p=>({l:p.n+' — '+p.d.split('.')[0]+'.',act:()=>{setProfession(p.id);setResult('Ngươi bái sư, chính thức là '+PROF_RANK[0]+' '+p.n+'. Hãy hành nghề để tinh tiến — Nhất phẩm đại sư được cả thiên hạ kính nể.');}})).concat([{l:'Thôi, dồn hết cho tu luyện.',act:()=>{S.scene=null;render();save();}}])};}

/* ===== THĂNG THẾ GIỚI (phi thăng lên giới cao hơn — mở khóa phẩm cao) ===== */
function worldAscendReq(){return Math.min(100,8+(S.world.tier-1)*11);}
function canAscendWorld(){return S.world.tier<WORLDS.length&&S.ri>=worldAscendReq();}
function sceneAscendWorld(){const nt=S.world.tier+1;const nw=WORLDS[nt-1];
  return{title:'PHI THĂNG · Vượt Giới',narr:`Ngươi đã đạt tới đỉnh mà ${S.world.name} có thể dung chứa. Không gian quanh ngươi rạn nứt — bờ bên kia là ${nw.n}, một thế giới CAO HƠN: linh khí nồng gấp bội, tài nguyên phẩm cấp cao hơn hẳn (trần phẩm nâng từ ${maxGrade(S.world.tier)} lên ${maxGrade(nt)}). Nhưng vượt giới phải xuyên qua Không Gian Loạn Lưu cùng lôi kiếp vượt giới — vô số kẻ tan xác giữa hư không.`,choices:[
    {l:`Độ kiếp vượt giới lên ${nw.n}.`,cls:'primary',hint:'Thất bại = tan xác giữa hư không.',act:()=>{const risk=clamp(0.4-S.soul*0.02-(S.dao-50)*0.003-profBonus('tran')*0.5-(S.natal?0.05:0),0.08,0.85);if(RNG.chance(risk)){S.alive=false;S.cause='Vượt giới thất bại — thân xác bị Không Gian Loạn Lưu xé vụn giữa hai thế giới.';setResult(S.cause);return;}S.world.tier=nt;S.world.name='['+nw.n+']';S.world.region=RNG.pick(['Tân Nhập Vực','Cổ Chiến Trường','Vạn Tộc Đại Lục','Biên Hoang','Trung Vực']);S.world.machId=Math.min(12,nt+2);S.att=Math.max(0,S.att-5);S.fame=clamp(S.fame+20,-100,1000);log('✧ VƯỢT GIỚI THÀNH CÔNG! Ngươi đặt chân tới '+nw.n+' — trần phẩm mở khóa lên '+maxGrade(nt)+'.','good');setResult('Ngươi xé rách không gian, đặt chân lên '+nw.n+'! Linh khí nồng đậm gấp bội, pháp bảo/công pháp/linh dược/trận/thú phẩm cao bắt đầu xuất hiện. Nhưng ở đây ngươi lại chỉ là tân khách yếu ớt giữa vô số cường giả bản địa.');}},
    {l:'Chưa vội — ở lại tích lũy thêm.',act:()=>{S.scene=null;render();save();}}]};}
/* ===== THÔNG THIÊN THÁP (thí luyện xếp hạng) ===== */
function sceneTower(){S.tower=S.tower||{best:0};const floor=(S._towerFloor||0)+1;const b=genBoss();b.ri=Math.min(100,Math.max(1,Math.round(S.ri*0.55+floor*1.3)));b.boss=true;b.soul=floor>=10;
  return{title:'THÔNG THIÊN THÁP · Tầng '+floor,narr:`Tầng ${floor} của Thông Thiên Tháp. Thủ tháp: ${b.name} (${realmName(b.ri,b.si)})${b.soul?' — tỏa áp lực thần hồn':''}. Vượt qua để lên tầng cao hơn; phần thưởng & hiểm nguy đều tăng. Kỷ lục hiện tại: tầng ${S.tower.best||0}.`,choices:[
    {l:'Khiêu chiến thủ tháp tầng '+floor+'.',cls:'primary',hint:'Bại thì bị đẩy khỏi tháp; chết là thật.',act:()=>{const r=fight(b);if(r==='win'){S._towerFloor=floor;S.tower.best=Math.max(S.tower.best||0,floor);S.fame=clamp(S.fame+2,-100,1000);const g=loot(Math.min(6,1+Math.floor(floor/5)));log('Vượt tầng '+floor+' Thông Thiên Tháp! Thu: '+g.join(', '),'good');setScene(sceneTower());}else if(r==='dead')setResult(S.cause);else{S._towerFloor=0;setResult('Ngươi bại ở tầng '+floor+' ('+r+'), bị kình lực đẩy văng khỏi tháp. Kỷ lục: tầng '+S.tower.best+'.');}}},
    {l:'Rời tháp, giữ kỷ lục.',act:()=>{S._towerFloor=0;setResult('Ngươi rời Thông Thiên Tháp với kỷ lục tầng '+(S.tower.best||0)+'.');}}]};}
/* ===== ĐỘNG PHỦ + LINH ĐIỀN ===== */
function caveCost(){return Math.round(Math.pow(10,2+S.ri*0.18));}
function sceneCave(){
  if(!S.cave)return{title:'ĐỘNG PHỦ',narr:'Một động phủ riêng cho ngươi nơi bế quan an toàn linh khí tụ, kèm một mảnh Linh Điền 3 ô để trồng linh dược. Giá: '+caveCost().toLocaleString('vi-VN')+' linh thạch.',choices:[
    {l:'Tậu động phủ ('+caveCost().toLocaleString('vi-VN')+' linh thạch).',show:()=>S.linhThach>=caveCost(),act:()=>{S.linhThach-=caveCost();S.cave={level:1,field:[null,null,null]};log('Ngươi tậu được động phủ + linh điền 3 ô.','good');setResult('Ngươi đã có động phủ riêng! Bế quan trong đây tu nhanh hơn, và có thể trồng/thu hoạch linh dược ở Linh Điền.');}},
    {l:'Thôi.',act:()=>{S.scene=null;render();save();}}]};
  const cv=S.cave;const c=[];
  cv.field.forEach((plot,i)=>{if(!plot)c.push({l:'🌱 Gieo linh dược ô '+(i+1)+' (100 linh thạch)',show:()=>S.linhThach>=100,act:()=>{S.linhThach-=100;const h=genHerb(S.world.tier);cv.field[i]={herb:h,ready:S.time.y+3+RNG.int(0,4)};setResult('Ngươi gieo hạt giống linh dược vào ô '+(i+1)+'; vài năm nữa sẽ chín.');}});
    else if(S.time.y>=plot.ready)c.push({l:'🌾 Thu hoạch ô '+(i+1)+' ('+plot.herb.name+')',act:()=>{const h=plot.herb;S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;cv.field[i]=null;setResult('Ngươi thu hoạch được '+h.name+' từ Linh Điền!');}});
    else c.push({l:'⏳ Ô '+(i+1)+': '+plot.herb.name+' (chín năm '+plot.ready+', nay '+S.time.y+')',act:()=>{setResult('Linh dược chưa chín. Cứ tu luyện, thời gian sẽ tới.');}});});
  c.push({l:'🧘 Bế quan trong động phủ (~2 năm, tu nhanh hơn)',act:()=>{cultivate(2,false);S.progress=Math.min(1,S.progress+0.015*cv.level);log('Bế quan trong động phủ, linh khí tụ giúp tu vi tinh tiến.','good');afterAct();}});
  if(cv.level<9)c.push({l:'⬆ Nâng cấp động phủ (cấp '+cv.level+'→'+(cv.level+1)+', '+(cv.level*500).toLocaleString('vi-VN')+' linh thạch)',show:()=>S.linhThach>=cv.level*500,act:()=>{S.linhThach-=cv.level*500;cv.level++;setResult('Động phủ nâng lên cấp '+cv.level+', linh khí càng nồng, bế quan càng lợi.');}});
  c.push({l:'↩ Rời động phủ.',act:()=>{S.scene=null;render();save();}});
  return{title:'ĐỘNG PHỦ (cấp '+cv.level+')',narr:'Động phủ của ngươi — chốn nương thân giữa cõi tu chân tàn khốc. Linh Điền 3 ô để trồng linh dược, bế quan tại đây tu nhanh hơn.',choices:c};}
/* ===== KIẾN LẬP THẾ LỰC RIÊNG ===== */
function sceneForce(){
  if(!S.ownForce)return{title:'KIẾN LẬP THẾ LỰC',narr:'Thực lực hiện tại đủ để ngươi tự lập môn hộ, cát cứ một phương, chiêu mộ bộ hạ. Một thế lực cho ngươi thu nhập, danh tiếng và tai mắt — cũng khiến ngươi thành mục tiêu của các thế lực khác.',choices:[
    {l:'Lập thế lực của riêng ngươi.',cls:'primary',act:()=>{S.ownForce={name:RNG.pick(SECT_PRE)+' '+RNG.pick(['Các','Cung','Môn','Điện','Trại','Đường']),members:3,power:S.ri,rep:0};S.fame=clamp(S.fame+10,-100,1000);log('Ngươi lập ra thế lực '+S.ownForce.name+'!','good');setResult('Thế lực «'+S.ownForce.name+'» chính thức thành lập với 3 bộ hạ đầu tiên. Từ nay ngươi là chủ một phương.');}},
    {l:'Chưa vội.',act:()=>{S.scene=null;render();save();}}]};
  const f=S.ownForce;const c=[
    {l:'📢 Chiêu mộ bộ hạ (~1 năm)',act:()=>{advance(1);if(RNG.chance(0.7)){const n=1+RNG.int(0,2);f.members+=n;setResult('Ngươi chiêu mộ được '+n+' tán tu gia nhập. Tổng bộ hạ: '+f.members+'.');}else setResult('Năm nay không ai đủ tư cách gia nhập, hoặc không ai dám.');}},
    {l:'💰 Thu thuế/kinh doanh (~1 năm)',act:()=>{advance(1);const inc=Math.round(f.members*Math.pow(10,1+S.ri*0.15));S.linhThach+=inc;f.rep+=2;setResult('Thế lực thu về '+inc.toLocaleString('vi-VN')+' linh thạch, danh tiếng tăng.');}},
    {l:'⚔ Bành trướng, thôn tính thế lực yếu (~2 năm)',hint:'Rủi ro chiến tranh.',act:()=>{advance(2);const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(-1,1));const r=fight(b);if(r==='win'){f.members+=RNG.int(2,6);f.power=Math.max(f.power,S.ri);f.rep+=5;S.fame=clamp(S.fame+5,-100,1000);setResult('Ngươi đánh bại thủ lĩnh địch, thôn tính thế lực của chúng! Bộ hạ tăng mạnh.');}else setResult(r==='dead'?S.cause:('Cuộc bành trướng thất bại ('+r+'), thế lực tổn thất bộ hạ.'));if(S.alive&&r!=='win')f.members=Math.max(0,f.members-RNG.int(1,3));}},
    {l:'↩ Rời sảnh nghị sự.',act:()=>{S.scene=null;render();save();}},
  ];
  return{title:'THẾ LỰC · '+f.name,narr:`«${f.name}» — thế lực của ngươi. Bộ hạ: ${f.members} · Danh vọng: ${f.rep}. Bộ hạ đông, thu nhập lớn, nhưng cũng dễ chiêu kẻ thù nhòm ngó.`,choices:c};}
/* ===== WORLD BOSS — hung thú viễn cổ ===== */
const WORLD_BOSSES=['Thượng Cổ Hung Long','Cửu Anh Quỷ Vương','Thôn Thiên Ma Tổ','Bất Tử Yêu Đế','Hỗn Độn Cổ Thú','Tru Thiên Cương Thi Vương','Vẫn Lạc Thần Ma','Cửu U Minh Xà','Phần Thiên Kim Ô','Đế Cấp Yêu Thánh'];
function evWorldBoss(){const nm=RNG.pick(WORLD_BOSSES);const b=genBoss();b.name=nm;b.ri=Math.min(100,S.ri+RNG.int(3,10));b.boss=true;b.soul=true;b.mightBonus=0.3;
  return{title:'THẾ GIỚI · Hung Thú Viễn Cổ Xuất Thế',narr:`${nm} — một tồn tại viễn cổ khủng bố — vừa phá phong ấn, tàn phá bốn cõi. Vô số tu sĩ kéo tới vây săn, cũng vô số kẻ bỏ mạng. Vật liệu trên thân nó là cực phẩm — nếu ngươi đủ mạng mà lấy.`,choices:[
    {l:'Nhập cuộc vây săn hung thú!',cls:'primary',hint:'Cường địch vượt cấp — cực nguy.',act:()=>{const r=fight(b);if(r==='win'){S.stats.kills++;S.fame=clamp(S.fame+15,-100,1000);const t=genTreasure(Math.min(12,maxGrade(S.world.tier)+1+RNG.int(0,1)));S.treasures.push(t);const g=loot(6);setResult('KHÔNG THỂ TIN NỔI — ngươi bồi nhát kết liễu '+nm+'! Danh chấn thiên hạ (+15 danh tiếng). Đoạt được '+t.name+' ('+t.gradeName+') và: '+g.join(', ')+'.');}else if(r==='dead')setResult(S.cause);else setResult('Ngươi không địch nổi uy áp của '+nm+' ('+r+'), đành lui về giữ mạng giữa biển người tan tác.');}},
    {l:'Núp xa quan sát, nhặt nhạnh tàn cục.',act:()=>{if(RNG.chance(0.5)){const g=loot(2);setResult('Ngươi nhặt nhạnh vật rơi vãi từ những kẻ bỏ mạng: '+g.join(', ')+'. Khôn ngoan hơn liều chết.');}else setResult('Ngươi đứng ngoài nhìn trận vây săn kinh thiên động địa. Nhìn thôi cũng đủ chấn động đạo tâm.');}}]};}
/* ===== CẤM ĐỊA / HUNG ĐỊA ===== */
function evForbiddenZone(){const rw=RNG.pick(['treasure','tech','herb','formation','beast','natal']);
  return{title:'CẤM ĐỊA · Tuyệt Địa Hung Hiểm',narr:'Trước mắt ngươi là một CẤM ĐỊA cổ xưa — nơi ngay cả đại năng cũng kiêng dè. Tử khí ngập trời, xương trắng chất thành núi. Nhưng nơi càng chết chóc, bảo vật càng kinh người.',choices:[
    {l:'Xông vào cấm địa!',cls:'primary',hint:'Tỉ lệ chết rất cao.',act:()=>{const risk=clamp(0.45+S.att*0.004-(luckOf().surv-1)*0.12-profBonus('tran')*0.5,0.2,0.9);if(RNG.chance(risk)){S.alive=false;S.cause='Bỏ mạng trong cấm địa cổ, thi thể hóa một trong vô số bộ xương trắng nơi tuyệt địa.';setResult(S.cause);return;}const g=Math.min(12,maxGrade(S.world.tier)+1+RNG.int(0,1));let name='';if(rw==='treasure'){const t=genTreasure(g);S.treasures.push(t);name=t.name;}else if(rw==='tech'){const t=genTech(g);S.techs.push(t);name='công pháp '+t.name;}else if(rw==='herb'){const h=genHerb(S.world.tier);h.grade=g;h.gradeName=PHAM[g-1].n;S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;name=h.name;}else if(rw==='formation'){const f=genFormation(g);(S.arrays=S.arrays||[]).push(f);name='trận đồ '+f.name;}else if(rw==='beast'){const bb=genBeast(g);(S.beasts=S.beasts||[]).push(bb);name='linh thú '+bb.name;}else{const t=genTreasure(Math.max(4,g));t.lifesave=true;t.special='Luân Hồi Hộ Mệnh (giữ mạng 1 lần)';S.treasures.push(t);name=t.name+' (giữ mạng trùng sinh)';}grantWithPrice(name,g);setResult('Ngươi sống sót ra khỏi cấm địa với chiến lợi phẩm vạn người mơ không được: '+name+'!');}},
    {l:'Đứng ngoài — có nơi không đáng đánh đổi mạng.',act:()=>setResult('Ngươi nhìn cấm địa hồi lâu rồi quay đi. Tham thì thâm; sống sót mới là căn bản của tu tiên.')}]};}
/* ===== ĐẤU GIÁ HỘI (tương tác) ===== */
function evAuction(){const it=RNG.chance(0.5)?genTreasure(clamp(3+RNG.int(0,2),1,maxGrade(S.world.tier)+1)):genTech(clamp(3+RNG.int(0,2),1,maxGrade(S.world.tier)));const base=Math.round(Math.pow(10,1.5+S.ri*0.3)*it.grade);const rival=Math.round(base*(1.25+RNG.range(0,1.35)));const lo=Math.round(base*1.4),hi=Math.round(base*2.4);
  const bid=(amt)=>{if(S.linhThach<amt){setResult('Ngươi không đủ linh thạch.');return;}if(amt>=rival){S.linhThach-=amt;if(it.type==='tech')S.techs.push(it);else S.treasures.push(it);setResult('Tiếng búa cuối cùng gõ xuống — '+it.name+' về tay ngươi với giá '+amt.toLocaleString('vi-VN')+' linh thạch!');}else{setResult('Ngươi trả '+amt.toLocaleString('vi-VN')+', nhưng một vị khách bí ẩn trong phòng riêng nhấc giá cao ngất. Ngươi đành buông — bảo vật vuột khỏi tay.');}};
  return{title:'ĐẤU GIÁ HỘI',narr:`Bảo vật đấu giá: ${it.name} (${it.gradeName||'phẩm '+it.grade}). Giá khởi điểm ${base.toLocaleString('vi-VN')} linh thạch. Các phú hào & đại năng cũng đang nhòm ngó...`,choices:[
    {l:`Trả giá vừa (${lo.toLocaleString('vi-VN')})`,show:()=>S.linhThach>=lo,act:()=>bid(lo)},
    {l:`Trả giá cao (${hi.toLocaleString('vi-VN')})`,show:()=>S.linhThach>=hi,act:()=>bid(hi)},
    {l:'Bỏ qua, không tranh.',act:()=>setResult('Ngươi lắc đầu bỏ qua. Món đó về tay một lão quái nào đó với giá trên trời.')}]};}
/* ===== VẤN ĐẠO ĐẠI HỘI ===== */
function evDaoConference(){const rivals=2+RNG.int(0,3);
  return{title:'VẤN ĐẠO ĐẠI HỘI',narr:`Vấn Đạo Đại Hội — thiên kiêu vạn tộc tụ hội luận đạo, tranh tài. ${rivals} yêu nghiệt đồng đại đang nhìn ngươi bằng ánh mắt khiêu khích. Đây là nơi lập danh, kết giao — và kết thù.`,choices:[
    {l:'Đăng đài luận đạo, tranh ngôi đầu.',cls:'primary',hint:'Thắng thì danh chấn, bại thì mất mặt.',act:()=>{const win=clamp(0.3+(S.cmp-1)*0.15+(S.dao-50)*0.004+((S.laws||[]).length*0.05),0.1,0.9);if(RNG.chance(win)){S.fame=clamp(S.fame+25,-100,1000);const k=RNG.pick(['pha_canh','ngo_dao']);S.inv[k]=(S.inv[k]||0)+1;S.flags.ngoDao=0.15;setResult('Ngươi biện đảo quần hùng, đoạt khôi nguyên Vấn Đạo Đại Hội! Danh chấn thiên hạ (+25 danh tiếng), được ban '+PILL_DEF[k].n+' và một tia đạo vận cho đột phá tới.');}else{S.fame=clamp(S.fame-5,-100,1000);const rv=makeNPC(RNG.int(0,2));remember(rv,'thắng ngươi ở Vấn Đạo Đại Hội',-30);setResult('Ngươi bị một yêu nghiệt đè bẹp trên đài luận đạo, mất mặt trước thiên hạ. Từ đây có thêm một kẻ khinh ngươi ra mặt.');}}},
    {l:'Lặng lẽ quan sát, kết giao thiên kiêu.',act:()=>{if(RNG.chance(0.5)){const n=makeNPC(RNG.int(0,2));n.relation=30;setResult('Ngươi kết giao được '+n.name+', một thiên kiêu đồng đại — quan hệ có thể hữu dụng về sau.');}else setResult('Ngươi lặng lẽ quan sát quần hùng, ghi nhớ mặt mũi các đối thủ tương lai. Tri kỷ tri bỉ, trăm trận trăm thắng.');}}]};}
/* ===== SƯ ĐỒ / THU ĐỒ ĐỆ ===== */
function sceneDisciple(){
  if(!S.disciple)return{title:'SƯ ĐỒ · Thu Đồ Đệ',narr:'Với thân phận hiện tại, ngươi có thể thu nhận một đồ đệ — truyền thừa y bát, có người nối nghiệp & trợ giúp. Nhưng đồ đệ cũng có thể phản sư, hoặc bị kẻ khác lợi dụng để hại ngươi.',choices:[
    {l:'Thu một đồ đệ tư chất tốt.',cls:'primary',act:()=>{const n=makeNPC(-2);S.disciple={name:n.name,ri:Math.max(1,n.ri),loyal:60,talent:1+RNG.int(0,2)};log('Ngươi thu '+n.name+' làm đồ đệ.','good');setResult('Ngươi thu nhận '+n.name+' làm đồ đệ. Hãy dạy dỗ tử tế — đồ đệ trung thành là chỗ dựa, đồ đệ phản bội là con dao sau lưng.');}},
    {l:'Đường tu cô độc, không vướng bận.',act:()=>{S.scene=null;render();save();}}]};

/* ===== ĐỐI THỦ MỆNH ĐỊNH — sự kiện tái ngộ ===== */
function evRival(){ensureRival();const r=S.rival;if(!r||!r.alive)return evCombat();r.encounters++;r.grudge+=8;
  return{title:'MỆNH ĐỊNH · Đối Thủ Tái Ngộ',narr:`Lại là ${r.name} (${realmName(r.ri,r.si)}, tính ${r.trait}) — kẻ đối đầu định mệnh của ngươi, một "thiên mệnh chi tử" khác của thời đại này. Lần thứ ${r.encounters} hai người chạm mặt, ân oán chồng chất. ${r.ri>S.ri?'Hắn đã đi trước ngươi một bước, ánh mắt đầy khinh miệt.':r.ri<S.ri?'Lần này ngươi đã vượt hắn — nhưng hắn tuyệt không cam tâm.':'Hai người vẫn kẻ tám lạng người nửa cân.'}`,choices:[
    {l:'Quyết sinh tử, chấm dứt ân oán!',cls:'primary',hint:'Một mất một còn.',act:()=>{const res=fight({name:r.name,ri:r.ri,si:r.si,mightBonus:0.15});if(res==='win'){r.alive=false;S.flags.rivalSlain=true;S.stats.kills++;S.luck=Math.min(5,S.luck+1);S.luckShown=true;S.fame=clamp(S.fame+20,-100,1000);addKarma(-1,'trảm sát mệnh địch');setResult('Sau bao năm ân oán, ngươi chém gục '+r.name+'! Khí vận của hắn tan vỡ hòa vào ngươi (khí vận +1), danh chấn thiên hạ. Một thiên mệnh chi tử đã ngã xuống dưới tay ngươi.');}else if(res==='dead'){S.cause=r.name+' — đối thủ định mệnh — cuối cùng đã kết liễu ngươi. "Thiên mệnh chi tử của thời đại này, chỉ có thể là một người."';setResult(S.cause);}else setResult('Trận chiến bất phân thắng bại ('+res+'). '+r.name+' để lại một câu lạnh lẽo: "Lần sau, ta sẽ chôn ngươi." Ân oán chưa dứt, chỉ càng thêm sâu.');}},
    {l:'Đấu khẩu, dằn mặt rồi lui.',act:()=>{r.grudge+=5;S.fame=clamp(S.fame+2,-100,1000);setResult('Hai người khẩu chiến nảy lửa trước bàn dân thiên hạ. Chưa động thủ, nhưng oán khí giữa hai người lại dày thêm một tầng.');}},
    {l:'Tạm gác thù, ai đi đường nấy.',show:()=>r.grudge<60,act:()=>{setResult('Ngươi nén cơn giận quay lưng. '+r.name+' cười khẩy sau lưng — ân oán này, sớm muộn cũng phải một phen sống chết.');}}]};}
/* ===== PHÁP BẢO TIẾN HÓA ===== */
function evolveCost(g){return Math.round(Math.pow(10,2+g*0.5));}
function sceneEvolve(){const pool=(S.natal?[{t:S.natal,natal:true}]:[]).concat(S.treasures.filter(t=>t.grade<12).map(t=>({t,natal:false})));const c=[];
  pool.forEach(e=>{const t=e.t;const cost=Math.round(evolveCost(t.grade)*(e.natal?0.5:1));c.push({l:`Tiến hóa ${t.name} (phẩm ${t.grade}→${t.grade+1}, ${cost.toLocaleString('vi-VN')} linh thạch)`,show:()=>S.linhThach>=cost&&t.grade<12,act:()=>{S.linhThach-=cost;const succ=clamp(0.72-t.grade*0.06+profBonus('khi')+(e.natal?0.1:0),0.1,0.95);if(RNG.chance(succ)){t.grade++;t.gradeName=PHAM[t.grade-1].n;t.color=PHAM[t.grade-1].c;t.mult=1+t.grade*0.25;setResult('✦ Tiến hóa thành công! '+t.name+' thăng lên phẩm '+t.grade+' ('+t.gradeName+'), uy lực tăng vọt.');}else{setResult('Tiến hóa thất bại — linh khí phản phệ, vật liệu tan thành hư vô. Pháp bảo may không hư hại.');}}});});
  c.push({l:'↩ Thôi.',act:()=>{S.scene=null;render();save();}});
  return{title:'LUYỆN KHÍ · Tiến Hóa Pháp Bảo',narr:'Bằng thủ đoạn luyện khí, ngươi có thể tế luyện nâng phẩm pháp bảo — phẩm càng cao càng khó, thất bại thì mất vật liệu. Bản mệnh pháp bảo dễ tiến hóa hơn nhờ khế hợp. (Luyện Khí Sư thành công cao hơn.)',choices:c};}
/* ===== TÂM MA KHẢO NGHIỆM ===== */

  {t:'"Trường sinh bất tử... chỉ cần nuốt chửng linh hồn kẻ khác. Chỉ một lần thôi mà, có ai biết đâu."',y:()=>{S.soul+=1;S.taint+=10;addKarma(-4,'nuốt hồn theo tâm ma');return'Ngươi nghe theo, nguyên thần cường hóa — nhưng chướng tính & nghiệp chướng dâng cao ngùn ngụt.';}},

  return{title:'TÂM MA KHẢO NGHIỆM',narr:'Giữa lúc tĩnh tọa, một bóng đen mang gương mặt của chính ngươi hiện lên trong tâm hải. TÂM MA. '+tempt.t,choices:[
    {l:'Trảm tâm ma, giữ vững đạo tâm.',cls:'primary',hint:'Củng cố đạo tâm.',act:()=>{const win=clamp(0.4+(S.dao-50)*0.008+S.cmp*0.05,0.15,0.95);if(RNG.chance(win)){S.dao=Math.min(100,S.dao+8);S.flags.ngoDao=Math.max(S.flags.ngoDao||0,0.1);setResult('Ngươi vung ý chí chém tan tâm ma! Đạo tâm càng kiên định, một tia linh cảm lóe lên cho đột phá tới.');}else{S.taint+=6;S.dao=Math.max(0,S.dao-5);setResult('Tâm ma quá mạnh, ngươi chưa diệt được hoàn toàn — nó lẩn sâu vào tâm hải chờ thời cơ. Chướng tính tăng.');}}},
    {l:'Thuận theo tâm ma, đổi lấy sức mạnh.',hint:'Mạnh lên nhưng sa đọa.',act:()=>{setResult(tempt.y());}}]};}
/* ===== NHÂN QUẢ THEO TỪNG NHÂN VẬT — cố nhân tầm thù / báo ân (dùng NPC & ký ức có thật) ===== */
function evConsequence(){const ids=Object.keys(S.npcs).filter(i=>S.npcs[i].alive&&Math.abs(S.npcs[i].relation)>=40);if(!ids.length)return evCombat();const n=S.npcs[RNG.pick(ids)];const mem=(n.memory&&n.memory.length)?n.memory[n.memory.length-1]:'chuyện cũ giữa hai ta';
  if(n.relation<=-40){n.ri=Math.max(n.ri,Math.min(100,S.ri+RNG.int(-1,1)));remember(n,'tìm ngươi thanh toán ân oán',0);

      {l:'Nghênh chiến, dứt điểm ân oán.',cls:'primary',act:()=>{const r=fight({name:n.name,ri:n.ri,si:n.si,mightBonus:0.15});if(r==='win'){n.alive=false;S.stats.kills++;addKarma(-1,'lại thêm một mạng vào nợ máu');setResult('Ngươi kết liễu '+n.name+', chấm dứt một mối oán — nhưng vòng xoáy nhân quả chỉ càng thêm sâu.');}else setResult(r==='dead'?S.cause:'Kết quả: '+r+'. '+n.name+' ôm hận rút lui, thề sẽ còn quay lại.');}},
      {l:'Cúi mình hòa giải, bồi thường (1000 linh thạch).',show:()=>S.linhThach>=1000,hint:'Chuộc lại nhân quả.',act:()=>{S.linhThach-=1000;if(RNG.chance(0.55)){remember(n,'ngươi thành khẩn bồi thường, hóa giải oán cừu',80);addKarma(1,'chuộc lỗi với cố nhân');setResult('Ngươi thành khẩn tạ lỗi và bồi thường. '+n.name+' trầm mặc hồi lâu rồi thu kiếm: "Coi như xong." Kẻ thù hóa người dưng — có khi thành bằng hữu.');}else setResult(n.name+' hất túi linh thạch xuống đất: "Tưởng vài đồng bạc là xong? Ngươi coi thường ta quá!" Hắn bỏ đi, hận càng khắc sâu.');}}]};}
  return{title:'NHÂN QUẢ · Cố Nhân Báo Ân',narr:`${n.name} (${esc(realmName(n.ri,n.si))}) tìm tới. Hắn vẫn nhớ như in: "${esc(mem)}". "Ân tình xưa chưa từng quên. Hôm nay, cho ta báo đáp."`,choices:[
    {l:'Cảm tạ, hàn huyên cố nhân.',cls:'primary',act:()=>{remember(n,'tái ngộ, tình nghĩa thêm bền chặt',10);if(RNG.chance(0.5)){const k=RNG.pick(['pha_canh','ngo_dao','ho_menh','tho_dan']);S.inv[k]=(S.inv[k]||0)+1;setResult(n.name+' tặng ngươi một viên '+PILL_DEF[k].n+' cùng một lời hứa: "Khi ngươi lâm nguy, ta nhất định có mặt."');}else{S.linhThach+=Math.round(Math.pow(10,1+S.ri*0.25));setResult(n.name+' để lại một túi linh thạch hậu hĩnh rồi cáo từ, không quên dặn ngươi bảo trọng.');}}}]};}

/* ---- Scene builders ---- */
function sceneOrigin(o){return{narr:o.open,choices:[{l:'Mở mắt ra, đối diện với thế giới tàn khốc trước mặt.',act:()=>{S.rootShown=false;S.tcShown=false;setScene(sceneReveal());}}]};}
function sceneReveal(){
  return{title:'Xem Căn Cốt',narr:`Đêm đó, một lão ăn mày rách rưới gõ cửa xin nước. Không ai trong thôn cho lão gì. Chỉ có ngươi chia cho lão nửa bát cháo loãng cuối cùng.

Lão ngẩng lên. Ánh mắt lão — không phải ánh mắt kẻ ăn xin, mà sâu tựa vực thẳm vạn năm. "Nhóc con, để lão phu xem căn cốt của ngươi." Lão đặt một ngón tay khô gầy lên cổ tay ngươi...`,
    choices:[{l:'Chìa tay ra. Đây là cơ hội duy nhất ngươi từng có.',act:()=>{S.rootShown=true;S.tcShown=true;S.luckShown=true;if(S.hidden)S.hidden.shown=true;
      addKarma(1,'chia miếng ăn cho kẻ khốn cùng');
      S.tech=genStarterTech();S.inv.tu_khi=(S.inv.tu_khi||0)+5;log('Nhận công pháp Thanh Khí Quyết + 5 Tụ Khí Đan.','good');grantWithPrice('chỉ dẫn nhập đạo của lão nhân',1);S.flags.canPlay=true;
      setScene(sceneRevealResult());}}]};}
function genStarterTech(){return{uid:++ITEM_SEQ,type:'tech',name:'Thanh Khí Quyết',grade:1,gradeName:'Phàm',giai:0,giaiName:'hạ giai',color:'#9e9e9e',tech:'Luyện Khí công pháp',mult:0.85,danger:0,desc:'Luyện Khí công pháp · phẩm 1 hạ giai — công pháp nhập môn, chậm nhưng vững.'};}
function sceneRevealResult(){const l=luckOf();
  let assess=S.root.spd>=2?'"Linh căn thượng đẳng... ở cái nơi chó ăn đá gà ăn sỏi này?! Trời cao đôi khi cũng biết đùa."':S.root.spd<0.3?'"Linh căn của ngươi gần như bằng không. Kẻ khác gọi đó là phế nhân. Nhưng còn hơn không có gì."':S.root.spd>=1?'"Một linh căn không tệ. Đủ để bước lên con đường ấy — nếu ngươi sống đủ lâu."':'"Linh căn tạp loạn, tu luyện chậm như rùa bò. Nhưng con đường vẫn mở."';
  return{title:'Căn Cốt',narr:`【 XEM CĂN CỐT 】

◆ Linh căn: ${S.root.n}\n   ${S.root.d}
◆ Thể chất: ${S.tc.n} (Phẩm ${S.tc.t})\n   ${S.tc.d}
◆ Khí vận: ${l.n}\n   ${l.d}

${assess}
${l.id===0?'\nLão bỗng trầm giọng: "Nhưng thứ khiến lão phu lo nhất là khí vận của ngươi. Hắc vận. Tai họa sẽ bám theo ngươi như bóng với hình."':''}${S.hidden?'\n\nRồi lão sững người khi ngón tay chạm cổ tay ngươi: "Thì ra là vậy... '+S.hidden.desc+' Đây là cơ duyên của ngươi — cũng là tai họa. Cơ duyên và tai họa là hai mặt một đồng tiền."':''}`,
    choices:[{l:'Cúi đầu tạ ơn, bắt đầu con đường tu tiên.',act:()=>{log('— Con đường tu tiên bắt đầu tại '+S.world.name+' —','lore');setScene(null);TAB='story';}}]};}
// Hub / free-roam scene (khi không có scene cố định)
function sceneHub(){
  const tg=nextTarget();const ready=S.progress>=1;
  const c=[
    {l:'🧘 Bế quan tu luyện (Tĩnh tu, ~1 năm)',act:()=>{cultivate(1,false);afterAct();}},
    {l:'🔥 Khổ tu (nhanh gấp bội, hao thọ + chướng tính)',act:()=>{cultivate(1,true);afterAct();}},
    {l:'⏩ Tu tới khi đủ đột phá',act:()=>{let g=0;while(S.alive&&S.progress<1&&g<4000){cultivate(1,false);g++;}afterAct();}},
  ];
  if(ready&&tg)c.push({l:`⚡ Đột phá → ${tg.name} (${Math.round(breakChance()*100)}%)`,cls:'primary',act:()=>{attemptBreak();afterAct();}});
  c.push({l:'🧠 Luyện nguyên thần (~2 năm)',act:()=>{advance(2);S.soul+=0.4+(S.tc.buff.soul||1)*0.1;log('Nguyên thần ngưng luyện, cường độ đạt '+Math.floor(S.soul)+'.','good');afterAct();}});
  if((S.inv.thanh_linh||0)>0)c.push({l:'💧 Dùng Thanh Linh Đan tẩy chướng tính',act:()=>{usePill('thanh_linh');afterAct();}});
  if(S.world.secretRealm>0)c.push({l:'🌌 Thâm nhập BÍ CẢNH đang mở (cơ duyên lớn · sát cơ lớn · phẩm cao)',cls:'primary',act:()=>{setScene(evSecretRealm());}});

  if(S.sect){c.push({l:`🏯 Vào Công Đức Đường ${S.sect.name} (cống hiến: ${S.sect.contrib})`,act:()=>{setScene(sceneSectHall());}});
    c.push({l:'📋 Nhận nhiệm vụ tông môn',act:()=>{setScene(sceneSectTask());}});
    const rq=sectPromoteReq();if(rq)c.push({l:`⬆ Thăng chức (cần ${rq.contrib} cống hiến · ${rq.ri>0?REALMS[rq.ri-1].name:'—'})`,act:()=>{sectPromote();afterAct();}});
    c.push({l:'🚪 Rời tông môn (thành tán tu)',act:()=>{const nm=S.sect.name;S.sect=null;log('Ngươi rời khỏi '+nm+', trở lại kiếp tán tu.','warn');afterAct();}});}
  // Chức nghiệp / nghề phụ

  else c.push({l:`🛠️ Hành nghề ${S.prof.n} (${PROF_RANK[S.prof.rankId]})`,act:()=>{practiceProf();afterAct();}});
  // Song tu với đạo lữ
  if(S.daolu)c.push({l:`❤ Song tu cùng đạo lữ ${S.daolu.name}`,act:()=>{cultivate(1,false);S.progress=Math.min(1,S.progress+0.03);S.daolu.love=Math.min(100,(S.daolu.love||60)+2);log('Song tu cùng '+S.daolu.name+', tiến độ tăng thêm.','good');afterAct();}});
  // Bản mệnh pháp bảo

  // Phường thị
  c.push({l:'🏪 Tới phường thị (mua/bán)',act:()=>{setScene(sceneMarket());}});
  // Tiến hóa pháp bảo
  if(S.natal||S.treasures.some(t=>t.grade<12))c.push({l:'🔧 Tiến hóa pháp bảo (nâng phẩm)',act:()=>{setScene(sceneEvolve());}});

  // Kiến lập thế lực (Kim Đan trở lên)
  if(S.ri>=3)c.push({l:S.ownForce?`👑 Thế lực ${S.ownForce.name} (${S.ownForce.members} bộ hạ)`:'👑 Kiến lập thế lực riêng',act:()=>{setScene(sceneForce());}});
  // Sư đồ (Nguyên Anh trở lên)
  if(S.ri>=4)c.push({l:S.disciple?`🧑‍🎓 Đồ đệ ${S.disciple.name} (${realmName(S.disciple.ri,0)})`:'🧑‍🎓 Thu đồ đệ',act:()=>{setScene(sceneDisciple());}});
  // Phi thăng vượt giới
  if(canAscendWorld())c.push({l:`🌠 PHI THĂNG vượt giới → ${WORLDS[S.world.tier].n} (mở khóa phẩm cao)`,cls:'primary',act:()=>{setScene(sceneAscendWorld());}});
  c.push({l:'🗺️ Xuất quan — bước vào thế gian hiểm ác (event)',act:()=>{setScene(rollEvent());}});
  if(S.ri>=1&&S.dao>=40&&!S.flags.canSeekDao)c.push({l:'☯ Bế quan tĩnh tọa, thử cầu một tia Ngộ Đạo',hidden:true,act:()=>{setScene(sceneNgoDao());}});
  if(S.ri>=100)c.unshift({l:'✧ Nghịch thiên độ kiếp — PHI THĂNG, kết thúc đạo ca',cls:'primary',hidden:true,act:()=>{S.flags.ascended=true;S.alive=false;S.cause='Ngươi đã đi tới tận cùng của đại đạo. Thiên môn mở ra, ngươi cất bước rời khỏi phàm trần này.';log('✧ ĐỘ KIẾP PHI THĂNG ✧','good');render();save();}});
  const overdue=S.ledger.filter(x=>x.n<0).length;
  const narr=`Ngươi đứng giữa ${S.world.name}, cảnh giới ${realmName(S.ri,S.si)}. Thời gian trôi, thọ nguyên hao mòn từng khắc — và con đường phía trước dài tựa vô tận.\n\n${overdue>3?'Ngươi mơ hồ cảm thấy có những ánh mắt oán độc đang tìm kiếm ngươi trong bóng tối...':luckOf().id<=0?'Vận đen đeo bám; đi đâu ngươi cũng thấy điềm gở.':'Thiên địa tĩnh lặng một cách đáng ngờ.'}`;
  return{title:'Bế Quan',narr,choices:c,log:true};
}
function sceneNgoDao(){S.stats.ngodao++;const gain=0.1+RNG.range(0,0.2)*(S.cmp);const insight=RNG.chance(0.3+S.cmp*0.05);
  return{title:'Ngộ Đạo',narr:`Ngươi ngồi kiết già, gạt bỏ vạn niệm. Hơi thở chậm lại, chậm lại... cho tới khi ngươi không còn nghe thấy nó nữa.

${RNG.pick(['Một chiếc lá khô xoay tròn rơi xuống. Trong khoảnh khắc, ngươi như chạm được một tia đạo vận.','Ngươi thấy mình đứng giữa một bàn cờ trải khắp thiên địa, còn mình chỉ là một quân tốt nhỏ bé.','Dòng thời gian như ngưng đọng. Ngươi thấy sinh, thấy tử, thấy vạn vật tuần hoàn.','Ngươi thấy một hạt giống nứt vỏ, một vì sao tắt lịm, cả hai đều là một quy luật.','Trong hư vô, ngươi nghe thấy tiếng vọng của chính mình từ vô lượng kiếp trước.','Ngươi thấy mưa rơi ngược lên trời, và hiểu ra: cái gọi là quy luật cũng có thể bị bẻ cong.','Một giọt nước hòa vào biển lớn — ngươi ngộ ra thế nào là hữu ngã, thế nào là vô ngã.','Ngươi đối diện một tấm gương vô tận, trong đó có vô số cái tôi đang tu luyện, đang chết, đang tái sinh.'])}`,
    choices:[{l:'Đắm mình vào cảm ngộ.',act:()=>{S.progress=Math.min(1,S.progress+gain);S.dao=Math.min(100,S.dao+5);advance(RNG.int(1,5));if(insight){S.flags.ngoDao=0.12;log(`Tâm cảnh thăng hoa! Tiến độ +${Math.round(gain*100)}%, giữ được linh cảm cho đột phá tới.`,'good');}else log(`Ngươi lĩnh hội được đôi phần, tiến độ +${Math.round(gain*100)}%.`,'good');if(RNG.chance(0.15)&&insight){const t=genTech(clamp(3,1,maxGrade(S.world.tier)));S.techs.push(t);log('Trong cảm ngộ, ngươi lĩnh hội một môn công pháp: '+t.name+'!','good');}
      if(S.ri>=5&&insight&&RNG.chance(0.12+S.cmp*0.03)){const law=RNG.pick(LAWS);if(!(S.laws||[]).includes(law)){(S.laws=S.laws||[]).push(law);log('⚛ Ngươi lĩnh ngộ một tia ĐẠI ĐẠO PHÁP TẮC: «'+law+'»! Đây là nền tảng của cường giả cảnh cao.','good');}}afterAct();}},
    {l:'Ghi nhớ nhưng không sa đà.',act:()=>{advance(0.5);log('Ngươi cất cảm ngộ vào lòng rồi tiếp tục.','');afterAct();}}]};}

/* ---- EVENTS (5 loại + báo thù/đền đáp từ nhân quả) ---- */
function disasterChance(){const l=luckOf();let p=0.02;if(S.karma<0)p+=Math.min(0.4,-S.karma*0.01);p+=Math.min(0.4,S.att*0.005);p/=Math.max(0.5,l.surv);p*=l.att;return clamp(p,0.005,0.9);}
function fortuneChance(){const l=luckOf();let p=0.03*l.fort;if(S.karma>0)p+=Math.min(0.2,S.karma*0.005);return Math.min(0.6,p);}
function rollEvent(){worldPulse();
  // nhân quả: nếu có nợ máu, đôi khi bị báo thù
  const debts=S.ledger.filter(x=>x.n<=-2&&(x.tag.includes('giết')||x.tag.includes('cướp')||x.tag.includes('phản')||x.tag.includes('tà')||x.tag.includes('hắc')));
  if(debts.length&&RNG.chance(Math.min(0.5,0.15+debts.length*0.08)))return evRevenge();
  const goods=S.ledger.filter(x=>x.n>=2);
  if(goods.length&&RNG.chance(0.12))return evReward();
  if(S.sect&&RNG.chance(0.24))return evSect();
  if(S.daolu&&RNG.chance(0.1))return evDaoluPeril();
  if(!S.daolu&&S.ri>=1&&S.dao>=45&&RNG.chance(0.06))return evDaolu();
  if(RNG.chance(0.05))return evWorldBoss();
  if(RNG.chance(0.05))return evForbiddenZone();
  if(RNG.chance(0.05))return evAuction();
  if(S.fame>=30&&RNG.chance(0.05))return evDaoConference();
  if(S.ri>=1&&RNG.chance(0.07))return evRival();
  if(Object.keys(S.npcs).some(i=>S.npcs[i].alive&&Math.abs(S.npcs[i].relation)>=40)&&RNG.chance(0.12))return evConsequence();
  if(RNG.chance(clamp(0.04+(S.taint>20?0.04:0)+(S.karma<0?0.03:0)+(S.dao<40?0.04:0),0.04,0.2)))return evInnerDemon();
  const dis=disasterChance(),fort=fortuneChance();const r=RNG.next();
  if(r<dis*0.6)return evCombat();if(r<dis)return evApoc();if(r<dis+fort)return evFortune();if(r<dis+fort+0.13)return sceneNgoDao();if(r<dis+fort+0.19&&Object.keys(S.npcs).length)return evBetray();if(r<dis+fort+0.24&&RNG.chance(0.5))return evBloodline();return RNG.pick([evFortune,evCombat])();}
const LEGENDS=['Nghe nói Thiên Kiêu của Thanh Vân Tông vừa đột phá Trúc Cơ khi mới mười sáu tuổi.','Đồn rằng một khí vận chi tử vừa bước ra từ bí cảnh, mang theo cả một truyền thừa.','Xa xôi nơi Đế Vực, hai vị Cổ Đế giao thủ, chấn nứt cả một tầng trời.','Một yêu nghiệt vô danh vừa đồ sát cả một tông môn chỉ vì một cây linh dược.','Có tin một bí cảnh vạn năm sắp mở ra ở Hoang Nguyên; vô số tu sĩ đang đổ về đó.','Người ta bảo Đan Vương các vừa ra giá trên trời cho một cây thiên niên linh dược.','Một vị lão tổ bế quan ngàn năm của Huyết Ma giáo vừa có động tĩnh — cả tu tiên giới nín thở.','Nghe đồn có kẻ luyện thành cấm thuật đoạt xá, chuyên chiếm thân xác thiên tài trẻ tuổi.','Một tán tu vô danh bỗng nổi danh sau một đêm vì chém chết một tên đệ tử đại tông môn.','Thương hội Vạn Bảo Lâu vừa treo thưởng truy nã một nữ tu trộm mất bảo vật trấn phái.','Linh mạch một vùng đột nhiên cạn kiệt, cả một tòa thành tu chân trong sớm chiều thành phế tích.','Đồn rằng nơi tận cùng tinh không có một cánh cửa cổ, mở ra là trường sinh, cũng có thể là diệt vong.'];
// Pháp tắc đại đạo: 55 bản nguyên × 6 tầng lĩnh ngộ = 330 pháp tắc phân biệt
const LAW_BASE=['Kim','Mộc','Thủy','Hỏa','Thổ','Lôi Đình','Cuồng Phong','Băng Sương','Viêm Diễm','Đại Địa','Quang Minh','Hắc Ám','Kịch Độc','Huyết Sát','Kiếm','Đao','Thương','Không Gian','Thời Gian','Trọng Lực','Sinh Mệnh','Tử Vong','Luân Hồi','Nhân Quả','Nghiệp Lực','Vận Mệnh','Hủy Diệt','Sáng Thế','Hỗn Độn','Âm','Dương','Ngũ Hành','Tinh Thần','Linh Hồn','Mộng Cảnh','Cấm Chế','Thôn Phệ','Bất Diệt','Hư Vô','Thực Tại','Nhật','Nguyệt','Tinh Thần','Sơn Nhạc','Thương Hải','Cương','Nhu','Tốc Độ','Phong Ấn','Ôn Dịch','Cổ Độc','Thần Lôi','Vẫn Tinh','Hồng Hoang','Chân Thực'];
const LAW_TIER=['chi Ý','chi Tắc','Tiểu Thành','Đại Thành','Bản Nguyên','Đại Đạo Viên Mãn'];
const LAWS=(function(){const o=[];for(const b of LAW_BASE)for(const t of LAW_TIER)o.push(b+' Pháp Tắc · '+t);return o;})();
function worldPulse(){const r=RNG.next();if(r<0.15)worldEvent();else if(r<0.5)log('· '+RNG.pick(LEGENDS),'lore');}
// SỰ KIỆN THẾ GIỚI — xảy ra bất kể người chơi (quy tắc 5), có hệ quả thật lên trạng thái thế giới
function worldEvent(){const roll=RNG.next();
  if(roll<0.28){const up=RNG.chance(0.55);S.world.qiMod=up?(1.6+RNG.range(0,0.6)):(0.55-RNG.range(0,0.15));
    log(up?'『THẾ GIỚI』 ✦ LINH TRIỀU DÂNG TRÀO! Linh khí thiên địa nồng đậm khác thường — tu luyện thuận lợi bội phần một thời gian.':'『THẾ GIỚI』 ✧ Linh khí đại địa đột nhiên khô kiệt, mạch nguồn suy tàn. Tu luyện chậm hẳn cho tới khi hồi phục.',up?'good':'bad');}
  else if(roll<0.48){S.att+=1;log('『THẾ GIỚI』 '+RNG.pick(['Hai đại tông môn khai chiến ở phương xa, vô số tán tu bị cuốn vào vòng xoáy máu lửa.','Ma đạo trỗi dậy — chính ma đại chiến khiến cả một châu vực chìm trong tử khí.','Một vương triều tu chân ngàn năm sụp đổ chỉ sau một đêm binh biến.','Yêu tộc phương Nam khởi loạn, nhân tộc và yêu tộc lại vào một trận đại chiến.'])+' Thời cuộc loạn lạc, đi lại thêm phần hiểm nguy.','lore');}
  else if(roll<0.66){S.world.secretRealm=(S.world.secretRealm||0)+(8+RNG.int(0,10));log('『THẾ GIỚI』 ✦ MỘT BÍ CẢNH CỔ VỪA MỞ RA! Cơ duyên nghịch thiên và sát cơ chết người song hành — cửa chỉ mở trong một thời gian ngắn. (Xuất hiện lựa chọn thám hiểm ở Bế Quan.)','good');}
  else if(roll<0.84){const b=genBoss();log('『THẾ GIỚI』 '+b.name+' — một tồn tại cấp bậc kinh người vừa xuất thế nơi xa, thiên địa dị tượng, vạn linh khiếp phục.','lore');}
  else{S.linhThach+=Math.round(Math.pow(10,(S.ri||1)*0.4));log('『THẾ GIỚI』 Một tòa phường thị lớn mở hội đấu giá; giá linh thạch biến động, ngươi vô tình hưởng lợi chút đỉnh.','lore');}
}
function evSecretRealm(){S.world.secretRealm=0;const reward=RNG.pick(['treasure','tech','herb','formation','beast']);
  return{title:'BÍ CẢNH · Cổ Địa Hung Hiểm',narr:'Ngươi bước qua cửa bí cảnh. Bên trong là một phương thiên địa riêng — linh khí nồng đến ngạt thở, nhưng khắp nơi là xương trắng của những kẻ tới trước. Ở đây, cơ duyên và cái chết chỉ cách nhau một hơi thở.',choices:[
    {l:'Tiến sâu vào lõi bí cảnh.',hint:'Càng sâu càng nhiều kỳ trân — và càng dễ bỏ mạng.',act:()=>{const risk=0.35+S.att*0.005-(luckOf().surv-1)*0.1;if(RNG.chance(clamp(risk,0.15,0.85))){const y=8+RNG.int(0,20);deductLife(y,'trúng cổ cấm chế trong bí cảnh');if(!S.alive){setResult(S.cause);return;}setResult('Ngươi trúng một cổ cấm chế, trọng thương hộc máu (-'+y+' năm thọ), phải liều mạng rút ra tay trắng.');}else{const g=Math.min(12,maxGrade(S.world.tier)+1+RNG.int(0,1));let name='';if(reward==='treasure'){const t=genTreasure(g);S.treasures.push(t);name=t.name+' ('+t.gradeName+')';}else if(reward==='tech'){const t=genTech(g);S.techs.push(t);name='công pháp '+t.name+' (phẩm '+g+')';}else if(reward==='herb'){const h=genHerb(S.world.tier);h.grade=g;h.gradeName=PHAM[g-1].n;S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;name=h.name+' (phẩm '+g+')';}else if(reward==='formation'){const f=genFormation(g);(S.arrays=S.arrays||[]).push(f);name='trận đồ '+f.name+' (phẩm '+g+')';}else{const b=genBeast(g);(S.beasts=S.beasts||[]).push(b);name='linh thú '+b.name+' (phẩm '+g+')';}grantWithPrice(name,g);setResult('Xuyên qua vô số hiểm nguy, ngươi chạm tới lõi bí cảnh và đoạt được kỳ trân mà cả thế giới bên ngoài gần như không tồn tại: '+name+'!');}}},
    {l:'Chỉ nhặt nhạnh vòng ngoài rồi rút lui.',act:()=>{const g=loot(2);setResult('Ngươi khôn ngoan chỉ vơ vét vòng ngoài rồi rút trước khi lòng tham nuốt chửng mình. Thu được: '+g.join(', ')+'.');}}]};}
function evFortune(){const kind=RNG.pick(['herb','cave','relic','spring','merchant','corpse','beast','array']);
  if(kind==='herb'){const h=genHerb(S.world.tier);return{title:'CƠ DUYÊN · Linh Dược Hoang Dã',narr:`Giữa khe núi khuất, ngươi bắt gặp một cây ${h.name} — linh dược phẩm ${h.grade}, ~${h.age.toLocaleString('vi-VN')} năm tuổi. ${h.sentient?'Nó khẽ rung động — dường như đã có linh trí và đang cảnh giác!':'Linh khí tỏa ra thanh mát.'}`,choices:[
    {l:'Lập tức hái lấy.',act:()=>{if(h.sentient&&RNG.chance(0.5)){setResult('Nó bất ngờ nhổ rễ bỏ chạy, phun một làn độc vụ — ngươi chộp hụt, suýt trúng độc.');}else{S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;grantWithPrice(h.name,clamp(h.grade,1,5));setResult('Ngươi hái được '+h.name+'! Nhưng trời đạo luôn đòi lại cái giá của nó.');}}},
    {l:'Quan sát cạm bẫy/kẻ rình rồi mới quyết.',hint:'Thận trọng.',act:()=>{if(RNG.chance(0.4))setResult('Quả nhiên có một tu sĩ khác cũng đang rình. Ngươi lặng lẽ rút lui, giữ được cái mạng.');else{S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;grantWithPrice(h.name,clamp(h.grade,1,4));setResult('An toàn, ngươi ung dung thu hoạch '+h.name+'.');}}},
    {l:'Bỏ qua. Cơ duyên nào cũng có giá.',act:()=>setResult('Ngươi rời đi — một quyết định tỉnh táo hiếm có ở tu tiên giới.')}]};}
  if(kind==='cave')return{title:'CƠ DUYÊN · Động Phủ Cổ Nhân',narr:'Một hang động ẩn sau thác nước cạn, bên trong có dấu vết bố trí của một tu sĩ đã viên tịch — có thể còn di vật.',choices:[
    {l:'Xông thẳng vào lấy đồ.',hint:'Có thể dính cấm chế.',act:()=>{if(RNG.chance(0.35)){const y=10+RNG.int(0,20);deductLife(y,'cấm chế còn sót');setResult(`Một cấm chế kích hoạt! Ngươi trúng đòn, hộc máu (-${y} năm thọ).`);}else{const t=genTreasure(clamp(1+RNG.int(0,3),1,maxGrade(S.world.tier)+1));S.treasures.push(t);grantWithPrice(t.name,t.grade);setResult('Ngươi tìm được di bảo: '+t.name+' ('+t.gradeName+')!');}}},
    {l:'Không mạo hiểm, rời đi.',act:()=>setResult('Ngươi quay lưng với hang động. Sống lâu mới là thắng.')}]};
  if(kind==='spring')return{title:'CƠ DUYÊN · Linh Tuyền',narr:'Sau một vách đá phủ rêu, một mạch suối linh khí trong vắt tuôn ra, hơi nước lấp lánh linh quang. Ngâm mình trong đó có thể tẩy tủy phạt mao — nhưng linh tuyền lộ thiên hiếm khi vô chủ.',choices:[

function evApoc(){return{title:'DIỆT THẾ · Tai Kiếp Giáng Thế',narr:RNG.pick(['Bầu trời bỗng nứt ra một vết đen. Không gian rung chuyển — một tai kiếp đang lan tới!','Đại địa gầm rú, linh khí cuồng loạn. Nghe nói hai đại năng giao thủ nơi xa, dư ba quét tới cả vùng này.','Một cơn linh triều hỗn loạn tràn qua, cuốn theo vô số yêu thú phát cuồng.']),choices:[

function genBoss(){const target=Math.min(100,S.ri+RNG.int(0,3));const names=target<=20?['Hắc Phong Lang Yêu','Thi Độc Chu','Huyết Bức Vương','Tà Tu Hắc Sát','Thủ Hộ Thạch Nhân','Cương Thi Cổ Mộ']:target<=40?['Cổ Đế phân thân','Nghịch Tu Ma Quân','Vạn Yêu Chi Vương','Huyết Hải Ma Thần']:target<=80?['Sinh vật không thể lý giải','Hỗn Độn Cổ Thú','Tàn niệm của một vị Đế đã chết']:['Ý chí của Thế Giới','Hồng Mông tàn ảnh'];
  return{name:RNG.pick(names),ri:Math.max(1,target),si:RNG.int(0,3),boss:true,soul:target>=15,dropG:target>=30?5:target>=10?3:1};}

function usePill(k){const p=PILL_DEF[k];if(!p||(S.inv[k]||0)<=0)return;S.inv[k]--;const msg=p.use(S);S.pillToxin=(S.pillToxin||0)+p.g*0.5;log('Dùng '+p.n+': '+msg,'good');if(S.pillToxin>20&&RNG.chance((S.pillToxin-20)*0.03)){deductLife(S.pillToxin,'tích độc đan (nổ thân)');S.pillToxin*=0.5;}}

const INTENTS=[['attack',['giết','chém','đánh','tấn công','ra tay','diệt','động thủ','xuống tay','hạ sát']],['steal',['trộm','cắp','thó','móc túi','lén lấy','đạo tặc','cuỗm','cướp','cưỡng đoạt']],['threaten',['dọa','đe dọa','uy hiếp','hăm','ép buộc','cảnh cáo','thị uy']],['deceive',['lừa','gạt','dối','giả vờ','đóng giả','ngụy trang','hỏa mù','giả ngây','trá']],['ally',['kết giao','kết bạn','liên minh','bắt tay','chiêu mộ','thu nạp','kết thân','hợp tác']],['flee',['chạy','trốn','bỏ đi','rút lui','né','tẩu','thoát thân']],['sacrifice',['hi sinh','hy sinh','thí','vứt bỏ','bỏ của','buông bỏ','đánh đổi']],['gamble',['liều','đánh cược','mạo hiểm','thử vận','tất tay','đặt cược','cầu may']],['help',['cứu','giúp','bảo vệ','che chở','ứng cứu','xả thân']],['talk',['nói','thương lượng','hỏi','cầu xin','xin','thuyết phục','đàm phán']],['trade',['mua','bán','đổi','trao đổi','giao dịch','mặc cả','ngã giá']],['explore',['khám phá','dò xét','tìm kiếm','lục soát','lục lọi','thăm dò','đi sâu','soát']],['observe',['quan sát','chờ','đợi','nghe ngóng','ẩn','nấp','rình','theo dõi','án binh']],['cultivate',['tu luyện','thiền','ngộ','vận công','luyện công','tĩnh tọa']],['submit',['quỳ','lạy','cúi','nhẫn nhịn','cầu hòa','chịu thua']],['take',['nhặt','lấy','hái','thu','nhận','chộp','đoạt']],['pray',['khấn','cầu nguyện','van','khẩn cầu']],['refuse',['từ chối','mặc kệ','phớt','bỏ qua','ngó lơ','làm ngơ']]];
function parseIntent(t){t=t.toLowerCase();for(const[i,ks]of INTENTS)if(ks.some(k=>t.includes(k)))return i;return'improvise';}
// nhận diện MỌI ý định trong câu, theo thứ tự xuất hiện trong text (cho lối chơi kết hợp: "quan sát rồi ra tay")
function parseIntents(t){t=t.toLowerCase();const hits=[];for(const[i,ks]of INTENTS){let pos=-1;for(const k of ks){const p=t.indexOf(k);if(p>=0&&(pos<0||p<pos))pos=p;}if(pos>=0)hits.push([i,pos]);}hits.sort((a,b)=>a[1]-b[1]);return hits.map(h=>h[0]);}
function detectLetters(t){const toks=t.toUpperCase().split(/[^A-ZÀ-Ỹ]+/);const f=[];for(const x of toks)if(x.length===1&&'ABCDEF'.includes(x)&&!f.includes(x))f.push(x);return f;}
function matchChoice(intent,labels){const rules={attack:['nghênh chiến','chiến','ra tay','giết','lao vào','liều'],flee:['chạy','rút','trốn','rời đi','bỏ đi','bỏ qua'],talk:['thương lượng','mua','nói','cầu','xin'],help:['che chở','cứu','giúp','chắn'],observe:['quan sát','nghe ngóng','chờ','ẩn','nấp','thận trọng','đề phòng'],take:['hái','lấy','nhặt','thu','xông thẳng'],submit:['cúi','quỳ','nhẫn','tạ tội'],refuse:['từ chối','bỏ qua','rời đi','không']};const ks=rules[intent];if(!ks)return-1;for(let i=0;i<labels.length;i++)if(ks.some(k=>(labels[i]||'').toLowerCase().includes(k)))return i;return-1;}
function freeGeneric(intent,text){switch(intent){
  case'attack':S.att+=3;addKarma(-1,'manh động bạo lực');return'Ngươi manh động ra tay. Máu tanh khiến ánh mắt xung quanh chú ý tới ngươi hơn.';
  case'help':addKarma(2,'ra tay nghĩa hiệp');return'Ngươi chọn giúp đỡ dù chẳng lợi gì. Một tia thiện niệm hiếm hoi — nhân quả ghi nhận.';
  case'observe':return'Ngươi lùi vào bóng tối, kiên nhẫn quan sát. Kẻ sống lâu nhất thường ra tay sau cùng.';
  case'cultivate':S.progress=Math.min(1,S.progress+0.02);return'Ngươi lặng lẽ vận công. Tiến độ tu luyện nhích lên đôi chút.';
  case'submit':S.att=Math.max(0,S.att-1);return'Ngươi cúi đầu nhẫn nhịn. Mất mặt, nhưng cái mạng còn — và kẻ khác bớt để ý.';
  case'pray':return'Ngươi thầm khấn nguyện. Thiên đạo vô tình, nhưng thành tâm đôi khi lay động một tia khí vận mong manh.';
  case'take':return'Ngươi với tay lấy thứ trước mắt. Nhưng thứ dễ lấy nhất thường là cạm bẫy khéo giăng.';
  case'flee':return'Ngươi chọn rời đi. Bỏ lỡ cơ duyên, hay né được kiếp nạn — không ai biết trước.';
  case'steal':if(RNG.chance(0.45)){const g=Math.round(Math.pow(10,1+S.ri*0.2));S.linhThach+=g;S.att+=3;addKarma(-1,'trộm đạo');return`Ngươi ra tay nhanh như chớp, thó gọn ${g.toLocaleString('vi-VN')} linh thạch rồi biến vào đám đông. Nhưng trộm đạo tất để lại dấu vết, và ánh mắt dò xét bắt đầu tìm ngươi.`;}S.att+=6;addKarma(-1,'trộm cắp bị lộ');return'Ngươi bị phát giác giữa chừng! Tiếng hô hoán vang lên — giờ cả một vùng đều nhớ mặt kẻ cắp là ngươi.';
  case'threaten':S.att+=2;if(RNG.chance(0.4))return'Khí thế uy hiếp của ngươi khiến đối phương chùn bước. Lần này ngươi thắng mà không cần động thủ.';addKarma(-1,'ỷ mạnh hiếp người');return'Ngươi lên giọng đe dọa. Kẻ yếu cúi đầu, nhưng trong lòng đã gieo một hạt giống oán hận chờ ngày nảy mầm.';
  case'deceive':if(RNG.chance(0.5))return'Ngươi tung hỏa mù, giả ngây giả dại. Đối phương bị dẫn dắt theo ý ngươi mà không hề hay biết — ngươi âm thầm chiếm thế thượng phong.';S.att+=2;addKarma(-1,'lừa gạt bị vạch trần');return'Mưu kế bị nhìn thấu. Ngươi mất mặt, lại thêm mang tiếng xảo trá gian manh.';
  case'ally':if(RNG.chance(0.4)){const n=makeNPC(RNG.int(0,2));n.relation=35;remember(n,'ngươi chủ động kết giao',0);return`Ngươi chủ động đưa tay kết giao. ${n.name} đáp lại thiện chí — một đồng minh hiếm hoi giữa cõi tu chân cô độc (xem Tab Quan Hệ).`;}return'Ngươi ngỏ lời kết giao, nhưng chỉ nhận lại ánh mắt đề phòng. Ở tu tiên giới, lòng tin là thứ xa xỉ bậc nhất.';
  case'sacrifice':S.att=Math.max(0,S.att-3);addKarma(1,'biết bỏ để giữ');return'Ngươi dứt khoát vứt bỏ thứ trong tay để thoát thân. Mất của, nhưng giữ được mạng và bớt bị dòm ngó — một cái đầu tỉnh táo.';
  case'gamble':if(RNG.chance(0.5*luckOf().fort)){const t=genTreasure(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier)+1));S.treasures.push(t);grantWithPrice(t.name,t.grade);return`Ngươi đánh cược tất tay với vận mệnh — và thắng! Đoạt được ${t.name} (${t.gradeName}).`;}{const y=5+RNG.int(0,15);deductLife(y,'canh bạc thất bại');return S.alive?`Canh bạc thất bại, ngươi trả giá bằng ${y} năm thọ nguyên. Vận mệnh không nợ ai lòng thương.`:S.cause;}
  case'explore':{const r=RNG.next();if(r<0.15){const g=Math.round(Math.pow(10,1+S.ri*0.15));S.linhThach+=g;return`Ngươi lục lọi tỉ mỉ từng ngóc ngách và tìm được ${g.toLocaleString('vi-VN')} linh thạch bị bỏ quên.`;}if(r<0.25){const y=3+RNG.int(0,8);deductLife(y,'sa vào cấm chế khi dò xét');return S.alive?`Ngươi dò xét quá sâu và vô tình kích hoạt một cấm chế cổ (-${y} năm thọ).`:S.cause;}return'Ngươi thăm dò xung quanh một cách cẩn thận. Chưa thấy gì đáng giá, nhưng cũng chẳng mất gì — sự thận trọng chưa bao giờ thừa.';}
  case'trade':return'Ngươi ngã giá, cân đo từng phần thiệt hơn. Ở nơi mạnh được yếu thua, biết mặc cả đúng lúc cũng là một loại bản lĩnh sinh tồn.';
  default:if(RNG.chance(0.15)){S.progress=Math.min(1,S.progress+0.01);addKarma(1,'một quyết định khôn ngoan bất ngờ');return`Ngươi hành động theo cách riêng: "${text.slice(0,80)}". Một nước cờ lạ mở ra sinh cơ.`;}return`Ngươi hành động theo cách riêng: "${text.slice(0,80)}". Dòng nhân quả lại rẽ thêm một nhánh nhỏ...`;}}
function doFree(){const inp=$('#freetext');const text=inp?inp.value.trim():'';if(!text)return;let sc=S.scene;if(!sc||sc.hub)sc=sceneHub();if(sc.result){render();return;}
  const intents=parseIntents(text);const intent=intents[0]||'improvise';const letters=detectLetters(text);
  const choices=(sc.choices||[]).filter(c=>!c.show||c.show());
  const combo=letters.length>=2||intents.length>=2; // lối chơi kết hợp / tư duy chiến thuật
  let idx=-1;if(letters.length){const vi=letters[0].charCodeAt(0)-65;if(vi>=0&&vi<choices.length)idx=vi;}
  if(idx<0)idx=matchChoice(intent,choices.map(c=>c.l));
  if(idx>=0&&choices[idx]){if(combo)addKarma(1,'lối chơi mưu trí phá cách');choices[idx].act();afterAct();return;}
  // Ứng biến tự do: mỗi ý định là một hệ quả THẬT; kết hợp nhiều ý định → nhiều hệ quả chồng lên nhau
  let res=freeGeneric(intent,text);
  if(combo&&intents.length>=2&&S.alive){addKarma(1,'lối chơi mưu trí phá cách');
    res='『Mưu kế liên hoàn』 '+res;
    for(let k=1;k<intents.length&&k<3&&S.alive;k++){res+=' — '+freeGeneric(intents[k],text);}}
  freeRes=res;render();save();}

   </div>`;}

/* ---- KẾT CỤC: tính từ nhân quả + lựa chọn + cảnh giới tích lũy cả đời ---- */
function computeEnding(){const k=S.karma,dao=S.dao,ri=S.ri,mut=S.mutations.length,kills=S.stats.kills,att=S.att,betray=S.stats.betray,ngo=S.stats.ngodao,age=Math.floor(S.age);
  const tier=ri>=100?5:ri>=80?4:ri>=50?3:ri>=20?2:ri>=5?1:0; // tầng vóc dáng đạo nghiệp
  const ascend=S.flags&&S.flags.ascended;
  // trục đạo đức: -2 đại ma, -1 tà, 0 trung, 1 chính, 2 đại thiện
  const moral=k<=-15?-2:k<=-4?-1:k>=15?2:k>=4?1:0;
  let title,epithet,tone='bad',poem;
  if(ascend||ri>=100){title='✧ PHI THĂNG THÀNH TIÊN ✧';tone='good';
    epithet=moral<=-1?'Ma Đạo Chân Tiên — cả tiên giới nghe tên biến sắc':moral>=1?'Thượng Cổ Chân Tiên, danh chấn Tam Thiên Đại Thiên Thế Giới':'Tiêu Dao Tán Tiên, đến đi không dấu vết';
    poem='Ngươi bước qua lôi kiếp cuối cùng. Thân xác tan thành vạn điểm tinh quang, bay lên khỏi phàm trần — nơi này đã không còn giữ nổi ngươi. Truyền thuyết về ngươi sẽ được kể mãi ở '+esc(S.world.name)+'.';}
  else if(mut>=8){title='☍ NHÂN TÍNH TIÊU VONG';epithet='Một dị vật không còn nhớ mình từng là người';tone='warn';
    poem=`Sau ${mut} lần dị biến, ngươi soi mình xuống mặt nước và không nhận ra thứ đang nhìn lại. Sức mạnh đã đổi bằng chính linh hồn ngươi. Cái chết này, có lẽ là một sự giải thoát.`;}
  else if(tier>=3&&moral<=-2){title='☠ MA ĐẾ NGÃ XUỐNG';epithet=`Đại Ma Đầu tay nhuốm máu ${kills} sinh linh, bị chính đạo vây diệt`;tone='warn';
    poem='Ngươi đã đứng trên đỉnh bằng xương máu vô số kẻ khác. Nhưng nợ máu tất phải trả — vạn tu sĩ chính đạo hợp lực, và ngay cả ngươi cũng không chống nổi nhân quả của cả một thời đại.';}
  else if(tier>=3&&moral>=2){title='✦ ĐẠI NĂNG VIÊN TỊCH';epithet='Một vị chính đạo tiền bối được vạn người kính ngưỡng, ngồi hóa mà đi';tone='good';
    poem='Ngươi sống một đời quang minh, cứu vớt vô số sinh linh. Khi thọ nguyên cạn, ngươi mỉm cười ngồi kiết già hóa đi, để lại một truyền thừa và một cái tên sạch sẽ giữa tu tiên giới đầy bùn nhơ.';}
  else if(tier>=3){title='◈ NHẤT ĐẠI CƯỜNG GIẢ TẠ THẾ';epithet=`${esc(realmName(ri,S.si))} — kẻ đã đi rất xa trên đại đạo`;tone='good';
    poem='Ngươi đã leo tới nơi mà chín phần mười tu sĩ cả đời không mơ tới. Nhưng đại đạo vô tận, còn thọ nguyên thì hữu hạn. Ngươi ngã xuống, mắt vẫn hướng về đỉnh trời chưa với tới.';}
  else if(betray>=3&&moral<=-1){title='✎ CÔ GIA QUẢ NHÂN';epithet='Kẻ phản bội tất cả, rồi bị tất cả phản bội, chết trong cô độc';
    poem='Ngươi đã bán đứng bao nhiêu người để leo lên? Đến cuối, không một ai bên cạnh khi ngươi tắt thở. Cái chết cô quạnh này là nhân quả ngươi tự gieo.';}
  else if(age>=400&&tier<=1){title='☯ TÁN NHÂN ẨN THẾ';epithet=`Một lão nhân sống ${age} tuổi mà cảnh giới không cao — nhưng sống lâu hơn vô số thiên tài`;tone='';
    poem='Ngươi không có đại tài, cũng chẳng có đại vận. Nhưng ngươi cẩn trọng, nhẫn nại, và ngươi sống — sống lâu hơn cả những thiên kiêu từng khinh thường ngươi. Đôi khi, sống sót cũng là một loại đạo.';}
  else if(ngo>=5){title='❈ NGỘ ĐẠO NHI VONG';epithet='Kẻ mãi mê đại đạo mà quên mất tính mạng, đắc đạo trong khoảnh khắc lâm chung';
    poem='Ngươi dành cả đời truy cầu chân lý, có lẽ đã chạm được một tia. Trong khoảnh khắc cuối, ngươi mỉm cười — hiểu ra, rồi tan biến. Đạo ở trong tâm, không ở tuổi thọ.';}
  else if(tier>=1){title='⚔ VONG ĐỒ NƠI TU CHÂN GIỚI';epithet=`${esc(realmName(ri,S.si))} — một tu sĩ trung bình giữa dòng đời tàn khốc`;
    poem='Ngươi đã cố gắng. Ngươi đã tiến bộ. Nhưng con đường tu tiên chất đầy xương trắng, và ngươi trở thành một trong số đó. Không ai nhớ tên ngươi ngoài chính ngươi.';}
  else{title='☠ VÔ DANH CHI BỐI';epithet=att>10?'Lộ diện quá sớm, chết như một con kiến dưới chân người khác':'Một hạt bụi chưa kịp thấy bầu trời đã tắt lịm';
    poem='Con đường còn chưa bắt đầu đã kết thúc. Trong '+esc(S.world.name)+', mỗi ngày có hàng vạn kẻ như ngươi ngã xuống, không tiếng vang, không dấu vết. Thế giới không hề dừng lại vì ngươi.';}
  const balance=k>=8?'Cả đời ngươi tích thiện, nhân quả trong sạch.':k>=1?'Ngươi giữ được nhiều hơn phần thiện.':k<=-15?'Nợ máu ngập trời, oán khí chưa tan.':k<=-1?'Tay ngươi đã vấy không ít nghiệp chướng.':'Thiện ác cân bằng, một đời không nợ ai cũng chẳng ai nợ.';
  return{title,epithet,tone,poem,balance};}
function death(){
  // Pháp bảo GIỮ MẠNG: nghịch chuyển sinh tử, hồi sinh tại chỗ 1 lần (khác với trùng sinh)
  const li=(S.treasures||[]).findIndex(t=>t.lifesave);
  if(li>=0&&!(S.flags&&S.flags.lifesaveUsed)){const t=S.treasures[li];S.treasures.splice(li,1);S.alive=true;S.flags.lifesaveUsed=true;S.hp=Math.round(S.hpMax*0.4);if(S.life<20)S.life=20+RNG.int(0,30);S.taint=Math.max(0,S.taint-20);
    log('✧ «'+t.name+'» vỡ tan, nghịch chuyển sinh tử — ngươi bị kéo lại từ cửa quỷ môn quan!','good');
    setResult('Ngay khoảnh khắc hồn phách sắp tiêu tán, «'+t.name+'» bất ngờ nổ tung thành vạn điểm kim quang, cải tử hoàn sinh cho ngươi. Ngươi sống lại — nhưng bảo vật hộ mệnh vô giá đã không còn.');return;}
  $('#status').style.display='block';$('#tabbar').style.display='none';
  const E=computeEnding();const col=E.tone==='good'?'var(--gold)':E.tone==='warn'?'var(--cyan)':'var(--bad)';
  const R=computeRebirth();save();
  $('#view').innerHTML=`<div class="menu-wrap"><h1 style="color:${col}">${esc(E.title)}</h1>
   <p style="color:${col};font-weight:600;font-style:italic;margin:6px 0 2px">「 ${esc(E.epithet)} 」</p>
   <p class="bad" style="font-style:italic;margin:12px 0">${esc(S.cause||'Ngươi đã chết.')}</p>
   <p class="muted" style="font-size:.9rem;line-height:1.6;margin:12px 0">${esc(E.poem)}</p>
   <p class="muted" style="font-size:.84rem;font-style:italic">${esc(E.balance)}</p>
   <div class="muted" style="font-size:.82rem;border-top:1px solid var(--line);padding-top:10px;margin-top:12px">Ngã xuống ở <b>${esc(realmName(S.ri,S.si))}</b>, hưởng "thọ" ${Math.floor(S.age)} tuổi.<br>Giết ${S.stats.kills} · Đột phá ${S.stats.break} · Ngộ đạo ${S.stats.ngodao} · Bị phản bội ${S.stats.betray} · Nhân quả ${S.karma}.</div>
   ${R.ok?`<p class="good" style="font-weight:600;margin:14px 0 4px">☯ TRÙNG SINH! Một tia hồn phách ngươi thoát khỏi luân hồi, mang theo ${esc(R.legacy.desc)} sang kiếp sau.</p>`:'<p class="muted" style="font-size:.82rem;margin-top:12px;font-style:italic">Hồn phách tan vào luân hồi, ký ức kiếp này xóa sạch...</p>'}
   <button class="btn primary" data-m="new" style="margin-top:12px">${R.ok?'☯ Chuyển thế (mang theo di sản kiếp trước)':'Chuyển thế — bắt đầu lại từ hư vô'}</button></div>`;}

document.addEventListener('click',(e)=>{
  const card=e.target.closest('[data-o]');if(card){const id=card.getAttribute('data-o');const o=id==='__random__'?rollRandomOrigin():ORIGINS.find(x=>x.id===id);newState(o.id);setScene(sceneOrigin(o));return;}
  const m=e.target.closest('[data-m]');if(m){const a=m.getAttribute('data-m');
    if(a==='cont'){if(load()){TAB='story';render();}}
    else if(a==='new')chooseOrigin();
    return;}
  const tab=e.target.closest('[data-tab]');if(tab){TAB=tab.getAttribute('data-tab');render();return;}
  const use=e.target.closest('[data-use]');if(use){usePill(use.getAttribute('data-use'));render();save();return;}
  const tech=e.target.closest('[data-tech]');if(tech){const i=+tech.getAttribute('data-tech');const t=S.techs[i];if(t){if(!S.tech||confirm('Chuyển sang tu luyện '+t.name+' (phẩm '+t.grade+')? Công pháp cũ: '+(S.tech?S.tech.name:'không'))){const old=S.tech;S.tech=t;S.techs.splice(i,1);if(old&&old.name!=='Thanh Khí Quyết')S.techs.push(old);log('Chuyển sang tu luyện: '+t.name+'.','good');}}render();save();return;}
  const bi=e.target.closest('[data-i]');if(bi){const k=bi.getAttribute('data-i');
    if(k==='cont'){S.scene=null;render();save();return;}
    if(k==='free'){doFree();return;}
    const idx=+k;const ch=$('#view')._choices;if(ch&&ch[idx]){ch[idx].act();afterAct();}return;}
});
document.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&e.target&&e.target.id==='freetext'){e.preventDefault();doFree();}});

/* khởi động */
window.addEventListener('error',function(ev){try{const v=document.getElementById('view');if(v&&!v.innerHTML.trim())v.innerHTML='<div class="menu-wrap"><h1>Lỗi tải</h1><p class="muted">Có lỗi khi khởi động. Thử tải lại trang. Nếu vẫn lỗi, báo lại giúp: '+(ev.message||'')+'</p><button class="btn" data-m="new">✦ Bắt đầu</button></div>';}catch(_){}});
try{render();}catch(e){try{document.getElementById('view').innerHTML='<div class="menu-wrap"><h1>TU TIÊN</h1><p class="muted">Không khởi động được ('+(e&&e.message||e)+'). Bấm để bắt đầu.</p><button class="btn primary" data-m="new">✦ Bắt đầu</button></div>';}catch(_){}}
</script>
</body>
