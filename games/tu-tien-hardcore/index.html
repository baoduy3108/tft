<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Tu Tiên — Vô Hạn Đạo (Hardcore)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
:root{
  --bg:#0a0e14;--card:#141922;--card2:#1a2029;--line:#26303d;--txt:#d8dee7;--muted:#7f8b9c;
  --cyan:#00e5ff;--gold:#ffab40;--good:#6fdc8c;--bad:#ff6b6b;--warn:#ffd54f;--lore:#b39ddb;--accent:#ff6f00;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.55;font-size:15px;max-width:760px;margin:0 auto;min-height:100vh;padding:8px 8px 68px}
#status{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#141922,#10151d);border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:0 3px 12px rgba(0,0,0,.5);margin-bottom:10px}
.st-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.st-name{font-weight:700;color:var(--cyan);font-size:1.02rem}
.st-realm{color:var(--gold);font-weight:600;text-align:right}
.bar{position:relative;height:16px;background:#0c1118;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:7px}
.bar>i{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,#0288d1,#00e5ff);transition:width .4s}
.bar>span{position:relative;z-index:1;display:block;text-align:center;line-height:16px;font-size:.72rem;text-shadow:0 1px 2px #000}
.st-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px 12px;font-size:.8rem}
.st-grid>div{display:flex;justify-content:space-between;gap:6px;border-bottom:1px dotted #202833;padding:1px 0}
.st-grid b{color:var(--muted);font-weight:500}
.st-grid .bad{color:var(--bad)}.st-grid .good{color:var(--good)}.st-grid .warn{color:var(--warn)}
#view{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;min-height:200px}
h1{color:var(--cyan);text-align:center;font-size:1.5rem;margin-bottom:8px}
h2{color:var(--gold);font-size:1.15rem;margin-bottom:10px}
.narr{white-space:pre-wrap;margin-bottom:14px;font-size:.98rem}
.choices{display:flex;flex-direction:column;gap:8px}
.btn{display:flex;align-items:center;gap:10px;width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:11px 13px;border-radius:10px;font-size:.9rem;cursor:pointer;text-align:left;transition:.12s;font-family:inherit}
.btn:hover{border-color:#3a4a5e;background:#1f2732}
.btn:active{transform:scale(.99)}
.btn.primary{background:linear-gradient(90deg,#e65100,#ff6f00);border:none;color:#fff;font-weight:700;justify-content:center}
.btn.small{width:auto;padding:6px 12px;font-size:.82rem}
.btn.disabled,.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.hidden-choice{border-color:#6d4bb3;background:#241a33}
.ch-key{flex:none;width:26px;height:26px;border-radius:6px;background:#0c1118;border:1px solid var(--line);display:grid;place-items:center;font-weight:700;color:var(--gold);font-size:.85rem}
.ch-l{flex:1}.ch-h{display:block;font-size:.74rem;color:var(--muted);margin-top:2px;font-style:italic}
.freeform{margin-top:14px;border-top:1px dashed var(--line);padding-top:10px}
.ff-l{font-size:.78rem;color:var(--muted);margin-bottom:6px;font-style:italic}
.ff-row{display:flex;gap:6px}
.ff-in{flex:1;background:#0c1118;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 11px;font-size:.85rem;font-family:inherit}
.ff-in:focus{outline:none;border-color:var(--cyan)}
.free-res{background:#12181f;border-left:3px solid var(--lore);border-radius:6px;padding:9px 11px;margin-bottom:12px;font-size:.9rem;font-style:italic}
.log{background:#0c1118;border:1px solid var(--line);border-radius:8px;padding:8px;max-height:180px;overflow-y:auto;font-size:.82rem;margin-top:10px}
.log div{padding:2px 0;border-bottom:1px dotted #1a212b}
.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.lore{color:var(--lore);font-style:italic}.death{color:var(--bad);font-weight:700}
.muted{color:var(--muted)}
.tabbar{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;display:flex;background:#10151d;border-top:1px solid var(--line);z-index:30}
.tab{flex:1;background:none;border:none;color:var(--muted);padding:8px 4px 7px;font-size:.72rem;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent}
.tab span{font-size:1.15rem}
.tab.active{color:var(--cyan);border-top-color:var(--cyan);background:#131a24}
.item{display:flex;justify-content:space-between;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin-bottom:6px;font-size:.85rem;align-items:center}
.pill{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:20px;font-weight:700;color:#0a0e14}
.chip{display:inline-block;font-size:.72rem;padding:2px 8px;border:1px solid var(--line);border-radius:12px;margin:2px 3px 0 0}
.sheet p{margin-bottom:7px;font-size:.9rem}
.menu-wrap{text-align:center;padding:16px 6px}
.menu-wrap .btn{max-width:340px;margin:8px auto;justify-content:center}
.rar{font-size:.7rem;padding:1px 7px;border-radius:10px;font-weight:700}
.origin-card{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px;background:var(--card2);cursor:pointer}
.origin-card:hover{border-color:#3a4a5e}
.origin-card .nm{font-weight:700;color:var(--cyan)}
.origin-card .ds{font-size:.8rem;color:var(--muted);margin-top:3px}
.warn-note{color:var(--bad);font-size:.82rem;margin-top:12px}
</style>
</head>

<script>
"use strict";
/* =========================================================================
   TU TIÊN — VÔ HẠN ĐẠO (hardcore). 1 file tự chứa, offline, localStorage.
   Kiến trúc: dữ liệu bảng + generator thủ tục + scene engine + 5 quy tắc gốc.
   ========================================================================= */
const SAVE_KEY='tutien_vohando_v1';
const LEGACY_KEY='tutien_legacy_v1'; // di sản mang qua kiếp sau khi trùng sinh
// Kho lưu an toàn: localStorage có thể bị chặn/ném lỗi trong iframe sandbox (Artifact) → fallback bộ nhớ tạm để game vẫn chạy
const LS=(function(){try{const k='__tt_probe';window.localStorage.setItem(k,'1');window.localStorage.removeItem(k);return window.localStorage;}catch(e){const m=Object.create(null);return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
const $=(s)=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=(s)=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2=(s)=>esc(s).replace(/\n/g,'<br>');

/* ---------- RNG có seed ---------- */
function makeRNG(seed){let st=(seed>>>0)||(Date.now()>>>0);
  const r={next(){let t=(st+=0x6d2b79f5);t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;},
  int(a,b){return Math.floor(r.next()*(b-a+1))+a;},range(a,b){return a+r.next()*(b-a);},
  pick(arr){return arr[Math.floor(r.next()*arr.length)];},chance(p){return r.next()<p;},
  weight(list){let t=0;for(const x of list)t+=x[0];let k=r.next()*t;for(const x of list){k-=x[0];if(k<=0)return x[1];}return list[list.length-1][1];}};
  return r;}
let RNG=makeRNG(Date.now());

/* ---------- Số lớn: hiển thị theo số mũ log10 + đơn vị Hán ---------- */
const HAN=[[0,''],[4,'vạn'],[8,'ức'],[12,'triệu ức'],[16,'kinh'],[20,'cai'],[24,'tỉ'],[28,'nhương'],[32,'câu'],[36,'giản'],[40,'chính'],[44,'tái'],[48,'cực'],[52,'hằng hà sa'],[56,'a tăng kỳ'],[60,'na do tha'],[64,'bất khả tư nghị'],[68,'vô lượng'],[72,'đại số']];
function fmtExp(exp){ // exp = log10 của số
  if(exp<0)return'0';
  if(exp<4){const v=Math.pow(10,exp);return (Math.round(v*10)/10).toLocaleString('vi-VN');}
  for(let i=HAN.length-1;i>=0;i--){const[ue,un]=HAN[i];if(exp>=ue&&exp-ue<4){const val=Math.pow(10,exp-ue);const sh=val>=1000?Math.round(val):Math.round(val*100)/100;return `${sh.toLocaleString('vi-VN')} ${un}`.trim();}}
  const e=Math.floor(exp);const m=Math.round(Math.pow(10,exp-e)*100)/100;return `${m}×10^${e}`;}

/* =========================================================================
   BẢNG DỮ LIỆU
   ========================================================================= */
const GROUPS=[
 {name:'Tiên Phàm Giới',names:['Luyện Khí','Trúc Cơ','Kim Đan','Nguyên Anh','Hóa Thần','Luyện Hư','Hợp Thể','Đại Thừa','Bán Tiên','Chân Tiên']},
 {name:'Tiên Nhân',names:['Huyền Tiên','Kim Tiên','Thái Ất Tiên','Đại La Tiên','Chuẩn Thánh','Thánh Nhân','Thánh Vương','Thánh Hoàng','Thánh Đế','Thiên Đế']},
 {name:'Đế Cấp',names:['Hư Không Đế','Luân Hồi Đế','Thiên Đạo Đế','Vũ Trụ Đế','Đa Vũ Trụ Đế','Thời Gian Đế','Nhân Quả Đế','Khởi Nguyên Đế','Hư Vô Đế','Hỗn Độn Đế','Hỗn Độn Thánh','Hỗn Độn Vương','Hỗn Độn Hoàng','Hỗn Độn Chúa','Hỗn Độn Chủ','Hỗn Độn Tổ','Hỗn Độn Thủy Tổ','Hỗn Độn Đạo Chủ','Hỗn Độn Đạo Tổ','Hỗn Độn Đạo Đế']},
 {name:'Đạo Cấp',names:['Đạo Chủ','Đạo Vương','Đạo Hoàng','Đạo Đế','Đạo Tổ','Đại Đạo Chủ','Đại Đạo Vương','Đại Đạo Hoàng','Đại Đạo Đế','Đại Đạo Tổ','Vô Thượng Đạo Chủ','Vô Thượng Đạo Vương','Vô Thượng Đạo Hoàng','Vô Thượng Đạo Đế','Vô Thượng Đạo Tổ','Tối Thượng Đạo Chủ','Tối Thượng Đạo Vương','Tối Thượng Đạo Hoàng','Tối Thượng Đạo Đế','Tối Thượng Đạo Tổ']},
 {name:'Hỗn Nguyên Cấp',names:['Hỗn Nguyên','Hỗn Nguyên Chủ','Hỗn Nguyên Vương','Hỗn Nguyên Hoàng','Hỗn Nguyên Đế','Hỗn Nguyên Thánh','Hỗn Nguyên Đại Thánh','Hỗn Nguyên Chúa','Hỗn Nguyên Tổ','Hỗn Nguyên Cực Tổ','Hỗn Nguyên Khởi Nguyên','Hỗn Nguyên Thực Tại','Hỗn Nguyên Vũ Trụ','Hỗn Nguyên Đa Vũ Trụ','Hỗn Nguyên Hư Vô','Hỗn Nguyên Vô Hạn','Hỗn Nguyên Vĩnh Hằng','Hỗn Nguyên Tối Thượng','Hỗn Nguyên Đại Đạo','Hỗn Nguyên Chúa Tể']},
 {name:'Đại Đạo Cấp',names:['Siêu Hỗn Nguyên','Tối Thượng Khởi Nguyên','Tối Thượng Hư Vô','Tối Thượng Hỗn Độn','Tối Thượng Thực Tại','Tối Thượng Vũ Trụ','Tối Thượng Đa Vũ Trụ','Tối Thượng Vô Hạn','Tối Thượng Vĩnh Hằng','Tối Thượng Đại Đạo','Khởi Nguyên Chủ','Hư Vô Chủ','Hỗn Độn Chủ','Thực Tại Chủ','Vũ Trụ Chủ','Đa Vũ Trụ Chủ','Vô Hạn Chủ','Vĩnh Hằng Chủ','Đại Đạo Chủ','ĐẠI ĐẠO']},
];
const SUBS=['Sơ kỳ','Trung kỳ','Hậu kỳ','Đỉnh phong'];
const SUBS9=['Nhất tầng','Nhị tầng','Tam tầng','Tứ tầng','Ngũ tầng','Lục tầng','Thất tầng','Bát tầng','Cửu tầng'];
const REALMS=(function(){
  const out=[];let g=0,cnt=0,entry=0.3;
  for(let id=1;id<=100;id++){
    while(cnt+GROUPS[g].names.length<id){cnt+=GROUPS[g].names.length;g++;}
    const group=GROUPS[g];const name=group.names[id-1-cnt];
    const subs=id===1?SUBS9:SUBS;
    const step=id<8?Math.log10(1.35):1;
    const subExps=subs.map((_,k)=>entry+k*step);
    const top=subExps[subExps.length-1];
    out.push({id,name,group:group.name,subs,subExps,entry,top,
      life:Math.round(id<=0?80:lifeFor(id)),
      breakBase:id<8?0.6:Math.max(0.02,0.6-(id-8)*0.006)});
    const jump=id<8?Math.log10(2.5):(2+(id-8)/92);
    entry=top+jump;
  }
  return out;
})();
function lifeFor(id){const t=[150,320,800,2000,5000,12000,30000,80000,200000,500000];if(id<=10)return t[id-1];return 500000*Math.pow(10,(id-10)*0.7);}
function realmName(ri,si){if(ri<=0)return'Phàm Nhân';const r=REALMS[ri-1];return r.name+' '+r.subs[clamp(si,0,r.subs.length-1)];}
function powerExp(ri,si){if(ri<=0)return 0;const r=REALMS[ri-1];return r.subExps[clamp(si,0,r.subExps.length-1)];}
// Miêu tả SỨC MẠNH từng cảnh giới — tu sĩ ở cảnh này làm được gì
const REALM_POWER={
 'Luyện Khí':'Dẫn linh khí nhập thể, gột rửa phàm cân tục cốt. Có thể ngưng linh lực sơ khai, đả xuất chưởng phong, luyện chút bùa chú. Vẫn là phàm nhân trước mắt cường giả.',
 'Trúc Cơ':'Trúc thành đạo cơ, linh lực hóa dịch chảy khắp kinh mạch. Có thể ngự vật bay lượn tầm thấp, khinh công lướt trên mặt nước, thọ nguyên ~200 năm.',
 'Kim Đan':'Ngưng linh lực thành một viên Kim Đan bất diệt — nguồn lực gần như vô tận. Ngự khí phi hành ngàn dặm, thần thức tỏa ra ngoài thân, ngưng đan lập phái.',
 'Nguyên Anh':'Kim Đan vỡ ra, sinh Nguyên Anh — một "mình thứ hai" trong hồn. Nguyên thần xuất khiếu, thân xác dù nát vẫn có thể đoạt xá trùng sinh. Thọ ~800 năm.',
 'Hóa Thần':'Nguyên Anh dung hợp thiên địa, bắt đầu lĩnh ngộ Pháp Tắc. Cách không dời non lấp bể, một ý niệm khuấy động phong vân cả một vùng.',
 'Luyện Hư':'Thân hòa vào hư không, nhìn thấu tầng không gian. Có thể ẩn thân giữa hư vô, chớp mắt dịch chuyển, đấu pháp trong khe hở không gian.',
 'Hợp Thể':'Nguyên thần và nhục thân hợp nhất, đạt cảnh thiên nhân hợp nhất. Vung tay chấn nứt sơn hà, một hơi thở làm khí hậu cả châu vực đổi thay.',
 'Đại Thừa':'Đỉnh phong của nhân tiên, chuẩn bị đón lôi kiếp phi thăng. Cử động dẫn động linh khí thiên địa, uy áp khiến vạn linh cấp thấp phủ phục.',
 'Bán Tiên':'Nửa bước sang bờ tiên, thân đã nhiễm tiên khí, phàm binh phàm pháp khó tổn thương. Một niệm có thể định sinh tử vô số phàm nhân.',
 'Chân Tiên':'Chân chính thành tiên, thoát ly luân hồi, thọ nguyên gần như bất tận. Một niệm diệt được cả một tòa phàm thành; bắt đầu ganh đua nơi tiên giới.',
 // — Tiên Nhân giới (cảnh 11–20) —
 'Huyền Tiên':'Sơ nhập tiên đạo, luyện hóa tiên nguyên. Có thể khai mở tiểu động thiên riêng, ngưng tụ tiên khí thành binh, một tay che kín cả một tòa núi.',
 'Kim Tiên':'Thân bất hoại như kim, kiếp số khó tổn. Cước đạp hư không xuyên tinh vực, ngôn xuất pháp tùy, lời nói mang theo uy quyền pháp tắc.',
 'Thái Ất Tiên':'Luyện thành Thái Ất chân thân, dung hợp nhiều pháp tắc thành một. Vung tay là tinh thần chuyển dịch, có thể trấn thủ một phương tiên vực.',
 'Đại La Tiên':'Chứng Đại La đạo quả, thoát khỏi trường hà thời gian — quá khứ vị lai khó trói buộc. Một niệm sinh diệt vạn vật trong lãnh vực của mình.',
 'Chuẩn Thánh':'Nửa bước thánh nhân, thân mang thánh uy sơ hiện. Cử động dẫn động đại đạo cộng hưởng; một hơi thở, vạn tiên phủ phục.',
 'Thánh Nhân':'Thánh nhân bất tử bất diệt, cùng thiên địa đồng thọ. Bàn tay lật là một phương thế giới sinh, úp là một phương thế giới diệt.',
 'Thánh Vương':'Thánh nhân chi vương, thống lĩnh vô số thánh. Đại đạo pháp tắc theo ý mà cong; nơi ngươi đứng, chính là trung tâm của một tầng trời.',
 'Thánh Hoàng':'Uy lâm vạn thánh, một lời định tôn ti thiên địa. Khai thiên tịch địa như trở bàn tay, nắm giữ vận mệnh của cả một đại thiên thế giới.',
 'Thánh Đế':'Thánh đạo đăng đỉnh, đế uy trùm vũ trụ. Một ánh mắt xuyên thấu vạn giới, một tiếng nói vang vọng khắp chư thiên.',
 'Thiên Đế':'Đế lâm chư thiên vạn giới, đứng trên tuyệt đại đa số sinh linh. Bước tới ngưỡng cửa của Đế Cấp — nơi một niệm có thể khai mở hoặc nghiền nát cả một vũ trụ.',
};
const GROUP_POWER={
 'Tiên Phàm Giới':'Từ phàm nhân leo dần tới tiên — mỗi cảnh giới là một lần lột xác của thân thể, linh hồn và thọ nguyên.',
 'Tiên Nhân':'Bậc chân tiên — có thể khai thiên tịch địa một phương tiểu thiên thế giới, nắm giữ nhiều pháp tắc, thọ nguyên tính bằng vạn năm.',
 'Đế Cấp':'Đế cấp cường giả — một niệm sinh, một niệm diệt cả một vũ trụ. Chưởng khống luân hồi, thời gian, nhân quả ở tầng vũ trụ.',
 'Đạo Cấp':'Đạo cấp tồn tại — bản thân đã hòa vào Đại Đạo, lời nói ra chính là pháp tắc, đứng ngoài vòng sinh diệt của vạn giới.',
 'Hỗn Nguyên Cấp':'Hỗn Nguyên cảnh — siêu thoát khỏi mọi vũ trụ, bất sinh bất diệt, một ý niệm có thể sáng tạo hoặc xóa sổ vô số thực tại.',

};

const TREASURE_POWER={1:'vũ khí thường',2:'vũ khí tốt',3:'có linh tính',4:'nhận chủ',5:'có ý thức',6:'tự tu luyện',7:'tạo pháp tắc',8:'thao túng không gian',9:'thao túng thời gian',10:'tạo vũ trụ nhỏ',11:'điều khiển nhân quả',12:'viết lại thực tại'};
function maxGrade(worldTier){return clamp(Math.floor(3+worldTier*1.1),2,12);}
function rollGrade(worldTier){ // gating: phẩm cao gần như không xuất hiện ở thế giới thấp; vượt trần cứng thì KHÔNG tồn tại
  const cap=maxGrade(worldTier);const hardCap=Math.min(12,cap+2);const w=[];
  for(let g=1;g<=hardCap;g++){let s=PHAM[g-1].spawn;if(g>cap)s*=Math.pow(1e-6,g-cap);w.push([Math.max(1e-42,s),g]);}
  return RNG.weight(w);
}

function rollRoot(){const t=LINH_CAN.reduce((s,x)=>s+x.rar,0);let k=RNG.next()*t;for(const x of LINH_CAN){k-=x.rar;if(k<=0)return x;}return LINH_CAN[0];}

 {n:'Cửu Dương Thể',t:3,buff:{hp:1.6,atk:1.4},d:'Dương khí cửu trùng, sinh lực bừng bừng, tự hồi phục nhanh.'},
 {n:'Băng Phách Thể',t:3,buff:{cmp:1.4,def:1.4},d:'Hồn phách lạnh giá, khống chế đóng băng, tâm bất động trước cám dỗ.'},
 {n:'Ngọc Tủy Thể',t:3,buff:{cult:1.4,soul:1.3},d:'Tủy xương như ngọc, linh lực tinh thuần, ít tạp chất chướng tính.'},
 {n:'Cuồng Ma Thể',t:3,buff:{atk:1.7},d:'Vào chiến là mất lý trí, sát thương tăng vọt nhưng khó dừng tay.',flag:'berserk'},
 {n:'Định Sơn Thể',t:3,buff:{def:1.8,hp:1.2},d:'Đứng vững như núi, không lay không đổ, phản chấn kình địch.'},
 {n:'Truy Phong Thể',t:3,buff:{spd:1.7},d:'Tốc độ kinh người, một bước trăm trượng, đối thủ chưa thấy đã trúng.'},
 {n:'Nạp Linh Thể',t:3,buff:{cult:1.6},d:'Toàn thân là khiếu, hấp linh khí như biển nuốt sông, tu cực nhanh.'},
 {n:'Thần Cơ Thể',t:3,buff:{cmp:1.5,spd:1.2},d:'Trí óc như cơ quan tính toán, dự liệu chiến cục, giỏi trận pháp.'},
 {n:'Huyễn Tâm Thể',t:3,buff:{cmp:1.4,soul:1.3},d:'Tâm trí biến ảo, tu huyễn thuật mê hoặc bậc thầy.'},
 {n:'Thiết Huyết Thể',t:3,buff:{hp:1.5,atk:1.3},d:'Máu sắt gan đồng, càng tử chiến càng mạnh, tử vong biên duyên bùng nổ.'},
 {n:'Vân Quang Thể',t:3,buff:{spd:1.4,cmp:1.3},d:'Thân như quang ảnh, di chuyển tránh né tuyệt luân.'},
 {n:'Thổ Nguyên Thể',t:3,buff:{def:1.6,cult:1.2},d:'Gắn liền đại địa, mượn địa khí hồi phục, thủ trận bất bại.'},
 {n:'Ngân Giáp Thể',t:3,buff:{def:1.5,atk:1.2},d:'Da mọc vảy bạc, công thủ nhất thể, phản xạ ánh sáng gây lóa.'},
 {n:'Trầm Hương Thể',t:3,buff:{soul:1.4,cmp:1.2},d:'Thân toả u hương an thần, trấn định tâm ma, hộ hồn cho đồng đạo.'},
 {n:'Cự Nhân Thể',t:3,buff:{hp:1.7,atk:1.3},d:'Cốt cách khổng lồ, sinh lực và lực tay áp đảo người thường.'},
 {n:'Diệu Âm Thể',t:3,buff:{soul:1.4,cmp:1.3},d:'Giọng mang đạo vận, âm luật công tâm, hàng phục hoặc sát địch bằng thanh.'},
 // — Phẩm 4 (Địa) —
 {n:'Bất Hoại Kim Thân',t:4,buff:{def:2.0,hp:1.5},d:'Kim thân bất hoại, phàm binh không thương, thể tu trứ danh.'},
 {n:'Địa Sát Thể',t:4,buff:{atk:1.8,def:1.3},d:'Sát khí ngập trời, mượn địa sát chi lực, một đòn định thắng bại.'},
 {n:'Cửu Âm Tuyệt Mạch Thể',t:4,buff:{cmp:1.8,soul:1.5},d:'Chí âm chi thể, tu tốc kinh người về đêm — nhưng bị tà tu săn làm lô đỉnh song tu.'},
 {n:'Thái Nhất Thể',t:4,buff:{cult:1.7,cmp:1.5},d:'Thái nhất quy nguyên, vạn pháp đồng tu, nền tảng cân bằng hoàn mỹ.'},
 {n:'Long Tượng Thể',t:4,buff:{atk:1.9,hp:1.4},d:'Sức long tượng, một quyền vạn cân, thể tu cương mãnh vô song.'},
 {n:'Huyền Vũ Thánh Thể',t:4,buff:{def:1.9,hp:1.6},d:'Mai huyền vũ hộ thân, phòng ngự thần thoại, thủ vệ đệ nhất.'},
 {n:'Ly Hỏa Thể',t:4,buff:{atk:1.7,cult:1.4},d:'Thân sinh ly hỏa, khống hoả luyện đan, đốt cả pháp bảo địch.'},
 {n:'Huyền Băng Thánh Thể',t:4,buff:{cmp:1.7,def:1.5},d:'Băng phong vạn dặm, khống chế phạm vi, đạo tâm lãnh triệt.'},
 {n:'Phá Quân Thể',t:4,buff:{atk:2.0},d:'Thiên sinh sát tinh, chuyên phá trận phá giáp, khắc tinh của phòng thủ.'},
 {n:'Tụ Linh Thánh Thể',t:4,buff:{cult:2.0},d:'Linh khí tự tụ quanh thân, tu luyện nhanh gấp bội, thiên tài luyện khí.'},
 {n:'Kiếm Cốt Thiên Thành',t:4,buff:{atk:1.9,spd:1.4},d:'Xương là kiếm, máu là ý, sinh ra để một kiếm định giang sơn.'},
 {n:'Vô Cấu Ngọc Thể',t:4,buff:{cmp:1.6,soul:1.5},d:'Thân tâm thanh khiết tuyệt đối, không nhiễm chướng tính, hộ đạo tâm.'},
 {n:'Cương Phong Thể',t:4,buff:{spd:1.8,atk:1.4},d:'Phong nhận quanh thân, tốc độ và sát thương hợp nhất, đến đi như bão.'},
 {n:'Huyết Hà Thể',t:4,buff:{atk:1.7,hp:1.6},d:'Huyết mạch cuộn như sông, hồi máu chiến đấu, càng đánh càng sung.'},
 {n:'Thôn Linh Thể',t:4,buff:{cult:1.8,atk:1.3},d:'Nuốt linh khí và nội đan để mạnh lên — cẩn thận tham quá phản phệ.',flag:'devour'},
 {n:'Tinh Thần Thánh Thể',t:4,buff:{soul:2.0,cmp:1.4},d:'Nguyên thần cường đại, thần thức công kích như đại quân, đối thủ hồn phi phách tán.'},
 {n:'Bàn Thạch Thể',t:4,buff:{def:2.0,hp:1.5},d:'Kiên cố như bàn thạch vạn năm, đứng giữa vạn quân không lùi.'},
 {n:'Lưu Quang Dịch Ảnh Thể',t:4,buff:{spd:2.0},d:'Nhanh tới mức để lại tàn ảnh, một thân hoá trăm bóng.'},
 {n:'Đan Hỏa Thánh Thể',t:4,buff:{cult:1.6,cmp:1.6},d:'Đan điền tự sinh chân hỏa, luyện đan không cần lô, thiên phú dược sư.'},
 {n:'Ma Cốt Thể',t:4,buff:{atk:1.8,cult:1.3},d:'Xương nhiễm ma khí, tu ma công cực nhanh, nhưng gánh nghiệp chướng.',flag:'demon'},
 {n:'Thanh Loan Thể',t:4,buff:{spd:1.7,cmp:1.4},d:'Huyết mạch thanh loan, thân nhẹ như bay, thân pháp phiêu dật tuyệt trần.'},
 {n:'Hạo Nhiên Thể',t:4,buff:{soul:1.6,def:1.5},d:'Thân mang hạo nhiên chính khí, tà ma bất xâm, khắc chế yêu ma quỷ.'},
 {n:'Cửu Chuyển Bất Diệt Thể',t:4,buff:{hp:2.0,def:1.4},d:'Tổn thương rồi tái sinh, chín lần tôi luyện, gần như không thể giết một đòn.',flag:'regen'},
 {n:'Nghịch Loạn Thể',t:4,buff:{atk:1.8,spd:1.4},d:'Kinh mạch nghịch hành, chiêu số quỷ dị khó lường, thắng trong bất ngờ.'},
 {n:'Địa Long Thể',t:4,buff:{def:1.7,hp:1.6},d:'Huyết mạch địa long, độn thổ như cá gặp nước, thủ và trốn đều tuyệt.'},
 {n:'Vô Tướng Thể',t:4,buff:{cmp:1.7,soul:1.5},d:'Vô tướng vô hình, biến hoá đạo lý, tu ngộ đạo và huyễn thuật siêu phàm.'},
 {n:'Xích Đồng Thể',t:4,buff:{def:1.8,atk:1.5},d:'Thân như đồng đỏ nung, vừa cứng vừa nóng, ôm địch cũng thiêu.'},
 {n:'Huyền Thiên Thánh Thể',t:4,buff:{cult:1.7,cmp:1.5,soul:1.3},d:'Cân bằng tam tài, tu gì cũng khá, đại khí vãn thành.'},
 // — Phẩm 5 (Thiên) —
 {n:'Bất Diệt Thánh Thể',t:5,buff:{hp:3,def:2},d:'Thánh thể trường tồn, sinh cơ vô tận, ngàn năm không lão hoá.',flag:'regen'},
 {n:'Chí Dương Thánh Thể',t:5,buff:{atk:2.2,hp:1.8},d:'Dương khí đến cực, thiêu đốt vạn tà, một tồn tại của ánh sáng.'},
 {n:'Chí Âm Thánh Thể',t:5,buff:{cmp:2,soul:2},d:'Âm nhu đến cực, thần hồn vô địch, khống chế và mê hoặc cả thánh nhân.'},
 {n:'Vạn Kiếm Chi Thể',t:5,buff:{atk:2.4,spd:1.6},d:'Sinh ra vạn kiếm quy tâm, một niệm vạn kiếm tề phát, sát phạt đệ nhất.'},
 {n:'Hỗn Nguyên Thánh Thể',t:5,buff:{cult:2.2,cmp:1.8},d:'Một khí hoá tam thanh, dung hợp vạn đạo, tiềm lực vô hạn.'},
 {n:'Bàn Cổ Chân Thể',t:5,buff:{hp:2.5,atk:2.3},d:'Huyết mạch khai thiên, nhục thân như thần, một búa tách trời đất.'},
 {n:'Thôn Thiên Thánh Thể',t:5,buff:{atk:2.2,cult:1.8},d:'Nuốt trời nuốt đất để tiến hoá — sức mạnh vô cực, nghiệp chướng vô biên.',flag:'devour'},
 {n:'Lôi Đế Thể',t:5,buff:{atk:2.3,def:1.6},d:'Thân là lôi trì, mượn thiên lôi độ kiếp mà càng mạnh, lôi kiếp khó thương.'},
 {n:'Huyễn Mộng Thánh Thể',t:5,buff:{cmp:2.2,soul:1.8},d:'Nhốt địch vào ảo mộng vĩnh hằng, thắng mà không cần động thủ.'},
 {n:'Tử Phủ Thánh Thể',t:5,buff:{soul:2.4,cult:1.6},d:'Tử phủ nội cảnh thành hình, nguyên thần cường đại như tiểu thiên địa.'},
 {n:'Băng Đế Huyền Thể',t:5,buff:{cmp:2,def:2},d:'Đóng băng cả thời gian trong khoảnh khắc, lãnh vực tuyệt đối.'},
 {n:'Phần Thiên Diễm Thể',t:5,buff:{atk:2.5},d:'Ngọn lửa thiêu cháy cả bầu trời, công kích vô song, khắc vạn vật.'},
 {n:'Thái Cổ Thần Thể',t:5,buff:{hp:2.4,atk:2,cult:1.6},d:'Huyết mạch thần tộc thái cổ, thân thể là chiến khí thiên sinh.'},
 {n:'Vô Cực Đạo Thể',t:5,buff:{cmp:2.3,cult:2},d:'Càng gần vô cực càng gần Đạo, ngộ tính không đáy, đại đạo tự hiện.'},
 {n:'Cửu Long Bá Thể',t:5,buff:{atk:2.3,hp:2,def:1.6},d:'Chín long triều thân, uy áp bá đạo, vạn linh phủ phục.'},
 // — Phẩm 6 (Vương) —
 {n:'Vương Cổ Thánh Thể',t:6,buff:{hp:3,atk:2.6,def:2.2},d:'Thân mang vương giả chi khí, đứng là trấn áp một phương, ngồi là định thiên hạ.'},
 {n:'Bất Tử Vương Thể',t:6,buff:{hp:3.5,def:2.5},d:'Đạt gần bất tử, dù nát thân vẫn có thể trùng tổ, khắc tinh của cái chết.',flag:'regen'},
 {n:'Diệt Thế Ma Thể',t:6,buff:{atk:3},d:'Sinh ra để huỷ diệt, đi tới đâu sinh linh tuyệt diệt tới đó — thiên đạo ghét bỏ.',flag:'demon'},
 {n:'Thái Sơ Đạo Thể',t:6,buff:{cmp:3,cult:2.4},d:'Gần với thái sơ hỗn độn, đại đạo pháp tắc dễ dàng lĩnh ngộ.'},
 {n:'Kiếm Thần Chi Thể',t:6,buff:{atk:3,spd:2},d:'Nhân kiếm hợp nhất tiên thiên, một kiếm phá vạn pháp, kiếm đạo chi vương.'},
 {n:'Hư Không Thánh Thể',t:6,buff:{spd:2.8,cmp:2.2},d:'Thân hoà hư không, xuyên không dịch chuyển, khó khoá khó thương.'},
 {n:'Vạn Cổ Bất Diệt Thân',t:6,buff:{hp:3.2,def:2.6},d:'Trải vạn cổ không hoại, thời gian khó ăn mòn, sinh mệnh cứng như đá tảng.',flag:'regen'},
 {n:'Huyết Thần Thể',t:6,buff:{atk:2.8,hp:2.6},d:'Máu là binh khí, huyết hải vô biên, càng chiến càng cuồng bạo.'},
 {n:'Vương Tọa Chi Thể',t:6,buff:{soul:3,cmp:2.2},d:'Thần thức như vương toạ cao ngất, uy áp tinh thần khiến địch quỳ phục.'},
 {n:'Cửu U Ma Đế Thể',t:6,buff:{atk:2.8,soul:2.4},d:'Từ cửu u mà sinh, âm ma song tu, hồn thuật và sát phạt đều tuyệt đỉnh.',flag:'demon'},
 {n:'Tinh Hà Thánh Thể',t:6,buff:{cult:3,cmp:2},d:'Trong thân có tinh hà chảy, mượn lực tinh thần luyện hoá, tu như thiên hà đổ.'},
 {n:'Bất Bại Chiến Thể',t:6,buff:{atk:2.6,def:2.6,hp:2.2},d:'Sinh ra không biết bại, càng nguy càng mạnh, chiến ý vô cùng.'},
 // — Phẩm 7 (Thánh) —
 {n:'Chí Tôn Thánh Thể',t:7,buff:{hp:4,atk:4,def:3},d:'Thân mang chí tôn khí tức, vạn giới cúi đầu, một tồn tại của huyền thoại.'},
 {n:'Đại La Kim Thân',t:7,buff:{hp:4.5,def:3.5},d:'Kim thân bất hoại của đại la, thoát khỏi kiếp số, khó bị diệt sát.',flag:'regen'},
 {n:'Trảm Tiên Ma Thể',t:7,buff:{atk:4.5},d:'Sát khí chém cả tiên thần, một đao trảm thánh, khắc tinh của cường giả.',flag:'demon'},
 {n:'Hồng Mông Nhất Tuyến Thể',t:7,buff:{cmp:4,cult:3.5},d:'Mang một tia hồng mông chi khí sót lại, đại đạo trong tầm tay, ngộ đạo như uống nước.'},
 {n:'Vô Thượng Kiếm Thể',t:7,buff:{atk:4.5,spd:3},d:'Kiếm đạo đăng phong tạo cực, một kiếm khai thiên, vô thượng vô địch.'},
 {n:'Bất Diệt Thánh Vương Thể',t:7,buff:{hp:4.5,def:3,cult:2.5},d:'Thánh vương chi thể trường sinh, thời gian không thể ăn mòn.',flag:'regen'},
 {n:'Hỗn Thế Ma Thể',t:7,buff:{atk:4,hp:3.5},d:'Sinh ra giữa loạn thế, nuốt kiếp nạn mà lớn, một mình địch vạn quân.',flag:'demon'},
 {n:'Thần Đế Chân Thể',t:7,buff:{atk:3.5,soul:3.5,cmp:3},d:'Thần và đế hợp nhất, thân thể lẫn thần hồn đều như đế vương.'},
 // — Phẩm 8 (Tiên) —
 {n:'Tiên Thiên Thánh Vương Thể',t:8,buff:{hp:6,atk:5,cult:3.5},d:'Sinh ra đã mang khí vận thánh vương của cả một tiên giới.'},
 {n:'Đại Đạo Kim Tiên Thể',t:8,buff:{cmp:6,cult:4,soul:4},d:'Thân đã bước vào tiên đạo, đại đạo pháp tắc thuận theo ý niệm.'},
 {n:'Diệt Tiên Ma Thể',t:8,buff:{atk:6},d:'Ma thể chém tiên như chém cỏ, cả tiên giới nghe tên biến sắc.',flag:'demon'},
 {n:'Bất Hủ Tiên Thể',t:8,buff:{hp:6.5,def:4.5},d:'Nhục thân bất hủ ngang tiên khí, muốn giết phải diệt cả hồn lẫn xác.',flag:'regen'},
 {n:'Hỗn Độn Tiên Thai',t:8,buff:{cult:5.5,cmp:4.5},d:'Thai nghén trong hỗn độn, sinh ra là bán tiên, tiềm lực khôn lường.'},
 {n:'Vạn Tượng Thần Thể',t:8,buff:{atk:5,hp:5,soul:4},d:'Bao dung vạn tượng, mọi công pháp đều luyện tới cực hạn.'},
 // — Phẩm 9 (Đế) —
 {n:'Đế Thể',t:9,buff:{hp:10,atk:8,def:6,cult:5},d:'Thân thể của một Đế — mỗi tế bào là một tiểu vũ trụ, đứng trên vạn linh.'},
 {n:'Luân Hồi Thánh Thể',t:9,buff:{soul:9,cmp:6,cult:5},d:'Nắm giữ một tia luân hồi, sinh tử trong tay, chết đi có thể trùng lai.'},
 {n:'Thí Đế Ma Thể',t:9,buff:{atk:10},d:'Sinh ra để giết Đế, sát khí nghịch thiên — bị cả chư thiên vây diệt.',flag:'demon'},
 {n:'Vĩnh Hằng Đế Thể',t:9,buff:{hp:11,def:7},d:'Gần chạm vĩnh hằng, thời gian và tử vong đều bó tay.',flag:'regen'},
 {n:'Đại Đạo Đế Thai',t:9,buff:{cmp:9,cult:7,soul:6},d:'Đại đạo dưỡng thai, sinh ra đã đứng ở ngưỡng cửa Đế cảnh.'},
 // — Phẩm 10 (Hồng Hoang) —
 {n:'Hồng Hoang Thánh Thể',t:10,buff:{hp:15,atk:12,cult:8},d:'Thân thể cổ tộc thời hồng hoang hoàn chỉnh, một tồn tại của thái cổ hồng hoang.'},
 {n:'Khai Thiên Thần Thể',t:10,buff:{atk:14,hp:12,def:8},d:'Mang khí tức khai thiên, một tay có thể tách một phương thiên địa.'},
 {n:'Hồng Hoang Ma Tổ Thể',t:10,buff:{atk:15,soul:9},d:'Huyết mạch ma tổ hồng hoang, nghiệp chướng ngập trời, uy năng diệt thế.',flag:'demon'},
 // — Phẩm 11 (Hỗn Độn) —
 {n:'Hỗn Độn Chí Thể',t:11,buff:{hp:25,atk:20,cult:12,soul:10},d:'Sinh từ hỗn độn nguyên thai, gần như bất khả chiến bại trong cùng tầng thực tại.'},
 {n:'Hỗn Độn Ma Thần Thể',t:11,buff:{atk:25,hp:18},d:'Ma thần thời hỗn độn tái sinh, một niệm sinh diệt vạn giới.',flag:'demon'},
 // — Phẩm 12 (Hồng Mông) —
 {n:'Hồng Mông Đạo Thể',t:12,buff:{cmp:20,cult:20,soul:15},d:'Bản thân là một phần của Hồng Mông đại đạo, đứng ngoài vòng sinh diệt vạn vật.'},
 // — bổ sung cho đủ 180 —
 {n:'Thạch Bì Thể',t:2,buff:{def:1.25},d:'Da như đá, đòn thường không rách, phòng ngự sơ cấp bền bỉ.'},
 {n:'Hoạt Cốt Thể',t:2,buff:{spd:1.2,def:1.1},d:'Khớp xương linh hoạt, thoát khóa cầm nã dễ dàng.'},
 {n:'Ôn Dưỡng Thể',t:2,buff:{hp:1.2,cult:1.1},d:'Thân tự ôn dưỡng, thương thế mau lành, ít bệnh tật.'},

function sectMaxTier(worldTier){return clamp(Math.floor((worldTier-1)*1.0),0,7);} // thế giới thấp chỉ có tông môn cấp thấp
function genSect(worldTier,forceType){const maxT=sectMaxTier(worldTier);const tier=RNG.int(0,maxT);const type=forceType||RNG.pick(SECT_TYPES);
  // 7 loại chỉ là CHỦ TU; nhiều tông vẫn kiêm tu loại khác, một số là Tổng Hợp (không phân biệt loại)
  const broad=RNG.chance(0.22);let also=[];
  if(broad){also=SECT_TYPES.filter(t=>t.id!==type.id).map(t=>t.n);}
  else if(RNG.chance(0.4)){const pool=SECT_TYPES.filter(t=>t.id!==type.id);const k=1+RNG.int(0,1);for(let i=0;i<k&&pool.length;i++){also.push(pool.splice(RNG.int(0,pool.length-1),1)[0].n);}}
  const suffix=broad?'Tổng Môn':type.n;
  return {name:RNG.pick(SECT_PRE)+' '+suffix,tierId:tier,tier:SECT_TIER[tier],typeId:type.id,type:broad?'Tổng Hợp ('+type.n+' chủ tu)':type.n,typeDesc:broad?('Đại phái tổng hợp, kiêm tu vạn pháp, lấy '+type.n+' làm chủ. '+type.d):type.d,buff:type.buff,favor:type.favor,broad,also,pos:0,posName:SECT_POS[0],contrib:0};}

 OC('con_tho_san','common','Con Thợ Săn','Cha ngươi chết trong nanh vuốt một con yêu lang, để lại một cây cung gãy và một đứa con quen đói rét. Mười lăm năm trong rừng sâu đã tôi cho ngươi một thân thể rắn rỏi hơn bạn đồng lứa — nhưng ở [Khô Kiệt Tinh Lộ], khí huyết tốt cũng chỉ giúp ngươi chết chậm hơn một chút.',{hp:1.1}),
 OC('co_nhi','common','Cô Nhi Nhặt Rác','Ngươi không nhớ mặt cha mẹ. Ký ức đầu đời là mùi rác và những trận đòn. Ngươi sống tới hôm nay nhờ luôn cảnh giác, luôn tính trước một bước — và nhờ hiểu rất sớm rằng lòng tốt trên đời này luôn có giá của nó.',{flags:{wary:true}}),
 OC('con_nha_buon','common','Con Nhà Buôn Sa Cơ','Gia đình ngươi từng có một sạp hàng nhỏ, rồi mất sạch trong một đêm vì một món nợ của tu sĩ. Cha ngươi treo cổ, mẹ ngươi phát điên. Ngươi còn lại chút chữ nghĩa, chút tài tính toán, và ba mươi đồng bạc vụn giấu trong đế giày.',{items:{bac_vun:30},cmp:1.05,flags:{literate:true}}),
 OC('con_liet_si','common','Con Của Kẻ Tử Trận','Cha ngươi là một tán tu quèn, chết trong một cuộc tranh đoạt linh dược mà ngươi thậm chí không biết tên. Ngươi lớn lên với một cái tên, một nấm mồ, và một mối thù mơ hồ với cả thế giới tu tiên.',{karma:-1,flags:{vengeful:true}}),
 OC('be_chan_trau','common','Trẻ Chăn Trâu','Ngày ngày ngươi thổi sáo trên lưng trâu, ngắm mây trôi, chẳng vướng bận sự đời. Tâm tính ngươi hồn nhiên, đạo tâm thuần khiết như nước suối đầu nguồn — thứ mà vô số lão quái vật tu vạn năm phải thèm khát.',{dao:10,flags:{pure_heart:true}}),
 OC('linh_tho','common','Phu Đào Mỏ','Nửa đời ngươi sống trong lòng đất, đục từng vụn khoáng thạch dưới ánh đuốc leo lét. Bóng tối và gian khổ đã rèn cho ngươi một thân thể trâu bò và một cái gan lì đến vô cảm.',{hp:1.15,def:1.05}),
 OC('an_may','common','Tiểu Ăn Mày','Ngươi lớn lên đầu đường xó chợ, mặt dày mày dạn, giỏi luồn lách và nịnh nọt. Người ta khinh ngươi, nhưng chính lũ ăn mày lại sống dai nhất khi tai họa ập tới.',{flags:{streetwise:true}}),
 OC('tho_ren','common','Học Việc Lò Rèn','Ngươi lớn lên bên lò rèn, quen với lửa đỏ và tiếng búa. Bàn tay ngươi chai sạn, thân thể cứng cáp, và ngươi hiểu một chân lý giản dị: thứ gì cũng phải qua lửa mới thành khí.',{hp:1.05,def:1.1}),
 OC('con_do_te','common','Con Nhà Đồ Tể','Ngươi lớn lên trong mùi máu tanh và tiếng kêu của súc vật. Tay ngươi không run khi cầm dao. Người trong thôn tránh ngươi, nhưng trong tu tiên giới, kẻ dám ra tay mới sống được.',{atk:1.1,flags:{cold_blooded:true}}),
 OC('tieu_tac','common','Đạo Chích Vặt','Ngón tay ngươi nhanh, bước chân ngươi êm. Ngươi sống nhờ những thứ thó được từ túi kẻ khác. Nghề trộm cắp hèn mọn ấy dạy ngươi hai điều: quan sát, và biến mất đúng lúc.',{spd:1.1,flags:{thief:true}}),
 OC('con_thay_lang','common','Con Thầy Lang','Cha ngươi bốc thuốc dạo, ngươi theo phụ từ bé. Ngươi phân biệt được cỏ lành cỏ độc, biết chút dược lý dân gian — cái nền mỏng manh cho con đường đan đạo sau này.',{flags:{herblore:true}}),
 OC('be_cau_bo','common','Đứa Trẻ Bị Bỏ Rơi','Ngươi bị vứt trước cổng thôn từ khi còn đỏ hỏn, quấn trong một tấm vải cũ không dấu vết. Không ai biết ngươi từ đâu tới. Có lẽ chính ngươi cũng không nên biết.',{flags:{unknown_origin:true}}),

 OC('do_de_bo_roi','uncommon','Đệ Tử Bị Trục Xuất','Ngươi từng khổ luyện ba năm trong một tông môn nhỏ, để rồi bị đuổi cổ với hai chữ "phế tài". Nhưng những gì học lỏm được trong ba năm đó — dẫn khí, điều tức, nhận biết linh mạch — vẫn nằm trong xương tủy ngươi.',{cult:1.1,flags:{ex_disciple:true}}),
 OC('than_dong','uncommon','Thần Đồng Yểu Mệnh','Từ nhỏ ngươi đã thông tuệ khác thường, ba tuổi thuộc thơ, bảy tuổi luận đạo. Nhưng một thầy tướng số phán ngươi "mệnh yểu khó qua hai mươi". Cả thôn nhìn ngươi như nhìn một ngọn nến sắp tắt.',{cmp:1.25,lifeMod:-10}),
 OC('con_lai_yeu','uncommon','Con Lai Yêu Tộc','Trong huyết mạch ngươi chảy một dòng máu không thuần: mẹ ngươi là người, còn cha... không ai dám nói. Thân thể ngươi mạnh mẽ dị thường, nhưng đôi lúc trong gương, ngươi thấy đồng tử mình co lại thành khe.',{hp:1.2,atk:1.1,karma:-1,flags:{demon_blood:true}}),
 OC('be_song_sot','uncommon','Kẻ Sống Sót Duy Nhất','Một đêm, cả thôn ngươi bị đồ sát sạch — đàn ông, đàn bà, trẻ con. Sáng ra chỉ còn mình ngươi bò ra từ đống tro. Không ai biết vì sao ngươi sống. Kể cả ngươi. Nhất là ngươi.',{karma:1,flags:{lone_survivor:true,vengeful:true}}),
 OC('linh_dong','uncommon','Linh Đồng Bẩm Sinh','Từ nhỏ ngươi đã thấy những thứ người khác không thấy: bóng người mờ ảo bên giếng, ánh sáng lập lòe trên mộ. Người ta bảo ngươi có "âm dương nhãn". Ngươi chỉ biết mình cô độc giữa hai thế giới.',{soul:1,flags:{spirit_sight:true}}),
 OC('con_luyen_dan_su','uncommon','Con Của Luyện Đan Sư','Cha ngươi là một đan sư lang thang, chết vì nợ nần và một mẻ đan nổ lò. Ông để lại cho ngươi một quyển đan phương cháy xém và một chiếc Đan Lô cũ — di sản đủ để giết ngươi, cũng đủ để đổi đời ngươi.',{flags:{hasFurnace:true,herblore:true},items:{thanh_linh:2}}),
 OC('vo_gia_lac_loi','uncommon','Võ Giả Lạc Đạo','Ngươi đã luyện võ phàm tục đến cực hạn — Võ Tôn, một quyền nứt đá. Nhưng ngươi nhận ra: dù mạnh đến đâu, phàm nhân cũng chỉ là con kiến dưới chân tiên nhân. Ngươi đến đây để bước lên con đường thật sự.',{hp:1.25,atk:1.2,flags:{martial_base:true}}),
 OC('con_the_gia_sa_sut','uncommon','Hậu Duệ Thế Gia Sa Sút','Gia tộc ngươi từng hiển hách một phương, nay chỉ còn một tòa nhà mục nát và những bài vị phủ bụi. Ngươi thừa hưởng lễ nghi, khí độ, và một nỗi khát khao phục hưng cháy âm ỉ trong lòng.',{cmp:1.1,items:{bac_vun:80},flags:{noble_manner:true}}),
 OC('nu_vu','uncommon','Truyền Nhân Nữ Vu','Bà ngoại ngươi là vu nữ cuối cùng của một bộ tộc đã tuyệt diệt. Trước khi chết, bà truyền cho ngươi cách trò chuyện với âm linh và đọc điềm trời — những kỹ thuật cổ xưa mà tu tiên chính đạo đã quên.',{soul:1,cmp:1.1,flags:{spirit_sight:true,fortune_sense:true}}),

 OC('huyet_mach_co','rare','Huyết Mạch Cổ Ngủ Say','Đêm ngươi sinh ra, một tiếng gầm câm lặng vang trong huyết quản ngươi. Ngươi mang một huyết mạch đã tuyệt diệt từ thời hồng hoang — nó đang ngủ say. Đánh thức nó, ngươi sẽ có tư cách vạn kẻ mơ ước; và cả kẻ thù của cả một dòng máu đã bị tận diệt.',{hp:1.3,flags:{ancient_blood:true},hidden:{name:'Huyết mạch cổ ngủ say',desc:'Một dòng máu tuyệt diệt thời hồng hoang đang say ngủ trong ngươi.'}}),
 OC('tan_hon','rare','Tàn Hồn Cường Giả','Trong nguyên thần ngươi có một mảnh ký ức không thuộc về mình — hình ảnh một trận chiến giữa các vì sao, một cái tên ngươi chưa từng nghe, và một cảm giác căm hận sâu tựa vực thẳm. Ai đó cực mạnh đã gửi tàn hồn vào ngươi.',{soul:3,flags:{remnant_soul:true},hidden:{name:'Tàn hồn cường giả',desc:'Một mảnh ký ức của kẻ cực mạnh đã chết.'}}),
 OC('gia_toc_tai_phu','rare','Hậu Duệ Gia Tộc Tài Phú','Gia tộc ngươi sa cơ, nhưng trước khi diệt vong, tổ tiên đã giấu một kho tàng và một tia khí vận gia tộc vào huyết mạch hậu nhân. Ngươi sinh ra dưới một ngôi sao sáng — và một tấm bản đồ kho báu chờ ngươi giải mã.',{luck:3,linhThach:5000,treasureGrade:2,items:{bac_vun:500},flags:{rich_heir:true}}),
 OC('thien_linh_can','rare','Mang Thiên Linh Căn','Khi lão đạo sĩ mù đặt tay lên cổ tay ngươi, ông run bần bật: "Thiên Linh Căn... đơn nhất, thuần khiết... Ở cái nơi chó ăn đá gà ăn sỏi này?!" Ngươi là thiên tài trăm năm khó gặp — và mọi tông môn sẽ tranh nhau, hoặc giết nhau, vì ngươi.',{rootId:'thien',att:3}),
 OC('di_hoa_the','rare','Thân Mang Dị Hỏa','Trong đan điền ngươi cháy một ngọn lửa không tắt — một dị hỏa bẩm sinh. Ngươi có thể nuốt lửa mà không bỏng, và mọi luyện đan sư nhìn thấy ngươi đều đỏ mắt thèm khát báu vật trong người ngươi.',{flags:{hasDiHoa:true,hasFurnace:true},atk:1.15}),
 OC('con_cua_ma_ton','rare','Hậu Nhân Ma Tôn','Tổ tiên ngươi là một Ma Tôn khét tiếng đã bị chính đạo vây giết. Ngươi thừa hưởng ma khí thâm hậu, một công pháp tà đạo khắc trong huyết mạch — và vô số kẻ thù chỉ chờ ngươi lộ diện để chém tận gốc.',{atk:1.3,karma:-5,att:4,flags:{demon_heir:true}}),

 OC('thien_dao_ruong_bo','epic','Thiên Đạo Kiếp Trước Ruồng Bỏ','Kiếp trước, ngươi từng nghịch thiên cải mệnh, và Thiên Đạo đã ghi hận. Kiếp này ngươi chào đời dưới một vì sao đen — mưa đá rơi ngày ngươi sinh, mẹ ngươi tắt thở khi vừa thấy mặt con. Người trong thôn gọi ngươi là "đứa trẻ điềm gở". Nhưng sâu trong hồn ngươi, một tiếng cười khẽ vang lên: Thiên Đạo càng ghét bỏ, luật trời càng khó áp lên kẻ đã bị ruồng bỏ.',{luck:0,karma:-10,flags:{heaven_forsaken:true},hidden:{name:'Bị Thiên Đạo ruồng bỏ',desc:'Khí vận đen tối bao trùm, nhưng nhân quả của trời khó đè lên kẻ đã bị bỏ rơi.'}}),
 OC('gioi_chi_lao_hon','epic','Chủ Nhân Giới Chỉ Cổ','Chiếc nhẫn cũ trên tay ngươi — di vật duy nhất cha mẹ để lại — đêm nay bỗng ấm nóng. Một giọng nói già nua khàn khàn vang lên ngay trong đầu ngươi, nơi không ai khác nghe được: "Rốt cuộc cũng đợi được một đứa đủ tư cách... Nhóc con, ngươi có muốn nghịch thiên không?"',{soul:2,flags:{has_ring:true},hidden:{name:'Cổ giới chỉ có lão hồn',desc:'Một Trữ Vật Giới Chỉ chứa không gian riêng và tàn niệm một cường giả.'}}),
 OC('con_cung_thanh_dia','epic','Thánh Tử Đầu Thai','Trong giấc mơ, ngươi thấy mình mặc bạch bào đứng trên chín tầng mây, vạn người quỳ lạy. Rồi một nhát kiếm xuyên tim, tất cả vỡ tan. Ngươi giật mình tỉnh dậy trong thân xác một đứa trẻ nghèo — nhưng ký ức về vinh quang và cái chết của kiếp Thánh Tử vẫn còn nóng hổi, cùng một gia sản kếch xù đang chờ ngươi tìm về.',{luck:4,soul:2,linhThach:20000,treasureGrade:3,cmp:1.3,flags:{reborn_saint:true},hidden:{name:'Ký ức Thánh Tử',desc:'Ký ức về vinh quang và cái chết của kiếp trước.'}}),
 OC('ma_chung','epic','Bị Gieo Ma Chủng','Từ nhỏ ngươi hay mơ thấy một con mắt đỏ mở ra trong lồng ngực mình. Ngươi không biết có kẻ đã gieo một Ma Chủng vào thân ngươi từ thuở sơ sinh — nó cho ngươi sức mạnh tà đạo nhanh đến chóng mặt, và một ngày, nó sẽ nuốt chửng ngươi để tái sinh. Đồng hồ đã bắt đầu đếm ngược.',{atk:1.4,cult:1.3,karma:-6,flags:{demon_seed:true},hidden:{name:'Ma chủng trong thân',desc:'Một hạt giống hắc ám chực chờ nuốt chửng ngươi để tái sinh.'}}),
 OC('hondon_can','epic','Hỗn Độn Linh Căn','Từ khi lọt lòng, linh khí trời đất tự động vây quanh ngươi như bị hút vào một khoảng không vô đáy. Không ai biết đó là Hỗn Độn Linh Căn — thứ dung hợp vạn hệ, truyền thuyết trong truyền thuyết. Nhưng thứ gì tỏa sáng quá rực giữa đêm đen, mọi ánh mắt trong bóng tối đều sẽ quay lại.',{rootId:'hondon',att:8,karma:-4,flags:{chaos_root:true}}),

 OC('de_hon','legend','Tàn Hồn Cổ Đế','Ngươi là nơi trú ngụ của một mảnh chân hồn của một vị Cổ Đế đã tử chiến nơi tận cùng vũ trụ. Trong đầu ngươi thi thoảng vang lên những đạo lý mà cả thánh nhân cũng phải quỳ nghe. Sức mạnh và kẻ thù của ngươi, đều ở tầm vũ trụ.',{soul:6,cmp:1.5,karma:-5,att:6,treasureGrade:4,flags:{emperor_soul:true}}),
 OC('thien_menh_chi_tu','legend','Thiên Mệnh Chi Tử','Ngươi là đứa con được thiên mệnh chọn của thời đại này. Nơi ngươi đi qua, hoa nở trái mùa, dị tượng giáng lâm. Vô số cơ duyên đang chờ ngươi — cùng vô số yêu nghiệt, cổ lão, và cả những kẻ chuyên săn giết "thiên mệnh chi tử" để đoạt lấy khí vận.',{luck:5,cmp:1.4,att:10,flags:{chosen_one:true}}),
 OC('dao_the','legend','Đạo Thể Thiên Sinh','Ngươi sinh ra đã là một phần của Đạo. Nghe gió thổi, ngươi ngộ ra kiếm ý; nhìn nước chảy, ngươi thấu lẽ vô thường. Ngộ tính của ngươi cao đến mức đáng sợ — nhưng con đường càng gần Đạo, cô độc càng thấu xương.',{theChatName:'Đạo Thể',cmp:2.0,cult:1.4,luck:3,flags:{dao_body:true}}),

 OC('van_co_de_nhat','mythic','Vạn Cổ Đệ Nhất Chuyển Thế','Bóng tối. Rồi một tiếng vọng từ vô tận thời gian: "Ngươi đã ngủ đủ lâu rồi." Ngươi mở mắt — thân thể nhỏ bé, yếu ớt, xa lạ. Ngươi từng là kẻ mạnh nhất vạn cổ, tự phong ấn để trốn một kiếp nạn kinh thiên. Nay tỉnh lại, gần như quên sạch, chỉ còn một bản năng gào thét trong xương tủy: mạnh lên, trước khi kẻ thù tìm ra.',{soul:12,cmp:2.0,hp:2,atk:2,luck:5,att:25,karma:-12,flags:{strongest_reborn:true}}),
 OC('hong_mong_the','mythic','Hồng Mông Chí Thể','Ngươi được sinh ra từ một luồng khí Hồng Mông nguyên thủy sót lại nơi khe nứt của vũ trụ — truyền thuyết trong truyền thuyết, có lẽ chưa từng xuất hiện. Thân thể ngươi là chí bảo, huyết mạch ngươi là đại đạo. Cả thiên địa cũng phải nín thở khi nhắc tới ngươi.',{theChatName:'Hồng Mông Chí Thể',hp:3,atk:3,cult:2,soul:8,att:15,karma:-8,flags:{hongmeng_body:true}}),

 // ===== COMMON — thứ dân, khởi điểm thấp nhất, mỗi người một mảnh đời =====
 OC('con_chai_luoi','common','Con Nhà Chài Lưới','Cả nhà ngươi sống trên một chiếc thuyền nan mục nát, đời này qua đời khác chỉ biết mặt sông. Cha ngươi chết chìm trong một đêm bão, để lại tấm lưới rách và một câu dặn: nước sâu nuốt người không nhả xương. Ngươi lớn lên biết nín thở lâu hơn ai hết, và biết rằng đáy nước tối tăm cũng không đáng sợ bằng lòng người.',{spd:1.1,flags:{waterborn:true}}),
 OC('con_gom','common','Con Thợ Gốm','Cha ngươi nặn gốm cả đời, bàn tay quen kéo hình từ một khối đất vô định. Một lần ngươi vô tình nặn ra chiếc bình tự giữ được hơi sương đọng bên trong ba ngày không tan — không ai giải thích được. Ngươi chỉ biết: cùng một nắm đất, kẻ khéo tay có thể tạo thành thứ chứa được cả trời đất.',{cmp:1.05,flags:{shaper:true}}),
 OC('con_may_va','common','Con Thợ May','Mẹ ngươi may vá thuê cho nhà phú hộ, dạy ngươi nhìn ra một đường chỉ lệch từ xa ba thước. May sai một mũi là hỏng cả tấm gấm — thói tỉ mỉ khắc nghiệt ấy về sau lại là thứ giúp ngươi không sai một nét khi khắc họa công pháp vào tâm.',{cmp:1.1,flags:{meticulous:true}}),
 OC('hoc_tro_ngheo','common','Học Trò Nghèo Mọt Sách','Ngươi chép sách thuê để đổi lấy quyền được đọc, thức trắng bao đêm dưới ánh trăng vì không có tiền mua dầu. Bụng đói nhưng đầu đầy chữ. Người đời cười ngươi hủ nho vô dụng — họ không biết một kẻ đọc vạn quyển sẽ nhìn thấu những thứ mà kẻ có linh căn tốt cả đời không ngộ ra.',{cmp:1.15,lifeMod:5,flags:{literate:true,scholar:true}}),
 OC('con_khieng_kieu','common','Phu Khiêng Kiệu','Ngươi gánh kiệu cho quý nhân từ năm mười tuổi, vai chai thành sẹo, chân quen leo dốc cả ngày không nghỉ. Ngươi học được cách nhẫn nhịn dưới ánh mắt khinh miệt, và một chân lý cay đắng: kẻ ngồi trên kiệu và kẻ khiêng kiệu, sinh ra vốn đã ở hai thế giới.',{hp:1.15,flags:{enduring:true}}),
 OC('con_hat_rong','common','Con Nhà Hát Rong','Ngươi lớn lên theo gánh hát lang bạt khắp chợ cùng quê, ca đủ khúc bi hoan để đổi lấy vài đồng lẻ và một bữa cơm. Ngươi giỏi đọc sắc mặt đám đông và biết diễn khi cần diễn — con đường tu tiên đầy giả dối, và kẻ biết diễn thường sống lâu hơn kẻ thật thà.',{flags:{charmer:true,performer:true}}),
 OC('tieu_dong_hau_tra','common','Tiểu Đồng Hầu Trà','Ngươi hầu trà cho một lão gia già trong phủ đệ, học cách im lặng, cúi đầu và ghi nhớ. Người ta nói chuyện trước mặt kẻ hầu như thể hắn không tồn tại — nhờ vậy ngươi biết được vô số bí mật mà đáng lẽ một đứa trẻ như ngươi không nên biết.',{flags:{observant:true,servile:true}}),
 OC('con_lai_do','common','Con Người Lái Đò','Cha ngươi chèo đò ngang qua khúc sông chảy xiết, đưa hàng nghìn kẻ lạ mặt sang bờ bên kia. Ngươi ngồi sau lái, nghe hàng nghìn câu chuyện đời, hàng nghìn nỗi lòng. Biết lắng nghe — đó là món quà cha để lại, và là thứ khiến người ta mở lòng với ngươi.',{flags:{listener:true}}),
 OC('con_thay_do','common','Con Thầy Đồ Làng','Cha ngươi dạy chữ cho lũ trẻ trong làng bằng đồng học phí là mấy nải chuối. Ngươi thuộc lòng thánh hiền thư từ khi chưa rụng răng sữa, hiểu lễ nghĩa liêm sỉ — hành trang vừa quý vừa vướng víu trên một con đường mà đa phần đều vứt bỏ đạo đức để tiến lên.',{cmp:1.1,dao:5,flags:{literate:true}}),
 OC('con_thu_y','common','Con Nhà Thú Y','Cha ngươi chữa bệnh cho trâu bò trong vùng, ngươi phụ ông từ bé nên quen mùi máu tanh và tiếng rên của sinh vật đau đớn. Ngươi hiểu cơ thể sống vận hành thế nào, biết đặt tay vào đâu để một con thú hung dữ chịu nằm im — mầm mống mong manh cho ngự thú và y đạo.',{flags:{beast_sense:true,herblore:true}}),
 OC('con_diem_dan','common','Con Diêm Dân','Ngươi phơi mình dưới nắng gắt trên ruộng muối ven biển, da rám nắng, tay nứt nẻ vì nước mặn. Nghèo đến mức muối làm ra cũng không đủ tiền nộp thuế. Nhưng cái nắng và cái mặn ấy tôi cho ngươi một thân thể bền bỉ đến lì lợm.',{hp:1.1,def:1.05,flags:{hardy:true}}),
 OC('nguoi_bat_ran','common','Người Bắt Rắn','Ngươi kiếm sống bằng nghề bắt rắn độc bán cho tiệm thuốc, mỗi ngày đùa với tử thần trong đám cỏ. Ngươi quen với nọc độc đến mức cơ thể tự sinh kháng tính, và học được cách ra tay nhanh gọn trước khi con mồi kịp phản đòn.',{spd:1.1,flags:{poison_resist:true}}),
 OC('tre_chan_de','common','Trẻ Chăn Dê Trên Núi','Ngươi lùa đàn dê lên sườn núi cao mỗi sớm, sống giữa gió lộng và mây trắng, xa lánh chốn phồn hoa bụi bặm. Tâm ngươi rộng như trời, tĩnh như đá — thứ đạo tâm mà người tu ngàn năm trong hồng trần vẫn hằng mơ mà không có được.',{dao:8,flags:{pure_heart:true}}),
 OC('con_tho_moc','common','Con Thợ Mộc','Cha ngươi dựng nhà, đóng quan tài, tay đục tay bào đều đặn như nhịp thở. Ngươi thừa hưởng con mắt nhìn ra kết cấu ẩn sau mọi vật — cái xà nào chịu lực, mộng nào sắp gãy. Nhìn thấu cấu trúc, về sau lại là chìa khóa để ngươi hiểu trận pháp.',{flags:{pattern_sense:true,array_talent:true}}),
 OC('con_phuong_bat_am','common','Con Phường Bát Âm','Nhà ngươi thổi kèn đánh trống cho các đám ma trong vùng, quen với người chết hơn người sống. Ngươi tiễn vô số linh hồn về đất, nghe tiếng khóc than đến chai lì, và sớm hiểu một điều mà cả đời tu sĩ chối bỏ: ai rồi cũng chết, kể cả kẻ tự xưng trường sinh.',{soul:1,flags:{deathwise:true,fearless:true}}),
 OC('con_lam_giay','common','Con Nhà Làm Giấy','Nhà ngươi seo giấy bên suối, ngâm vỏ dó, giã bột, phơi từng tờ dưới nắng. Công việc đòi hỏi kiên nhẫn đến mức nhàm chán — nhưng chính cái kiên nhẫn tỉ mỉ ấy dạy ngươi rằng đại đạo cũng như tờ giấy, phải trải qua vạn lần giã nát mới thành hình.',{cmp:1.05,flags:{patient:true}}),
 OC('tre_ganh_nuoc','common','Đứa Trẻ Gánh Nước Thuê','Ngươi gánh nước từ giếng đầu làng đến các nhà giàu, mỗi thùng đổi một đồng, mỗi ngày trăm lượt lên xuống. Đôi vai nhỏ oằn xuống nhưng không gãy. Ngươi hiểu sớm rằng thân phận thấp hèn không phải là số mệnh — nó chỉ là điểm khởi đầu.',{hp:1.1,flags:{enduring:true}}),
 OC('con_nuoi_tam','common','Con Nhà Nuôi Tằm','Ngươi thức đêm hái dâu, canh nong tằm, nhìn con tằm nhả tơ rồi tự nhốt mình trong kén. Cảnh ấy khắc vào lòng ngươi một câu hỏi ám ảnh: phải chăng muốn hóa thành thứ khác, trước hết phải dám tự phá vỡ cái vỏ cũ của mình?',{cmp:1.1,flags:{insightful:true}}),
 OC('tre_ban_than','common','Đứa Trẻ Bán Than','Ngươi đội thúng than đi rao khắp phố mùa đông, mặt mũi lem luốc, áo mỏng run cầm cập. Người ta trả giá keo kiệt cho thứ ngươi đổ mồ hôi kiếm được. Cái lạnh thấu xương ấy hun đúc trong ngươi một ngọn lửa không tắt: một ngày, ngươi sẽ không còn phải cúi đầu vì vài cục than.',{atk:1.05,flags:{fireheart:true}}),
 OC('tieu_nhi_tuu_lau','common','Tiểu Nhị Tửu Lâu','Ngươi bưng rượu rót trà trong một tửu lâu bên quan đạo, nơi tụ họp đủ hạng người: hiệp khách, gian thương, tu sĩ giả dạng. Ngươi nghe lỏm thiên hạ sự, học đọc vị khách nhân qua ánh mắt và cách họ đặt túi tiền — kẻ nhanh mắt nhanh tai thường sống sót.',{flags:{streetwise:true,worldly:true}}),
 OC('con_linh_thu_thanh','common','Con Lính Thú Thành','Cha ngươi là lính gác cổng thành, cả đời cầm giáo đứng canh mà chưa từng lập công. Ngươi lớn lên trong doanh trại, quen kỷ luật và mùi binh khí, biết vài đường thương cơ bản — cái nền võ phàm tục ít ỏi, nhưng hơn đứt kẻ tay không bước vào giang hồ.',{atk:1.08,hp:1.05,flags:{tactician:true}}),
 OC('con_tho_da','common','Con Thợ Đá','Cha ngươi đục đá xây cầu, tạc tượng thần cho các đền miếu, tay chai như vỏ cây. Ngươi quen ăn ngủ cùng đá tảng, hiểu thớ đá và điểm yếu của nó. Người ta bảo ngươi ngu như đá — nhưng đá cũng là thứ bền bỉ nhất, chịu đựng nhất dưới gầm trời.',{hp:1.15,def:1.1,flags:{stoneheart:true}}),
 OC('tre_moi_coi_dich','common','Trẻ Mồ Côi Vì Ôn Dịch','Một trận ôn dịch quét qua thôn ngươi, chôn cả cha lẫn mẹ trong ba ngày. Ngươi sống sót một cách khó hiểu giữa những xác người. Từ đó ngươi mang trong mình một kháng tính kỳ lạ với bệnh tật và độc khí — và một nỗi cô độc không ai lấp đầy nổi.',{def:1.1,flags:{plague_touched:true,poison_resist:true}}),
 OC('con_ganh_xiec','common','Con Nhà Gánh Xiếc','Ngươi biết đi trên dây, nhào lộn, uốn dẻo từ khi chưa biết chữ, mua vui cho đám đông để đổi lấy tràng vỗ tay và vài đồng bố thí. Thân thể ngươi mềm dẻo, phản xạ nhanh như sóc — nền tảng tuyệt vời cho thân pháp về sau.',{spd:1.2,flags:{acrobat:true}}),

 // ===== HIẾM — số phận đã lệch khỏi lối phàm nhân =====
 OC('do_de_tap_dich','uncommon','Đệ Tử Tạp Dịch','Ngươi được nhận vào một tông môn — nhưng chỉ để quét sân, gánh nước, hầu hạ các sư huynh. Suốt mười năm hèn mọn ấy, ngươi lén nghe giảng đạo qua khe cửa, lén xem đệ tử chân truyền luyện công. Họ khinh ngươi là nô bộc; họ không biết ngươi đã thuộc lòng thứ họ được ban.',{cult:1.1,flags:{ex_disciple:true,observant:true}}),
 OC('con_tran_su','uncommon','Con Trận Sư','Cha ngươi bày trận cho các tông môn thuê, một đời sống bằng những đường vẽ bí ẩn trên nền đất. Ngươi lớn lên giữa la bàn, cọc trận và những nguyên lý mà người thường thấy chỉ là mê tín. Trong mắt ngươi, thế gian là một tấm trận đồ khổng lồ chờ giải mã.',{cmp:1.1,flags:{array_talent:true,pattern_sense:true}}),
 OC('con_phu_luc_su','uncommon','Con Phù Lục Sư','Cha ngươi vẽ bùa, họa phù trên giấy vàng bằng chu sa và máu. Ngươi học cách vận thần niệm vào từng nét bút, hiểu rằng một đạo phù thành bại chỉ trong một hơi thở. Nghề này rèn cho ngươi thần thức tập trung hơn hẳn người thường.',{soul:1,cmp:1.1,flags:{talisman:true}}),
 OC('con_ngu_thu_su','uncommon','Con Ngự Thú Sư','Nhà ngươi nuôi và thuần linh thú bán cho tu sĩ, sân sau đầy tiếng gầm gừ. Ngươi lớn lên giữa nanh vuốt, học cách áp chế bản năng hung dữ của mãnh thú bằng khí thế và tâm ý. Loài vật sợ ngươi, và cũng trung thành với ngươi.',{flags:{beast_sense:true,beastmaster:true}}),
 OC('con_luyen_khi_su','uncommon','Con Luyện Khí Sư','Cha ngươi rèn pháp khí cho tu sĩ trong một lò lửa không bao giờ tắt. Ngươi lớn lên giữa tiếng đe búa và ánh kim loại nung đỏ, có khả năng thiên phú nhìn ra phẩm cấp và điểm yếu của một món vũ khí chỉ bằng một cái liếc.',{atk:1.1,flags:{smith:true,appraiser:true}}),
 OC('con_kiem_gia','uncommon','Con Nhà Kiếm Đạo','Gia tộc ngươi ba đời theo kiếm, tuy chỉ là kiếm phàm tục nhưng kiếm ý đã ngấm vào huyết mạch. Ông nội ngươi từng khiến một tu sĩ trẻ phải né đòn. Ngươi cầm kiếm trước khi biết đọc, và trong tay ngươi, thanh kiếm như nối dài của cánh tay.',{atk:1.15,flags:{sword_heart:true,martial_base:true}}),
 OC('con_doc_su','uncommon','Con Độc Sư','Cha ngươi nghiên cứu chất độc để bào chế thuốc giải, cả đời sống chung với thứ có thể giết người trong một hơi thở. Ngươi được cho nếm độc từ nhỏ để luyện kháng tính, thân thể ngươi giờ là một tòa thành mà trăm độc khó xâm.',{def:1.1,flags:{poison_master:true,poison_resist:true}}),
 OC('con_ca_ky','uncommon','Con Nhà Ca Kỹ','Mẹ ngươi là danh kỹ một thời, dạy ngươi cầm kỳ thi họa và cả cách khiến lòng người mềm đi bằng một ánh nhìn. Ngươi sớm hiểu quyền lực thật sự không nằm ở nắm đấm — mà ở khả năng khiến kẻ mạnh tự nguyện quỳ xuống.',{cmp:1.1,flags:{charmer:true,manipulator:true}}),
 OC('con_thuong_hoi','uncommon','Con Đại Thương Hội','Gia đình ngươi điều hành một thương hội trải khắp mấy châu, tiền bạc như nước nhưng thiếu thứ quan trọng nhất: nền tảng tu luyện. Ngươi thừa hưởng cái đầu tính toán lạnh lùng và một túi bạc kha khá — trong tu tiên giới, tiền cũng là một loại tu vi.',{cmp:1.05,items:{bac_vun:300},linhThach:2000,flags:{worldly:true,merchant:true}}),
 OC('con_khoang_su','uncommon','Con Khoáng Sư','Cha ngươi đãi linh thạch trong các mỏ sâu, có con mắt hiếm có: chỉ cần chạm vào quặng thô là biết bên trong có bảo hay không. Ngươi thừa hưởng cảm ứng ấy với linh khí và khoáng vật — thứ khiến ngươi tìm ra cơ duyên nơi kẻ khác chỉ thấy đá vụn.',{luck:2,flags:{prospector:true,treasure_sense:true}}),
 OC('con_phong_thuy','uncommon','Con Thầy Phong Thủy','Cha ngươi xem đất, tầm long điểm huyệt, đặt mồ mả cho các nhà quyền quý. Ngươi học cách đọc long mạch và dòng chảy linh khí của đất trời — con mắt ấy giúp ngươi cảm nhận nơi nào có linh mạch giấu mình, nơi nào là tử địa.',{cmp:1.1,flags:{geomancer:true,fortune_sense:true}}),
 OC('hau_due_dao_tac','uncommon','Hậu Duệ Đại Đạo Tặc','Ông tổ ngươi là tên trộm khét tiếng từng khoắng sạch kho báu của một tiểu tông môn rồi biến mất. Ngươi thừa hưởng thân pháp quỷ mị và một tấm bản đồ giấu chỗ chôn của cải — nếu vô số kẻ đang truy lùng dòng máu này không tìm ra ngươi trước.',{spd:1.2,att:2,flags:{thief:true,hidden_lineage:true}}),
 OC('con_ngu_dan_bien','uncommon','Con Ngư Dân Biển Sâu','Nhà ngươi đánh cá nơi vùng biển có thủy yêu ẩn mình, mỗi chuyến ra khơi là một lần cược mạng. Cha ngươi bị một con giao long kéo xuống đáy; ngươi sống sót nhờ lặn sâu hơn, nín thở lâu hơn bất kỳ ai. Nước sâu và tử vong là bạn cũ của ngươi.',{hp:1.1,spd:1.05,flags:{waterborn:true,fearless:true}}),
 OC('con_vo_quan','uncommon','Con Võ Quan Thất Thế','Cha ngươi từng là võ tướng nhất phẩm, rồi bị vu tội, cả nhà bị đày. Ngươi lớn lên với binh thư gia truyền và mối nhục phải rửa. Ngươi hiểu binh pháp, biết dụng mưu và chỉ huy — thứ hiếm có ở một kẻ tu hành đơn độc.',{atk:1.1,karma:-1,flags:{tactician:true,leader:true,vengeful:true}}),
 OC('con_menh_ly','uncommon','Con Nhà Mệnh Lý','Cha ngươi bấm quẻ đoán mệnh nơi đầu chợ, đôi khi lời tiên đoán chính xác đến rợn người khiến người ta vừa tìm đến vừa sợ hãi. Ngươi thừa hưởng chút cảm ứng với vận mệnh và điềm báo — mơ hồ thấy trước hung cát, dù chưa từng làm chủ được nó.',{luck:1,flags:{fortune_sense:true,precog:true}}),
 OC('nu_hiep_lac_loi','uncommon','Nữ Hiệp Lạc Bước','Ngươi từng là hiệp nữ nổi danh chốn giang hồ phàm tục, đao pháp như gió, cứu khốn phò nguy. Rồi ngươi chứng kiến một tu sĩ búng tay giết sạch cả một tiêu cục — và hiểu rằng chính nghĩa phàm nhân nhẹ tựa lông hồng. Ngươi đến đây để có sức mạnh bảo vệ thứ mình tin.',{atk:1.15,dao:5,flags:{martial_base:true,righteous:true}}),

 // ===== QUÝ — trời đất đã đánh dấu ngươi từ khi lọt lòng =====
 OC('long_huyet','rare','Hậu Duệ Long Huyết','Trong ngươi chảy một dòng máu Long tộc đã pha loãng qua vô số đời, nhưng đêm mưa giông nó vẫn cuộn trào khiến xương cốt ngươi đau như bị bẻ gãy rồi ghép lại. Long uy tiềm ẩn khiến mãnh thú cúi đầu — và khiến những kẻ săn huyết mạch Long tộc thèm nhỏ dãi.',{hp:1.3,atk:1.2,flags:{dragon_body:true,ancient_blood:true},hidden:{name:'Long huyết ngủ say',desc:'Một dòng máu Long tộc pha loãng đang cuộn chảy trong ngươi.'}}),
 OC('tien_thien_kiem_cot','rare','Tiên Thiên Kiếm Cốt','Xương sống ngươi sinh ra đã thẳng như một thanh kiếm, và trong tủy có một luồng kiếm ý bẩm sinh không ai truyền dạy. Ngươi vung tay không cũng mang theo tiếng gió rít của lưỡi thép. Kiếm tu thấy ngươi thì mừng như bắt được vàng, còn ngươi thì sinh ra để chém.',{atk:1.25,cmp:1.1,flags:{sword_bone:true,sword_heart:true}}),
 OC('con_lai_tinh_linh','rare','Con Lai Tinh Linh','Mẹ ngươi là một tinh linh của rừng già cổ, cha là người phàm lạc lối. Ngươi mang vẻ đẹp phi nhân và mối liên kết bẩm sinh với thảo mộc, linh khí — cây cỏ nghiêng mình khi ngươi đi qua. Nhưng nửa dòng máu phàm khiến ngươi không thuộc về đâu cả.',{cmp:1.25,cult:1.1,flags:{fae_blood:true,herblore:true},hidden:{name:'Huyết mạch tinh linh',desc:'Nửa dòng máu tinh linh rừng cổ, thân với thảo mộc và linh khí.'}}),
 OC('tre_nuoi_boi_thi','rare','Đứa Trẻ Được Thi Thể Nuôi','Cha mẹ chết trong một cổ mộ, để lại ngươi sơ sinh bên cạnh. Kỳ lạ thay, một cỗ cương thi cổ trong mộ đã không giết mà lặng lẽ nhỏ tinh huyết nuôi ngươi sống. Ngươi lớn lên mang tử khí trong người, gần gũi với cái chết đến mức âm linh không dám phạm.',{soul:2,def:1.15,karma:-2,flags:{corpse_raised:true,deathwise:true},hidden:{name:'Tử khí hộ thân',desc:'Được cương thi cổ nuôi dưỡng, thân mang tử khí khiến âm linh kiêng dè.'}}),
 OC('ke_mong_du','rare','Kẻ Mộng Du Vạn Dặm','Mỗi đêm khi ngủ say, thần hồn ngươi rời xác lang thang qua những nơi cách xa vạn dặm, chứng kiến những chuyện chưa xảy ra. Ngươi tỉnh dậy với ký ức về tương lai mờ nhạt, và một nỗi sợ: có những thứ trong bóng tối của giấc mơ cũng đang nhìn lại ngươi.',{soul:2,luck:2,flags:{dream_walker:true,precog:true},hidden:{name:'Nguyên thần du mộng',desc:'Thần hồn rời xác trong mơ, thoáng thấy những điều chưa xảy đến.'}}),
 OC('hau_nhan_yeu_vuong','rare','Hậu Nhân Yêu Vương','Tổ tiên ngươi là một Yêu Vương thống trị cả một dãy núi, bị liên quân tu sĩ vây diệt ngàn năm trước. Dòng máu yêu tộc trong ngươi cho thân thể cường hãn và bản năng săn mồi — nhưng chính đạo ngửi thấy hơi yêu là rút kiếm, chẳng cần hỏi ngươi thiện hay ác.',{hp:1.25,atk:1.2,karma:-3,att:3,flags:{demon_blood:true,beast_sense:true},hidden:{name:'Huyết mạch Yêu Vương',desc:'Dòng máu Yêu Vương cổ cho sức mạnh cường hãn và bản năng săn mồi.'}}),
 OC('tre_song_trong_mo','rare','Đứa Trẻ Sống Trong Mộ Cổ','Ngươi trốn nạn đói vào một quần thể mộ cổ và sống trong đó suốt tuổi thơ, ăn ngủ giữa quan quách và bích họa ngàn năm. Ngươi học chữ cổ trên vách mộ, hiểu tang chế thượng cổ, và quen với việc những thứ trong mộ đôi khi... cử động.',{cmp:1.1,soul:1,flags:{tomb_raised:true,ancient_script:true},hidden:{name:'Tri thức mộ cổ',desc:'Lớn lên trong mộ cổ, đọc được cổ văn và hiểu bí thuật thượng cổ.'}}),
 OC('than_mang_co_lo','rare','Thân Mang Cổ Lô','Từ khi sinh ra, đan điền ngươi không rỗng như người thường mà chứa sẵn một chiếc lò cổ mờ ảo, tự động luyện hóa linh khí ngươi hấp thụ thành thứ tinh thuần hơn. Không ai biết ai đã đặt nó vào ngươi, hay để làm gì.',{cult:1.2,flags:{inner_furnace:true},hidden:{name:'Cổ lô trong đan điền',desc:'Một lò cổ vô danh nằm sẵn trong đan điền, tự luyện hóa linh khí.'}}),
 OC('ke_tuyet_mach','rare','Kẻ Tuyệt Mạch Nghịch Sinh','Thầy tướng phán ngươi tuyệt mạch — kinh mạch bế tắc, vĩnh viễn không thể tu luyện. Cả nhà xem ngươi như đồ bỏ. Nhưng chính vì kinh mạch "chết", ngươi lại miễn nhiễm với vô số cấm chế và tà thuật khống chế người khác. Con đường của ngươi, không ai đi được thay.',{cmp:1.15,def:1.1,flags:{severed_meridian:true,curse_immune:true},hidden:{name:'Tuyệt mạch nghịch sinh',desc:'Kinh mạch bế tắc lại khiến ngươi miễn nhiễm cấm chế và thuật khống chế.'}}),
 OC('bang_phach_di_the','rare','Băng Phách Dị Thể','Ngươi sinh ra giữa mùa đông khắc nghiệt nhất, thân thể lạnh như băng, chạm vào ai người ấy rùng mình. Máu ngươi mang hàn khí bẩm sinh — vết thương tự đóng băng cầm máu, tâm ngươi tĩnh lặng đến vô cảm trước mọi cám dỗ và tâm ma.',{def:1.2,cmp:1.1,flags:{ice_body:true,calm_heart:true},hidden:{name:'Băng phách bẩm sinh',desc:'Thân mang hàn khí, máu tự đóng băng, tâm tĩnh vô cảm trước tâm ma.'}}),
 OC('loi_the_thien_sinh','rare','Lôi Thể Thiên Sinh','Ngươi sinh ra trong một đêm sấm sét, và từ đó tĩnh điện luôn tí tách trên đầu ngón tay mỗi khi ngươi giận dữ. Thân thể ngươi dẫn và chịu được lôi kiếp mạnh hơn người thường gấp bội — thứ khiến ngươi vừa là thiên tài lôi tu, vừa là mục tiêu của thiên phạt.',{atk:1.25,flags:{thunder_body:true},hidden:{name:'Lôi thể bẩm sinh',desc:'Thân sinh cùng sấm sét, dẫn và chịu lôi kiếp cường hơn người thường.'}}),
 OC('con_huyet_dao_mon','rare','Con Của Huyết Đao Môn','Ngươi sinh ra trong một ma môn chuyên luyện đao bằng máu tươi. Từ tấm bé ngươi đã quen mùi tanh và tiếng thét, được dạy rằng nhân từ là bệnh tật. Đao pháp của ngươi khát máu, càng chém càng mạnh — nhưng cái giá là nhân tính hao mòn từng ngày.',{atk:1.3,karma:-4,att:2,flags:{blood_blade:true,cold_blooded:true},hidden:{name:'Huyết đao khát máu',desc:'Đao pháp ma môn, càng đổ máu càng mạnh, nhưng bào mòn nhân tính.'}}),
 OC('co_su_truyen_nhan','rare','Truyền Nhân Cổ Sư','Sư phụ ngươi là một Cổ Sư ẩn dật của Miêu Cương, nuôi vạn cổ trùng trong một chiếc bình. Trước khi chết vì phản phệ, lão truyền cho ngươi vài con cổ trùng và thuật ngự cổ — thứ tà thuật khiến kẻ mạnh nhất cũng phải dè chừng một khi trúng độc.',{soul:1,karma:-2,flags:{gu_master:true,poison_master:true},hidden:{name:'Cổ trùng truyền thừa',desc:'Nuôi cổ trùng cổ, ngự độc hại người vô hình vô ảnh.'}}),
 OC('tinh_than_chi_tu','rare','Tinh Thần Chi Tử','Ngươi chào đời vào đêm sao sa dày đặc nhất trăm năm, và linh hồn ngươi từ khi ấy kết một sợi dây mờ ảo với một vì sao xa. Đôi khi trong đêm, ngươi nhận được những gợi ý không từ đâu tới — như thể vì sao kia đang khe khẽ dẫn đường.',{soul:2,cmp:1.15,luck:2,flags:{star_soul:true},hidden:{name:'Tinh hồn liên kết',desc:'Linh hồn nối với một vì sao, đôi khi nhận gợi ý huyền bí trong đêm.'}}),

 // ===== SỬ THI — thiên địa phải để mắt =====
 OC('tien_tri_nhat_thuc','epic','Đứa Trẻ Trong Lời Tiên Tri','Một tiên tri trăm năm trước để lại: "Đứa trẻ sinh ngày không mặt trời sẽ định đoạt vận mệnh một kỷ nguyên." Ngươi sinh đúng ngày nhật thực toàn phần. Ngươi không biết mình có phải kẻ được nhắc tới hay không — nhưng vô số thế lực đã tin là vậy, kẻ muốn phò tá, kẻ muốn diệt trừ.',{luck:4,cmp:1.2,att:8,flags:{prophecy_child:true,chosen_one:true},hidden:{name:'Ứng lời tiên tri',desc:'Sinh ngày nhật thực, ứng vào lời tiên tri định đoạt một kỷ nguyên.'}}),
 OC('nguoi_bi_set_danh_song','epic','Người Bị Sét Đánh Mà Sống','Năm mười hai tuổi ngươi bị một tia sét đánh thẳng giữa trán trước mặt cả làng — và đứng dậy như không. Từ đó thân thể ngươi biến đổi: gân cốt cứng như thần thiết, đôi khi tĩnh điện chạy dọc sống lưng khi ngươi nổi giận. Trời đã đánh mà không giết được ngươi.',{hp:1.3,atk:1.25,flags:{thunder_body:true,heaven_tempered:true},hidden:{name:'Thiên lôi tôi thân',desc:'Sống sót sau một tia thiên lôi, thân thể được sét tôi luyện lại.'}}),
 OC('nhan_qua_chi_loi','epic','Nhân Quả Chi Lõi','Ngươi sinh ra là một điểm hội tụ của nhân quả — mọi việc ngươi làm đều bị khuếch đại lên gấp trăm lần. Làm một việc thiện nhỏ, phúc báo đổ về như thác; gieo một mầm ác, nghiệp chướng nghiền ngươi không thương tiếc. Con đường của ngươi, mỗi bước đều là canh bạc với trời.',{luck:3,karma:2,flags:{karma_core:true},hidden:{name:'Lõi nhân quả',desc:'Mọi thiện ác ngươi gieo đều bị thiên đạo khuếch đại gấp trăm lần.'}}),
 OC('tieng_vang_thoi_gian','epic','Tiếng Vang Thời Gian','Ngươi không chỉ sống ở hiện tại — thần hồn ngươi khẽ vang vọng qua nhiều điểm thời gian cùng lúc. Đôi khi ngươi nhớ một chuyện chưa xảy ra, đôi khi mang một vết thương từ quá khứ chưa đến. Cả Thiên Đạo cũng khó khóa được một kẻ tồn tại lệch pha với dòng thời gian.',{soul:3,cmp:1.2,luck:2,flags:{time_echo:true,precog:true},hidden:{name:'Vọng âm thời gian',desc:'Thần hồn tồn tại lệch pha thời gian, thoáng nhớ cả quá khứ lẫn tương lai.'}}),
 OC('than_linh_bi_tu_choi','epic','Thần Linh Bị Từ Chối','Ngươi từng là một tiểu thần linh cai quản một vùng đất, rồi bị Thiên Đạo phế bỏ, đày xuống làm người, mất sạch thần lực. Nhưng ngươi vẫn giữ được ký ức về cách thế giới thật sự vận hành — thứ tri thức mà mọi tu sĩ phải dò dẫm cả đời mới chạm tới một góc.',{soul:4,cmp:1.2,karma:-3,att:3,flags:{fallen_god:true,worldsight:true},hidden:{name:'Ký ức thần linh',desc:'Từng là thần linh bị phế, còn giữ tri thức về cách thế giới vận hành.'}}),
 OC('phe_linh_can_hoa_than','epic','Phế Linh Căn Hóa Thần','Linh căn ngươi yếu đến mức tông môn nào cũng lắc đầu, gọi ngươi là phế vật. Nhưng ẩn sâu trong cái linh căn "phế" ấy là một dị chủng mà ngay cả đại năng cũng không nhận ra — nó không hút linh khí, nó nuốt và luyện hóa mọi thứ, chỉ là cực kỳ chậm ở khởi đầu.',{lifeMod:-10,cmp:1.3,att:-2,flags:{false_waste:true,devour_root:true},hidden:{name:'Phế căn ẩn chân',desc:'Linh căn bị chê phế lại ẩn giấu một dị chủng nuốt luyện vạn vật.'}}),
 OC('hon_don_chi_tu','epic','Hỗn Độn Chi Tử','Ngươi không sinh ra từ cha mẹ bình thường — một cơn hỗn độn năng lượng nơi cấm địa ngẫu nhiên ngưng tụ thành ngươi. Ngươi không có huyết thống, không có quá khứ, chỉ có một thân thể dung hợp vạn khí và một sự tồn tại khiến các tu sĩ già nhất cũng bất an khi nhìn vào.',{cult:1.4,soul:2,cmp:1.2,att:5,flags:{chaos_born:true},hidden:{name:'Sinh từ hỗn độn',desc:'Ngưng tụ từ một cơn hỗn độn năng lượng, thân dung hợp vạn khí.'}}),
 OC('ke_cuoi_cung_cua_tong','epic','Kẻ Cuối Cùng Của Một Đạo Thống','Cả một đạo thống cổ với truyền thừa vô thượng đã bị tận diệt, và ngươi — một đứa trẻ được giấu đi — là hạt giống cuối cùng. Trong đầu ngươi là toàn bộ tâm pháp trấn phái, trên vai ngươi là mối thù của cả một môn phái, và sau lưng là kẻ đã ra tay vẫn đang lùng sục.',{cmp:1.25,cult:1.2,karma:1,att:4,flags:{last_heir:true,vengeful:true},hidden:{name:'Truyền thừa tuyệt thống',desc:'Hạt giống cuối cùng của một đạo thống bị diệt, gánh cả truyền thừa lẫn ân thù.'}}),

 // ===== TRUYỀN THUYẾT — cả tu tiên giới vừa mơ ước vừa sợ hãi =====
 OC('nghich_thien_chi_tu','legend','Nghịch Thiên Chi Tử','Thiên Đạo ghét ngươi từ khi sinh — mưa máu ngày ngươi chào đời, vạn vật quay lưng, cơ duyên né tránh, tai họa bám riết. Nhưng có một quy luật kỳ dị: mỗi lần ngươi vượt qua điều tưởng chừng không thể sống nổi, ngươi lại mạnh lên một bậc. Trời càng đè, ngươi càng vươn.',{luck:0,karma:-6,att:6,hp:1.2,atk:1.2,flags:{heaven_defier:true,heaven_forsaken:true},hidden:{name:'Nghịch thiên nhi hành',desc:'Thiên Đạo ghét bỏ, nhưng mỗi lần vượt tử cảnh ngươi lại cường thêm một bậc.'}}),
 OC('thien_ma_the','legend','Thiên Ma Thể','Ngươi mang Thiên Ma Thể — thể chất mà cả tu tiên giới vừa mơ ước vừa khiếp sợ. Ma khí trời sinh khiến ngươi tu luyện tà công nhanh như hít thở, áp chế tâm trí kẻ yếu bằng một ánh nhìn. Khi tin này lan ra, chính đạo sẽ đến để diệt, ma đạo sẽ đến để tranh đoạt ngươi làm chí tôn.',{atk:1.4,cult:1.3,soul:3,karma:-6,att:6,flags:{demon_heir:true,heaven_ma_body:true},hidden:{name:'Thiên Ma Thể',desc:'Thể chất ma đạo tối thượng, tu tà công thần tốc, áp chế tâm trí kẻ yếu.'}}),
 OC('truyen_nhan_co_tong','legend','Truyền Nhân Cổ Tông','Truyền nhân hợp pháp của một cổ tông đã biến mất vạn năm trước — đó là ngươi. Trong huyết mạch ngươi khắc dấu ấn mở kho tàng khổng lồ mà tổ tông cất giấu, cùng một danh sách kẻ thù dài đằng đẵng đã hủy diệt tông môn. Họ sẽ tìm đến ngươi, sớm thôi.',{cmp:1.3,cult:1.2,luck:3,linhThach:10000,treasureGrade:4,items:{bac_vun:1000},att:3,flags:{ancient_heir:true},hidden:{name:'Ấn ký cổ tông',desc:'Huyết mạch khắc dấu mở kho tàng cổ tông — và danh sách kẻ thù của tổ tông.'}}),
