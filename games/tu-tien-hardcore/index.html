// Fill tới 100 bằng generator (mỗi cái vẫn có narrative riêng)
const ROLE=[['Con Nhà Nông',{hp:1.05}],['Tiều Phu',{hp:1.05}],['Con Nhà Chài',{spd:1.1}],['Học Đồ Nghèo',{cmp:1.1,flags:{literate:true}}],['Nô Bộc Bỏ Trốn',{karma:-2,flags:{vengeful:true}}],['Ca Kỹ Hát Rong',{flags:{charmer:true}}],['Lính Thú Đào Ngũ',{atk:1.05,flags:{tactician:true}}],['Trẻ Coi Nghĩa Địa',{flags:{fearless:true}}],['Con Nhà Thợ Mộc',{flags:{pattern_sense:true}}],['Tiểu Nhị Tiệm Thuốc',{flags:{herblore:true}}],['Con Nhà Hải Thương',{items:{bac_vun:100},flags:{worldly:true}}],['Đầu Lĩnh Trẻ Trộm Cắp',{flags:{leader:true,deceiver:true},karma:-1}],['Con Rơi Thành Chủ',{items:{bac_vun:100},flags:{hidden_lineage:true}}],['Thợ Săn Yêu Thú',{atk:1.15,flags:{beast_hunter:true}}],['Truyền Nhân Trận Sư',{flags:{array_talent:true}}],['Đạo Cô Quét Sân',{cmp:1.05,flags:{pure_heart:true}}],['Con Thầy Bói',{flags:{fortune_sense:true}}],['Kẻ Vượt Ngục',{karma:-2,flags:{knows_secret:true}}],['Con Nhà Dệt Vải',{cmp:1.05}],['Đào Kép Gánh Xiếc',{spd:1.15}]];
const CIRC=['sống sót qua một trận đói kinh hoàng','lớn lên bên một dòng sông chết','mồ côi từ tấm bé','bị cả thôn xa lánh vì một lời nguyền','từng chứng kiến một tu sĩ giết người ngay trước mắt','bị bán làm nô rồi trốn thoát','được một lão ăn mày kỳ lạ dạy dỗ','nhặt được một mảnh ngọc bội không rõ nguồn gốc','mang trên người một vết bớt hình rồng','hay mơ những giấc mơ về kiếp trước'];
const FORT=[['Mảnh Ngọc Bội Lạ','Một mảnh ngọc bội ấm áp, đôi khi tự phát sáng.'],['Giấc Mơ Tiền Kiếp','Những mảnh ký ức mơ hồ của một kiếp sống khác.'],['Vết Bớt Huyết Mạch','Một dấu vết huyết mạch cổ đang ngủ dưới da ngươi.'],['Lão Nhân Trong Mộng','Một bóng người già nua thi thoảng chỉ dạy ngươi trong mơ.'],['Hạt Giống Lạ','Một hạt giống đen ai đó gieo vào thân ngươi từ nhỏ.'],['Cổ Vật Nuôi Dưỡng','Một cổ vật rơi bên đường lặng lẽ nuôi ngươi bằng linh khí.']];
const RAR_HOOK={common:'Ngươi sinh ra tầm thường như hạt cát giữa sa mạc.',uncommon:'Số phận ngươi vốn đã lệch khỏi lối mòn phàm nhân.',rare:'Trời đất dường như đã đánh dấu ngươi từ khi lọt lòng.'};
(function fill(){let i=0;const rar=['common','common','common','uncommon','rare'];
 while(ORIGINS.length<100){const R=makeRNG(9137+i*31);const role=R.pick(ROLE);const circ=R.pick(CIRC);const rr=rar[i%rar.length];const fx=JSON.parse(JSON.stringify(role[1]));
  const hasFort=rr!=='common'||R.chance(0.3);let hidden=null;if(hasFort){const f=R.pick(FORT);hidden={name:f[0],desc:f[1]};fx.hidden=hidden;}
  const nm=`${role[0]} (${circ.split(' ').slice(0,2).join(' ')}…)`;
  const open=`${RAR_HOOK[rr]}\n\nNgươi là ${role[0].toLowerCase()}, ${circ}. Tuổi thơ ngươi không có gì ngoài gian khổ và bản năng sinh tồn.${hidden?` Nhưng sâu trong ngươi ẩn giấu một điều lạ: ${hidden.desc}`:''}\n\nDù quá khứ thế nào, hiện tại ngươi vẫn chỉ là một thiếu niên mười lăm tuổi đứng ở khởi điểm thấp nhất của một thế giới tàn khốc — [Khô Kiệt Tinh Lộ].`;
  ORIGINS.push(OC('gen_'+i,rr,nm,open,fx));i++;}
})();
function rollOriginHand(n){const pool=ORIGINS.slice();const hand=[];for(let i=0;i<n&&pool.length;i++){const w=pool.map(o=>[RAR[o.rar].w,o]);const pick=RNG.weight(w);hand.push(pick);pool.splice(pool.indexOf(pick),1);}return hand;}
function rollRandomOrigin(){return RNG.weight(ORIGINS.map(o=>[RAR[o.rar].w,o]));}

/* =========================================================================
   STATE
   ========================================================================= */
let S=null,LOG=[];
function newState(originId){
  const seed=(Date.now()^(Math.random()*1e9))>>>0;RNG=makeRNG(seed);THECHAT=buildTheChat();
  const root=rollRoot();const tc=rollTheChat();const luckId=RNG.weight([[12,0],[60,1],[20,2],[6,3],[1.8,4],[0.2,5]]);
  const o=ORIGINS.find(x=>x.id===originId);const fx=o.fx||{};
  S={seed,ver:1,name:o.name.split(' ')[0]==='Con'?'Vô Danh':'Vô Danh',
    origin:o.id,originName:o.name,originRar:o.rar,
    ri:0,si:0,progress:0,soul:0+(fx.soul||0),
    hp:100,hpMax:100,linhLuc:100,dao:50+(fx.dao||0),taint:0,
    life:(80-15)+(fx.lifeMod||0),lifeMax:80+(fx.lifeMod||0),age:15,
    linhThach:fx.linhThach||0,
    root:fx.rootId?LINH_CAN.find(x=>x.id===fx.rootId):root,rootShown:false,
    tc:fx.theChatName?(THECHAT.find(x=>x.n===fx.theChatName)||tc):tc,tcShown:false,
    luck:fx.luck!=null?fx.luck:luckId,luckShown:false,
    cmp:fx.cmp||1,hpMul:fx.hp||1,atkMul:fx.atk||1,defMul:fx.def||1,cultMul:fx.cult||1,
    fame:0,karma:fx.karma||0,att:fx.att||0,
    inv:{},treasures:[],techs:[],tech:null,arrays:[],beasts:[],prof:null,daolu:null,natal:null,laws:[],cave:null,tower:null,ownForce:null,disciple:null,rival:null,achievements:[],clues:{},heart:0,placeClues:{},placesFound:[],
    hidden:fx.hidden?{...fx.hidden,shown:false}:null,mutations:[],
    world:{tier:1,name:'[Khô Kiệt Tinh Lộ]',region:'Thôn Khô Thạch',machId:1,qiMod:1,secretRealm:0},
    sect:null,npcs:{},ledger:[],flags:{...(fx.flags||{})},
    time:{y:0,m:1,d:1},stats:{kills:0,break:0,pills:0,ngodao:0,betray:0},
    scene:null,alive:true,cause:null,
  };
  // Chủng tộc: đa số Nhân tộc, hiếm khi Yêu/Ma/Vu/Quỷ/Long
  const race=pickRace(S.flags);S.race=race.id;S.raceName=race.n;const rf=race.fx||{};
  if(rf.hp)S.hpMul*=rf.hp;if(rf.atk)S.atkMul*=rf.atk;if(rf.cult)S.cultMul*=rf.cult;if(rf.cmp)S.cmp*=rf.cmp;
  if(rf.lifeMul){S.lifeMax=Math.round(S.lifeMax*rf.lifeMul);S.life=Math.round(S.life*rf.lifeMul);}
  if(race.soulAdd)S.soul+=race.soulAdd;if(race.karma)S.karma+=race.karma;if(race.att)S.att+=race.att;
  if(rf.nosoul)S.flags.vu_nosoul=true;
  S.hpMax=Math.round(100*S.hpMul);S.hp=S.hpMax;
  if(fx.items)for(const k in fx.items)S.inv[k]=(S.inv[k]||0)+fx.items[k];
  if(fx.treasureGrade)S.treasures.push(genTreasure(fx.treasureGrade));
  LOG=[];
  applyLegacy(); // di sản kiếp trước (nếu vừa trùng sinh)
}
// ===== TRÙNG SINH: giữ lại 1 di sản (công pháp / khí vận / pháp bảo) qua kiếp sau =====
function applyLegacy(){let lg;try{lg=JSON.parse(LS.getItem(LEGACY_KEY)||'null');}catch(e){lg=null;}if(!lg)return;LS.removeItem(LEGACY_KEY);S.flags.reborn=true;
  if(lg.type==='tech'&&lg.data){S.techs.push(lg.data);log('【TRÙNG SINH】 Ký ức kiếp trước bừng tỉnh — ngươi vẫn khắc cốt công pháp «'+lg.data.name+'».','good');}
  else if(lg.type==='treasure'&&lg.data){S.treasures.push(lg.data);log('【TRÙNG SINH】 Pháp bảo «'+lg.data.name+'» xuyên qua luân hồi, theo ngươi tái thế.','good');}
  else if(lg.type==='luck'){S.luck=clamp(lg.data|0,0,5);S.luckShown=true;log('【TRÙNG SINH】 Khí vận kiếp trước vẫn đeo bám: '+LUCK[S.luck].n+'.','good');}
}
function computeRebirth(){if(S._reborn)return S._reborn;
  let ch=0.04+luckOf().id*0.02+(S.hidden?0.05:0)+(S.dao>=70?0.03:0)+(S.stats.ngodao>=3?0.03:0);
  if(S.flags&&S.flags.reincarnation)ch=1; // vài cơ duyên/thể chất bảo đảm trùng sinh
  const ok=RNG.chance(clamp(ch,0.02,0.95));let legacy=null;
  if(ok){const opts=[];if(S.tech)opts.push({type:'tech',data:S.tech,desc:'công pháp «'+S.tech.name+'»'});
    const bestT=(S.treasures||[]).slice().sort((a,b)=>b.grade-a.grade)[0];if(bestT)opts.push({type:'treasure',data:bestT,desc:'pháp bảo «'+bestT.name+'»'});
    opts.push({type:'luck',data:Math.max(2,S.luck),desc:'khí vận «'+LUCK[clamp(Math.max(2,S.luck),0,5)].n+'»'});
    legacy=RNG.pick(opts);try{LS.setItem(LEGACY_KEY,JSON.stringify({type:legacy.type,data:legacy.data}));}catch(e){}}
  S._reborn={ok,legacy};return S._reborn;
}
function save(){try{LS.setItem(SAVE_KEY,JSON.stringify({S,LOG}));}catch(e){}}
function load(){try{const o=JSON.parse(LS.getItem(SAVE_KEY));if(!o||!o.S)return false;S=o.S;LOG=o.LOG||[];RNG=makeRNG((S.seed^(Date.now()&0xffff))>>>0);THECHAT=buildTheChat();return true;}catch(e){return false;}}
function hasSave(){try{return !!LS.getItem(SAVE_KEY);}catch(e){return false;}}
function wipe(){try{LS.removeItem(SAVE_KEY);}catch(e){}}
function log(t,c){LOG.push({t,c:c||''});if(LOG.length>300)LOG.shift();}

/* =========================================================================
   HỆ THỐNG LÕI
   ========================================================================= */
function luckOf(){return LUCK[clamp(S.luck,0,5)];}
function addKarma(n,tag){S.karma+=n;if(tag)S.ledger.push({n,tag,t:{...S.time}});if(tag)log(`${n>=0?'Tích':'Gánh'} ${Math.abs(n)} nhân quả (${tag}).`,n>=0?'good':'bad');}
function addFame(n){S.fame=clamp(S.fame+n,-100,1000);}
function advance(years){S.time.d+=Math.round(years*360);while(S.time.d>360){S.time.d-=360;S.time.y++;}S.age+=years;S.life-=years;
  // thế giới tự diễn tiến bất kể người chơi: linh khí hồi về mức nền, bí cảnh dần đóng
  if(S.world.qiMod&&S.world.qiMod!==1){S.world.qiMod+=(1-S.world.qiMod)*Math.min(1,years*0.12);if(Math.abs(S.world.qiMod-1)<0.03)S.world.qiMod=1;}
  if(S.world.secretRealm>0){S.world.secretRealm-=years;if(S.world.secretRealm<=0){S.world.secretRealm=0;log('『THẾ GIỚI』 Cửa bí cảnh cổ đã khép lại. Cơ duyên trong đó, từ nay thành truyền thuyết.','lore');}}
  if(S.rival)rivalGrow(years); // đối thủ mệnh định cũng tu luyện, cũng đột phá
  if(S.life<=0&&S.alive){S.alive=false;S.cause='Thọ nguyên cạn kiệt. Ngươi ngồi kiết già, hóa thành tro tàn theo lẽ trời đất.';log('☠ Thọ nguyên cạn.',' death');}}
function deductLife(y,r){S.life-=y;if(r)log(`Thọ nguyên hao ${Math.round(y)} năm (${r}).`,'bad');if(S.life<=0&&S.alive){S.alive=false;S.cause='Thọ nguyên khấu tận vì '+(r||'hao tổn')+'.';}}
function machQi(){return MACH_QI[clamp((S.world.machId||1)-1,0,11)];}
function cultRate(){const tech=S.tech?(0.6+S.tech.grade*0.25):0.3;const taint=Math.max(0.2,1-S.taint*0.02);const diff=S.ri<=0?0.8:(1+S.ri*0.25)*Math.pow(1.06,S.ri);
  return 6*(S.root.spd)*(S.cultMul)*(S.tc.buff.cult||1)*machQi()*(S.world.qiMod||1)*sectCultBonus()*(1+profBonus('dan'))*(S.daolu?1.12:1)*tech*taint/diff;}
function cultivate(years,hard){const gain=cultRate()*years*(hard?2.6:1);S.progress=Math.min(1,S.progress+gain);
  const taint=(1-[0.5,0.55,0.65,0.72,0.8,0.86,0.9,0.93,0.95,0.97,0.985,1][clamp((S.world.machId||1)-1,0,11)])*0.5*years*(hard?2.5:1);S.taint+=taint;
  advance(years*(hard?2.6:1));if(hard)deductLife(years*0.6*(1-profBonus('y')),'khổ tu');
  if(S.taint>40){deductLife((S.taint-40)*0.1*years,'chướng tính ăn mòn kinh mạch');}
  return gain;}
function nextTarget(){if(S.ri<=0)return{ri:1,si:0,major:true,name:'Luyện Khí Nhất tầng'};const r=REALMS[S.ri-1];if(S.si<r.subs.length-1)return{ri:S.ri,si:S.si+1,major:false,name:r.name+' '+r.subs[S.si+1]};if(S.ri>=100)return null;const nr=REALMS[S.ri];return{ri:S.ri+1,si:0,major:true,name:nr.name+' '+nr.subs[0]};}
function breakChance(){const tg=nextTarget();if(!tg)return 0;const tr=REALMS[tg.ri-1];let p=tr.breakBase;if(!tg.major)p=Math.min(0.95,p+0.25);
  p+=Math.min(0.2,S.soul*0.01);p+=(S.flags.phaCanh||0)+(S.flags.ngoDao||0);p+=(luckOf().fort-1)*0.03;p+=(S.cmp-1)*0.1;
  p-=Math.min(0.4,S.taint*0.01);if(S.karma<0)p-=Math.min(0.15,-S.karma*0.003);if(S.dao<30)p-=0.1;
  return clamp(p,0.01,0.98);}
// THIÊN KIẾP + TÂM MA — độ kiếp khi đại đột phá cảnh cao (Kim Đan trở lên)
function heavenTribulation(ri){
  const bolts=Math.min(9,2+Math.floor(ri/6));
  let def=S.soul*0.4+(S.dao-50)*0.02+(S.tc.buff.def||1-1)*2+S.treasures.reduce((a,t)=>a+Math.log10(t.mult||1),0)+profBonus('tran')*3;
  log(`☇ THIÊN KIẾP giáng lâm! ${bolts} đạo lôi kiếp xé nát tầng trời, khóa chặt lấy ngươi.`,'warn');
  // Tâm ma kiếp: đạo tâm thấp dễ tự bạo
  if(S.dao<45&&RNG.chance(0.45)){
    if(RNG.chance(clamp(0.55-S.dao*0.009,0.05,0.8))){S.alive=false;S.cause='Tâm ma bùng phát giữa lôi kiếp — ảo cảnh nuốt chửng đạo tâm, ngươi tự bạo mà vong.';log('☠ TÂM MA KIẾP — đạo tâm sụp đổ!','death');return false;}
    S.taint+=8;log('Tâm ma trỗi dậy trong kiếp vân, ngươi cắn răng trấn áp — chướng tính tăng.','warn');
  }
  let hit=0;for(let i=0;i<bolts;i++){if(RNG.chance(clamp(0.14-def*0.006,0.02,0.5)))hit++;}
  if(hit>=Math.ceil(bolts*0.6)){S.alive=false;S.cause=`Không chống nổi ${bolts} đạo thiên lôi, thân tử đạo tiêu giữa biển sấm.`;log('☠ ĐỘ KIẾP THẤT BẠI!','death');return false;}
  if(hit>0){deductLife(hit*3,'thương tổn lôi kiếp');S.hp=Math.max(1,S.hp-hit*8);log(`Ngươi trúng ${hit} đạo lôi, trọng thương nhưng gắng gượng qua kiếp.`,'bad');}
  S.hpMax=Math.round(S.hpMax*1.04);S.hp=S.hpMax;log('✦ Vượt qua thiên kiếp! Lôi kiếp tôi luyện nhục thân, ngươi thoát thai hoán cốt, mạnh hơn xưa.','good');return true;
}
function attemptBreak(){const tg=nextTarget();if(!tg){log('Ngươi đã ở tận cùng Đại Đạo.','lore');return;}
  if(S.progress<1){log('Tu vi chưa đủ, đột phá lúc này chỉ chuốc tẩu hỏa.','warn');return;}
  const p=breakChance();log(`Bắt đầu đột phá ${tg.name}... (tỉ lệ ${Math.round(p*100)}%)`,'');
  delete S.flags.phaCanh;delete S.flags.ngoDao;
  if(RNG.chance(p)){S.ri=tg.ri;S.si=tg.si;S.progress=0;S.stats.break++;if(S.natal)S.natal.bond=Math.min(100,(S.natal.bond||0)+3);log(`✦ Đột phá thành công! ${tg.name}.`,'good');
    if(tg.major){const nr=REALMS[tg.ri-1];const gain=Math.max(nr.life-S.lifeMax,nr.life*0.1);S.life+=gain;S.lifeMax=Math.max(S.lifeMax,nr.life);log(`Thọ nguyên tăng ${Math.round(gain)} năm.`,'good');log('【'+nr.name+'】'+realmPower(tg.ri),'lore');
      if(tg.ri>=3){if(!heavenTribulation(tg.ri))return;} // Kim Đan trở lên phải độ thiên kiếp
      rollMutation();}
    else if(RNG.chance(0.25))rollMutation();
  }else{S.progress=Math.max(0,S.progress-0.3);S.taint+=3;const major=tg.major;const deathRisk=(major?0.12:0.03)+(S.dao<30?0.06:0)+S.taint*0.002;
    if(RNG.chance(deathRisk)){S.alive=false;S.cause=`Tẩu hỏa nhập ma khi đột phá ${tg.name}. Kinh mạch nổ tung, nguyên thần tan biến.`;log('☠ TẨU HỎA NHẬP MA!','death');}
    else{deductLife((major?20:5)+RNG.int(0,15),'phản phệ đột phá');log('Đột phá thất bại! Ngươi hộc máu, đạo cơ tổn thương.','bad');}}
}
const MUT=[['Đồng tử co như rắn',false,'Ánh mắt khiến người thường khiếp sợ.'],['Da mọc vảy mỏng',false,'Phòng ngự tăng, ngày càng ít giống người.'],['Thần thức nhạy bén dị thường',true,'Nguyên thần +1.'],['Huyết mạch cổ thức tỉnh một phần',true,'Khí huyết mạnh lên.'],['Tâm ma nhen nhóm',false,'Đạo tâm bất ổn, dễ tẩu hỏa.'],['Một phần linh hồn hóa dị vật',false,'Mạnh hơn nhưng nhân tính hao mòn.'],['Mọc một chiếc sừng nhỏ trên trán',false,'Yêu tộc huyết mạch trỗi dậy, người thường xa lánh.'],['Lưng nhú đôi cánh xương mỏng',true,'Thân pháp nhẹ nhàng hơn, nhưng khó giấu thân phận.'],['Máu chuyển sắc vàng kim',true,'Khí huyết cường hãn, vết thương mau lành.'],['Nghe được tiếng lòng vạn vật',true,'Ngộ tính bén hơn, nhưng tạp âm thiên địa quấy nhiễu đạo tâm.'],['Bóng của ngươi bắt đầu tự cử động',false,'Một thứ gì đó đang thành hình trong hồn ngươi.'],['Xương cốt trong suốt như lưu ly',true,'Thân thể thuần khiết hơn, ít nhiễm chướng tính.'],['Không còn cảm thấy đói khát hay mỏi mệt',false,'Càng gần tiên, càng xa người.'],['Tóc bạc trắng dù còn trẻ',false,'Dấu vết của việc nghịch thiên cải mệnh.']];
function rollMutation(){const m=RNG.pick(MUT);S.mutations.push(m[0]);if(m[0].includes('Thần thức'))S.soul+=1;if(m[0].includes('Tâm ma'))S.dao=Math.max(0,S.dao-10);if(m[0].includes('Huyết mạch'))S.hpMax=Math.round(S.hpMax*1.05);log(`⚝ Dị biến khi đột phá: ${m[0]}. ${m[2]}`,m[1]?'good':'warn');}
// Không cơ duyên miễn phí
function grantWithPrice(name,mag){log('✦ Ngươi có được: '+name+'.','good');const roll=RNG.next();if(roll<0.4){deductLife(mag*(2+RNG.int(0,3)),'cái giá của cơ duyên');}else if(roll<0.75){addKarma(-mag,'nợ nhân quả từ cơ duyên');}else{S.att+=mag*2;log('Cơ duyên lộ ra ngoài, ngươi thêm bị chú ý.','warn');}if(mag>=3&&RNG.chance(0.6))S.att+=mag;}
// NPC
const SUR=['Lý','Vương','Trương','Triệu','Tần','Mộ Dung','Âu Dương','Diệp','Hàn','Bạch','Huyền Viên'];
const GIV=['Thanh Phong','Vô Tình','Kiếm Tâm','Nhược Thủy','Hạo Nhiên','Tử Yên','Mặc','Linh Nhi','Thất Sát','Dạ','Cửu U'];
const TRAITS=['tham lam','thận trọng','tàn nhẫn','trọng nghĩa','kiêu ngạo','nhẫn nhịn','đa nghi','giảo hoạt','cuồng ngạo','lãnh khốc','hào sảng','ngụy quân tử','si tình','hiếu chiến','tham sống sợ chết','coi trọng chữ tín'];
const GOALS=['đoạt cơ duyên','báo thù cố nhân','tìm trường sinh','bảo vệ tông môn','thu thập linh dược','đột phá cảnh giới','ẩn nhẫn chờ thời','tìm lại người xưa','phục hưng gia tộc đã diệt vong','truy tìm kẻ giết thầy','luyện thành một môn cấm thuật','tìm đường về cố hương ở giới khác','chứng đạo trường sinh bất tử','san bằng một mối thù truyền kiếp'];
function makeNPC(rel){const id='npc_'+RNG.int(0,1e9);const npc={id,name:RNG.pick(SUR)+' '+RNG.pick(GIV),ri:clamp(S.ri+(rel||RNG.int(-1,3)),0,100),si:RNG.int(0,3),traits:[RNG.pick(TRAITS)],goal:RNG.pick(GOALS),relation:0,memory:[],alive:true};S.npcs[id]=npc;return npc;}
function remember(npc,deed,d){npc.memory.push(deed);npc.relation=clamp(npc.relation+d,-100,100);if(npc.memory.length>12)npc.memory.shift();}

/* =========================================================================
   SCENE ENGINE — narrative + choices + free input + hidden 5th
   ========================================================================= */
let TAB='story';
let freeRes=null;
function powerMight(){let m=S.ri<=0?0:powerExp(S.ri,S.si);m+=Math.log10(S.atkMul*(S.tc.buff.atk||1));if(S.tech)m+=S.tech.grade*0.15;for(const t of S.treasures)m+=Math.log10(t.mult||1);for(const a of(S.arrays||[]))m+=Math.log10(a.mult||1)*0.5;for(const b of(S.beasts||[]))m+=Math.log10(b.mult||1);
  m+=profBonus('khi');if(S.natal)m+=Math.log10((S.natal.mult||1))*(1+(S.natal.bond||0)*0.01)+0.3;for(const l of(S.laws||[]))m+=0.25;if(S.flags.huyetBao)m+=Math.log10(3);return m;}
function fight(enemy){const gap=powerMight()-(powerExp(enemy.ri,enemy.si)+(enemy.boss?0.3:0)+(enemy.mightBonus||0));const l=luckOf();
  if(enemy.soul&&S.soul<enemy.ri*0.4){log(`${enemy.name} tung một đòn thần thức thẳng vào nguyên thần ngươi!`,'bad');if(RNG.chance(Math.max(0.1,0.5-S.soul*0.05))){S.alive=false;S.cause=`Nguyên thần bị ${enemy.name} nghiền nát (chưa luyện nguyên thần).`;return'dead';}deductLife(3,'nguyên thần bị công kích');}
  if(gap<-4){if(S.flags.hoMenh&&RNG.chance(0.6)){S.flags.hoMenh=false;deductLife(10,'kích hoạt hộ mệnh');log('Hộ Mệnh Đan cứu ngươi một mạng!','good');return'injured';}S.alive=false;S.cause=`${enemy.name} chỉ phóng một tia uy áp; ngươi như con kiến dưới chân voi.`;return'dead';}
  const win=1/(1+Math.pow(10,-gap*1.1));delete S.flags.huyetBao;
  if(RNG.chance(win)){S.stats.kills++;log(`Ngươi hạ gục ${enemy.name}!`,'good');return'win';}
  const fleeP=Math.min(0.7,0.25+(S.tc.buff.spd?0.2:0)+(l.surv-1)*0.1);
  if(enemy.canFlee!==false&&RNG.chance(fleeP)){deductLife(2,'trọng thương khi tháo chạy');log('Ngươi liều mạng thoát được trong gang tấc.','warn');return'flee';}
  if(S.flags.hoMenh&&RNG.chance(0.6)){S.flags.hoMenh=false;deductLife(10,'kích hoạt hộ mệnh');log('Hộ Mệnh Đan cứu ngươi!','good');return'injured';}
  if(RNG.chance(Math.min(0.9,0.55-gap*0.15))){S.alive=false;S.cause=`Bị ${enemy.name} đánh chết. Kẻ yếu không có quyền sống.`;return'dead';}
  deductLife(5,'trọng thương sau bại trận');log(`Ngươi bại trận trước ${enemy.name}, giữ được cái mạng.`,'bad');return'injured';}
function loot(minG){const got=[];S.linhThach+=Math.round(Math.pow(10,(S.ri||1)*0.5));got.push('linh thạch');if(RNG.chance(0.5)){const t=genTreasure(clamp(minG,1,maxGrade(S.world.tier)+1));S.treasures.push(t);got.push(t.name);}if(RNG.chance(0.4)){const k=RNG.pick(Object.keys(PILL_DEF));S.inv[k]=(S.inv[k]||0)+1;got.push(PILL_DEF[k].n);}
  if(RNG.chance(0.12)){const f=genFormation(rollGrade(S.world.tier));(S.arrays=S.arrays||[]).push(f);got.push('trận đồ '+f.name);}
  if(RNG.chance(0.08)){const b=genBeast(rollGrade(S.world.tier));(S.beasts=S.beasts||[]).push(b);got.push('linh thú '+b.name);}
  return got;}

/* ===== HỆ THỐNG TÔNG MÔN ===== */
function talentScore(){return (S.root.pham||1)+(S.tc.t||1)+luckOf().id+(S.hidden?2:0);}
function sectCultBonus(){if(!S.sect)return 1;return 1+S.sect.tierId*0.12+S.sect.pos*0.1;} // tài nguyên/linh mạch tông môn → tu nhanh hơn
function sectPromoteReq(){if(!S.sect)return null;const p=S.sect.pos;if(p>=7)return null;return{contrib:Math.round(100*Math.pow(2.2,p)),ri:Math.max(1,(p+1)*4)};}
function offerPos(sect){const t=talentScore();let base=t>=17?4:t>=13?3:t>=9?2:t>=6?1:0;if(sect.typeId==='ma'&&RNG.chance(0.3))base=Math.min(4,base+1);return base;}
// Bái nhập
function sceneJoinSect(){const sect=genSect(S.world.tier);const pos=offerPos(sect);sect.pos=pos;sect.posName=SECT_POS[pos];const rootFav=sect.favor.includes(S.root.id);
  const assess=pos>=4?`Trưởng lão vừa liếc qua căn cốt ngươi đã biến sắc: "Tư chất này... phải thu làm ${SECT_POS[pos]}!" Vinh quang tột đỉnh — và một tấm bia ngắm sau lưng.`:pos>=2?`Chấp sự gật gù: "Tư chất khá, vào thẳng ${SECT_POS[pos]}."`:`Chấp sự phất tay lạnh nhạt: "Tư chất tầm thường, làm ${SECT_POS[pos]} đi, tự lo lấy thân."`;
  return{title:'TÔNG MÔN · Bái Nhập',narr:`Ngươi tìm tới ${sect.name} — một ${sect.tier} ${sect.type}. ${sect.typeDesc}\n\n${rootFav?'Linh căn của ngươi hợp với sở trường bản môn — cơ hội hiếm có.\n\n':''}${assess}\n\n${SECT_RULES}`,choices:[
    {l:`Bái nhập, nhận vị trí ${SECT_POS[pos]}.`,cls:'primary',act:()=>{S.sect=sect;S.flags.sectJoinYear=S.time.y;if(sect.typeId==='ma')addKarma(-3,'gia nhập ma đạo');const t=genTech(clamp(2+(pos>=3?1:0)+RNG.int(0,1),1,maxGrade(S.world.tier)));S.techs.push(t);S.inv.tu_khi=(S.inv.tu_khi||0)+3;S.contribShown=true;log(`Bái nhập ${sect.name} với thân phận ${SECT_POS[pos]}.`,'good');setResult(`Ngươi chính thức là ${SECT_POS[pos]} của ${sect.name}. Bản môn ban công pháp «${t.name}» và 3 Tụ Khí Đan làm lễ nhập môn.${pos>=4?' Nhưng từ giây phút này, vô số ánh mắt ghen ghét đã dán chặt vào ngươi.':''}`);}},
    {l:'Từ chối — làm tán tu tự do, không ai quản cũng không ai che.',act:()=>setResult('Ngươi quay lưng với tông môn. Tự do tuyệt đối, và cô độc tuyệt đối. Con đường tán tu gian nan hơn, nhưng không ai đâm ngươi sau lưng vì một câu "vì bản môn".')}]};}
// Đại điện tông môn: đổi cống hiến
function sceneSectHall(){const s=S.sect;const c=[
  {l:'📿 Đổi 50 cống hiến lấy đan dược.',show:()=>s.contrib>=50,act:()=>{s.contrib-=50;const k=RNG.pick(['tu_khi','thanh_linh','pha_canh','ho_menh']);S.inv[k]=(S.inv[k]||0)+2;setResult('Ngươi đổi được 2 viên '+PILL_DEF[k].n+' từ Công Đức Đường.');}},
  {l:'📜 Đổi 120 cống hiến lấy công pháp bản môn.',show:()=>s.contrib>=120,act:()=>{s.contrib-=120;const cat=SECT_TECH_CAT[s.typeId]||null;const t=genTech(clamp(3+RNG.int(0,1),1,maxGrade(S.world.tier)),cat);S.techs.push(t);setResult('Ngươi thỉnh được công pháp «'+t.name+'» ('+t.gradeName+' '+t.giaiName+', '+t.tech+') từ Tàng Kinh Các.');}},
  {l:'⚡ Đổi 300 cống hiến vào Tụ Linh Đại Trận bế quan (tu nhanh).',show:()=>s.contrib>=300,act:()=>{s.contrib-=300;let g=0;while(S.alive&&S.progress<1&&g<8){cultivate(1,false);g++;}log('Ngươi bế quan trong Tụ Linh Đại Trận, linh khí nồng gấp bội.','good');afterAct();}},
  {l:'↩ Rời khỏi đại điện.',act:()=>{S.scene=null;render();save();}},
];
  return{title:'TÔNG MÔN · Công Đức Đường',narr:`Ngươi đứng trong Công Đức Đường của ${s.name}. Cống hiến hiện có: ${s.contrib}. Thân phận: ${s.posName}.\n\n"Cống hiến đổi lấy tất cả — ở tông môn, không có gì miễn phí, kể cả với người nhà."`,choices:c};}
// Nhiệm vụ tông môn
function sceneSectTask(){const s=S.sect;const kind=RNG.pick(['san','ho','do']);
  if(kind==='san')return{title:'NHIỆM VỤ · Săn Yêu',narr:'Chấp sự giao ngươi đi tiễu trừ một con yêu thú quấy phá linh dược viên bản môn.',choices:[
    {l:'Nhận lệnh xuất phát.',cls:'primary',act:()=>{const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(-1,1));const r=fight(b);if(r==='win'){s.contrib+=40;const g=loot(1);setResult('Ngươi hạ được yêu thú, lập công! +40 cống hiến. Thu thêm: '+g.join(', ')+'.');}else setResult(r==='dead'?S.cause:'Nhiệm vụ thất bại ('+r+'), ngươi trở về tay không, còn bị chấp sự khiển trách.');}},
    {l:'Từ chối, cáo bệnh.',act:()=>{s.contrib=Math.max(0,s.contrib-5);setResult('Ngươi thoái thác. Chấp sự cau mày, trừ 5 cống hiến vì "lười biếng".');}}]};
  if(kind==='ho')return{title:'NHIỆM VỤ · Hộ Tống',narr:'Ngươi được cử hộ tống một trưởng lão vận chuyển linh thạch qua vùng loạn.',choices:[
    {l:'Lên đường hộ tống.',cls:'primary',act:()=>{if(RNG.chance(0.55)){s.contrib+=30;S.linhThach+=Math.round(Math.pow(10,1+S.ri*0.2));setResult('Chuyến đi suôn sẻ. +30 cống hiến và một túi linh thạch thưởng.');}else{const b=genBoss();const r=fight(b);setResult(r==='dead'?('Đạo tặc phục kích, '+S.cause):('Bị đạo tặc phục kích! Ngươi liều mạng hộ tống ('+r+'), giữ được hàng và +25 cống hiến.'));if(S.alive&&r!=='dead')s.contrib+=25;}}},
    {l:'Từ chối.',act:()=>setResult('Ngươi từ chối nhiệm vụ, chấp sự lắc đầu bỏ đi.')}]};
  return{title:'NHIỆM VỤ · Trực Ban',narr:'Một nhiệm vụ tạp dịch nhàm chán: canh giữ Tàng Kinh Các một thời gian.',choices:[
    {l:'Nhận việc, tiện thể lén học lỏm.',cls:'primary',act:()=>{s.contrib+=15;advance(1);if(RNG.chance(0.25)){S.cmp=Math.round((S.cmp+0.05)*100)/100;setResult('+15 cống hiến. Lén đọc trộm được vài trang tâm pháp, ngộ tính tăng chút ít.');}else setResult('+15 cống hiến. Một năm trực ban trôi qua tẻ nhạt.');}},
    {l:'Bỏ trực, trốn đi tu luyện.',act:()=>{s.contrib=Math.max(0,s.contrib-10);setResult('Ngươi bỏ trực. Bị phát hiện, trừ 10 cống hiến.');}}]};}
function sectPromote(){const s=S.sect;const req=sectPromoteReq();if(!req){log('Ngươi đã là Tông Chủ — không còn gì để thăng.','lore');return;}
  if(s.contrib<req.contrib||S.ri<req.ri){log(`Chưa đủ điều kiện thăng chức (cần ${req.contrib} cống hiến & cảnh giới ${req.ri>0?REALMS[req.ri-1].name:'—'}).`,'warn');return;}
  s.contrib-=req.contrib;s.pos++;s.posName=SECT_POS[s.pos];log(`✦ Thăng chức! Ngươi nay là ${s.posName} của ${s.name}.`,'good');
  if(s.pos>=4){S.att+=4;log('Địa vị càng cao, ánh mắt ghen ghét và dã tâm nhắm vào ngươi càng nhiều.','warn');}}
// Sự kiện tông môn (gọi từ rollEvent khi đang ở trong tông môn)
function evSect(){const s=S.sect;const roll=RNG.next();
  // Đoạt xá: thiên tài vị trí cao, nguyên thần yếu → bị nhắm chiếm thân xác
  if((s.pos>=3||talentScore()>=13)&&S.soul<S.ri*0.5&&roll<0.4){return{title:'TÔNG MÔN · Nguy Cơ Đoạt Xá',narr:`Một trưởng lão Hồn tu của ${s.name} lâu nay vẫn nhìn ngươi bằng ánh mắt tham lam khó hiểu. Đêm nay, thần thức lão lặng lẽ vươn tới, định chiếm lấy thân xác thiên tài của ngươi làm của riêng — cấm thuật ĐOẠT XÁ!`,choices:[
    {l:'Liều mạng phản kháng bằng nguyên thần.',hint:'Nguyên thần yếu thì cực nguy.',act:()=>{const p=0.3+S.soul*0.06+(S.dao-50)*0.004;if(RNG.chance(clamp(p,0.1,0.9))){s.contrib+=0;S.soul+=1;log('Ngươi đẩy lùi được thần thức lão, nguyên thần tôi luyện thêm cứng cỏi.','good');setResult('Trong sát na sinh tử, ngươi cắn răng phản kích, đánh bật thần thức trưởng lão ra! Lão hậm hực rút lui — nhưng mối họa này chưa dứt.');}else{S.alive=false;S.cause=`Bị một trưởng lão Hồn tu của ${s.name} đoạt xá. Linh hồn ngươi bị nghiền nát, thân xác thành lồng giam cho kẻ khác.`;setResult(S.cause);}}},
    {l:'Bỏ chạy khỏi tông môn ngay trong đêm.',act:()=>{S.att+=3;const old=s.name;S.sect=null;setResult(`Ngươi vứt bỏ tất cả, liều chết đào tẩu khỏi ${old} trong đêm. Từ nay là kẻ phản đồ bị truy sát, nhưng ít ra linh hồn còn là của ngươi.`);}},
    {l:'Cầu cứu Tông Chủ / phe cánh của mình.',show:()=>s.pos>=4,act:()=>{if(RNG.chance(0.6)){log('Tông Chủ ra mặt trấn áp, lão trưởng lão bị phế.','good');setResult('Thân phận Thánh Tử phát huy tác dụng — Tông Chủ đích thân ra mặt, phế bỏ lão trưởng lão dám động vào ngươi. Lần này, địa vị đã cứu mạng ngươi.');}else{S.alive=false;S.cause='Ngươi cầu cứu, nhưng phe trưởng lão mạnh hơn. Không ai tới kịp. Ngươi bị đoạt xá.';setResult(S.cause);}}}]};}
  if(roll<0.4){const rival=makeNPC(RNG.int(0,2));rival.traits=['đố kỵ'];remember(rival,'ganh ghét địa vị của ngươi',-40);return{title:'TÔNG MÔN · Tranh Đấu Nội Bộ',narr:`${rival.name}, một đồng môn ganh ghét ngươi, công khai khiêu chiến tỉ thí — và đưa ra một tờ SINH TỬ TRẠNG. Trong ${s.name}, đệ tử giết nhau trên đài tỉ thí là hợp pháp.`,choices:[
    {l:'Ký sinh tử trạng, quyết một trận.',cls:'primary',act:()=>{const r=fight({name:rival.name,ri:rival.ri,si:rival.si,mightBonus:0.1});if(r==='win'){S.stats.kills++;s.contrib+=30;S.fame=clamp(S.fame+5,-100,1000);setResult('Ngươi hạ gục '+rival.name+' trên đài, danh chấn nội môn. +30 cống hiến. Không ai dám coi thường ngươi nữa.');}else setResult(r==='dead'?('Ngươi bỏ mạng trên đài tỉ thí. '+S.cause):('Ngươi bại trận ('+r+'), mất mặt trước toàn môn.'));}},
    {l:'Từ chối tỉ thí, nuốt nhục.',act:()=>{S.fame=clamp(S.fame-5,-100,1000);remember(rival,'ngươi hèn nhát né tránh',-10);setResult('Ngươi từ chối. Giữ được mạng nhưng mất mặt; '+rival.name+' càng lấn tới, đồng môn xì xào khinh thường.');}}]};}
  if(roll<0.62){return{title:'TÔNG MÔN · Ban Thưởng',narr:`Nhờ biểu hiện gần đây, ${s.name} ban thưởng cho ngươi.`,choices:[
    {l:'Bái tạ nhận thưởng.',cls:'primary',act:()=>{s.contrib+=25;if(RNG.chance(0.5)){const k=RNG.pick(['pha_canh','ho_menh','ngo_dao']);S.inv[k]=(S.inv[k]||0)+1;setResult('+25 cống hiến và một viên '+PILL_DEF[k].n+'.');}else{S.linhThach+=Math.round(Math.pow(10,1+S.ri*0.25));setResult('+25 cống hiến và một túi linh thạch.');}}}]};}
  // Tông môn đại chiến
  return{title:'TÔNG MÔN · Tông Chiến',narr:`${s.name} khai chiến với một tông môn địch. Toàn môn đệ tử buộc phải ra trận — kể cả ngươi.`,choices:[
    {l:'Xông pha tiền tuyến lập công.',cls:'primary',hint:'Công lớn, nhưng dễ chết.',act:()=>{const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(0,2));const r=fight(b);if(r==='win'){s.contrib+=60;S.fame=clamp(S.fame+10,-100,1000);setResult('Ngươi chém tướng địch giữa vạn quân, đại công! +60 cống hiến, danh vang khắp môn.');}else setResult(r==='dead'?('Ngươi tử trận. '+S.cause):('Ngươi trọng thương lui về ('+r+'), nhưng giữ được mạng giữa loạn chiến.'));}},
    {l:'Nấp phía sau, giữ mạng là chính.',act:()=>{s.contrib+=5;S.fame=clamp(S.fame-3,-100,1000);setResult('Ngươi nấp sau lưng đồng môn, sống sót qua trận chiến nhưng bị coi là hèn nhát (+5 cống hiến gọi là).');}}]};}

/* ===== BẢNG THIÊN KIÊU — danh hiệu theo danh tiếng + tư chất ===== */
function geniusTitle(){const f=S.fame,t=talentScore();if(f>=800||t>=18)return{n:'Đệ Nhất Nhân của thời đại',rank:1};if(f>=500)return{n:'Yêu Nghiệt Bảng · Top 10',rank:10};if(f>=250)return{n:'Thiên Kiêu Bảng · Top 100',rank:100};if(f>=100)return{n:'Tuấn Kiệt hữu danh một vùng',rank:1000};if(f>=30)return{n:'Tiểu hữu danh khí',rank:9999};return null;}
/* ===== BẢN MỆNH PHÁP BẢO ===== */
function sceneNatal(){const list=S.treasures.slice().sort((a,b)=>b.grade-a.grade);const t=list[0];
  return{title:'BẢN MỆNH PHÁP BẢO',narr:`Ngươi có thể dùng tinh huyết & nguyên thần tế luyện một pháp bảo thành BẢN MỆNH PHÁP BẢO — vật này sẽ cùng ngươi sinh tử tương liên, lớn mạnh theo ngươi, uy lực vượt xa pháp bảo thường. Nhưng một khi nó vỡ, nguyên thần ngươi trọng thương.\n\nPháp bảo mạnh nhất trong túi: ${t?esc(t.name)+' ('+t.gradeName+')':'(không có)'}.`,choices:[
    {l:'Tế luyện '+(t?t.name:'—')+' thành bản mệnh pháp bảo.',show:()=>!!t&&!S.natal,hint:'Hao 5 năm thọ + nguyên thần.',act:()=>{deductLife(5,'tế luyện bản mệnh');const idx=S.treasures.indexOf(t);if(idx>=0)S.treasures.splice(idx,1);t.bond=0;S.natal=t;log('Ngươi tế luyện '+t.name+' thành BẢN MỆNH PHÁP BẢO!','good');setResult('Từ nay '+t.name+' và ngươi tâm ý tương thông, sinh tử tương liên. Nó sẽ lớn mạnh cùng ngươi trên đại đạo.');}},
    {l:'Thôi, chưa vội.',act:()=>{S.scene=null;render();save();}}]};}
/* ===== ĐẠO LỮ / SONG TU ===== */
function evDaolu(){if(S.daolu)return evReward();const npc=makeNPC(RNG.int(-1,1));npc.relation=45;
  return{title:'HỒNG TRẦN · Người Trong Mộng',narr:`Trên đường tu hành cô độc, ngươi gặp ${npc.name} (${esc(realmName(npc.ri,npc.si))}) — hai người tâm đầu ý hợp, cùng chung chí hướng đại đạo. Đối phương ngỏ ý kết làm ĐẠO LỮ, song tu cùng tiến.`,choices:[
    {l:'Kết đạo lữ, song tu cùng tiến.',cls:'primary',hint:'Tu nhanh hơn, nhưng có thêm điểm yếu.',act:()=>{S.daolu={name:npc.name,ri:npc.ri,si:npc.si,love:60};remember(npc,'kết làm đạo lữ với ngươi',60);log('Ngươi và '+npc.name+' kết làm đạo lữ.','good');setResult('Ngươi và '+npc.name+' kết làm đạo lữ. Song tu giúp cả hai tu luyện nhanh hơn — nhưng trong tu tiên giới tàn khốc, người ngươi yêu cũng là điểm yếu kẻ khác nhắm vào.');}},
    {l:'Đạo tâm ta chỉ có một mình một đạo.',act:()=>{addKarma(1,'giữ đạo tâm cô tịch');setResult('Ngươi lắc đầu. Đường tu vốn cô độc, ngươi chọn bước đi một mình — không vướng bận, cũng không sơ hở.');}}]};}
function evDaoluPeril(){const d=S.daolu;if(!d)return evReward();
  return{title:'ĐẠO LỮ LÂM NẠN',narr:`${d.name}, đạo lữ của ngươi, bị một cường địch bắt giữ để uy hiếp ngươi. "Muốn cứu nàng/chàng? Nộp hết bảo vật, tự phế tu vi!"`,choices:[
    {l:'Liều mạng cứu đạo lữ!',cls:'primary',act:()=>{const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(0,2));const r=fight(b);if(r==='win'){log('Ngươi cứu được '+d.name+'!','good');d.love=Math.min(100,d.love+15);setResult('Ngươi liều chết đánh bại kẻ bắt cóc, cứu được '+d.name+'. Tình cảm hai người càng thêm sâu đậm.');}else if(r==='dead')setResult(S.cause);else{S.daolu=null;S.dao=Math.max(0,S.dao-15);setResult('Ngươi bại trận ('+r+'). '+d.name+' bị giết ngay trước mắt ngươi. Đạo tâm ngươi rạn vỡ, ôm một mối hận thấu xương.');addKarma(-1,'mất đạo lữ, gieo hận');}}},
    {l:'Nuốt hận bỏ đi — người tu tiên không thể vướng bận.',act:()=>{S.daolu=null;S.dao=Math.max(0,S.dao-8);addKarma(-2,'bỏ rơi đạo lữ');setResult('Ngươi quay lưng bỏ đi, mặc '+d.name+' gào tên ngươi. Ngươi giữ được mạng và bảo vật, nhưng đạo tâm vấy một vết nhơ không bao giờ rửa sạch.');}}]};}
/* ===== PHƯỜNG THỊ / ĐẤU GIÁ ===== */
function sceneMarket(){const goods=[];for(let i=0;i<3;i++){const kind=RNG.pick(['tech','treasure','pill','herb']);let it,price;if(kind==='tech'){it=genTech(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier)));price=Math.round(Math.pow(10,1+S.ri*0.28)*it.grade);}else if(kind==='treasure'){it=genTreasure(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier)+1));price=Math.round(Math.pow(10,1+S.ri*0.3)*it.grade);}else if(kind==='pill'){const k=RNG.pick(Object.keys(PILL_DEF));it={pill:k,name:PILL_DEF[k].n,grade:PILL_DEF[k].g};price=Math.round(Math.pow(10,1+S.ri*0.2)*it.grade);}else{it=genHerb(S.world.tier);price=Math.round(Math.pow(10,1+S.ri*0.18)*it.grade);}goods.push({kind,it,price});}
  const c=goods.map(g=>({l:`Mua ${g.it.name} (${g.it.grade?'phẩm '+g.it.grade:''}) — ${g.price.toLocaleString('vi-VN')} linh thạch`,show:()=>S.linhThach>=g.price,act:()=>{S.linhThach-=g.price;if(g.kind==='tech')S.techs.push(g.it);else if(g.kind==='treasure')S.treasures.push(g.it);else if(g.kind==='pill')S.inv[g.it.pill]=(S.inv[g.it.pill]||0)+1;else{S.inv['herb_'+g.it.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+g.it.uid]=g.it;}setResult('Ngươi mua được '+g.it.name+'. Tiền trao cháo múc, phường thị chẳng ai hỏi lai lịch.');}}));
  if(S.treasures.length)c.push({l:'Bán pháp bảo yếu nhất lấy linh thạch',act:()=>{const t=S.treasures.slice().sort((a,b)=>a.grade-b.grade)[0];const idx=S.treasures.indexOf(t);S.treasures.splice(idx,1);const g=Math.round(Math.pow(10,1+S.ri*0.28)*t.grade*0.5);S.linhThach+=g;setResult('Ngươi bán '+t.name+' được '+g.toLocaleString('vi-VN')+' linh thạch.');}});
  c.push({l:'Rời phường thị.',act:()=>{S.scene=null;render();save();}});
  return{title:'PHƯỜNG THỊ',narr:`Ngươi bước vào một tòa phường thị nhộn nhịp. Linh thạch hiện có: ${fmtExp(Math.log10(Math.max(1,S.linhThach)))}. Vài món đang bày bán:`,choices:c};}
/* ===== HUYẾT MẠCH GIÁC TỈNH ===== */
function evBloodline(){const b=RNG.pick([['Thượng cổ thần long',{atk:1.3,hp:1.2}],['Cửu u huyền phượng',{cmp:1.3,soul:1.2}],['Thái cổ chiến thần',{atk:1.4}],['Bất tử kim ô',{hp:1.4}],['Hỗn độn dị thú',{cult:1.3,atk:1.15}]]);
  return{title:'HUYẾT MẠCH GIÁC TỈNH',narr:`Giữa cơn hấp hối sinh tử, một dòng huyết mạch cổ xưa ngủ vùi trong thân ngươi bỗng bừng tỉnh — HUYẾT MẠCH ${b[0].toUpperCase()}! Sức mạnh tổ tiên chảy ngược trong huyết quản.`,choices:[
    {l:'Thuận theo, dung hợp huyết mạch.',cls:'primary',hint:'Sức mạnh lớn, nhưng thân dần hóa dị.',act:()=>{for(const k in b[1]){if(k==='atk')S.atkMul*=b[1][k];else if(k==='hp'){S.hpMul*=b[1][k];S.hpMax=Math.round(S.hpMax*b[1][k]);}else if(k==='cult')S.cultMul*=b[1][k];else if(k==='cmp')S.cmp*=b[1][k];else if(k==='soul')S.soul+=2;}S.mutations.push('Huyết mạch '+b[0]+' giác tỉnh');S.flags.bloodline=b[0];log('Huyết mạch '+b[0]+' giác tỉnh! Sức mạnh tăng vọt.','good');setResult('Ngươi dung hợp huyết mạch '+b[0]+', thực lực tăng vọt — nhưng thân thể bắt đầu mang dấu ấn của một chủng tộc không còn là người.');}},
    {l:'Cưỡng ép đè nén huyết mạch.',act:()=>{deductLife(3,'đè nén huyết mạch phản phệ');setResult('Ngươi sợ mất nhân tính, gắng đè nén dòng huyết mạch. Nó tạm lắng xuống, nhưng cơ hội nghịch thiên có lẽ đã vụt qua.');}}]};}
function sceneChooseProf(){return{title:'CHỨC NGHIỆP · Bái Sư Học Nghề',narr:'Một nghề phụ có thể nuôi sống ngươi giữa tu tiên giới khắc nghiệt, mở ra một con đường sức mạnh khác ngoài tu vi. Ngươi muốn học nghề gì? (Chỉ chọn một — chuyên một nghề mới mong đạt Nhất phẩm.)',choices:PROFS.map(p=>({l:p.n+' — '+p.d.split('.')[0]+'.',act:()=>{setProfession(p.id);setResult('Ngươi bái sư, chính thức là '+PROF_RANK[0]+' '+p.n+'. Hãy hành nghề để tinh tiến — Nhất phẩm đại sư được cả thiên hạ kính nể.');}})).concat([{l:'Thôi, dồn hết cho tu luyện.',act:()=>{S.scene=null;render();save();}}])};}

/* ===== THĂNG THẾ GIỚI (phi thăng lên giới cao hơn — mở khóa phẩm cao) ===== */
function worldAscendReq(){return Math.min(100,8+(S.world.tier-1)*11);}
function canAscendWorld(){return S.world.tier<WORLDS.length&&S.ri>=worldAscendReq();}
function sceneAscendWorld(){const nt=S.world.tier+1;const nw=WORLDS[nt-1];
  return{title:'PHI THĂNG · Vượt Giới',narr:`Ngươi đã đạt tới đỉnh mà ${S.world.name} có thể dung chứa. Không gian quanh ngươi rạn nứt — bờ bên kia là ${nw.n}, một thế giới CAO HƠN: linh khí nồng gấp bội, tài nguyên phẩm cấp cao hơn hẳn (trần phẩm nâng từ ${maxGrade(S.world.tier)} lên ${maxGrade(nt)}). Nhưng vượt giới phải xuyên qua Không Gian Loạn Lưu cùng lôi kiếp vượt giới — vô số kẻ tan xác giữa hư không.`,choices:[
    {l:`Độ kiếp vượt giới lên ${nw.n}.`,cls:'primary',hint:'Thất bại = tan xác giữa hư không.',act:()=>{const risk=clamp(0.4-S.soul*0.02-(S.dao-50)*0.003-profBonus('tran')*0.5-(S.natal?0.05:0),0.08,0.85);if(RNG.chance(risk)){S.alive=false;S.cause='Vượt giới thất bại — thân xác bị Không Gian Loạn Lưu xé vụn giữa hai thế giới.';setResult(S.cause);return;}S.world.tier=nt;S.world.name='['+nw.n+']';S.world.region=RNG.pick(['Tân Nhập Vực','Cổ Chiến Trường','Vạn Tộc Đại Lục','Biên Hoang','Trung Vực']);S.world.machId=Math.min(12,nt+2);S.att=Math.max(0,S.att-5);S.fame=clamp(S.fame+20,-100,1000);log('✧ VƯỢT GIỚI THÀNH CÔNG! Ngươi đặt chân tới '+nw.n+' — trần phẩm mở khóa lên '+maxGrade(nt)+'.','good');setResult('Ngươi xé rách không gian, đặt chân lên '+nw.n+'! Linh khí nồng đậm gấp bội, pháp bảo/công pháp/linh dược/trận/thú phẩm cao bắt đầu xuất hiện. Nhưng ở đây ngươi lại chỉ là tân khách yếu ớt giữa vô số cường giả bản địa.');}},
    {l:'Chưa vội — ở lại tích lũy thêm.',act:()=>{S.scene=null;render();save();}}]};}
/* ===== THÔNG THIÊN THÁP (thí luyện xếp hạng) ===== */
function sceneTower(){S.tower=S.tower||{best:0};const floor=(S._towerFloor||0)+1;const b=genBoss();b.ri=Math.min(100,Math.max(1,Math.round(S.ri*0.55+floor*1.3)));b.boss=true;b.soul=floor>=10;
  return{title:'THÔNG THIÊN THÁP · Tầng '+floor,narr:`Tầng ${floor} của Thông Thiên Tháp. Thủ tháp: ${b.name} (${realmName(b.ri,b.si)})${b.soul?' — tỏa áp lực thần hồn':''}. Vượt qua để lên tầng cao hơn; phần thưởng & hiểm nguy đều tăng. Kỷ lục hiện tại: tầng ${S.tower.best||0}.`,choices:[
    {l:'Khiêu chiến thủ tháp tầng '+floor+'.',cls:'primary',hint:'Bại thì bị đẩy khỏi tháp; chết là thật.',act:()=>{const r=fight(b);if(r==='win'){S._towerFloor=floor;S.tower.best=Math.max(S.tower.best||0,floor);S.fame=clamp(S.fame+2,-100,1000);const g=loot(Math.min(6,1+Math.floor(floor/5)));log('Vượt tầng '+floor+' Thông Thiên Tháp! Thu: '+g.join(', '),'good');setScene(sceneTower());}else if(r==='dead')setResult(S.cause);else{S._towerFloor=0;setResult('Ngươi bại ở tầng '+floor+' ('+r+'), bị kình lực đẩy văng khỏi tháp. Kỷ lục: tầng '+S.tower.best+'.');}}},
    {l:'Rời tháp, giữ kỷ lục.',act:()=>{S._towerFloor=0;setResult('Ngươi rời Thông Thiên Tháp với kỷ lục tầng '+(S.tower.best||0)+'.');}}]};}
/* ===== ĐỘNG PHỦ + LINH ĐIỀN ===== */
function caveCost(){return Math.round(Math.pow(10,2+S.ri*0.18));}
function sceneCave(){
  if(!S.cave)return{title:'ĐỘNG PHỦ',narr:'Một động phủ riêng cho ngươi nơi bế quan an toàn linh khí tụ, kèm một mảnh Linh Điền 3 ô để trồng linh dược. Giá: '+caveCost().toLocaleString('vi-VN')+' linh thạch.',choices:[
    {l:'Tậu động phủ ('+caveCost().toLocaleString('vi-VN')+' linh thạch).',show:()=>S.linhThach>=caveCost(),act:()=>{S.linhThach-=caveCost();S.cave={level:1,field:[null,null,null]};log('Ngươi tậu được động phủ + linh điền 3 ô.','good');setResult('Ngươi đã có động phủ riêng! Bế quan trong đây tu nhanh hơn, và có thể trồng/thu hoạch linh dược ở Linh Điền.');}},
    {l:'Thôi.',act:()=>{S.scene=null;render();save();}}]};
  const cv=S.cave;const c=[];
  cv.field.forEach((plot,i)=>{if(!plot)c.push({l:'🌱 Gieo linh dược ô '+(i+1)+' (100 linh thạch)',show:()=>S.linhThach>=100,act:()=>{S.linhThach-=100;const h=genHerb(S.world.tier);cv.field[i]={herb:h,ready:S.time.y+3+RNG.int(0,4)};setResult('Ngươi gieo hạt giống linh dược vào ô '+(i+1)+'; vài năm nữa sẽ chín.');}});
    else if(S.time.y>=plot.ready)c.push({l:'🌾 Thu hoạch ô '+(i+1)+' ('+plot.herb.name+')',act:()=>{const h=plot.herb;S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;cv.field[i]=null;setResult('Ngươi thu hoạch được '+h.name+' từ Linh Điền!');}});
    else c.push({l:'⏳ Ô '+(i+1)+': '+plot.herb.name+' (chín năm '+plot.ready+', nay '+S.time.y+')',act:()=>{setResult('Linh dược chưa chín. Cứ tu luyện, thời gian sẽ tới.');}});});
  c.push({l:'🧘 Bế quan trong động phủ (~2 năm, tu nhanh hơn)',act:()=>{cultivate(2,false);S.progress=Math.min(1,S.progress+0.015*cv.level);log('Bế quan trong động phủ, linh khí tụ giúp tu vi tinh tiến.','good');afterAct();}});
  if(cv.level<9)c.push({l:'⬆ Nâng cấp động phủ (cấp '+cv.level+'→'+(cv.level+1)+', '+(cv.level*500).toLocaleString('vi-VN')+' linh thạch)',show:()=>S.linhThach>=cv.level*500,act:()=>{S.linhThach-=cv.level*500;cv.level++;setResult('Động phủ nâng lên cấp '+cv.level+', linh khí càng nồng, bế quan càng lợi.');}});
  c.push({l:'↩ Rời động phủ.',act:()=>{S.scene=null;render();save();}});
  return{title:'ĐỘNG PHỦ (cấp '+cv.level+')',narr:'Động phủ của ngươi — chốn nương thân giữa cõi tu chân tàn khốc. Linh Điền 3 ô để trồng linh dược, bế quan tại đây tu nhanh hơn.',choices:c};}
/* ===== KIẾN LẬP THẾ LỰC RIÊNG ===== */
function sceneForce(){
  if(!S.ownForce)return{title:'KIẾN LẬP THẾ LỰC',narr:'Thực lực hiện tại đủ để ngươi tự lập môn hộ, cát cứ một phương, chiêu mộ bộ hạ. Một thế lực cho ngươi thu nhập, danh tiếng và tai mắt — cũng khiến ngươi thành mục tiêu của các thế lực khác.',choices:[
    {l:'Lập thế lực của riêng ngươi.',cls:'primary',act:()=>{S.ownForce={name:RNG.pick(SECT_PRE)+' '+RNG.pick(['Các','Cung','Môn','Điện','Trại','Đường']),members:3,power:S.ri,rep:0};S.fame=clamp(S.fame+10,-100,1000);log('Ngươi lập ra thế lực '+S.ownForce.name+'!','good');setResult('Thế lực «'+S.ownForce.name+'» chính thức thành lập với 3 bộ hạ đầu tiên. Từ nay ngươi là chủ một phương.');}},
    {l:'Chưa vội.',act:()=>{S.scene=null;render();save();}}]};
  const f=S.ownForce;const c=[
    {l:'📢 Chiêu mộ bộ hạ (~1 năm)',act:()=>{advance(1);if(RNG.chance(0.7)){const n=1+RNG.int(0,2);f.members+=n;setResult('Ngươi chiêu mộ được '+n+' tán tu gia nhập. Tổng bộ hạ: '+f.members+'.');}else setResult('Năm nay không ai đủ tư cách gia nhập, hoặc không ai dám.');}},
    {l:'💰 Thu thuế/kinh doanh (~1 năm)',act:()=>{advance(1);const inc=Math.round(f.members*Math.pow(10,1+S.ri*0.15));S.linhThach+=inc;f.rep+=2;setResult('Thế lực thu về '+inc.toLocaleString('vi-VN')+' linh thạch, danh tiếng tăng.');}},
    {l:'⚔ Bành trướng, thôn tính thế lực yếu (~2 năm)',hint:'Rủi ro chiến tranh.',act:()=>{advance(2);const b=genBoss();b.ri=Math.max(1,S.ri+RNG.int(-1,1));const r=fight(b);if(r==='win'){f.members+=RNG.int(2,6);f.power=Math.max(f.power,S.ri);f.rep+=5;S.fame=clamp(S.fame+5,-100,1000);setResult('Ngươi đánh bại thủ lĩnh địch, thôn tính thế lực của chúng! Bộ hạ tăng mạnh.');}else setResult(r==='dead'?S.cause:('Cuộc bành trướng thất bại ('+r+'), thế lực tổn thất bộ hạ.'));if(S.alive&&r!=='win')f.members=Math.max(0,f.members-RNG.int(1,3));}},
    {l:'↩ Rời sảnh nghị sự.',act:()=>{S.scene=null;render();save();}},
  ];
  return{title:'THẾ LỰC · '+f.name,narr:`«${f.name}» — thế lực của ngươi. Bộ hạ: ${f.members} · Danh vọng: ${f.rep}. Bộ hạ đông, thu nhập lớn, nhưng cũng dễ chiêu kẻ thù nhòm ngó.`,choices:c};}
/* ===== WORLD BOSS — hung thú viễn cổ ===== */
const WORLD_BOSSES=['Thượng Cổ Hung Long','Cửu Anh Quỷ Vương','Thôn Thiên Ma Tổ','Bất Tử Yêu Đế','Hỗn Độn Cổ Thú','Tru Thiên Cương Thi Vương','Vẫn Lạc Thần Ma','Cửu U Minh Xà','Phần Thiên Kim Ô','Đế Cấp Yêu Thánh'];
function evWorldBoss(){const nm=RNG.pick(WORLD_BOSSES);const b=genBoss();b.name=nm;b.ri=Math.min(100,S.ri+RNG.int(3,10));b.boss=true;b.soul=true;b.mightBonus=0.3;
  return{title:'THẾ GIỚI · Hung Thú Viễn Cổ Xuất Thế',narr:`${nm} — một tồn tại viễn cổ khủng bố — vừa phá phong ấn, tàn phá bốn cõi. Vô số tu sĩ kéo tới vây săn, cũng vô số kẻ bỏ mạng. Vật liệu trên thân nó là cực phẩm — nếu ngươi đủ mạng mà lấy.`,choices:[
    {l:'Nhập cuộc vây săn hung thú!',cls:'primary',hint:'Cường địch vượt cấp — cực nguy.',act:()=>{const r=fight(b);if(r==='win'){S.stats.kills++;S.fame=clamp(S.fame+15,-100,1000);const t=genTreasure(Math.min(12,maxGrade(S.world.tier)+1+RNG.int(0,1)));S.treasures.push(t);const g=loot(6);setResult('KHÔNG THỂ TIN NỔI — ngươi bồi nhát kết liễu '+nm+'! Danh chấn thiên hạ (+15 danh tiếng). Đoạt được '+t.name+' ('+t.gradeName+') và: '+g.join(', ')+'.');}else if(r==='dead')setResult(S.cause);else setResult('Ngươi không địch nổi uy áp của '+nm+' ('+r+'), đành lui về giữ mạng giữa biển người tan tác.');}},
    {l:'Núp xa quan sát, nhặt nhạnh tàn cục.',act:()=>{if(RNG.chance(0.5)){const g=loot(2);setResult('Ngươi nhặt nhạnh vật rơi vãi từ những kẻ bỏ mạng: '+g.join(', ')+'. Khôn ngoan hơn liều chết.');}else setResult('Ngươi đứng ngoài nhìn trận vây săn kinh thiên động địa. Nhìn thôi cũng đủ chấn động đạo tâm.');}}]};}
/* ===== CẤM ĐỊA / HUNG ĐỊA ===== */
function evForbiddenZone(){const rw=RNG.pick(['treasure','tech','herb','formation','beast','natal']);
  return{title:'CẤM ĐỊA · Tuyệt Địa Hung Hiểm',narr:'Trước mắt ngươi là một CẤM ĐỊA cổ xưa — nơi ngay cả đại năng cũng kiêng dè. Tử khí ngập trời, xương trắng chất thành núi. Nhưng nơi càng chết chóc, bảo vật càng kinh người.',choices:[
    {l:'Xông vào cấm địa!',cls:'primary',hint:'Tỉ lệ chết rất cao.',act:()=>{const risk=clamp(0.45+S.att*0.004-(luckOf().surv-1)*0.12-profBonus('tran')*0.5,0.2,0.9);if(RNG.chance(risk)){S.alive=false;S.cause='Bỏ mạng trong cấm địa cổ, thi thể hóa một trong vô số bộ xương trắng nơi tuyệt địa.';setResult(S.cause);return;}const g=Math.min(12,maxGrade(S.world.tier)+1+RNG.int(0,1));let name='';if(rw==='treasure'){const t=genTreasure(g);S.treasures.push(t);name=t.name;}else if(rw==='tech'){const t=genTech(g);S.techs.push(t);name='công pháp '+t.name;}else if(rw==='herb'){const h=genHerb(S.world.tier);h.grade=g;h.gradeName=PHAM[g-1].n;S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;name=h.name;}else if(rw==='formation'){const f=genFormation(g);(S.arrays=S.arrays||[]).push(f);name='trận đồ '+f.name;}else if(rw==='beast'){const bb=genBeast(g);(S.beasts=S.beasts||[]).push(bb);name='linh thú '+bb.name;}else{const t=genTreasure(Math.max(4,g));t.lifesave=true;t.special='Luân Hồi Hộ Mệnh (giữ mạng 1 lần)';S.treasures.push(t);name=t.name+' (giữ mạng trùng sinh)';}grantWithPrice(name,g);setResult('Ngươi sống sót ra khỏi cấm địa với chiến lợi phẩm vạn người mơ không được: '+name+'!');}},
    {l:'Đứng ngoài — có nơi không đáng đánh đổi mạng.',act:()=>setResult('Ngươi nhìn cấm địa hồi lâu rồi quay đi. Tham thì thâm; sống sót mới là căn bản của tu tiên.')}]};}
/* ===== ĐẤU GIÁ HỘI (tương tác) ===== */
function evAuction(){const it=RNG.chance(0.5)?genTreasure(clamp(3+RNG.int(0,2),1,maxGrade(S.world.tier)+1)):genTech(clamp(3+RNG.int(0,2),1,maxGrade(S.world.tier)));const base=Math.round(Math.pow(10,1.5+S.ri*0.3)*it.grade);const rival=Math.round(base*(1.25+RNG.range(0,1.35)));const lo=Math.round(base*1.4),hi=Math.round(base*2.4);
  const bid=(amt)=>{if(S.linhThach<amt){setResult('Ngươi không đủ linh thạch.');return;}if(amt>=rival){S.linhThach-=amt;if(it.type==='tech')S.techs.push(it);else S.treasures.push(it);setResult('Tiếng búa cuối cùng gõ xuống — '+it.name+' về tay ngươi với giá '+amt.toLocaleString('vi-VN')+' linh thạch!');}else{setResult('Ngươi trả '+amt.toLocaleString('vi-VN')+', nhưng một vị khách bí ẩn trong phòng riêng nhấc giá cao ngất. Ngươi đành buông — bảo vật vuột khỏi tay.');}};
  return{title:'ĐẤU GIÁ HỘI',narr:`Bảo vật đấu giá: ${it.name} (${it.gradeName||'phẩm '+it.grade}). Giá khởi điểm ${base.toLocaleString('vi-VN')} linh thạch. Các phú hào & đại năng cũng đang nhòm ngó...`,choices:[
    {l:`Trả giá vừa (${lo.toLocaleString('vi-VN')})`,show:()=>S.linhThach>=lo,act:()=>bid(lo)},
    {l:`Trả giá cao (${hi.toLocaleString('vi-VN')})`,show:()=>S.linhThach>=hi,act:()=>bid(hi)},
    {l:'Bỏ qua, không tranh.',act:()=>setResult('Ngươi lắc đầu bỏ qua. Món đó về tay một lão quái nào đó với giá trên trời.')}]};}
/* ===== VẤN ĐẠO ĐẠI HỘI ===== */
function evDaoConference(){const rivals=2+RNG.int(0,3);
  return{title:'VẤN ĐẠO ĐẠI HỘI',narr:`Vấn Đạo Đại Hội — thiên kiêu vạn tộc tụ hội luận đạo, tranh tài. ${rivals} yêu nghiệt đồng đại đang nhìn ngươi bằng ánh mắt khiêu khích. Đây là nơi lập danh, kết giao — và kết thù.`,choices:[
    {l:'Đăng đài luận đạo, tranh ngôi đầu.',cls:'primary',hint:'Thắng thì danh chấn, bại thì mất mặt.',act:()=>{const win=clamp(0.3+(S.cmp-1)*0.15+(S.dao-50)*0.004+((S.laws||[]).length*0.05),0.1,0.9);if(RNG.chance(win)){S.fame=clamp(S.fame+25,-100,1000);const k=RNG.pick(['pha_canh','ngo_dao']);S.inv[k]=(S.inv[k]||0)+1;S.flags.ngoDao=0.15;setResult('Ngươi biện đảo quần hùng, đoạt khôi nguyên Vấn Đạo Đại Hội! Danh chấn thiên hạ (+25 danh tiếng), được ban '+PILL_DEF[k].n+' và một tia đạo vận cho đột phá tới.');}else{S.fame=clamp(S.fame-5,-100,1000);const rv=makeNPC(RNG.int(0,2));remember(rv,'thắng ngươi ở Vấn Đạo Đại Hội',-30);setResult('Ngươi bị một yêu nghiệt đè bẹp trên đài luận đạo, mất mặt trước thiên hạ. Từ đây có thêm một kẻ khinh ngươi ra mặt.');}}},
    {l:'Lặng lẽ quan sát, kết giao thiên kiêu.',act:()=>{if(RNG.chance(0.5)){const n=makeNPC(RNG.int(0,2));n.relation=30;setResult('Ngươi kết giao được '+n.name+', một thiên kiêu đồng đại — quan hệ có thể hữu dụng về sau.');}else setResult('Ngươi lặng lẽ quan sát quần hùng, ghi nhớ mặt mũi các đối thủ tương lai. Tri kỷ tri bỉ, trăm trận trăm thắng.');}}]};}
/* ===== SƯ ĐỒ / THU ĐỒ ĐỆ ===== */
function sceneDisciple(){
  if(!S.disciple)return{title:'SƯ ĐỒ · Thu Đồ Đệ',narr:'Với thân phận hiện tại, ngươi có thể thu nhận một đồ đệ — truyền thừa y bát, có người nối nghiệp & trợ giúp. Nhưng đồ đệ cũng có thể phản sư, hoặc bị kẻ khác lợi dụng để hại ngươi.',choices:[
    {l:'Thu một đồ đệ tư chất tốt.',cls:'primary',act:()=>{const n=makeNPC(-2);S.disciple={name:n.name,ri:Math.max(1,n.ri),loyal:60,talent:1+RNG.int(0,2)};log('Ngươi thu '+n.name+' làm đồ đệ.','good');setResult('Ngươi thu nhận '+n.name+' làm đồ đệ. Hãy dạy dỗ tử tế — đồ đệ trung thành là chỗ dựa, đồ đệ phản bội là con dao sau lưng.');}},
    {l:'Đường tu cô độc, không vướng bận.',act:()=>{S.scene=null;render();save();}}]};
  const d=S.disciple;return{title:'SƯ ĐỒ · '+d.name,narr:`Đồ đệ ${d.name} (${realmName(d.ri,0)}) · Trung thành: ${d.loyal} · Tư chất: ${['','thường','khá','ưu tú'][d.talent]||'ưu tú'}.`,choices:[
    {l:'Truyền thụ công pháp, dạy dỗ (~2 năm)',act:()=>{advance(2);d.ri=Math.min(100,d.ri+d.talent);d.loyal=Math.min(100,d.loyal+5);setResult('Ngươi tận tâm chỉ dạy, '+d.name+' tiến bộ rõ rệt, càng thêm kính phục ngươi.');}},
    {l:'Sai đồ đệ đi làm nhiệm vụ (~1 năm)',act:()=>{advance(1);if(RNG.chance(0.7)){const inc=Math.round(Math.pow(10,1+d.ri*0.15));S.linhThach+=inc;d.loyal=Math.min(100,d.loyal+2);setResult(d.name+' hoàn thành nhiệm vụ, mang về '+inc.toLocaleString('vi-VN')+' linh thạch cho sư môn.');}else if(RNG.chance(0.3)){S.disciple=null;setResult(d.name+' gặp cường địch, bỏ mạng ngoài kia. Ngươi mất một đồ đệ, lòng nặng trĩu.');}else setResult(d.name+' trở về tay không, còn bị thương nhẹ.');}},
    {l:'↩ Thôi.',act:()=>{S.scene=null;render();save();}}]};}
/* ===== ĐỐI THỦ MỆNH ĐỊNH — sự kiện tái ngộ ===== */
function evRival(){ensureRival();const r=S.rival;if(!r||!r.alive)return evCombat();r.encounters++;r.grudge+=8;
  return{title:'MỆNH ĐỊNH · Đối Thủ Tái Ngộ',narr:`Lại là ${r.name} (${realmName(r.ri,r.si)}, tính ${r.trait}) — kẻ đối đầu định mệnh của ngươi, một "thiên mệnh chi tử" khác của thời đại này. Lần thứ ${r.encounters} hai người chạm mặt, ân oán chồng chất. ${r.ri>S.ri?'Hắn đã đi trước ngươi một bước, ánh mắt đầy khinh miệt.':r.ri<S.ri?'Lần này ngươi đã vượt hắn — nhưng hắn tuyệt không cam tâm.':'Hai người vẫn kẻ tám lạng người nửa cân.'}`,choices:[
    {l:'Quyết sinh tử, chấm dứt ân oán!',cls:'primary',hint:'Một mất một còn.',act:()=>{const res=fight({name:r.name,ri:r.ri,si:r.si,mightBonus:0.15});if(res==='win'){r.alive=false;S.flags.rivalSlain=true;S.stats.kills++;S.luck=Math.min(5,S.luck+1);S.luckShown=true;S.fame=clamp(S.fame+20,-100,1000);addKarma(-1,'trảm sát mệnh địch');setResult('Sau bao năm ân oán, ngươi chém gục '+r.name+'! Khí vận của hắn tan vỡ hòa vào ngươi (khí vận +1), danh chấn thiên hạ. Một thiên mệnh chi tử đã ngã xuống dưới tay ngươi.');}else if(res==='dead'){S.cause=r.name+' — đối thủ định mệnh — cuối cùng đã kết liễu ngươi. "Thiên mệnh chi tử của thời đại này, chỉ có thể là một người."';setResult(S.cause);}else setResult('Trận chiến bất phân thắng bại ('+res+'). '+r.name+' để lại một câu lạnh lẽo: "Lần sau, ta sẽ chôn ngươi." Ân oán chưa dứt, chỉ càng thêm sâu.');}},
    {l:'Đấu khẩu, dằn mặt rồi lui.',act:()=>{r.grudge+=5;S.fame=clamp(S.fame+2,-100,1000);setResult('Hai người khẩu chiến nảy lửa trước bàn dân thiên hạ. Chưa động thủ, nhưng oán khí giữa hai người lại dày thêm một tầng.');}},
    {l:'Tạm gác thù, ai đi đường nấy.',show:()=>r.grudge<60,act:()=>{setResult('Ngươi nén cơn giận quay lưng. '+r.name+' cười khẩy sau lưng — ân oán này, sớm muộn cũng phải một phen sống chết.');}}]};}
/* ===== PHÁP BẢO TIẾN HÓA ===== */
function evolveCost(g){return Math.round(Math.pow(10,2+g*0.5));}
function sceneEvolve(){const pool=(S.natal?[{t:S.natal,natal:true}]:[]).concat(S.treasures.filter(t=>t.grade<12).map(t=>({t,natal:false})));const c=[];
  pool.forEach(e=>{const t=e.t;const cost=Math.round(evolveCost(t.grade)*(e.natal?0.5:1));c.push({l:`Tiến hóa ${t.name} (phẩm ${t.grade}→${t.grade+1}, ${cost.toLocaleString('vi-VN')} linh thạch)`,show:()=>S.linhThach>=cost&&t.grade<12,act:()=>{S.linhThach-=cost;const succ=clamp(0.72-t.grade*0.06+profBonus('khi')+(e.natal?0.1:0),0.1,0.95);if(RNG.chance(succ)){t.grade++;t.gradeName=PHAM[t.grade-1].n;t.color=PHAM[t.grade-1].c;t.mult=1+t.grade*0.25;setResult('✦ Tiến hóa thành công! '+t.name+' thăng lên phẩm '+t.grade+' ('+t.gradeName+'), uy lực tăng vọt.');}else{setResult('Tiến hóa thất bại — linh khí phản phệ, vật liệu tan thành hư vô. Pháp bảo may không hư hại.');}}});});
  c.push({l:'↩ Thôi.',act:()=>{S.scene=null;render();save();}});
  return{title:'LUYỆN KHÍ · Tiến Hóa Pháp Bảo',narr:'Bằng thủ đoạn luyện khí, ngươi có thể tế luyện nâng phẩm pháp bảo — phẩm càng cao càng khó, thất bại thì mất vật liệu. Bản mệnh pháp bảo dễ tiến hóa hơn nhờ khế hợp. (Luyện Khí Sư thành công cao hơn.)',choices:c};}
/* ===== TÂM MA KHẢO NGHIỆM ===== */
function evInnerDemon(){const tempt=RNG.pick([
  {t:'Một giọng nói mang chính giọng ngươi thì thầm: "Giết kẻ đó đi, đoạt lấy cơ duyên của hắn. Ngươi xứng đáng hơn nó."',y:()=>{S.atkMul*=1.08;addKarma(-3,'thuận theo tâm ma');S.dao=Math.max(0,S.dao-8);return'Ngươi buông cho hắc ám dẫn lối — thực lực tăng vọt, nhưng đạo tâm nhuốm đen thêm một mảng.';}},
  {t:'"Trường sinh bất tử... chỉ cần nuốt chửng linh hồn kẻ khác. Chỉ một lần thôi mà, có ai biết đâu."',y:()=>{S.soul+=1;S.taint+=10;addKarma(-4,'nuốt hồn theo tâm ma');return'Ngươi nghe theo, nguyên thần cường hóa — nhưng chướng tính & nghiệp chướng dâng cao ngùn ngụt.';}},
  {t:'"Cả thế giới này nợ ngươi. Hãy bắt chúng phải trả bằng máu."',y:()=>{S.att+=5;S.cultMul*=1.05;addKarma(-3,'ôm hận theo tâm ma');S.dao=Math.max(0,S.dao-6);return'Cơn thịnh nộ cho ngươi động lực tu luyện đáng sợ — nhưng ngươi ngày một giống một con quái vật.';}}]);
  return{title:'TÂM MA KHẢO NGHIỆM',narr:'Giữa lúc tĩnh tọa, một bóng đen mang gương mặt của chính ngươi hiện lên trong tâm hải. TÂM MA. '+tempt.t,choices:[
    {l:'Trảm tâm ma, giữ vững đạo tâm.',cls:'primary',hint:'Củng cố đạo tâm.',act:()=>{const win=clamp(0.4+(S.dao-50)*0.008+S.cmp*0.05,0.15,0.95);if(RNG.chance(win)){S.dao=Math.min(100,S.dao+8);S.flags.ngoDao=Math.max(S.flags.ngoDao||0,0.1);setResult('Ngươi vung ý chí chém tan tâm ma! Đạo tâm càng kiên định, một tia linh cảm lóe lên cho đột phá tới.');}else{S.taint+=6;S.dao=Math.max(0,S.dao-5);setResult('Tâm ma quá mạnh, ngươi chưa diệt được hoàn toàn — nó lẩn sâu vào tâm hải chờ thời cơ. Chướng tính tăng.');}}},
    {l:'Thuận theo tâm ma, đổi lấy sức mạnh.',hint:'Mạnh lên nhưng sa đọa.',act:()=>{setResult(tempt.y());}}]};}
/* ===== NHÂN QUẢ THEO TỪNG NHÂN VẬT — cố nhân tầm thù / báo ân (dùng NPC & ký ức có thật) ===== */
function evConsequence(){const ids=Object.keys(S.npcs).filter(i=>S.npcs[i].alive&&Math.abs(S.npcs[i].relation)>=40);if(!ids.length)return evCombat();const n=S.npcs[RNG.pick(ids)];const mem=(n.memory&&n.memory.length)?n.memory[n.memory.length-1]:'chuyện cũ giữa hai ta';
  if(n.relation<=-40){n.ri=Math.max(n.ri,Math.min(100,S.ri+RNG.int(-1,1)));remember(n,'tìm ngươi thanh toán ân oán',0);
    return{title:'NHÂN QUẢ · Cố Nhân Tầm Thù',narr:`${n.name} (${esc(realmName(n.ri,n.si))}, ${esc(n.traits.join(', '))}) tìm tới tận cửa. Ân oán giữa hai người vẫn còn nguyên trong ký ức hắn: "${esc(mem)}". Bao năm hắn cũng đã lớn mạnh — ánh mắt chất chứa hận thù dồn nén. "Món nợ năm xưa, hôm nay ta tới đòi."`,choices:[
      {l:'Nghênh chiến, dứt điểm ân oán.',cls:'primary',act:()=>{const r=fight({name:n.name,ri:n.ri,si:n.si,mightBonus:0.15});if(r==='win'){n.alive=false;S.stats.kills++;addKarma(-1,'lại thêm một mạng vào nợ máu');setResult('Ngươi kết liễu '+n.name+', chấm dứt một mối oán — nhưng vòng xoáy nhân quả chỉ càng thêm sâu.');}else setResult(r==='dead'?S.cause:'Kết quả: '+r+'. '+n.name+' ôm hận rút lui, thề sẽ còn quay lại.');}},
      {l:'Cúi mình hòa giải, bồi thường (1000 linh thạch).',show:()=>S.linhThach>=1000,hint:'Chuộc lại nhân quả.',act:()=>{S.linhThach-=1000;if(RNG.chance(0.55)){remember(n,'ngươi thành khẩn bồi thường, hóa giải oán cừu',80);addKarma(1,'chuộc lỗi với cố nhân');setResult('Ngươi thành khẩn tạ lỗi và bồi thường. '+n.name+' trầm mặc hồi lâu rồi thu kiếm: "Coi như xong." Kẻ thù hóa người dưng — có khi thành bằng hữu.');}else setResult(n.name+' hất túi linh thạch xuống đất: "Tưởng vài đồng bạc là xong? Ngươi coi thường ta quá!" Hắn bỏ đi, hận càng khắc sâu.');}}]};}
  return{title:'NHÂN QUẢ · Cố Nhân Báo Ân',narr:`${n.name} (${esc(realmName(n.ri,n.si))}) tìm tới. Hắn vẫn nhớ như in: "${esc(mem)}". "Ân tình xưa chưa từng quên. Hôm nay, cho ta báo đáp."`,choices:[
    {l:'Cảm tạ, hàn huyên cố nhân.',cls:'primary',act:()=>{remember(n,'tái ngộ, tình nghĩa thêm bền chặt',10);if(RNG.chance(0.5)){const k=RNG.pick(['pha_canh','ngo_dao','ho_menh','tho_dan']);S.inv[k]=(S.inv[k]||0)+1;setResult(n.name+' tặng ngươi một viên '+PILL_DEF[k].n+' cùng một lời hứa: "Khi ngươi lâm nguy, ta nhất định có mặt."');}else{S.linhThach+=Math.round(Math.pow(10,1+S.ri*0.25));setResult(n.name+' để lại một túi linh thạch hậu hĩnh rồi cáo từ, không quên dặn ngươi bảo trọng.');}}}]};}

/* ===== A. BÍ ẨN & ĐẠI KẾ NGÀN NĂM (xương sống cốt truyện) ===== */
const MYSTERIES=[
 {id:'truongsinh',t:'Trường Sinh Là Dối Trá',clues:['Ngươi đọc được một đoạn cổ văn khắc vội: "Cổ Đế... cũng chết." Ba chữ ấy khiến ngươi lạnh sống lưng.','Một lão nhân hấp hối nắm tay ngươi thì thầm: "Đừng tin trường sinh. Càng lên cao, thọ nguyên càng là xiềng xích."','Ngươi thấy một cỗ quan tài khắc tên một vị Đại Đế — kẻ mà sử sách nói là bất tử.','Một tàn hồn gào lên trước khi tan biến: "Bọn ta đều bị lừa! Con đường này không có điểm cuối!"'],reveal:'Trường sinh bất tử là một lời nói dối vĩ đại. Ngay cả Đại Đế cũng phải chết — tồn tại một "sinh mệnh cấm khu" không ai vượt qua. Con đường tu tiên là một cái bẫy đếm ngược, và ai đó đã cố tình thiết kế nó như vậy.'},
 {id:'bautroigia',t:'Bầu Trời Giả & Thực Tại Tầng Sâu',clues:['Có đêm ngươi ngước lên và thấy bầu trời khẽ "rung" một cái, như một tấm màn.','Một dị nhân điên loạn hét giữa chợ: "Bầu trời là giả! Chúng ta bị nhốt trong một cái lồng!"','Ngươi phát hiện linh khí của thế giới này đang bị hút đi đâu đó — như bị ai rút cạn từ từ.','Một cổ trận đồ vẽ chín tầng trời lồng vào nhau, tầng ngoài cùng là một con mắt khổng lồ.'],reveal:'Bầu trời thế giới này là một tầng phong ấn nhân tạo. Mỗi "giới" cao hơn chỉ là một lớp thực tại sâu hơn của cùng một cái lồng. Có một thứ ở tầng ngoài cùng đang lặng lẽ quan sát — và nuôi dưỡng tất cả như nuôi gia súc.'},
 {id:'codetim',t:'Thi Thể Cổ Đế & Hoang Cổ Cấm Khu',clues:['Đồn rằng nơi Hoang Cổ có những cỗ thi thể Cổ Đế vẫn rỉ ra uy áp diệt thế.','Ngươi nghe kể về một cấm khu nơi thời gian ngừng chảy, chất đầy xác cường giả thượng cổ.','Một mảnh xương cổ ngươi vừa chạm truyền tới ký ức về một trận chiến giữa các vì sao.','"Kẻ nào đánh thức thi thể Cổ Đế, kẻ đó gánh lấy nghiệp chướng của cả một thời đại."'],reveal:'Các Hoang Cổ Cấm Khu là mộ địa của những Cổ Đế đã tử chiến chống lại "kẻ trên bầu trời". Thi thể họ vẫn giữ truyền thừa vô thượng — và cả lời nguyền lẫn thủ vệ. Họ đã thua. Còn ngươi, đang đi lại chính con đường của họ.'},
 {id:'matu',t:'Đại Kế Ngàn Năm Của Ma Tổ',clues:['Phong ấn dưới Hoàng Tuyền đang lỏng dần — một thứ cổ xưa sắp thức tỉnh.','Ngươi giật mình nhận ra vô số "cơ duyên" của mình đến quá đúng lúc, như được sắp đặt sẵn.','Một tà tu cười man dại: "Tất cả chúng ta đều là quân cờ trong ván cờ ngàn năm của Người."','Một dòng chữ máu trên vách đá cổ: "Khi kẻ được chọn đủ mạnh, phong ấn sẽ vỡ."'],reveal:'Một Ma Tổ bị phong ấn từ vạn kiếp trước đã bày ra một đại kế ngàn năm: nuôi dưỡng vô số tu sĩ (gồm cả ngươi) làm "chìa khóa sống". Mỗi bước ngươi mạnh lên là một bước phong ấn của hắn lỏng ra. Cơ duyên của ngươi — có lẽ chưa từng là của ngươi.'},
 {id:'luanhoi',t:'Ngươi Là Ai — Luân Hồi Cổ Đế',identity:true,clues:['Có những khoảnh khắc ngươi thấy cảnh tượng xa lạ mà lại quen thuộc đến nhói lòng.','Trong mơ, ngươi ngồi trên một ngai vàng giữa mây, vạn người quỳ lạy dưới chân.','Một tướng sư nhìn ngươi rồi tái mặt bỏ chạy: "Không thể nào... Người đã chuyển thế?!"','Nguyên thần ngươi thi thoảng vang lên một cái tên — tên của một Cổ Đế đã mất tích.'],reveal:'Ngươi có thể là chuyển thế của một Cổ Đế đã ngã xuống trong trận chiến chống "kẻ trên bầu trời". Ký ức bị phong ấn để ngươi tái sinh mà không bị phát hiện. Nhưng khi ngươi mạnh trở lại — kẻ thù cũ, và cả cố nhân năm xưa, đều sẽ nhận ra ngươi.'},
];
// Bí ẩn ĐỊNH DANH ('ngươi là...') chỉ hé lộ cho xuất thân phù hợp — không nhét cho người thường
function qualifiesIdentityMystery(){return !!(S.flags&&(S.flags.emperor_soul||S.flags.strongest_reborn||S.flags.reborn_saint||S.flags.remnant_soul||S.flags.reincarnation||S.flags.reborn||S.flags.dao_body||S.flags.hongmeng_body||S.flags.ancient_blood));}
function availMysteries(){return MYSTERIES.filter(m=>!m.identity||qualifiesIdentityMystery());}
function clueCount(id){return (S.clues&&S.clues[id])||0;}
function evClue(){const pool=availMysteries().filter(m=>clueCount(m.id)<m.clues.length);if(!pool.length)return evFortune();const m=RNG.pick(pool);const idx=clueCount(m.id);S.clues=S.clues||{};S.clues[m.id]=idx+1;const done=idx+1>=m.clues.length;
  return{title:'THIÊN CƠ · Một Tia Chân Tướng',narr:`Giữa lúc nhập định, một mảnh thiên cơ lọt vào tâm trí ngươi, lạnh buốt:\n\n"${m.clues[idx]}"\n\n(Bí ẩn: ${m.t} — manh mối ${idx+1}/${m.clues.length})${done?'\n\n✦ Ngươi đã ghép đủ manh mối cho bí ẩn này!':''}`,choices:[
    {l:done?'Chiêm nghiệm chân tướng.':'Ghi khắc vào tâm, đi tiếp.',cls:'primary',act:()=>{if(done){S.flags['mystery_'+m.id]=true;S.dao=Math.min(100,S.dao+3);S.cmp=Math.round((S.cmp+0.03)*100)/100;setResult('【'+m.t+'】\n\n'+m.reveal+'\n\n(Chân tướng đã mở khóa — xem Thiên Cơ Lục ở tab Nhân Vật. Đạo tâm & ngộ tính chấn động thăng hoa.)');}else setResult('Ngươi khắc mảnh thiên cơ vào tận xương tủy. Bức tranh lớn vẫn mờ mịt, nhưng ngươi vừa thấy một góc của sự thật.');}},
    {l:'Cố quên đi — biết quá nhiều có khi là họa sát thân.',act:()=>{S.clues[m.id]=idx;setResult('Ngươi cố xua mảnh thiên cơ khỏi đầu. Có những sự thật, không biết còn hơn.');}}]};}

/* ===== B. ĐẠO TÂM: TÌNH ↔ VÔ TÌNH + MỘT NIỆM ===== */
function evHeartTrial(){const sc=RNG.pick(['Một người ngươi từng thân thiết đang lâm nguy trước mắt — cứu thì chậm lại và nguy hiểm, bỏ mặc thì chuyên tâm cầu đạo.','Một cố nhân quỳ xuống cầu xin ngươi vì tình xưa. Đáp lại tình, hay dứt khoát vô tình để đạo tâm không lay động?','Đạo tâm ngươi vang lên một câu hỏi lạnh người: muốn thành tiên, phải chăng trước hết phải giết chết phần "người" trong chính mình?']);
  return{title:'ĐẠO TÂM · Tình Kiếp — Một Niệm',narr:'Trên con đường trường sinh cô độc, một khảo nghiệm đạo tâm giáng xuống.\n\n'+sc+'\n\nNhất niệm thành ma, nhất niệm thành phật.',choices:[
    {l:'Đoạn tình cầu đạo (Vô Tình).',hint:'Tu nhanh & lạnh lùng hơn, nhưng mất dần nhân tính.',act:()=>{S.heart-=2;S.cultMul=Math.round(S.cultMul*1.04*1000)/1000;S.atkMul=Math.round(S.atkMul*1.03*1000)/1000;S.dao=Math.max(0,S.dao-4);setResult('Ngươi chặt đứt một mối tình duyên trong lòng. Đạo tâm lạnh đi, tu vi tinh tiến — nhưng ngươi lại xa "người" thêm một bước. Vô Tình Đạo mở ra trước mắt.');}},
    {l:'Giữ lấy tình (Hữu Tình).',hint:'Đạo tâm nhân bản, vững nhưng có điểm yếu.',act:()=>{S.heart+=2;S.dao=Math.min(100,S.dao+6);setResult('Ngươi chọn giữ lấy phần người trong mình. Đạo tâm không lạnh lẽo mà ấm áp kiên định — dù trên con đường này, có tình là có điểm yếu, có thứ để mất, có kẻ để bảo vệ.');}},
    {l:'Không đoạn không chấp — một niệm giữa hai bờ.',act:()=>{S.dao=Math.min(100,S.dao+2);setResult('Ngươi không chọn cực đoan nào, giữ tâm ở lằn ranh mong manh giữa tình và đạo. Khó nhất, nhưng có lẽ là con đường trung dung của bậc đại trí.');}}]};}

/* ===== C. TRƯỜNG SINH LỘ — TẦNG SÂU & NGUY HIỂM BÍ ẨN (hardcore) ===== */
function evForbiddenTruth(){return{title:'CẤM KỴ · Chân Tướng Không Nên Biết',narr:'Ngươi vô tình chạm phải một tầng chân tướng bị phong cấm — một sự thật mà thiên đạo không muốn bất kỳ ai biết. Càng nhìn, thần hồn càng đau như bị xé toạc.',choices:[
    {l:'Nhìn thẳng vào sự thật.',cls:'primary',hint:'Thêm manh mối bí ẩn, nhưng trả giá bằng thọ nguyên.',act:()=>{deductLife(6+RNG.int(0,10),'gánh chân tướng cấm kỵ');if(!S.alive){setResult(S.cause);return;}const m=RNG.pick(availMysteries());S.clues=S.clues||{};S.clues[m.id]=Math.min(m.clues.length,(S.clues[m.id]||0)+1);setResult('Ngươi cắn răng nhìn thẳng. Một mảnh bí ẩn hằn vào tâm trí (+1 manh mối: '+m.t+') — nhưng thiên đạo giáng một phần trừng phạt lên thọ nguyên ngươi. Biết sự thật, chưa bao giờ miễn phí.');}},
    {l:'Nhắm mắt lại, chối bỏ.',act:()=>{setResult('Ngươi vội nhắm mắt, đẩy sự thật ra khỏi tâm trí. Sống sót — nhưng bức màn bí ẩn vẫn treo lơ lửng trên đầu.');}}]};}
function evHeavenSuppress(){const bolts=Math.min(9,3+Math.floor(S.ri/8));return{title:'THIÊN ĐẠO ÁP CHẾ · Kẻ Cầu Trường Sinh',narr:'Ngươi đã đi quá xa trên con đường nghịch thiên. Thiên đạo cảm nhận được, và nó KHÔNG ưa. Một tầng uy áp vô hình giáng xuống — cả thế giới này đang cố nghiền ngươi như nghiền một mầm mống phản nghịch.',choices:[
    {l:'Đứng thẳng, chống lại thiên uy!',cls:'primary',hint:'Nghịch thiên mà sống, hoặc chết.',act:()=>{const def=S.soul*0.4+(S.dao-50)*0.02+profBonus('tran')*3+((S.laws||[]).length*0.3);let hit=0;for(let i=0;i<bolts;i++)if(RNG.chance(clamp(0.16-def*0.006,0.03,0.55)))hit++;if(hit>=Math.ceil(bolts*0.6)){S.alive=false;S.cause='Thiên đạo áp chế — ngươi bị chính quy luật của thế giới này nghiền nát vì dám cầu trường sinh chân chính.';setResult(S.cause);return;}if(hit>0)deductLife(hit*4,'thiên đạo áp chế');S.flags.defiedHeaven=true;S.fame=clamp(S.fame+10,-100,1000);setResult('Ngươi gồng mình đứng thẳng dưới thiên uy, KHÔNG quỳ! Thiên đạo lùi lại một bước — ngươi vừa chứng minh mình là một biến số nó không kiểm soát nổi. Càng gần trường sinh, cả thế giới càng muốn giết ngươi — và ngươi vẫn sống.');}},
    {l:'Cúi đầu thuận theo, thu liễm.',act:()=>{S.att=Math.max(0,S.att-4);S.progress=Math.max(0,S.progress-0.08);setResult('Ngươi cúi đầu, thu liễm khí tức, giả vờ an phận thủ thường. Thiên đạo bỏ qua ngươi — lần này. Nhưng thu mình cũng là chậm lại.');}}]};}

    {n:'Tàn hồn đã tỉnh hẳn, giọng lạnh lẽo vang trong đầu: "Thân xác này... hợp để ta trùng sinh."',a:()=>{if(S.soul>=3||RNG.chance(0.5)){S.soul+=1;setResult('Ngươi vận nguyên thần trấn áp, ép tàn hồn quy phục làm dưỡng liệu. Nguyên thần ngươi mạnh lên — ngươi đã thắng cuộc đấu tranh trong chính hồn mình.');}else{S.alive=false;S.cause='Tàn hồn cường giả đoạt xá thành công. Ngươi biến mất, thân xác thành lồng giam cho một kẻ đã chết.';setResult(S.cause);}}},
    {n:'Dư âm cuối của tàn hồn tan đi, để lại cho ngươi một mảnh ký ức: một cái tên, một mối thù, và một manh mối.',a:()=>{const m=MYSTERIES.find(x=>x.id==='luanhoi')||RNG.pick(MYSTERIES);S.clues=S.clues||{};S.clues[m.id]=Math.min(m.clues.length,(S.clues[m.id]||0)+1);setResult('Tàn hồn để lại di sản cuối: một mảnh chân tướng về '+m.t+'. Ngươi thừa hưởng cả sức mạnh lẫn ân oán của một kẻ đã chết.');}}];
    const b=beats[st];return{title:'CỐT TRUYỆN · Tàn Hồn Thức Tỉnh',narr:b.n,choices:[{l:'Đối mặt.',cls:'primary',act:b.a}]};}
  if((f.demon_seed||f.demon_heir)&&(f.arc_machung||0)<3){const st=(f.arc_machung||0);f.arc_machung=st+1;const beats=[
    {n:'Con mắt đỏ trong lồng ngực ngươi mở ra một khe. Ma chủng đang lớn lên, cho ngươi sức mạnh tà đạo dồi dào.',a:()=>{S.atkMul=Math.round(S.atkMul*1.1*1000)/1000;S.cultMul=Math.round(S.cultMul*1.08*1000)/1000;addKarma(-2,'nuôi lớn ma chủng');setResult('Ngươi để ma chủng lớn thêm, thực lực tăng vọt — nhưng đồng hồ đếm ngược cũng nhích thêm một nấc.');}},
    {n:'Ma chủng thì thầm cám dỗ: "Nuốt thêm sinh linh đi. Ta với ngươi, sẽ vô địch." Nó đang muốn chiếm lấy ngươi.',a:()=>{S.heart-=2;S.taint+=8;addKarma(-3,'thuận theo ma chủng');setResult('Ngươi thuận theo ma chủng thêm một bước. Sức mạnh khủng khiếp — nhưng ngươi ngày càng không phân biệt được đâu là mình, đâu là nó.');}},
    {n:'Ma chủng đã chín. Đêm nay, nó sẽ nuốt chửng ngươi để tái sinh. Đây là cửa sinh tử của kiếp ma chủng.',a:()=>{const win=clamp(0.35+(S.dao-50)*0.008+S.soul*0.05-(S.heart<0?0.1:0),0.1,0.9);if(RNG.chance(win)){delete f.demon_seed;S.flags.tamedSeed=true;S.atkMul=Math.round(S.atkMul*1.2*1000)/1000;setResult('Trong đêm sinh tử, ngươi dùng đạo tâm chưa vỡ vụn của mình trấn áp và LÀM CHỦ ma chủng! Từ nô lệ của nó, ngươi thành chủ nhân — sức mạnh tà đạo nay là của riêng ngươi.');}else{S.alive=false;S.cause='Ma chủng nuốt chửng ngươi để tái sinh. Kẻ bước ra khỏi xác ngươi, không còn là ngươi nữa.';setResult(S.cause);}}}];
    const b=beats[st];return{title:'CỐT TRUYỆN · Ma Chủng Đếm Ngược',narr:b.n,choices:[{l:'Đối mặt.',cls:'primary',act:b.a}]};}
  if(f.has_ring&&(f.arc_ring||0)<2){const st=(f.arc_ring||0);f.arc_ring=st+1;const beats=[
    {n:'Lão hồn trong chiếc giới chỉ cổ lên tiếng: "Nhóc con, muốn mạnh không? Ta chỉ ngươi một cơ duyên — nhưng phải trả giá."',a:()=>{deductLife(5,'giao dịch với lão hồn');if(!S.alive){setResult(S.cause);return;}const t=genTreasure(clamp(4,1,maxGrade(S.world.tier)+1));S.treasures.push(t);setResult('Lão hồn dẫn ngươi tới một di bảo: '+t.name+'! Nhưng lão lấy đi 5 năm thọ nguyên làm "học phí". Không có gì miễn phí, kể cả từ ân nhân.');}},
    {n:'Lão hồn bỗng đổi giọng: "Ta đã dạy ngươi đủ rồi. Giờ, trả lại thân xác cho ta." Lão định đoạt xá!',a:()=>{if(S.soul>=2&&RNG.chance(0.6)){S.natal=S.natal||genTreasure(5);setResult('Ngươi sớm đề phòng, phản kích đúng lúc lão hồn ra tay! Lão bại, tan vào chiếc nhẫn — để lại toàn bộ truyền thừa cho ngươi. Kẻ dạy ngươi, cuối cùng thành bệ đỡ cho ngươi.');}else{S.alive=false;S.cause='Lão hồn trong giới chỉ đoạt xá thành công. Hắn đã kiên nhẫn nuôi ngươi bao năm chỉ để chờ khoảnh khắc này.';setResult(S.cause);}}}];
    const b=beats[st];return{title:'CỐT TRUYỆN · Lão Hồn Giới Chỉ',narr:b.n,choices:[{l:'Đối mặt.',cls:'primary',act:b.a}]};}

    {n:'Một mảnh ký ức Thánh Tử kiếp trước sống dậy, dẫn ngươi tới một gia sản mà chỉ ngươi biết đường tìm.',a:()=>{S.linhThach+=Math.round(Math.pow(10,2+S.ri*0.2));const t=genTreasure(clamp(4,1,maxGrade(S.world.tier)+1));S.treasures.push(t);setResult('Theo ký ức kiếp trước, ngươi tìm được gia sản: một túi linh thạch lớn và '+t.name+'! Vinh quang kiếp trước bắt đầu trở về.');}},
    {n:'Ký ức về cái chết kiếp trước ùa về — kẻ đã đâm ngươi một kiếm xuyên tim. Và ngươi nhận ra: hắn vẫn còn sống.',a:()=>{ensureRival();S.rival.name=RNG.pick(SUR)+' '+RNG.pick(GIV);S.rival.grudge=80;const m=MYSTERIES.find(x=>x.id==='luanhoi')||RNG.pick(MYSTERIES);S.clues=S.clues||{};S.clues[m.id]=Math.min(m.clues.length,(S.clues[m.id]||0)+1);setResult('Kẻ giết ngươi kiếp trước nay là '+S.rival.name+' — mối thù xuyên hai kiếp. Ngươi cũng hiểu thêm về '+m.t+'. Kiếp này, ngươi sẽ đòi lại tất cả.');}}];
    const b=beats[st];return{title:'CỐT TRUYỆN · Ký Ức Thánh Tử',narr:b.n,choices:[{l:'Đối mặt.',cls:'primary',act:b.a}]};}
