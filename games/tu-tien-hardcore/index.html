<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Tu Tiên — Vô Hạn Đạo (Hardcore)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
:root{
  --bg:#0a0e14;--card:#141922;--card2:#1a2029;--line:#26303d;--txt:#d8dee7;--muted:#7f8b9c;
  --cyan:#00e5ff;--gold:#ffab40;--good:#6fdc8c;--bad:#ff6b6b;--warn:#ffd54f;--lore:#b39ddb;--accent:#ff6f00;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.55;font-size:15px;max-width:760px;margin:0 auto;min-height:100vh;padding:8px 8px 68px}
#status{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#141922,#10151d);border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:0 3px 12px rgba(0,0,0,.5);margin-bottom:10px}
.st-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.st-name{font-weight:700;color:var(--cyan);font-size:1.02rem}
.st-realm{color:var(--gold);font-weight:600;text-align:right}
.bar{position:relative;height:16px;background:#0c1118;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:7px}
.bar>i{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,#0288d1,#00e5ff);transition:width .4s}
.bar>span{position:relative;z-index:1;display:block;text-align:center;line-height:16px;font-size:.72rem;text-shadow:0 1px 2px #000}
.st-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px 12px;font-size:.8rem}
.st-grid>div{display:flex;justify-content:space-between;gap:6px;border-bottom:1px dotted #202833;padding:1px 0}
.st-grid b{color:var(--muted);font-weight:500}
.st-grid .bad{color:var(--bad)}.st-grid .good{color:var(--good)}.st-grid .warn{color:var(--warn)}
#view{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;min-height:200px}
h1{color:var(--cyan);text-align:center;font-size:1.5rem;margin-bottom:8px}
h2{color:var(--gold);font-size:1.15rem;margin-bottom:10px}
.narr{white-space:pre-wrap;margin-bottom:14px;font-size:.98rem}
.choices{display:flex;flex-direction:column;gap:8px}
.btn{display:flex;align-items:center;gap:10px;width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:11px 13px;border-radius:10px;font-size:.9rem;cursor:pointer;text-align:left;transition:.12s;font-family:inherit}
.btn:hover{border-color:#3a4a5e;background:#1f2732}
.btn:active{transform:scale(.99)}
.btn.primary{background:linear-gradient(90deg,#e65100,#ff6f00);border:none;color:#fff;font-weight:700;justify-content:center}
.btn.small{width:auto;padding:6px 12px;font-size:.82rem}
.btn.disabled,.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.hidden-choice{border-color:#6d4bb3;background:#241a33}
.ch-key{flex:none;width:26px;height:26px;border-radius:6px;background:#0c1118;border:1px solid var(--line);display:grid;place-items:center;font-weight:700;color:var(--gold);font-size:.85rem}
.ch-l{flex:1}.ch-h{display:block;font-size:.74rem;color:var(--muted);margin-top:2px;font-style:italic}
.freeform{margin-top:14px;border-top:1px dashed var(--line);padding-top:10px}
.ff-l{font-size:.78rem;color:var(--muted);margin-bottom:6px;font-style:italic}
.ff-row{display:flex;gap:6px}
.ff-in{flex:1;background:#0c1118;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 11px;font-size:.85rem;font-family:inherit}
.ff-in:focus{outline:none;border-color:var(--cyan)}
.free-res{background:#12181f;border-left:3px solid var(--lore);border-radius:6px;padding:9px 11px;margin-bottom:12px;font-size:.9rem;font-style:italic}
.log{background:#0c1118;border:1px solid var(--line);border-radius:8px;padding:8px;max-height:180px;overflow-y:auto;font-size:.82rem;margin-top:10px}
.log div{padding:2px 0;border-bottom:1px dotted #1a212b}
.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.lore{color:var(--lore);font-style:italic}.death{color:var(--bad);font-weight:700}
.muted{color:var(--muted)}
.tabbar{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;display:flex;background:#10151d;border-top:1px solid var(--line);z-index:30}
.tab{flex:1;background:none;border:none;color:var(--muted);padding:8px 4px 7px;font-size:.72rem;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent}
.tab span{font-size:1.15rem}
.tab.active{color:var(--cyan);border-top-color:var(--cyan);background:#131a24}
.item{display:flex;justify-content:space-between;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin-bottom:6px;font-size:.85rem;align-items:center}
.pill{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:20px;font-weight:700;color:#0a0e14}
.chip{display:inline-block;font-size:.72rem;padding:2px 8px;border:1px solid var(--line);border-radius:12px;margin:2px 3px 0 0}
.sheet p{margin-bottom:7px;font-size:.9rem}
.menu-wrap{text-align:center;padding:16px 6px}
.menu-wrap .btn{max-width:340px;margin:8px auto;justify-content:center}
.rar{font-size:.7rem;padding:1px 7px;border-radius:10px;font-weight:700}
.origin-card{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px;background:var(--card2);cursor:pointer}
.origin-card:hover{border-color:#3a4a5e}
.origin-card .nm{font-weight:700;color:var(--cyan)}
.origin-card .ds{font-size:.8rem;color:var(--muted);margin-top:3px}
.warn-note{color:var(--bad);font-size:.82rem;margin-top:12px}
</style>
</head>

<script>
"use strict";
/* =========================================================================
   TU TIÊN — VÔ HẠN ĐẠO (hardcore). 1 file tự chứa, offline, localStorage.
   Kiến trúc: dữ liệu bảng + generator thủ tục + scene engine + 5 quy tắc gốc.
   ========================================================================= */
const SAVE_KEY='tutien_vohando_v1';
const LEGACY_KEY='tutien_legacy_v1'; // di sản mang qua kiếp sau khi trùng sinh
// Kho lưu an toàn: localStorage có thể bị chặn/ném lỗi trong iframe sandbox (Artifact) → fallback bộ nhớ tạm để game vẫn chạy
const LS=(function(){try{const k='__tt_probe';window.localStorage.setItem(k,'1');window.localStorage.removeItem(k);return window.localStorage;}catch(e){const m=Object.create(null);return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
const $=(s)=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=(s)=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2=(s)=>esc(s).replace(/\n/g,'<br>');

/* ---------- RNG có seed ---------- */
function makeRNG(seed){let st=(seed>>>0)||(Date.now()>>>0);
  const r={next(){let t=(st+=0x6d2b79f5);t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;},
  int(a,b){return Math.floor(r.next()*(b-a+1))+a;},range(a,b){return a+r.next()*(b-a);},
  pick(arr){return arr[Math.floor(r.next()*arr.length)];},chance(p){return r.next()<p;},
  weight(list){let t=0;for(const x of list)t+=x[0];let k=r.next()*t;for(const x of list){k-=x[0];if(k<=0)return x[1];}return list[list.length-1][1];}};
  return r;}
let RNG=makeRNG(Date.now());

/* ---------- Số lớn: hiển thị theo số mũ log10 + đơn vị Hán ---------- */
const HAN=[[0,''],[4,'vạn'],[8,'ức'],[12,'triệu ức'],[16,'kinh'],[20,'cai'],[24,'tỉ'],[28,'nhương'],[32,'câu'],[36,'giản'],[40,'chính'],[44,'tái'],[48,'cực'],[52,'hằng hà sa'],[56,'a tăng kỳ'],[60,'na do tha'],[64,'bất khả tư nghị'],[68,'vô lượng'],[72,'đại số']];
function fmtExp(exp){ // exp = log10 của số
  if(exp<0)return'0';
  if(exp<4){const v=Math.pow(10,exp);return (Math.round(v*10)/10).toLocaleString('vi-VN');}
  for(let i=HAN.length-1;i>=0;i--){const[ue,un]=HAN[i];if(exp>=ue&&exp-ue<4){const val=Math.pow(10,exp-ue);const sh=val>=1000?Math.round(val):Math.round(val*100)/100;return `${sh.toLocaleString('vi-VN')} ${un}`.trim();}}
  const e=Math.floor(exp);const m=Math.round(Math.pow(10,exp-e)*100)/100;return `${m}×10^${e}`;}

/* =========================================================================
   BẢNG DỮ LIỆU
   ========================================================================= */
const GROUPS=[
 {name:'Tiên Phàm Giới',names:['Luyện Khí','Trúc Cơ','Kim Đan','Nguyên Anh','Hóa Thần','Luyện Hư','Hợp Thể','Đại Thừa','Bán Tiên','Chân Tiên']},
 {name:'Tiên Nhân',names:['Huyền Tiên','Kim Tiên','Thái Ất Tiên','Đại La Tiên','Chuẩn Thánh','Thánh Nhân','Thánh Vương','Thánh Hoàng','Thánh Đế','Thiên Đế']},
 {name:'Đế Cấp',names:['Hư Không Đế','Luân Hồi Đế','Thiên Đạo Đế','Vũ Trụ Đế','Đa Vũ Trụ Đế','Thời Gian Đế','Nhân Quả Đế','Khởi Nguyên Đế','Hư Vô Đế','Hỗn Độn Đế','Hỗn Độn Thánh','Hỗn Độn Vương','Hỗn Độn Hoàng','Hỗn Độn Chúa','Hỗn Độn Chủ','Hỗn Độn Tổ','Hỗn Độn Thủy Tổ','Hỗn Độn Đạo Chủ','Hỗn Độn Đạo Tổ','Hỗn Độn Đạo Đế']},
 {name:'Đạo Cấp',names:['Đạo Chủ','Đạo Vương','Đạo Hoàng','Đạo Đế','Đạo Tổ','Đại Đạo Chủ','Đại Đạo Vương','Đại Đạo Hoàng','Đại Đạo Đế','Đại Đạo Tổ','Vô Thượng Đạo Chủ','Vô Thượng Đạo Vương','Vô Thượng Đạo Hoàng','Vô Thượng Đạo Đế','Vô Thượng Đạo Tổ','Tối Thượng Đạo Chủ','Tối Thượng Đạo Vương','Tối Thượng Đạo Hoàng','Tối Thượng Đạo Đế','Tối Thượng Đạo Tổ']},
 {name:'Hỗn Nguyên Cấp',names:['Hỗn Nguyên','Hỗn Nguyên Chủ','Hỗn Nguyên Vương','Hỗn Nguyên Hoàng','Hỗn Nguyên Đế','Hỗn Nguyên Thánh','Hỗn Nguyên Đại Thánh','Hỗn Nguyên Chúa','Hỗn Nguyên Tổ','Hỗn Nguyên Cực Tổ','Hỗn Nguyên Khởi Nguyên','Hỗn Nguyên Thực Tại','Hỗn Nguyên Vũ Trụ','Hỗn Nguyên Đa Vũ Trụ','Hỗn Nguyên Hư Vô','Hỗn Nguyên Vô Hạn','Hỗn Nguyên Vĩnh Hằng','Hỗn Nguyên Tối Thượng','Hỗn Nguyên Đại Đạo','Hỗn Nguyên Chúa Tể']},
 {name:'Đại Đạo Cấp',names:['Siêu Hỗn Nguyên','Tối Thượng Khởi Nguyên','Tối Thượng Hư Vô','Tối Thượng Hỗn Độn','Tối Thượng Thực Tại','Tối Thượng Vũ Trụ','Tối Thượng Đa Vũ Trụ','Tối Thượng Vô Hạn','Tối Thượng Vĩnh Hằng','Tối Thượng Đại Đạo','Khởi Nguyên Chủ','Hư Vô Chủ','Hỗn Độn Chủ','Thực Tại Chủ','Vũ Trụ Chủ','Đa Vũ Trụ Chủ','Vô Hạn Chủ','Vĩnh Hằng Chủ','Đại Đạo Chủ','ĐẠI ĐẠO']},
];
const SUBS=['Sơ kỳ','Trung kỳ','Hậu kỳ','Đỉnh phong'];
const SUBS9=['Nhất tầng','Nhị tầng','Tam tầng','Tứ tầng','Ngũ tầng','Lục tầng','Thất tầng','Bát tầng','Cửu tầng'];
const REALMS=(function(){
  const out=[];let g=0,cnt=0,entry=0.3;
  for(let id=1;id<=100;id++){
    while(cnt+GROUPS[g].names.length<id){cnt+=GROUPS[g].names.length;g++;}
    const group=GROUPS[g];const name=group.names[id-1-cnt];
    const subs=id===1?SUBS9:SUBS;
    const step=id<8?Math.log10(1.35):1;
    const subExps=subs.map((_,k)=>entry+k*step);
    const top=subExps[subExps.length-1];
    out.push({id,name,group:group.name,subs,subExps,entry,top,
      life:Math.round(id<=0?80:lifeFor(id)),
      breakBase:id<8?0.6:Math.max(0.02,0.6-(id-8)*0.006)});
    const jump=id<8?Math.log10(2.5):(2+(id-8)/92);
    entry=top+jump;
  }
  return out;
})();
function lifeFor(id){const t=[150,320,800,2000,5000,12000,30000,80000,200000,500000];if(id<=10)return t[id-1];return 500000*Math.pow(10,(id-10)*0.7);}
function realmName(ri,si){if(ri<=0)return'Phàm Nhân';const r=REALMS[ri-1];return r.name+' '+r.subs[clamp(si,0,r.subs.length-1)];}
function powerExp(ri,si){if(ri<=0)return 0;const r=REALMS[ri-1];return r.subExps[clamp(si,0,r.subExps.length-1)];}
// Miêu tả SỨC MẠNH từng cảnh giới — tu sĩ ở cảnh này làm được gì
const REALM_POWER={
 'Luyện Khí':'Dẫn linh khí nhập thể, gột rửa phàm cân tục cốt. Có thể ngưng linh lực sơ khai, đả xuất chưởng phong, luyện chút bùa chú. Vẫn là phàm nhân trước mắt cường giả.',
 'Trúc Cơ':'Trúc thành đạo cơ, linh lực hóa dịch chảy khắp kinh mạch. Có thể ngự vật bay lượn tầm thấp, khinh công lướt trên mặt nước, thọ nguyên ~200 năm.',
 'Kim Đan':'Ngưng linh lực thành một viên Kim Đan bất diệt — nguồn lực gần như vô tận. Ngự khí phi hành ngàn dặm, thần thức tỏa ra ngoài thân, ngưng đan lập phái.',
 'Nguyên Anh':'Kim Đan vỡ ra, sinh Nguyên Anh — một "mình thứ hai" trong hồn. Nguyên thần xuất khiếu, thân xác dù nát vẫn có thể đoạt xá trùng sinh. Thọ ~800 năm.',
 'Hóa Thần':'Nguyên Anh dung hợp thiên địa, bắt đầu lĩnh ngộ Pháp Tắc. Cách không dời non lấp bể, một ý niệm khuấy động phong vân cả một vùng.',
 'Luyện Hư':'Thân hòa vào hư không, nhìn thấu tầng không gian. Có thể ẩn thân giữa hư vô, chớp mắt dịch chuyển, đấu pháp trong khe hở không gian.',
 'Hợp Thể':'Nguyên thần và nhục thân hợp nhất, đạt cảnh thiên nhân hợp nhất. Vung tay chấn nứt sơn hà, một hơi thở làm khí hậu cả châu vực đổi thay.',
 'Đại Thừa':'Đỉnh phong của nhân tiên, chuẩn bị đón lôi kiếp phi thăng. Cử động dẫn động linh khí thiên địa, uy áp khiến vạn linh cấp thấp phủ phục.',
 'Bán Tiên':'Nửa bước sang bờ tiên, thân đã nhiễm tiên khí, phàm binh phàm pháp khó tổn thương. Một niệm có thể định sinh tử vô số phàm nhân.',
 'Chân Tiên':'Chân chính thành tiên, thoát ly luân hồi, thọ nguyên gần như bất tận. Một niệm diệt được cả một tòa phàm thành; bắt đầu ganh đua nơi tiên giới.',
 // — Tiên Nhân giới (cảnh 11–20) —
 'Huyền Tiên':'Sơ nhập tiên đạo, luyện hóa tiên nguyên. Có thể khai mở tiểu động thiên riêng, ngưng tụ tiên khí thành binh, một tay che kín cả một tòa núi.',
 'Kim Tiên':'Thân bất hoại như kim, kiếp số khó tổn. Cước đạp hư không xuyên tinh vực, ngôn xuất pháp tùy, lời nói mang theo uy quyền pháp tắc.',
 'Thái Ất Tiên':'Luyện thành Thái Ất chân thân, dung hợp nhiều pháp tắc thành một. Vung tay là tinh thần chuyển dịch, có thể trấn thủ một phương tiên vực.',
 'Đại La Tiên':'Chứng Đại La đạo quả, thoát khỏi trường hà thời gian — quá khứ vị lai khó trói buộc. Một niệm sinh diệt vạn vật trong lãnh vực của mình.',
 'Chuẩn Thánh':'Nửa bước thánh nhân, thân mang thánh uy sơ hiện. Cử động dẫn động đại đạo cộng hưởng; một hơi thở, vạn tiên phủ phục.',
 'Thánh Nhân':'Thánh nhân bất tử bất diệt, cùng thiên địa đồng thọ. Bàn tay lật là một phương thế giới sinh, úp là một phương thế giới diệt.',
 'Thánh Vương':'Thánh nhân chi vương, thống lĩnh vô số thánh. Đại đạo pháp tắc theo ý mà cong; nơi ngươi đứng, chính là trung tâm của một tầng trời.',
 'Thánh Hoàng':'Uy lâm vạn thánh, một lời định tôn ti thiên địa. Khai thiên tịch địa như trở bàn tay, nắm giữ vận mệnh của cả một đại thiên thế giới.',
 'Thánh Đế':'Thánh đạo đăng đỉnh, đế uy trùm vũ trụ. Một ánh mắt xuyên thấu vạn giới, một tiếng nói vang vọng khắp chư thiên.',
 'Thiên Đế':'Đế lâm chư thiên vạn giới, đứng trên tuyệt đại đa số sinh linh. Bước tới ngưỡng cửa của Đế Cấp — nơi một niệm có thể khai mở hoặc nghiền nát cả một vũ trụ.',
};
const GROUP_POWER={
 'Tiên Phàm Giới':'Từ phàm nhân leo dần tới tiên — mỗi cảnh giới là một lần lột xác của thân thể, linh hồn và thọ nguyên.',
 'Tiên Nhân':'Bậc chân tiên — có thể khai thiên tịch địa một phương tiểu thiên thế giới, nắm giữ nhiều pháp tắc, thọ nguyên tính bằng vạn năm.',
 'Đế Cấp':'Đế cấp cường giả — một niệm sinh, một niệm diệt cả một vũ trụ. Chưởng khống luân hồi, thời gian, nhân quả ở tầng vũ trụ.',
 'Đạo Cấp':'Đạo cấp tồn tại — bản thân đã hòa vào Đại Đạo, lời nói ra chính là pháp tắc, đứng ngoài vòng sinh diệt của vạn giới.',
 'Hỗn Nguyên Cấp':'Hỗn Nguyên cảnh — siêu thoát khỏi mọi vũ trụ, bất sinh bất diệt, một ý niệm có thể sáng tạo hoặc xóa sổ vô số thực tại.',

  const bk=['hp','atk','def','cult','cmp','soul','spd'];
  while(list.length<180){const t=RNG.weight([[40,2],[30,3],[18,4],[8,5],[3,6],[1,7]]);const n=`${RNG.pick(TC_PRE)} ${RNG.pick(TC_CORE)} ${RNG.pick(TC_SUF)}`;const buff={};const k=1+(t>=4?2:t>=3?1:0);for(let j=0;j<k;j++){buff[RNG.pick(bk)]=Math.round((1+t*0.25+RNG.range(0,0.5))*10)/10;}list.push({id:i,n,t,buff,d:'Thể chất hiếm, gốc gác thất truyền.'});i++;}
  return list;}

function sectMaxTier(worldTier){return clamp(Math.floor((worldTier-1)*1.0),0,7);} // thế giới thấp chỉ có tông môn cấp thấp
function genSect(worldTier,forceType){const maxT=sectMaxTier(worldTier);const tier=RNG.int(0,maxT);const type=forceType||RNG.pick(SECT_TYPES);
  // 7 loại chỉ là CHỦ TU; nhiều tông vẫn kiêm tu loại khác, một số là Tổng Hợp (không phân biệt loại)
  const broad=RNG.chance(0.22);let also=[];
  if(broad){also=SECT_TYPES.filter(t=>t.id!==type.id).map(t=>t.n);}
  else if(RNG.chance(0.4)){const pool=SECT_TYPES.filter(t=>t.id!==type.id);const k=1+RNG.int(0,1);for(let i=0;i<k&&pool.length;i++){also.push(pool.splice(RNG.int(0,pool.length-1),1)[0].n);}}
  const suffix=broad?'Tổng Môn':type.n;
  return {name:RNG.pick(SECT_PRE)+' '+suffix,tierId:tier,tier:SECT_TIER[tier],typeId:type.id,type:broad?'Tổng Hợp ('+type.n+' chủ tu)':type.n,typeDesc:broad?('Đại phái tổng hợp, kiêm tu vạn pháp, lấy '+type.n+' làm chủ. '+type.d):type.d,buff:type.buff,favor:type.favor,broad,also,pos:0,posName:SECT_POS[0],contrib:0};}

function practiceProf(){const p=S.prof;if(!p)return;advance(1);const gain=6+RNG.int(0,8)+p.rankId*2;p.xp+=gain;
  const income=Math.round(Math.pow(10,1+S.ri*0.15)*(1+p.rankId*0.4)*(p.id==='phu'?1.6:1));S.linhThach+=income;

  return{uid:++ITEM_SEQ,type:'treasure',name:`${RNG.pick(IT_PRE)} ${RNG.pick(IT_KIND)}`,grade:g,gradeName:gr.n,color:gr.c,power:TREASURE_POWER[g],mult:1+g*0.25,special,lifesave,desc:`Pháp bảo phẩm ${g} - ${gr.n}: ${TREASURE_POWER[g]}.`};}
function genHerb(worldTier){const g=rollGrade(worldTier);const age=Math.round(Math.pow(10,g)*(1+RNG.range(0,5)));const gr=PHAM[g-1];return{uid:++ITEM_SEQ,type:'herb',name:`${RNG.pick(HB_PRE)} ${RNG.pick(HB_KIND)}`,grade:g,gradeName:gr.n,color:gr.c,age,sentient:g>=5,desc:`Linh dược phẩm ${g}, ~${age.toLocaleString('vi-VN')} năm.`};}
const TE_HIGH=['Thần thông','Thời gian pháp','Luân hồi pháp','Hỗn Độn pháp','Nhân quả pháp']; // chỉ xuất hiện ở phẩm cao
function genTech(g,forceCat){let c=forceCat?(TE_CAT_MAP[forceCat]||RNG.pick(TE_CATS)):RNG.pick(TE_CATS);
  if(!forceCat&&g<4&&TE_HIGH.includes(c.n))c=RNG.pick(TE_CATS); // thần thông/đại đạo pháp cần phẩm cao mới ngộ được
  const gr=PHAM[g-1];const giai=RNG.int(0,2);
  const nm=RNG.chance(0.6)?`${RNG.pick(TE_PRE)} ${RNG.pick(TE_MID)} ${RNG.pick(TE_SUF)}`:`${RNG.pick(TE_PRE)} ${RNG.pick(TE_SUF)}`;
  return{uid:++ITEM_SEQ,type:'tech',name:nm,grade:g,gradeName:gr.n,giai,giaiName:TE_GIAI[giai],color:gr.c,tech:c.n,mult:0.6+g*0.25+giai*0.06,danger:c.danger?g:Math.max(0,g-3),desc:`${c.n} · phẩm ${g} ${TE_GIAI[giai]} — ${c.d}`};}
const FM_PRE=['Thái Ất','Cửu Cung','Chu Thiên','Hỗn Nguyên','Bát Quái','Vạn Kiếm','Huyền Thiên','Ngũ Hành','Âm Dương','Tru Tiên','Càn Khôn','Thái Cực'];

function genFormation(g){const gr=PHAM[g-1];return{uid:++ITEM_SEQ,type:'formation',name:`${RNG.pick(FM_PRE)} ${RNG.pick(FM_KIND)}`,grade:g,gradeName:gr.n,color:gr.c,mult:1+g*0.18,desc:`Trận đồ phẩm ${g}: bố trí để hộ thân, sát địch, tụ linh hoặc khốn địch.`};}
// Linh thú — 12 phẩm; cảnh giới linh thú tỉ lệ theo phẩm, có thể trợ chiến
function genBeast(g){const gr=PHAM[g-1];const ri=clamp((g-1)*8+RNG.int(0,7),1,100);const trait=RNG.pick(BS_TRAIT);return{uid:++ITEM_SEQ,type:'beast',name:`${RNG.pick(BS_PRE)} ${RNG.pick(BS_KIND)}`,grade:g,gradeName:gr.n,color:gr.c,ri,bond:0,mult:1+g*0.2,trait,desc:`Linh thú phẩm ${g}, tương đương ${realmName(ri,0)} — ${trait}. Đồng hành trợ chiến.`};}

const RAR={common:{n:'Phàm Thường',c:'#9e9e9e',w:1000},uncommon:{n:'Hiếm',c:'#4caf50',w:300},rare:{n:'Quý',c:'#03a9f4',w:80},epic:{n:'Sử Thi',c:'#9c27b0',w:20},legend:{n:'Truyền Thuyết',c:'#ff9800',w:4},mythic:{n:'Thần Thoại',c:'#ff5252',w:0.6}};
// curated: {id,rar,name,open,fx}
const OC=(id,rar,name,open,fx={})=>({id,rar,name,open,fx});
const ORIGINS=[
 OC('con_tho_san','common','Con Thợ Săn','Cha ngươi chết trong nanh vuốt một con yêu lang, để lại một cây cung gãy và một đứa con quen đói rét. Mười lăm năm trong rừng sâu đã tôi cho ngươi một thân thể rắn rỏi hơn bạn đồng lứa — nhưng ở [Khô Kiệt Tinh Lộ], khí huyết tốt cũng chỉ giúp ngươi chết chậm hơn một chút.',{hp:1.1}),
 OC('co_nhi','common','Cô Nhi Nhặt Rác','Ngươi không nhớ mặt cha mẹ. Ký ức đầu đời là mùi rác và những trận đòn. Ngươi sống tới hôm nay nhờ luôn cảnh giác, luôn tính trước một bước — và nhờ hiểu rất sớm rằng lòng tốt trên đời này luôn có giá của nó.',{flags:{wary:true}}),
 OC('con_nha_buon','common','Con Nhà Buôn Sa Cơ','Gia đình ngươi từng có một sạp hàng nhỏ, rồi mất sạch trong một đêm vì một món nợ của tu sĩ. Cha ngươi treo cổ, mẹ ngươi phát điên. Ngươi còn lại chút chữ nghĩa, chút tài tính toán, và ba mươi đồng bạc vụn giấu trong đế giày.',{items:{bac_vun:30},cmp:1.05,flags:{literate:true}}),
 OC('con_liet_si','common','Con Của Kẻ Tử Trận','Cha ngươi là một tán tu quèn, chết trong một cuộc tranh đoạt linh dược mà ngươi thậm chí không biết tên. Ngươi lớn lên với một cái tên, một nấm mồ, và một mối thù mơ hồ với cả thế giới tu tiên.',{karma:-1,flags:{vengeful:true}}),
 OC('be_chan_trau','common','Trẻ Chăn Trâu','Ngày ngày ngươi thổi sáo trên lưng trâu, ngắm mây trôi, chẳng vướng bận sự đời. Tâm tính ngươi hồn nhiên, đạo tâm thuần khiết như nước suối đầu nguồn — thứ mà vô số lão quái vật tu vạn năm phải thèm khát.',{dao:10,flags:{pure_heart:true}}),
 OC('linh_tho','common','Phu Đào Mỏ','Nửa đời ngươi sống trong lòng đất, đục từng vụn khoáng thạch dưới ánh đuốc leo lét. Bóng tối và gian khổ đã rèn cho ngươi một thân thể trâu bò và một cái gan lì đến vô cảm.',{hp:1.15,def:1.05}),
 OC('an_may','common','Tiểu Ăn Mày','Ngươi lớn lên đầu đường xó chợ, mặt dày mày dạn, giỏi luồn lách và nịnh nọt. Người ta khinh ngươi, nhưng chính lũ ăn mày lại sống dai nhất khi tai họa ập tới.',{flags:{streetwise:true}}),
 OC('tho_ren','common','Học Việc Lò Rèn','Ngươi lớn lên bên lò rèn, quen với lửa đỏ và tiếng búa. Bàn tay ngươi chai sạn, thân thể cứng cáp, và ngươi hiểu một chân lý giản dị: thứ gì cũng phải qua lửa mới thành khí.',{hp:1.05,def:1.1}),
 OC('con_do_te','common','Con Nhà Đồ Tể','Ngươi lớn lên trong mùi máu tanh và tiếng kêu của súc vật. Tay ngươi không run khi cầm dao. Người trong thôn tránh ngươi, nhưng trong tu tiên giới, kẻ dám ra tay mới sống được.',{atk:1.1,flags:{cold_blooded:true}}),
 OC('tieu_tac','common','Đạo Chích Vặt','Ngón tay ngươi nhanh, bước chân ngươi êm. Ngươi sống nhờ những thứ thó được từ túi kẻ khác. Nghề trộm cắp hèn mọn ấy dạy ngươi hai điều: quan sát, và biến mất đúng lúc.',{spd:1.1,flags:{thief:true}}),
 OC('con_thay_lang','common','Con Thầy Lang','Cha ngươi bốc thuốc dạo, ngươi theo phụ từ bé. Ngươi phân biệt được cỏ lành cỏ độc, biết chút dược lý dân gian — cái nền mỏng manh cho con đường đan đạo sau này.',{flags:{herblore:true}}),
 OC('be_cau_bo','common','Đứa Trẻ Bị Bỏ Rơi','Ngươi bị vứt trước cổng thôn từ khi còn đỏ hỏn, quấn trong một tấm vải cũ không dấu vết. Không ai biết ngươi từ đâu tới. Có lẽ chính ngươi cũng không nên biết.',{flags:{unknown_origin:true}}),

 OC('do_de_bo_roi','uncommon','Đệ Tử Bị Trục Xuất','Ngươi từng khổ luyện ba năm trong một tông môn nhỏ, để rồi bị đuổi cổ với hai chữ "phế tài". Nhưng những gì học lỏm được trong ba năm đó — dẫn khí, điều tức, nhận biết linh mạch — vẫn nằm trong xương tủy ngươi.',{cult:1.1,flags:{ex_disciple:true}}),
 OC('than_dong','uncommon','Thần Đồng Yểu Mệnh','Từ nhỏ ngươi đã thông tuệ khác thường, ba tuổi thuộc thơ, bảy tuổi luận đạo. Nhưng một thầy tướng số phán ngươi "mệnh yểu khó qua hai mươi". Cả thôn nhìn ngươi như nhìn một ngọn nến sắp tắt.',{cmp:1.25,lifeMod:-10}),
 OC('con_lai_yeu','uncommon','Con Lai Yêu Tộc','Trong huyết mạch ngươi chảy một dòng máu không thuần: mẹ ngươi là người, còn cha... không ai dám nói. Thân thể ngươi mạnh mẽ dị thường, nhưng đôi lúc trong gương, ngươi thấy đồng tử mình co lại thành khe.',{hp:1.2,atk:1.1,karma:-1,flags:{demon_blood:true}}),
 OC('be_song_sot','uncommon','Kẻ Sống Sót Duy Nhất','Một đêm, cả thôn ngươi bị đồ sát sạch — đàn ông, đàn bà, trẻ con. Sáng ra chỉ còn mình ngươi bò ra từ đống tro. Không ai biết vì sao ngươi sống. Kể cả ngươi. Nhất là ngươi.',{karma:1,flags:{lone_survivor:true,vengeful:true}}),
 OC('linh_dong','uncommon','Linh Đồng Bẩm Sinh','Từ nhỏ ngươi đã thấy những thứ người khác không thấy: bóng người mờ ảo bên giếng, ánh sáng lập lòe trên mộ. Người ta bảo ngươi có "âm dương nhãn". Ngươi chỉ biết mình cô độc giữa hai thế giới.',{soul:1,flags:{spirit_sight:true}}),
 OC('con_luyen_dan_su','uncommon','Con Của Luyện Đan Sư','Cha ngươi là một đan sư lang thang, chết vì nợ nần và một mẻ đan nổ lò. Ông để lại cho ngươi một quyển đan phương cháy xém và một chiếc Đan Lô cũ — di sản đủ để giết ngươi, cũng đủ để đổi đời ngươi.',{flags:{hasFurnace:true,herblore:true},items:{thanh_linh:2}}),
 OC('vo_gia_lac_loi','uncommon','Võ Giả Lạc Đạo','Ngươi đã luyện võ phàm tục đến cực hạn — Võ Tôn, một quyền nứt đá. Nhưng ngươi nhận ra: dù mạnh đến đâu, phàm nhân cũng chỉ là con kiến dưới chân tiên nhân. Ngươi đến đây để bước lên con đường thật sự.',{hp:1.25,atk:1.2,flags:{martial_base:true}}),
 OC('con_the_gia_sa_sut','uncommon','Hậu Duệ Thế Gia Sa Sút','Gia tộc ngươi từng hiển hách một phương, nay chỉ còn một tòa nhà mục nát và những bài vị phủ bụi. Ngươi thừa hưởng lễ nghi, khí độ, và một nỗi khát khao phục hưng cháy âm ỉ trong lòng.',{cmp:1.1,items:{bac_vun:80},flags:{noble_manner:true}}),
 OC('nu_vu','uncommon','Truyền Nhân Nữ Vu','Bà ngoại ngươi là vu nữ cuối cùng của một bộ tộc đã tuyệt diệt. Trước khi chết, bà truyền cho ngươi cách trò chuyện với âm linh và đọc điềm trời — những kỹ thuật cổ xưa mà tu tiên chính đạo đã quên.',{soul:1,cmp:1.1,flags:{spirit_sight:true,fortune_sense:true}}),

 OC('huyet_mach_co','rare','Huyết Mạch Cổ Ngủ Say','Đêm ngươi sinh ra, một tiếng gầm câm lặng vang trong huyết quản ngươi. Ngươi mang một huyết mạch đã tuyệt diệt từ thời hồng hoang — nó đang ngủ say. Đánh thức nó, ngươi sẽ có tư cách vạn kẻ mơ ước; và cả kẻ thù của cả một dòng máu đã bị tận diệt.',{hp:1.3,flags:{ancient_blood:true},hidden:{name:'Huyết mạch cổ ngủ say',desc:'Một dòng máu tuyệt diệt thời hồng hoang đang say ngủ trong ngươi.'}}),
 OC('tan_hon','rare','Tàn Hồn Cường Giả','Trong nguyên thần ngươi có một mảnh ký ức không thuộc về mình — hình ảnh một trận chiến giữa các vì sao, một cái tên ngươi chưa từng nghe, và một cảm giác căm hận sâu tựa vực thẳm. Ai đó cực mạnh đã gửi tàn hồn vào ngươi.',{soul:3,flags:{remnant_soul:true},hidden:{name:'Tàn hồn cường giả',desc:'Một mảnh ký ức của kẻ cực mạnh đã chết.'}}),
 OC('gia_toc_tai_phu','rare','Hậu Duệ Gia Tộc Tài Phú','Gia tộc ngươi sa cơ, nhưng trước khi diệt vong, tổ tiên đã giấu một kho tàng và một tia khí vận gia tộc vào huyết mạch hậu nhân. Ngươi sinh ra dưới một ngôi sao sáng — và một tấm bản đồ kho báu chờ ngươi giải mã.',{luck:3,linhThach:5000,treasureGrade:2,items:{bac_vun:500},flags:{rich_heir:true}}),
 OC('thien_linh_can','rare','Mang Thiên Linh Căn','Khi lão đạo sĩ mù đặt tay lên cổ tay ngươi, ông run bần bật: "Thiên Linh Căn... đơn nhất, thuần khiết... Ở cái nơi chó ăn đá gà ăn sỏi này?!" Ngươi là thiên tài trăm năm khó gặp — và mọi tông môn sẽ tranh nhau, hoặc giết nhau, vì ngươi.',{rootId:'thien',att:3}),
 OC('di_hoa_the','rare','Thân Mang Dị Hỏa','Trong đan điền ngươi cháy một ngọn lửa không tắt — một dị hỏa bẩm sinh. Ngươi có thể nuốt lửa mà không bỏng, và mọi luyện đan sư nhìn thấy ngươi đều đỏ mắt thèm khát báu vật trong người ngươi.',{flags:{hasDiHoa:true,hasFurnace:true},atk:1.15}),
 OC('con_cua_ma_ton','rare','Hậu Nhân Ma Tôn','Tổ tiên ngươi là một Ma Tôn khét tiếng đã bị chính đạo vây giết. Ngươi thừa hưởng ma khí thâm hậu, một công pháp tà đạo khắc trong huyết mạch — và vô số kẻ thù chỉ chờ ngươi lộ diện để chém tận gốc.',{atk:1.3,karma:-5,att:4,flags:{demon_heir:true}}),

 OC('thien_dao_ruong_bo','epic','Thiên Đạo Kiếp Trước Ruồng Bỏ','Kiếp trước, ngươi từng nghịch thiên cải mệnh, và Thiên Đạo đã ghi hận. Kiếp này ngươi chào đời dưới một vì sao đen — mưa đá rơi ngày ngươi sinh, mẹ ngươi tắt thở khi vừa thấy mặt con. Người trong thôn gọi ngươi là "đứa trẻ điềm gở". Nhưng sâu trong hồn ngươi, một tiếng cười khẽ vang lên: Thiên Đạo càng ghét bỏ, luật trời càng khó áp lên kẻ đã bị ruồng bỏ.',{luck:0,karma:-10,flags:{heaven_forsaken:true},hidden:{name:'Bị Thiên Đạo ruồng bỏ',desc:'Khí vận đen tối bao trùm, nhưng nhân quả của trời khó đè lên kẻ đã bị bỏ rơi.'}}),
 OC('gioi_chi_lao_hon','epic','Chủ Nhân Giới Chỉ Cổ','Chiếc nhẫn cũ trên tay ngươi — di vật duy nhất cha mẹ để lại — đêm nay bỗng ấm nóng. Một giọng nói già nua khàn khàn vang lên ngay trong đầu ngươi, nơi không ai khác nghe được: "Rốt cuộc cũng đợi được một đứa đủ tư cách... Nhóc con, ngươi có muốn nghịch thiên không?"',{soul:2,flags:{has_ring:true},hidden:{name:'Cổ giới chỉ có lão hồn',desc:'Một Trữ Vật Giới Chỉ chứa không gian riêng và tàn niệm một cường giả.'}}),
 OC('con_cung_thanh_dia','epic','Thánh Tử Đầu Thai','Trong giấc mơ, ngươi thấy mình mặc bạch bào đứng trên chín tầng mây, vạn người quỳ lạy. Rồi một nhát kiếm xuyên tim, tất cả vỡ tan. Ngươi giật mình tỉnh dậy trong thân xác một đứa trẻ nghèo — nhưng ký ức về vinh quang và cái chết của kiếp Thánh Tử vẫn còn nóng hổi, cùng một gia sản kếch xù đang chờ ngươi tìm về.',{luck:4,soul:2,linhThach:20000,treasureGrade:3,cmp:1.3,flags:{reborn_saint:true},hidden:{name:'Ký ức Thánh Tử',desc:'Ký ức về vinh quang và cái chết của kiếp trước.'}}),
 OC('ma_chung','epic','Bị Gieo Ma Chủng','Từ nhỏ ngươi hay mơ thấy một con mắt đỏ mở ra trong lồng ngực mình. Ngươi không biết có kẻ đã gieo một Ma Chủng vào thân ngươi từ thuở sơ sinh — nó cho ngươi sức mạnh tà đạo nhanh đến chóng mặt, và một ngày, nó sẽ nuốt chửng ngươi để tái sinh. Đồng hồ đã bắt đầu đếm ngược.',{atk:1.4,cult:1.3,karma:-6,flags:{demon_seed:true},hidden:{name:'Ma chủng trong thân',desc:'Một hạt giống hắc ám chực chờ nuốt chửng ngươi để tái sinh.'}}),
 OC('hondon_can','epic','Hỗn Độn Linh Căn','Từ khi lọt lòng, linh khí trời đất tự động vây quanh ngươi như bị hút vào một khoảng không vô đáy. Không ai biết đó là Hỗn Độn Linh Căn — thứ dung hợp vạn hệ, truyền thuyết trong truyền thuyết. Nhưng thứ gì tỏa sáng quá rực giữa đêm đen, mọi ánh mắt trong bóng tối đều sẽ quay lại.',{rootId:'hondon',att:8,karma:-4,flags:{chaos_root:true}}),

 OC('de_hon','legend','Tàn Hồn Cổ Đế','Ngươi là nơi trú ngụ của một mảnh chân hồn của một vị Cổ Đế đã tử chiến nơi tận cùng vũ trụ. Trong đầu ngươi thi thoảng vang lên những đạo lý mà cả thánh nhân cũng phải quỳ nghe. Sức mạnh và kẻ thù của ngươi, đều ở tầm vũ trụ.',{soul:6,cmp:1.5,karma:-5,att:6,treasureGrade:4,flags:{emperor_soul:true}}),
 OC('thien_menh_chi_tu','legend','Thiên Mệnh Chi Tử','Ngươi là đứa con được thiên mệnh chọn của thời đại này. Nơi ngươi đi qua, hoa nở trái mùa, dị tượng giáng lâm. Vô số cơ duyên đang chờ ngươi — cùng vô số yêu nghiệt, cổ lão, và cả những kẻ chuyên săn giết "thiên mệnh chi tử" để đoạt lấy khí vận.',{luck:5,cmp:1.4,att:10,flags:{chosen_one:true}}),
 OC('dao_the','legend','Đạo Thể Thiên Sinh','Ngươi sinh ra đã là một phần của Đạo. Nghe gió thổi, ngươi ngộ ra kiếm ý; nhìn nước chảy, ngươi thấu lẽ vô thường. Ngộ tính của ngươi cao đến mức đáng sợ — nhưng con đường càng gần Đạo, cô độc càng thấu xương.',{theChatName:'Đạo Thể',cmp:2.0,cult:1.4,luck:3,flags:{dao_body:true}}),

 OC('van_co_de_nhat','mythic','Vạn Cổ Đệ Nhất Chuyển Thế','Bóng tối. Rồi một tiếng vọng từ vô tận thời gian: "Ngươi đã ngủ đủ lâu rồi." Ngươi mở mắt — thân thể nhỏ bé, yếu ớt, xa lạ. Ngươi từng là kẻ mạnh nhất vạn cổ, tự phong ấn để trốn một kiếp nạn kinh thiên. Nay tỉnh lại, gần như quên sạch, chỉ còn một bản năng gào thét trong xương tủy: mạnh lên, trước khi kẻ thù tìm ra.',{soul:12,cmp:2.0,hp:2,atk:2,luck:5,att:25,karma:-12,flags:{strongest_reborn:true}}),
 OC('hong_mong_the','mythic','Hồng Mông Chí Thể','Ngươi được sinh ra từ một luồng khí Hồng Mông nguyên thủy sót lại nơi khe nứt của vũ trụ — truyền thuyết trong truyền thuyết, có lẽ chưa từng xuất hiện. Thân thể ngươi là chí bảo, huyết mạch ngươi là đại đạo. Cả thiên địa cũng phải nín thở khi nhắc tới ngươi.',{theChatName:'Hồng Mông Chí Thể',hp:3,atk:3,cult:2,soul:8,att:15,karma:-8,flags:{hongmeng_body:true}}),

// Fill tới 100 bằng generator (mỗi cái vẫn có narrative riêng)
const ROLE=[['Con Nhà Nông',{hp:1.05}],['Tiều Phu',{hp:1.05}],['Con Nhà Chài',{spd:1.1}],['Học Đồ Nghèo',{cmp:1.1,flags:{literate:true}}],['Nô Bộc Bỏ Trốn',{karma:-2,flags:{vengeful:true}}],['Ca Kỹ Hát Rong',{flags:{charmer:true}}],['Lính Thú Đào Ngũ',{atk:1.05,flags:{tactician:true}}],['Trẻ Coi Nghĩa Địa',{flags:{fearless:true}}],['Con Nhà Thợ Mộc',{flags:{pattern_sense:true}}],['Tiểu Nhị Tiệm Thuốc',{flags:{herblore:true}}],['Con Nhà Hải Thương',{items:{bac_vun:100},flags:{worldly:true}}],['Đầu Lĩnh Trẻ Trộm Cắp',{flags:{leader:true,deceiver:true},karma:-1}],['Con Rơi Thành Chủ',{items:{bac_vun:100},flags:{hidden_lineage:true}}],['Thợ Săn Yêu Thú',{atk:1.15,flags:{beast_hunter:true}}],['Truyền Nhân Trận Sư',{flags:{array_talent:true}}],['Đạo Cô Quét Sân',{cmp:1.05,flags:{pure_heart:true}}],['Con Thầy Bói',{flags:{fortune_sense:true}}],['Kẻ Vượt Ngục',{karma:-2,flags:{knows_secret:true}}],['Con Nhà Dệt Vải',{cmp:1.05}],['Đào Kép Gánh Xiếc',{spd:1.15}]];
const CIRC=['sống sót qua một trận đói kinh hoàng','lớn lên bên một dòng sông chết','mồ côi từ tấm bé','bị cả thôn xa lánh vì một lời nguyền','từng chứng kiến một tu sĩ giết người ngay trước mắt','bị bán làm nô rồi trốn thoát','được một lão ăn mày kỳ lạ dạy dỗ','nhặt được một mảnh ngọc bội không rõ nguồn gốc','mang trên người một vết bớt hình rồng','hay mơ những giấc mơ về kiếp trước'];
const FORT=[['Mảnh Ngọc Bội Lạ','Một mảnh ngọc bội ấm áp, đôi khi tự phát sáng.'],['Giấc Mơ Tiền Kiếp','Những mảnh ký ức mơ hồ của một kiếp sống khác.'],['Vết Bớt Huyết Mạch','Một dấu vết huyết mạch cổ đang ngủ dưới da ngươi.'],['Lão Nhân Trong Mộng','Một bóng người già nua thi thoảng chỉ dạy ngươi trong mơ.'],['Hạt Giống Lạ','Một hạt giống đen ai đó gieo vào thân ngươi từ nhỏ.'],['Cổ Vật Nuôi Dưỡng','Một cổ vật rơi bên đường lặng lẽ nuôi ngươi bằng linh khí.']];
const RAR_HOOK={common:'Ngươi sinh ra tầm thường như hạt cát giữa sa mạc.',uncommon:'Số phận ngươi vốn đã lệch khỏi lối mòn phàm nhân.',rare:'Trời đất dường như đã đánh dấu ngươi từ khi lọt lòng.'};
(function fill(){let i=0;const rar=['common','common','common','uncommon','rare'];
 while(ORIGINS.length<100){const R=makeRNG(9137+i*31);const role=R.pick(ROLE);const circ=R.pick(CIRC);const rr=rar[i%rar.length];const fx=JSON.parse(JSON.stringify(role[1]));
  const hasFort=rr!=='common'||R.chance(0.3);let hidden=null;if(hasFort){const f=R.pick(FORT);hidden={name:f[0],desc:f[1]};fx.hidden=hidden;}
  const nm=`${role[0]} (${circ.split(' ').slice(0,2).join(' ')}…)`;
  const open=`${RAR_HOOK[rr]}\n\nNgươi là ${role[0].toLowerCase()}, ${circ}. Tuổi thơ ngươi không có gì ngoài gian khổ và bản năng sinh tồn.${hidden?` Nhưng sâu trong ngươi ẩn giấu một điều lạ: ${hidden.desc}`:''}\n\nDù quá khứ thế nào, hiện tại ngươi vẫn chỉ là một thiếu niên mười lăm tuổi đứng ở khởi điểm thấp nhất của một thế giới tàn khốc — [Khô Kiệt Tinh Lộ].`;
  ORIGINS.push(OC('gen_'+i,rr,nm,open,fx));i++;}
})();
function rollOriginHand(n){const pool=ORIGINS.slice();const hand=[];for(let i=0;i<n&&pool.length;i++){const w=pool.map(o=>[RAR[o.rar].w,o]);const pick=RNG.weight(w);hand.push(pick);pool.splice(pool.indexOf(pick),1);}return hand;}
function rollRandomOrigin(){return RNG.weight(ORIGINS.map(o=>[RAR[o.rar].w,o]));}

/* =========================================================================
   STATE
   ========================================================================= */
let S=null,LOG=[];
function newState(originId){
  const seed=(Date.now()^(Math.random()*1e9))>>>0;RNG=makeRNG(seed);THECHAT=buildTheChat();
  const root=rollRoot();const tc=rollTheChat();const luckId=RNG.weight([[12,0],[60,1],[20,2],[6,3],[1.8,4],[0.2,5]]);
  const o=ORIGINS.find(x=>x.id===originId);const fx=o.fx||{};
  S={seed,ver:1,name:o.name.split(' ')[0]==='Con'?'Vô Danh':'Vô Danh',
    origin:o.id,originName:o.name,originRar:o.rar,
    ri:0,si:0,progress:0,soul:0+(fx.soul||0),
    hp:100,hpMax:100,linhLuc:100,dao:50+(fx.dao||0),taint:0,
    life:(80-15)+(fx.lifeMod||0),lifeMax:80+(fx.lifeMod||0),age:15,
    linhThach:fx.linhThach||0,
    root:fx.rootId?LINH_CAN.find(x=>x.id===fx.rootId):root,rootShown:false,
    tc:fx.theChatName?(THECHAT.find(x=>x.n===fx.theChatName)||tc):tc,tcShown:false,
    luck:fx.luck!=null?fx.luck:luckId,luckShown:false,
    cmp:fx.cmp||1,hpMul:fx.hp||1,atkMul:fx.atk||1,defMul:fx.def||1,cultMul:fx.cult||1,
    fame:0,karma:fx.karma||0,att:fx.att||0,
    inv:{},treasures:[],techs:[],tech:null,arrays:[],beasts:[],prof:null,daolu:null,natal:null,laws:[],cave:null,tower:null,ownForce:null,disciple:null,rival:null,achievements:[],
    hidden:fx.hidden?{...fx.hidden,shown:false}:null,mutations:[],
    world:{tier:1,name:'[Khô Kiệt Tinh Lộ]',region:'Thôn Khô Thạch',machId:1,qiMod:1,secretRealm:0},
    sect:null,npcs:{},ledger:[],flags:{...(fx.flags||{})},
    time:{y:0,m:1,d:1},stats:{kills:0,break:0,pills:0,ngodao:0,betray:0},
    scene:null,alive:true,cause:null,
  };
  // Chủng tộc: đa số Nhân tộc, hiếm khi Yêu/Ma/Vu/Quỷ/Long
  const race=pickRace(S.flags);S.race=race.id;S.raceName=race.n;const rf=race.fx||{};
  if(rf.hp)S.hpMul*=rf.hp;if(rf.atk)S.atkMul*=rf.atk;if(rf.cult)S.cultMul*=rf.cult;if(rf.cmp)S.cmp*=rf.cmp;
  if(rf.lifeMul){S.lifeMax=Math.round(S.lifeMax*rf.lifeMul);S.life=Math.round(S.life*rf.lifeMul);}
  if(race.soulAdd)S.soul+=race.soulAdd;if(race.karma)S.karma+=race.karma;if(race.att)S.att+=race.att;
  if(rf.nosoul)S.flags.vu_nosoul=true;
  S.hpMax=Math.round(100*S.hpMul);S.hp=S.hpMax;
  if(fx.items)for(const k in fx.items)S.inv[k]=(S.inv[k]||0)+fx.items[k];
  if(fx.treasureGrade)S.treasures.push(genTreasure(fx.treasureGrade));
  LOG=[];
  applyLegacy(); // di sản kiếp trước (nếu vừa trùng sinh)
}
// ===== TRÙNG SINH: giữ lại 1 di sản (công pháp / khí vận / pháp bảo) qua kiếp sau =====
function applyLegacy(){let lg;try{lg=JSON.parse(LS.getItem(LEGACY_KEY)||'null');}catch(e){lg=null;}if(!lg)return;LS.removeItem(LEGACY_KEY);S.flags.reborn=true;
  if(lg.type==='tech'&&lg.data){S.techs.push(lg.data);log('【TRÙNG SINH】 Ký ức kiếp trước bừng tỉnh — ngươi vẫn khắc cốt công pháp «'+lg.data.name+'».','good');}
  else if(lg.type==='treasure'&&lg.data){S.treasures.push(lg.data);log('【TRÙNG SINH】 Pháp bảo «'+lg.data.name+'» xuyên qua luân hồi, theo ngươi tái thế.','good');}
  else if(lg.type==='luck'){S.luck=clamp(lg.data|0,0,5);S.luckShown=true;log('【TRÙNG SINH】 Khí vận kiếp trước vẫn đeo bám: '+LUCK[S.luck].n+'.','good');}
}
function computeRebirth(){if(S._reborn)return S._reborn;
  let ch=0.04+luckOf().id*0.02+(S.hidden?0.05:0)+(S.dao>=70?0.03:0)+(S.stats.ngodao>=3?0.03:0);
  if(S.flags&&S.flags.reincarnation)ch=1; // vài cơ duyên/thể chất bảo đảm trùng sinh
  const ok=RNG.chance(clamp(ch,0.02,0.95));let legacy=null;
  if(ok){const opts=[];if(S.tech)opts.push({type:'tech',data:S.tech,desc:'công pháp «'+S.tech.name+'»'});
    const bestT=(S.treasures||[]).slice().sort((a,b)=>b.grade-a.grade)[0];if(bestT)opts.push({type:'treasure',data:bestT,desc:'pháp bảo «'+bestT.name+'»'});
    opts.push({type:'luck',data:Math.max(2,S.luck),desc:'khí vận «'+LUCK[clamp(Math.max(2,S.luck),0,5)].n+'»'});
    legacy=RNG.pick(opts);try{LS.setItem(LEGACY_KEY,JSON.stringify({type:legacy.type,data:legacy.data}));}catch(e){}}
  S._reborn={ok,legacy};return S._reborn;
}
function save(){try{LS.setItem(SAVE_KEY,JSON.stringify({S,LOG}));}catch(e){}}
function load(){try{const o=JSON.parse(LS.getItem(SAVE_KEY));if(!o||!o.S)return false;S=o.S;LOG=o.LOG||[];RNG=makeRNG((S.seed^(Date.now()&0xffff))>>>0);THECHAT=buildTheChat();return true;}catch(e){return false;}}
function hasSave(){try{return !!LS.getItem(SAVE_KEY);}catch(e){return false;}}
function wipe(){try{LS.removeItem(SAVE_KEY);}catch(e){}}
function log(t,c){LOG.push({t,c:c||''});if(LOG.length>300)LOG.shift();}

/* =========================================================================
   HỆ THỐNG LÕI
   ========================================================================= */
function luckOf(){return LUCK[clamp(S.luck,0,5)];}
function addKarma(n,tag){S.karma+=n;if(tag)S.ledger.push({n,tag,t:{...S.time}});if(tag)log(`${n>=0?'Tích':'Gánh'} ${Math.abs(n)} nhân quả (${tag}).`,n>=0?'good':'bad');}
function addFame(n){S.fame=clamp(S.fame+n,-100,1000);}
function advance(years){S.time.d+=Math.round(years*360);while(S.time.d>360){S.time.d-=360;S.time.y++;}S.age+=years;S.life-=years;
  // thế giới tự diễn tiến bất kể người chơi: linh khí hồi về mức nền, bí cảnh dần đóng
  if(S.world.qiMod&&S.world.qiMod!==1){S.world.qiMod+=(1-S.world.qiMod)*Math.min(1,years*0.12);if(Math.abs(S.world.qiMod-1)<0.03)S.world.qiMod=1;}
  if(S.world.secretRealm>0){S.world.secretRealm-=years;if(S.world.secretRealm<=0){S.world.secretRealm=0;log('『THẾ GIỚI』 Cửa bí cảnh cổ đã khép lại. Cơ duyên trong đó, từ nay thành truyền thuyết.','lore');}}
  if(S.rival)rivalGrow(years); // đối thủ mệnh định cũng tu luyện, cũng đột phá
  if(S.life<=0&&S.alive){S.alive=false;S.cause='Thọ nguyên cạn kiệt. Ngươi ngồi kiết già, hóa thành tro tàn theo lẽ trời đất.';log('☠ Thọ nguyên cạn.',' death');}}
function deductLife(y,r){S.life-=y;if(r)log(`Thọ nguyên hao ${Math.round(y)} năm (${r}).`,'bad');if(S.life<=0&&S.alive){S.alive=false;S.cause='Thọ nguyên khấu tận vì '+(r||'hao tổn')+'.';}}
function machQi(){return MACH_QI[clamp((S.world.machId||1)-1,0,11)];}
function cultRate(){const tech=S.tech?(0.6+S.tech.grade*0.25):0.3;const taint=Math.max(0.2,1-S.taint*0.02);const diff=S.ri<=0?0.8:(1+S.ri*0.25)*Math.pow(1.06,S.ri);
  return 6*(S.root.spd)*(S.cultMul)*(S.tc.buff.cult||1)*machQi()*(S.world.qiMod||1)*sectCultBonus()*(1+profBonus('dan'))*(S.daolu?1.12:1)*tech*taint/diff;}
function cultivate(years,hard){const gain=cultRate()*years*(hard?2.6:1);S.progress=Math.min(1,S.progress+gain);
  const taint=(1-[0.5,0.55,0.65,0.72,0.8,0.86,0.9,0.93,0.95,0.97,0.985,1][clamp((S.world.machId||1)-1,0,11)])*0.5*years*(hard?2.5:1);S.taint+=taint;
  advance(years*(hard?2.6:1));if(hard)deductLife(years*0.6*(1-profBonus('y')),'khổ tu');
  if(S.taint>40){deductLife((S.taint-40)*0.1*years,'chướng tính ăn mòn kinh mạch');}
  return gain;}
function nextTarget(){if(S.ri<=0)return{ri:1,si:0,major:true,name:'Luyện Khí Nhất tầng'};const r=REALMS[S.ri-1];if(S.si<r.subs.length-1)return{ri:S.ri,si:S.si+1,major:false,name:r.name+' '+r.subs[S.si+1]};if(S.ri>=100)return null;const nr=REALMS[S.ri];return{ri:S.ri+1,si:0,major:true,name:nr.name+' '+nr.subs[0]};}
function breakChance(){const tg=nextTarget();if(!tg)return 0;const tr=REALMS[tg.ri-1];let p=tr.breakBase;if(!tg.major)p=Math.min(0.95,p+0.25);
  p+=Math.min(0.2,S.soul*0.01);p+=(S.flags.phaCanh||0)+(S.flags.ngoDao||0);p+=(luckOf().fort-1)*0.03;p+=(S.cmp-1)*0.1;
  p-=Math.min(0.4,S.taint*0.01);if(S.karma<0)p-=Math.min(0.15,-S.karma*0.003);if(S.dao<30)p-=0.1;
  return clamp(p,0.01,0.98);}
// THIÊN KIẾP + TÂM MA — độ kiếp khi đại đột phá cảnh cao (Kim Đan trở lên)
function heavenTribulation(ri){
  const bolts=Math.min(9,2+Math.floor(ri/6));
  let def=S.soul*0.4+(S.dao-50)*0.02+(S.tc.buff.def||1-1)*2+S.treasures.reduce((a,t)=>a+Math.log10(t.mult||1),0)+profBonus('tran')*3;
  log(`☇ THIÊN KIẾP giáng lâm! ${bolts} đạo lôi kiếp xé nát tầng trời, khóa chặt lấy ngươi.`,'warn');
  // Tâm ma kiếp: đạo tâm thấp dễ tự bạo
  if(S.dao<45&&RNG.chance(0.45)){
    if(RNG.chance(clamp(0.55-S.dao*0.009,0.05,0.8))){S.alive=false;S.cause='Tâm ma bùng phát giữa lôi kiếp — ảo cảnh nuốt chửng đạo tâm, ngươi tự bạo mà vong.';log('☠ TÂM MA KIẾP — đạo tâm sụp đổ!','death');return false;}
    S.taint+=8;log('Tâm ma trỗi dậy trong kiếp vân, ngươi cắn răng trấn áp — chướng tính tăng.','warn');
  }
  let hit=0;for(let i=0;i<bolts;i++){if(RNG.chance(clamp(0.14-def*0.006,0.02,0.5)))hit++;}
  if(hit>=Math.ceil(bolts*0.6)){S.alive=false;S.cause=`Không chống nổi ${bolts} đạo thiên lôi, thân tử đạo tiêu giữa biển sấm.`;log('☠ ĐỘ KIẾP THẤT BẠI!','death');return false;}
  if(hit>0){deductLife(hit*3,'thương tổn lôi kiếp');S.hp=Math.max(1,S.hp-hit*8);log(`Ngươi trúng ${hit} đạo lôi, trọng thương nhưng gắng gượng qua kiếp.`,'bad');}
  S.hpMax=Math.round(S.hpMax*1.04);S.hp=S.hpMax;log('✦ Vượt qua thiên kiếp! Lôi kiếp tôi luyện nhục thân, ngươi thoát thai hoán cốt, mạnh hơn xưa.','good');return true;
}
function attemptBreak(){const tg=nextTarget();if(!tg){log('Ngươi đã ở tận cùng Đại Đạo.','lore');return;}
  if(S.progress<1){log('Tu vi chưa đủ, đột phá lúc này chỉ chuốc tẩu hỏa.','warn');return;}
  const p=breakChance();log(`Bắt đầu đột phá ${tg.name}... (tỉ lệ ${Math.round(p*100)}%)`,'');
  delete S.flags.phaCanh;delete S.flags.ngoDao;
  if(RNG.chance(p)){S.ri=tg.ri;S.si=tg.si;S.progress=0;S.stats.break++;if(S.natal)S.natal.bond=Math.min(100,(S.natal.bond||0)+3);log(`✦ Đột phá thành công! ${tg.name}.`,'good');
    if(tg.major){const nr=REALMS[tg.ri-1];const gain=Math.max(nr.life-S.lifeMax,nr.life*0.1);S.life+=gain;S.lifeMax=Math.max(S.lifeMax,nr.life);log(`Thọ nguyên tăng ${Math.round(gain)} năm.`,'good');log('【'+nr.name+'】'+realmPower(tg.ri),'lore');
      if(tg.ri>=3){if(!heavenTribulation(tg.ri))return;} // Kim Đan trở lên phải độ thiên kiếp
      rollMutation();}
    else if(RNG.chance(0.25))rollMutation();
  }else{S.progress=Math.max(0,S.progress-0.3);S.taint+=3;const major=tg.major;const deathRisk=(major?0.12:0.03)+(S.dao<30?0.06:0)+S.taint*0.002;
    if(RNG.chance(deathRisk)){S.alive=false;S.cause=`Tẩu hỏa nhập ma khi đột phá ${tg.name}. Kinh mạch nổ tung, nguyên thần tan biến.`;log('☠ TẨU HỎA NHẬP MA!','death');}
    else{deductLife((major?20:5)+RNG.int(0,15),'phản phệ đột phá');log('Đột phá thất bại! Ngươi hộc máu, đạo cơ tổn thương.','bad');}}
}
const MUT=[['Đồng tử co như rắn',false,'Ánh mắt khiến người thường khiếp sợ.'],['Da mọc vảy mỏng',false,'Phòng ngự tăng, ngày càng ít giống người.'],['Thần thức nhạy bén dị thường',true,'Nguyên thần +1.'],['Huyết mạch cổ thức tỉnh một phần',true,'Khí huyết mạnh lên.'],['Tâm ma nhen nhóm',false,'Đạo tâm bất ổn, dễ tẩu hỏa.'],['Một phần linh hồn hóa dị vật',false,'Mạnh hơn nhưng nhân tính hao mòn.'],['Mọc một chiếc sừng nhỏ trên trán',false,'Yêu tộc huyết mạch trỗi dậy, người thường xa lánh.'],['Lưng nhú đôi cánh xương mỏng',true,'Thân pháp nhẹ nhàng hơn, nhưng khó giấu thân phận.'],['Máu chuyển sắc vàng kim',true,'Khí huyết cường hãn, vết thương mau lành.'],['Nghe được tiếng lòng vạn vật',true,'Ngộ tính bén hơn, nhưng tạp âm thiên địa quấy nhiễu đạo tâm.'],['Bóng của ngươi bắt đầu tự cử động',false,'Một thứ gì đó đang thành hình trong hồn ngươi.'],['Xương cốt trong suốt như lưu ly',true,'Thân thể thuần khiết hơn, ít nhiễm chướng tính.'],['Không còn cảm thấy đói khát hay mỏi mệt',false,'Càng gần tiên, càng xa người.'],['Tóc bạc trắng dù còn trẻ',false,'Dấu vết của việc nghịch thiên cải mệnh.']];
function rollMutation(){const m=RNG.pick(MUT);S.mutations.push(m[0]);if(m[0].includes('Thần thức'))S.soul+=1;if(m[0].includes('Tâm ma'))S.dao=Math.max(0,S.dao-10);if(m[0].includes('Huyết mạch'))S.hpMax=Math.round(S.hpMax*1.05);log(`⚝ Dị biến khi đột phá: ${m[0]}. ${m[2]}`,m[1]?'good':'warn');}
// Không cơ duyên miễn phí
function grantWithPrice(name,mag){log('✦ Ngươi có được: '+name+'.','good');const roll=RNG.next();if(roll<0.4){deductLife(mag*(2+RNG.int(0,3)),'cái giá của cơ duyên');}else if(roll<0.75){addKarma(-mag,'nợ nhân quả từ cơ duyên');}else{S.att+=mag*2;log('Cơ duyên lộ ra ngoài, ngươi thêm bị chú ý.','warn');}if(mag>=3&&RNG.chance(0.6))S.att+=mag;}
// NPC
const SUR=['Lý','Vương','Trương','Triệu','Tần','Mộ Dung','Âu Dương','Diệp','Hàn','Bạch','Huyền Viên'];
const GIV=['Thanh Phong','Vô Tình','Kiếm Tâm','Nhược Thủy','Hạo Nhiên','Tử Yên','Mặc','Linh Nhi','Thất Sát','Dạ','Cửu U'];
const TRAITS=['tham lam','thận trọng','tàn nhẫn','trọng nghĩa','kiêu ngạo','nhẫn nhịn','đa nghi','giảo hoạt','cuồng ngạo','lãnh khốc','hào sảng','ngụy quân tử','si tình','hiếu chiến','tham sống sợ chết','coi trọng chữ tín'];
const GOALS=['đoạt cơ duyên','báo thù cố nhân','tìm trường sinh','bảo vệ tông môn','thu thập linh dược','đột phá cảnh giới','ẩn nhẫn chờ thời','tìm lại người xưa','phục hưng gia tộc đã diệt vong','truy tìm kẻ giết thầy','luyện thành một môn cấm thuật','tìm đường về cố hương ở giới khác','chứng đạo trường sinh bất tử','san bằng một mối thù truyền kiếp'];
function makeNPC(rel){const id='npc_'+RNG.int(0,1e9);const npc={id,name:RNG.pick(SUR)+' '+RNG.pick(GIV),ri:clamp(S.ri+(rel||RNG.int(-1,3)),0,100),si:RNG.int(0,3),traits:[RNG.pick(TRAITS)],goal:RNG.pick(GOALS),relation:0,memory:[],alive:true};S.npcs[id]=npc;return npc;}
function remember(npc,deed,d){npc.memory.push(deed);npc.relation=clamp(npc.relation+d,-100,100);if(npc.memory.length>12)npc.memory.shift();}

/* =========================================================================
   SCENE ENGINE — narrative + choices + free input + hidden 5th
   ========================================================================= */
let TAB='story';
let freeRes=null;
function powerMight(){let m=S.ri<=0?0:powerExp(S.ri,S.si);m+=Math.log10(S.atkMul*(S.tc.buff.atk||1));if(S.tech)m+=S.tech.grade*0.15;for(const t of S.treasures)m+=Math.log10(t.mult||1);for(const a of(S.arrays||[]))m+=Math.log10(a.mult||1)*0.5;for(const b of(S.beasts||[]))m+=Math.log10(b.mult||1);
  m+=profBonus('khi');if(S.natal)m+=Math.log10((S.natal.mult||1))*(1+(S.natal.bond||0)*0.01)+0.3;for(const l of(S.laws||[]))m+=0.25;if(S.flags.huyetBao)m+=Math.log10(3);return m;}
function fight(enemy){const gap=powerMight()-(powerExp(enemy.ri,enemy.si)+(enemy.boss?0.3:0)+(enemy.mightBonus||0));const l=luckOf();
  if(enemy.soul&&S.soul<enemy.ri*0.4){log(`${enemy.name} tung một đòn thần thức thẳng vào nguyên thần ngươi!`,'bad');if(RNG.chance(Math.max(0.1,0.5-S.soul*0.05))){S.alive=false;S.cause=`Nguyên thần bị ${enemy.name} nghiền nát (chưa luyện nguyên thần).`;return'dead';}deductLife(3,'nguyên thần bị công kích');}
  if(gap<-4){if(S.flags.hoMenh&&RNG.chance(0.6)){S.flags.hoMenh=false;deductLife(10,'kích hoạt hộ mệnh');log('Hộ Mệnh Đan cứu ngươi một mạng!','good');return'injured';}S.alive=false;S.cause=`${enemy.name} chỉ phóng một tia uy áp; ngươi như con kiến dưới chân voi.`;return'dead';}
  const win=1/(1+Math.pow(10,-gap*1.1));delete S.flags.huyetBao;
  if(RNG.chance(win)){S.stats.kills++;log(`Ngươi hạ gục ${enemy.name}!`,'good');return'win';}
  const fleeP=Math.min(0.7,0.25+(S.tc.buff.spd?0.2:0)+(l.surv-1)*0.1);
  if(enemy.canFlee!==false&&RNG.chance(fleeP)){deductLife(2,'trọng thương khi tháo chạy');log('Ngươi liều mạng thoát được trong gang tấc.','warn');return'flee';}
  if(S.flags.hoMenh&&RNG.chance(0.6)){S.flags.hoMenh=false;deductLife(10,'kích hoạt hộ mệnh');log('Hộ Mệnh Đan cứu ngươi!','good');return'injured';}
  if(RNG.chance(Math.min(0.9,0.55-gap*0.15))){S.alive=false;S.cause=`Bị ${enemy.name} đánh chết. Kẻ yếu không có quyền sống.`;return'dead';}
  deductLife(5,'trọng thương sau bại trận');log(`Ngươi bại trận trước ${enemy.name}, giữ được cái mạng.`,'bad');return'injured';}
function loot(minG){const got=[];S.linhThach+=Math.round(Math.pow(10,(S.ri||1)*0.5));got.push('linh thạch');if(RNG.chance(0.5)){const t=genTreasure(clamp(minG,1,maxGrade(S.world.tier)+1));S.treasures.push(t);got.push(t.name);}if(RNG.chance(0.4)){const k=RNG.pick(Object.keys(PILL_DEF));S.inv[k]=(S.inv[k]||0)+1;got.push(PILL_DEF[k].n);}
  if(RNG.chance(0.12)){const f=genFormation(rollGrade(S.world.tier));(S.arrays=S.arrays||[]).push(f);got.push('trận đồ '+f.name);}
  if(RNG.chance(0.08)){const b=genBeast(rollGrade(S.world.tier));(S.beasts=S.beasts||[]).push(b);got.push('linh thú '+b.name);}
  return got;}

/* ===== HỆ THỐNG TÔNG MÔN ===== */
function talentScore(){return (S.root.pham||1)+(S.tc.t||1)+luckOf().id+(S.hidden?2:0);}
function sectCultBonus(){if(!S.sect)return 1;return 1+S.sect.tierId*0.12+S.sect.pos*0.1;} // tài nguyên/linh mạch tông môn → tu nhanh hơn
function sectPromoteReq(){if(!S.sect)return null;const p=S.sect.pos;if(p>=7)return null;return{contrib:Math.round(100*Math.pow(2.2,p)),ri:Math.max(1,(p+1)*4)};}
function offerPos(sect){const t=talentScore();let base=t>=17?4:t>=13?3:t>=9?2:t>=6?1:0;if(sect.typeId==='ma'&&RNG.chance(0.3))base=Math.min(4,base+1);return base;}
// Bái nhập
function sceneJoinSect(){const sect=genSect(S.world.tier);const pos=offerPos(sect);sect.pos=pos;sect.posName=SECT_POS[pos];const rootFav=sect.favor.includes(S.root.id);
  const assess=pos>=4?`Trưởng lão vừa liếc qua căn cốt ngươi đã biến sắc: "Tư chất này... phải thu làm ${SECT_POS[pos]}!" Vinh quang tột đỉnh — và một tấm bia ngắm sau lưng.`:pos>=2?`Chấp sự gật gù: "Tư chất khá, vào thẳng ${SECT_POS[pos]}."`:`Chấp sự phất tay lạnh nhạt: "Tư chất tầm thường, làm ${SECT_POS[pos]} đi, tự lo lấy thân."`;
  return{title:'TÔNG MÔN · Bái Nhập',narr:`Ngươi tìm tới ${sect.name} — một ${sect.tier} ${sect.type}. ${sect.typeDesc}\n\n${rootFav?'Linh căn của ngươi hợp với sở trường bản môn — cơ hội hiếm có.\n\n':''}${assess}\n\n${SECT_RULES}`,choices:[
    {l:`Bái nhập, nhận vị trí ${SECT_POS[pos]}.`,cls:'primary',act:()=>{S.sect=sect;S.flags.sectJoinYear=S.time.y;if(sect.typeId==='ma')addKarma(-3,'gia nhập ma đạo');const t=genTech(clamp(2+(pos>=3?1:0)+RNG.int(0,1),1,maxGrade(S.world.tier)));S.techs.push(t);S.inv.tu_khi=(S.inv.tu_khi||0)+3;S.contribShown=true;log(`Bái nhập ${sect.name} với thân phận ${SECT_POS[pos]}.`,'good');setResult(`Ngươi chính thức là ${SECT_POS[pos]} của ${sect.name}. Bản môn ban công pháp «${t.name}» và 3 Tụ Khí Đan làm lễ nhập môn.${pos>=4?' Nhưng từ giây phút này, vô số ánh mắt ghen ghét đã dán chặt vào ngươi.':''}`);}},
    {l:'Từ chối — làm tán tu tự do, không ai quản cũng không ai che.',act:()=>setResult('Ngươi quay lưng với tông môn. Tự do tuyệt đối, và cô độc tuyệt đối. Con đường tán tu gian nan hơn, nhưng không ai đâm ngươi sau lưng vì một câu "vì bản môn".')}]};}
// Đại điện tông môn: đổi cống hiến
