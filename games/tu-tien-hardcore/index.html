 {id:'pl_lacnhat',w:2,t:'Lạc Nhật Cổ Chiến Trường',clues:['Một bình nguyên trải dài phủ đầy binh khí gãy và xương trắng của cả người lẫn yêu.','Mỗi hoàng hôn, ảo ảnh một trận đại chiến lại tái diễn, rồi tan đi khi mặt trời tắt.','Nhặt một mảnh giáp cổ, ngươi thấy ký ức của kẻ đã chết mặc nó — và cách hắn chết.'],reveal:'Lạc Nhật Cổ Chiến Trường là nơi một đạo quân tu sĩ đã tử chiến chặn "thứ trên bầu trời" tràn xuống. Họ thua, nhưng oán niệm và ký ức khắc vào không gian, lặp lại vĩnh viễn như một lời cảnh báo không ai nghe.'},
 // --- Tầng 3: Tiên Giới ---
 {id:'pl_tienmon',w:3,t:'Tiên Môn Sụp Đổ',clues:['Một cánh cổng ngọc khổng lồ lơ lửng giữa không trung, nứt vỡ, rỉ ra tiên khí đã ngàn năm.','Vô số thi thể nửa người nửa quang bám quanh cổng, chết ở khoảnh khắc phi thăng.','Bước qua cổng, ngươi thấy phía bên kia... là chính nơi ngươi vừa đứng.'],reveal:'Tiên Môn này từng nối phàm giới với tiên giới, rồi bị đóng sập giữa chừng, kẹp chết vô số kẻ phi thăng. Nó là bằng chứng rằng "phi thăng" chỉ dẫn tới một tầng khác của cùng cái lồng — không có lối ra thật sự.'},
 {id:'pl_battu_dong',w:3,t:'Bất Tử Sơn Động',clues:['Một sơn động đồn rằng ai vào sẽ bất tử — và quả thật, không ai từng thấy người vào đó chết.','Nhưng cũng không ai thấy họ ra. Động im lặng, đầy những kẻ ngồi bất động, mắt mở, còn thở.','Thời gian trong động gần như ngừng — một hơi thở bằng trăm năm bên ngoài.'],reveal:'Bất Tử Sơn Động ban "bất tử" bằng cách đóng băng nạn nhân trong một bong bóng thời gian ngưng đọng. Họ không chết, cũng chẳng sống — đây là lời chế giễu tàn nhẫn của thế giới với kẻ cầu trường sinh: bất tử, nghĩa là mắc kẹt mãi mãi.'},
 {id:'pl_thienha_lau',w:3,t:'Thiên Hà Quan Tinh Lâu',clues:['Một tòa lầu cổ chọc thẳng lên tầng mây, xây để quan sát tinh tượng và thiên cơ.','Bản đồ sao khắc trên trần lầu vẽ những chòm sao không tồn tại trên bầu trời hiện tại.','Đài quan sát cao nhất hướng ống kính không lên trời, mà xuống — vào lòng đất.'],reveal:'Quan Tinh Lâu do một nhóm cổ nhân dựng khi họ nhận ra "bầu trời sao" chỉ là hình vẽ trên mặt trong của cái lồng. Họ chĩa kính xuống đất vì tin rằng lối ra thật sự nằm bên dưới, không phải bên trên.'},
 // --- Tầng 4: Thánh Giới ---
 {id:'pl_thanhmo',w:4,t:'Thánh Nhân Mộ Viên',clues:['Một nghĩa trang mênh mông chỉ chôn Thánh Nhân — những kẻ đáng lẽ đã siêu thoát.','Mỗi ngôi mộ khắc một câu cuối: gần như tất cả đều là biến thể của "Ta đã bị lừa".','Ngôi mộ trung tâm bỏ trống, bia khắc: "Dành cho kẻ cuối cùng hiểu ra sự thật".'],reveal:'Thánh Nhân Mộ Viên chôn những bậc đã đạt tới đỉnh cao nhất mà một tu sĩ có thể — và nhận ra rằng đỉnh cao ấy vẫn nằm trong lồng. Họ chết trong tuyệt vọng. Ngôi mộ trống chờ ngươi, nếu ngươi cũng đi hết con đường ấy.'},
 {id:'pl_vothuong_dai',w:4,t:'Vô Thượng Luận Đạo Đài',clues:['Một đài đá tròn nơi các Thánh Nhân từng luận đạo, giọng nói của họ vẫn vang vọng.','Ghép lại những lời còn sót, ngươi nhận ra họ tranh cãi một câu hỏi duy nhất: "Ai tạo ra thiên đạo?"','Cuộc luận đạo kết thúc đột ngột — tất cả im bặt cùng một khoảnh khắc.'],reveal:'Luận Đạo Đài ghi lại khoảnh khắc các Thánh Nhân tiến gần nhất tới chân tướng: thiên đạo không phải quy luật tự nhiên, mà do "ai đó" đặt ra. Họ bị bịt miệng ngay khi chạm tới câu trả lời — bởi chính cái mà họ sắp vạch trần.'},
 // --- Tầng 5: Đế Vực ---
 {id:'pl_dequan',w:5,t:'Đế Quan Trủng',clues:['Một thung lũng chứa những cỗ quan tài lớn bằng cả tòa núi, khắc phù hiệu đế vương.','Uy áp rỉ ra từ quan tài đủ khiến tu sĩ Hóa Thần quỳ sụp, thổ huyết.','Một cỗ quan tài hé mở — bên trong trống rỗng, chỉ còn dấu tay cào từ bên trong nắp.'],reveal:'Đế Quan Trủng là nơi an nghỉ của các Cổ Đế đã chết. Cỗ quan trống với vết cào bên trong chứng tỏ: có một vị Đế đã "chết" nhưng vẫn tỉnh lại và thoát ra. Trường sinh là dối trá — nhưng cái chết, với họ, cũng chưa chắc là thật.'},
 {id:'pl_thoisa',w:5,t:'Thời Sa Chi Hải',clues:['Một biển cát chảy ngược thời gian: vật rơi vào trẻ lại rồi biến mất thành hư vô.','Đứng bên bờ, ngươi thấy bóng mình ở nhiều độ tuổi cùng lúc, chồng lên nhau.','Giữa biển cát nổi lên một cung điện lúc ẩn lúc hiện, thuộc về một thời chưa từng có.'],reveal:'Thời Sa Chi Hải là nơi dòng thời gian của cái lồng bị rò rỉ và xoáy loạn. Cung điện giữa biển là của một Cổ Đế đã cố dùng thời gian để trốn khỏi lồng — hắn không chết, cũng không sống, mà bị nghiền nát giữa vô số dòng thời gian.'},
 // --- Tầng 6: Hồng Hoang ---
 {id:'pl_honghoang_co',w:6,t:'Hồng Hoang Di Cốt',clues:['Những bộ xương lớn tới mức một đốt xương cũng bằng cả dãy núi, nằm rải khắp hoang vực.','Xương không thuộc về người, yêu, hay thần — mà một chủng loài đã tuyệt diệt trước cả thượng cổ.','Trong hốc mắt một chiếc sọ khổng lồ, một nền văn minh nhỏ đang sinh sống, thờ nó làm trời.'],reveal:'Hồng Hoang Di Cốt là hài cốt của những sinh vật nguyên thủy tồn tại trước khi cái lồng được dựng — có lẽ là những kẻ đã chống lại việc tạo ra nó. Chúng bị diệt sạch, xương vứt lại làm nền cho thế giới mới. Kẻ dựng lồng đã thắng từ rất lâu.'},
 {id:'pl_thangian_liet',w:6,t:'Không Gian Liệt Phùng',clues:['Một vùng trời đất rách nát, đầy những khe nứt lơ lửng dẫn tới hư không.','Nhìn vào một khe nứt, ngươi thấy một thế giới khác — đôi khi thấy chính mình ở đó, sống một đời khác.','Vật thể lọt vào khe nứt biến mất; đôi khi một thứ lạ từ khe khác rơi ra.'],reveal:'Không Gian Liệt Phùng là nơi lớp vỏ giữa các tầng thực tại mỏng nhất, rách toạc. Những "thế giới khác" nhìn thấy qua khe chính là các tầng lồng song song. Ngươi ở đó là ngươi của một dòng thực tại khác — cùng một quân cờ, ván cờ khác.'},
 // --- Tầng 7: Hỗn Độn Hải ---
 {id:'pl_hondon_hai',w:7,t:'Hỗn Độn Hải Nhãn',clues:['Giữa biển hỗn độn vô biên có một xoáy nước khổng lồ nuốt cả ánh sáng và quy luật.','Mọi pháp tắc tới gần Hải Nhãn đều tan rã — kiếm không còn là kiếm, lửa không còn là lửa.','Từ đáy xoáy vọng lên một nhịp đập, đều đặn, như trái tim của cả vũ trụ.'],reveal:'Hỗn Độn Hải Nhãn là nơi quy luật thế giới bị hút về và tái tạo — cỗ máy giữ cho cái lồng vận hành. Nhịp đập dưới đáy là "trái tim" của hệ thống. Phá nó, cả thế giới có thể sụp; nhưng cũng có thể đó là cách duy nhất ra ngoài.'},
 {id:'pl_vantho_thu',w:7,t:'Vạn Thọ Cổ Thụ',clues:['Một cội cây vượt ngoài tưởng tượng, tán lá che kín cả một tầng trời của Hỗn Độn Hải.','Mỗi chiếc lá là một thế giới thu nhỏ; đôi khi một lá vàng rụng, một thế giới lặng lẽ diệt vong.','Rễ cây không cắm xuống đất mà cắm vào... hư không bên ngoài cái lồng.'],reveal:'Vạn Thọ Cổ Thụ là cây trụ nối cái lồng với thứ nuôi dưỡng nó bên ngoài. Mỗi lá là một thế giới bị "trồng" để thu hoạch. Rễ cắm ra ngoài cho thấy: có một thứ đang uống cạn tất cả các thế giới này qua thân cây, từ tầng ngoài cùng.'},
 // --- Tầng 8: Hồng Mông Hải ---
 {id:'pl_hongmong_lo',w:8,t:'Hồng Mông Tổ Lô',clues:['Một chiếc lò cổ trôi giữa Hồng Mông Hải, lớn bằng một tòa thế giới, lửa đã tắt từ vô lượng kiếp.','Trong lò còn sót lại tro của những "phôi thế giới" chưa thành hình.','Thành lò khắc một dòng: "Nơi đây từng đúc ra tam thiên đại thiên thế giới."'],reveal:'Hồng Mông Tổ Lô là cái lò đã đúc ra mọi thế giới — kể cả cái lồng giam ngươi. Nó đã nguội, kẻ đúc lò đã đi. Nhưng lò vẫn còn đó: ai thắp lại được ngọn lửa Hồng Mông, kẻ đó có thể đúc thế giới mới — hoặc phá tan thế giới cũ.'},
 // --- Tầng 9: Vô Hạn Ngoại Vực ---
 {id:'pl_ngoaivuc_nhan',w:9,t:'Con Mắt Ngoài Cái Lồng',clues:['Vượt khỏi tầng trời cuối cùng, không còn sao, không còn đất — chỉ có một con mắt khổng lồ.','Con mắt không chớp, và ngươi nhận ra nó đã dõi theo ngươi từ khoảnh khắc ngươi chào đời.','Khi ánh nhìn của nó chạm ngươi, ngươi nghe một "ý niệm" lạnh lùng: "Một quân cờ nữa đã tới đích."'],reveal:'Đây là "kẻ trên bầu trời" — tồn tại ở tầng ngoài cùng, nuôi vô số thế giới trong lồng như nuôi ruộng. Mọi cơ duyên, mọi con đường trường sinh, đều là cách nó chọn lọc và thu hoạch những quân cờ mạnh nhất. Ngươi đã tới đích của nó. Câu hỏi cuối cùng: ngươi là bữa ăn, hay là kẻ đầu tiên phản lại người nông dân?'},

 // === Thêm địa danh (thấm dày mỗi giới) ===
 {id:'pl_loantang',w:1,t:'Loạn Táng Cương',clues:['Một quả đồi chôn tập thể xác của cả một cuộc di dân chết đói năm xưa, không mộ bia.','Đêm rằm, trên đồi lập lòe vô số đốm lửa ma trơi xếp thành hàng như một đạo quân.','Đào lên một bộ hài cốt, ngươi thấy tay nó vẫn nắm chặt một mảnh ngọc phù còn ấm.'],reveal:'Loạn Táng Cương không phải mồ của dân đói — đó là nơi một thế lực cổ chôn giấu cả một đội quân tu sĩ đã bị "tẩy" ký ức và phong ấn, chờ ngày được đánh thức làm quân cờ. Mảnh ngọc phù là chìa khóa đánh thức chúng.'},
 {id:'pl_thodia',w:1,t:'Miếu Thổ Địa Nứt Đôi',clues:['Ngôi miếu thổ địa đầu làng nứt toác làm đôi trong một đêm không mưa gió.','Tượng thổ địa bên trong quay mặt vào tường — dân làng thề rằng trước kia nó quay ra.','Sau bức tường nứt là một lối đi hẹp dẫn xuống, hơi lạnh phả lên mùi hương trầm đã tắt ngàn năm.'],reveal:'Ngôi miếu tầm thường là nắp đậy một đạo tràng cổ. "Thổ địa" quay mặt đi vì thứ nó canh giữ đã thức tỉnh và đang trồi lên. Những vị thần nhỏ nơi phàm trần, hóa ra là lính gác cho các phong ấn — và có phong ấn vừa lỏng.'},
 {id:'pl_vongngon',w:2,t:'Vong Ngôn Bi Lâm',clues:['Một rừng bia đá dày đặc, mỗi bia khắc kín chữ nhưng chạm vào là chữ tự xóa dần.','Kẻ đọc được trọn một tấm bia sẽ quên mất tên mình, đổi lại nhớ một đoạn đạo pháp vô thượng.','Tấm bia trung tâm trống trơn — chờ được khắc bởi kẻ đầu tiên dám quên hết tất cả.'],reveal:'Bi Lâm là kho tri thức của một văn minh chọn cách "trả giá bằng lãng quên": mỗi bí pháp học được lấy đi một phần ký ức. Họ tin quên đi bản ngã là cách duy nhất chứa nổi đại đạo. Cuối cùng họ quên cả chính mình — và biến mất khỏi lịch sử theo đúng nghĩa đen.'},
 {id:'pl_tramchu',w:2,t:'Trầm Chu Hồ Đáy',clues:['Một hồ nước phẳng lặng đáng sợ, đáy hồ là cả một hạm đội thuyền cổ chìm nguyên vẹn.','Thuyền không mục, buồm vẫn căng như vừa chìm hôm qua, dù đã dưới nước vạn năm.','Trong khoang một con thuyền, bộ hài cốt thuyền trưởng vẫn ghì tay lái, hướng mũi thuyền lên trời.'],reveal:'Đây là hạm đội của những kẻ từng thử "vượt bể trời" để thoát khỏi thế giới bằng đường thủy — họ tin biển nối với biển, biển nối ra ngoài lồng. Cả hạm đội bị dìm xuống bởi một lực vô hình ngay khi chạm ranh giới. Nước hồ này thông với Hỗn Độn Hải.'},
 {id:'pl_phithang',w:3,t:'Phi Thăng Đài Vỡ',clues:['Một đài tế bằng bạch ngọc trên đỉnh núi cao nhất, nơi cổ nhân làm lễ phi thăng.','Mặt đài chi chít vết cháy hình người — dấu tích những kẻ phi thăng bị "cái gì đó" đánh rớt.','Khắc bên rìa đài: "Bay lên không phải là thoát ra. Càng cao, lưới càng dày."'],reveal:'Phi Thăng Đài là nơi vô số tu sĩ tưởng mình sắp thành tiên, để rồi bị thiêu rụi ngay ngưỡng cửa. Dòng khắc cảnh báo sự thật tàn nhẫn: phi thăng chỉ là bị kéo lên một tầng cao hơn của lồng, và tầng càng cao thì sự giám sát càng nghiêm.'},
 {id:'pl_phongthan',w:4,t:'Phong Thần Bảng Tàn Quyển',clues:['Đồn có một bảng cổ ghi tên mọi vị thần từng được sắc phong — và cách phế bỏ họ.','Nhiều tên trên bảng bị gạch đỏ, bên cạnh ghi một chữ: "phản".','Cuối bảng có một khoảng trống đang tự viết thêm tên — bằng nét chữ giống hệt của ngươi.'],reveal:'Phong Thần Bảng là công cụ Thiên Đạo dùng để bổ nhiệm và thanh trừng thần linh. Những cái tên gạch đỏ là các vị thần đã nhận ra chân tướng và phản lại — nên bị xóa sổ. Việc tên ngươi đang được viết vào nghĩa là: hệ thống đã bắt đầu xem ngươi là một biến số cần "xử lý".'},
 {id:'pl_detam',w:5,t:'Đế Tâm Trủng',clues:['Giữa Đế Vực có một hố sâu không đáy, hình dạng như một trái tim bị moi ra.','Từ đáy hố phát ra nhịp đập yếu ớt, đồng bộ kỳ lạ với nhịp tim của chính ngươi.','Kẻ nhảy xuống hố không rơi, mà bị kéo về phía một ký ức không thuộc về mình.'],reveal:'Đế Tâm Trủng là nơi trái tim đạo của một Cổ Đế bị moi ra và chôn giấu — trái tim vẫn đập, giữ cho một tia chân linh của ngài tồn tại. Nhịp đập đồng bộ với ngươi ám chỉ một liên hệ huyết mạch hoặc luân hồi. Ngài đang chờ một người thừa kế... hoặc một cái xác mới.'},
 {id:'pl_thanchien',w:6,t:'Thái Cổ Thần Chiến Di Chỉ',clues:['Một vùng trời đất bị đóng băng ngay giữa khoảnh khắc một trận thần chiến — sét treo lơ lửng, máu ngưng giữa không.','Bước vào, thời gian nơi đây gần như đứng im; ngươi có thể đi giữa những đòn đánh diệt thế bất động.','Chạm vào một giọt máu thần treo lơ lửng, ngươi thấy toàn cảnh: các vị thần không đánh nhau — họ cùng đánh một thứ trên trời.'],reveal:'Di chỉ này ghi lại khoảnh khắc các Thái Cổ Thần liên thủ chống lại kẻ dựng lồng — và bị đóng băng vĩnh viễn ngay giữa trận, như một tiêu bản. Cảnh "thần chiến thần" mà hậu thế truyền tụng là dối trá: họ chưa từng là kẻ thù của nhau. Họ cùng thua một kẻ thù chung.'},
 {id:'pl_quykhu',w:7,t:'Quy Khư — Nơi Vạn Vật Trở Về',clues:['Một vực thẳm ở rìa Hỗn Độn Hải, nơi mọi thứ già cỗi, chết đi đều trôi dạt về.','Không chỉ vật chất — cả linh hồn, ký ức, thậm chí cả những "quy luật" đã lỗi thời cũng tan vào đây.','Đứng ở mép Quy Khư, ngươi nghe vô số giọng nói của những thứ từng tồn tại rồi bị xóa.'],reveal:'Quy Khư là "thùng rác" của cái lồng — nơi kẻ dựng lồng thải bỏ những thế giới, sinh linh và quy luật không còn dùng được. Đây là bằng chứng rằng thế giới có thể bị "xóa và thay". Nhưng cũng có tin đồn: thứ gì rơi vào Quy Khư mà không tan, sẽ trở về tồn tại ngoài tầm kiểm soát của kẻ dựng lồng.'},
 {id:'pl_tamthien',w:8,t:'Tam Thiên Thế Giới Sa Bàn',clues:['Trong Hồng Mông Hải trôi một sa bàn khổng lồ mô phỏng tam thiên đại thiên thế giới, sống động như thật.','Chạm vào một hạt sáng trên sa bàn, ngươi thấy một thế giới thật đang diễn ra bên trong nó.','Vài hạt sáng đã tắt ngấm — và ngươi nhận ra một trong số đó chính là thế giới quê nhà của ngươi... trong tương lai.'],reveal:'Sa bàn này là "bảng điều khiển" mà kẻ dựng lồng dùng để quản lý tam thiên thế giới. Mỗi hạt sáng là một thế giới thật; tắt một hạt là xóa một thế giới. Thấy thế giới quê nhà sắp tắt nghĩa là nó đã bị đánh dấu để thu hoạch — và đồng hồ đang đếm ngược.'},
 {id:'pl_daoduc_bi',w:8,t:'Đạo Đức Cổ Bi',clues:['Một tấm bia đá cô độc trôi giữa Hồng Mông Hải, khắc năm nghìn chữ đã mòn quá nửa.','Những chữ còn đọc được ghép thành một câu hỏi: "Nếu đạo do người đặt ra, thì đạo có còn là đạo?"','Mặt sau bia trống — nhưng ai chạm vào đều thấy hiện lên câu trả lời của riêng mình, khác nhau ở mỗi người.'],reveal:'Cổ Bi là di vật của kẻ đầu tiên nghi ngờ tính chính danh của thiên đạo. Nó không đưa ra chân lý — nó buộc mỗi người tự đối diện: khi biết luật trời là do "ai đó" viết ra, ngươi vẫn tuân theo, hay tự viết luật của riêng mình? Đây là ngưỡng cửa thật sự trước Vô Hạn Ngoại Vực.'},
 {id:'pl_khiengoai',w:9,t:'Khe Hở Của Cái Lồng',clues:['Nơi tầng trời cuối cùng, có một vết nứt nhỏ bằng sợi tóc mà ánh sáng bên trong không lọt qua nổi.','Ghé mắt nhìn qua khe, ngươi không thấy gì — chỉ cảm nhận một sự "rộng lớn" khiến thần hồn muốn vỡ.','Có dấu vết cho thấy ai đó đã từng cạy khe này rộng ra, rồi... đi mất, không quay lại.'],reveal:'Khe hở là chỗ duy nhất trên vỏ lồng từng bị phá thủng — bởi một kẻ đã thoát ra ngoài thật sự, kẻ đầu tiên và có lẽ duy nhất. Hắn không chết, không bị thu hoạch: hắn biến mất khỏi hệ thống. Khe đã gần liền lại. Nếu ngươi đủ mạnh và đủ điên, đây là cánh cửa duy nhất ra khỏi ván cờ.'},

 // === Bí ẩn theo CHỦNG TỘC (chỉ hé lộ cho đúng tộc) ===
 {id:'pl_yeuson',w:2,gate:()=>S.race==='yeu',t:'Yêu Tộc Vạn Thú Thánh Sơn',clues:['Huyết mạch ngươi réo gọi ngươi về một ngọn thánh sơn nơi tổ tiên yêu tộc từng ngự trị.','Trên núi, những bức bích họa kể chuyện yêu tộc từng thống trị thế giới trước khi nhân tộc trỗi dậy.','Một cổ yêu tàn hồn nhận ra huyết mạch ngươi, gầm lên: "Ngươi mang dòng máu của kẻ đã phản bội tộc!"'],reveal:'Vạn Thú Thánh Sơn là cố hương của yêu tộc thời hoàng kim. Yêu tộc không bị nhân tộc đánh bại — họ bị phản bội từ bên trong bởi một Yêu Đế bắt tay với "kẻ trên bầu trời" để đổi lấy trường sinh. Huyết mạch ngươi có thể chính là dòng dõi kẻ phản bội ấy, hoặc kẻ đã cố ngăn hắn.'},
 {id:'pl_matoc',w:3,gate:()=>S.race==='ma'||S.flags.demon_seed||S.flags.demon_heir,t:'Ma Tộc Hoàng Tuyền Tổ Địa',clues:['Ma khí trong ngươi dẫn đường xuống một vực Hoàng Tuyền sâu thẳm nơi ma tộc khởi nguồn.','Nơi đáy vực, một phong ấn khổng lồ khóa chặt thứ gì đó đang thở — nguồn cội của mọi ma khí.','Phong ấn khắc tên một vị Ma Tổ, và một lời sấm: "Khi huyết duệ trở về, xiềng sẽ gãy."'],reveal:'Hoàng Tuyền Tổ Địa giam giữ Ma Tổ — thủy tổ của ma tộc, kẻ bày ra đại kế ngàn năm. Mọi ma tu, gồm cả ngươi, là "huyết duệ" được gieo rắc để một ngày quay về làm chìa khóa sống mở phong ấn. Ngươi mạnh lên càng nhanh, ngày Ma Tổ tái xuất càng gần — và ngươi có thể là kẻ mở xiềng cho hắn.'},
 {id:'pl_longuyen',w:4,gate:()=>S.race==='long'||S.flags.dragon_body,t:'Long Tộc Chân Long Cổ Uyên',clues:['Long huyết trong ngươi sôi lên khi ngươi tới gần một vực nước cổ nơi chân long từng trú.','Đáy uyên là xương của vô số chân long, xếp thành hình một vòng tròn bảo vệ một quả trứng đã hóa đá.','Long hồn cổ thì thầm: "Bọn ta không tuyệt diệt vì chiến bại. Bọn ta tự phong ấn... để giấu nó."'],reveal:'Chân Long Cổ Uyên giấu quả trứng của Long Tổ — hy vọng cuối cùng của long tộc. Chân long không bị diệt: họ hy sinh cả chủng tộc để giấu quả trứng khỏi "kẻ trên bầu trời", kẻ muốn dùng huyết mạch long tộc làm nguyên liệu. Là hậu duệ long tộc, ngươi vừa là người bảo vệ quả trứng, vừa là mục tiêu bị săn để dẫn đường tới nó.'},
 {id:'pl_vutoc',w:4,gate:()=>S.race==='vu',t:'Vu Tộc Thập Nhị Đô Thiên Di Trận',clues:['Không cần thần thức, thân thể ngươi tự cảm ứng được một đại trận cổ khắc bằng máu và xương vu tộc.','Trận đồ gồm mười hai cây cột đại, mỗi cột là thi thể một Vu Thần cổ hóa thành.','Vu ngữ khắc trên cột: "Bọn ta không thờ trời. Bọn ta là thứ trời phải dè chừng."'],reveal:'Thập Nhị Đô Thiên là đại trận vu tộc dựng để chống lại cả thiên đạo — vu tộc là chủng tộc duy nhất không có nguyên thần nên thiên đạo không thể dùng hồn thuật khống chế họ. Chính vì "ngoài vòng kiểm soát" mà họ bị tận diệt gần hết. Là truyền nhân vu tộc, ngươi thừa hưởng thứ vũ khí mà kẻ dựng lồng sợ nhất: một linh hồn không thể bị chi phối.'},
 {id:'pl_uquy',w:3,gate:()=>S.race==='quy',t:'U Quỷ Vong Xuyên Cố Lộ',clues:['Là u quỷ, ngươi thấy được một con đường mờ ảo mà sinh linh dương thế không nhìn ra.','Con đường dẫn qua vô số vong hồn xếp hàng, tất cả đi về cùng một hướng, không ai quay đầu.','Cuối đường không phải luân hồi — mà là một cỗ máy khổng lồ nghiền vong hồn thành thứ ánh sáng xám.'],reveal:'Vong Xuyên Cố Lộ tiết lộ sự thật về "luân hồi": nó không phải vòng tuần hoàn tự nhiên mà là một cỗ máy thu hoạch — nghiền linh hồn người chết thành năng lượng cung phụng cho tầng ngoài cùng. U quỷ tộc, vì là linh hồn thuần túy, nhìn thấu được điều này. Đó là lý do họ bị chính đạo lẫn thiên đạo cùng truy diệt: họ biết quá nhiều.'},

 // === Bí ẩn theo TÔNG MÔN & CƠ DUYÊN (mở khi đủ thân phận) ===
 {id:'pl_tangkinh',w:2,gate:()=>!!S.sect,t:'Tàng Kinh Các Cấm Tầng',clues:['Tông môn ngươi có một tầng cấm trong Tàng Kinh Các mà ngay cả trưởng lão cũng không được vào.','Một đêm ngươi lẻn vào, thấy vô số công pháp bị niêm phong với dấu "cấm truyền — nghịch thiên".','Cuốn sâu nhất không có chữ, chỉ có một bản đồ dẫn ra ngoài tam giới.'],reveal:'Cấm Tầng của mọi tông môn cổ đều giấu chung một bí mật: các công pháp "nghịch thiên" bị cấm không phải vì nguy hiểm cho người tu, mà vì chúng hé lộ con đường thoát khỏi lồng. Tổ sư lập tông từng biết chân tướng, khóa nó lại để bảo vệ đệ tử — hoặc vì bị buộc phải im lặng. Tông môn của ngươi, tận gốc, là một nhà tù êm ái.'},
 {id:'pl_tosuduong',w:3,gate:()=>!!S.sect,t:'Lịch Đại Tổ Sư Đường',clues:['Trong Tổ Sư Đường của tông môn, bài vị lịch đại tổ sư xếp thành hàng dài tăm tắp.','Ngươi đếm thấy số bài vị nhiều hơn hẳn số đời tông môn được ghi trong sử — có những đời bị xóa.','Ban đêm, một vài bài vị "đời bị xóa" tự phát sáng, khắc lại tên đã bị đục.'],reveal:'Những đời tổ sư bị xóa khỏi sử là các vị đã phát hiện chân tướng và cố dẫn dắt tông môn phản kháng — nên bị chính "thế lực trên cao" thanh trừng và bôi xóa. Tông môn ngươi từng nhiều lần đứng bên bờ giác ngộ, và nhiều lần bị dập tắt. Ngươi không phải người đầu tiên. Câu hỏi là ngươi có phải người cuối cùng.'},
 {id:'pl_giochi_co',w:3,gate:()=>!!S.flags.has_ring,t:'Cố Chủ Của Chiếc Giới Chỉ',clues:['Lão hồn trong giới chỉ đôi khi lỡ lời về "chủ cũ" của chiếc nhẫn — giọng đầy kính sợ.','Ngươi lần theo ký ức rò rỉ từ nhẫn, tới một di tích nơi chủ cũ từng bế quan.','Trên vách khắc dở một câu: "Ta giấu mình trong vật nhỏ, để trốn con mắt trên trời—"'],reveal:'Chủ cũ của giới chỉ là một cường giả đã cố "thu nhỏ tồn tại" của mình vào một vật phẩm để tàng hình khỏi sự giám sát của tầng ngoài cùng. Lão hồn ngươi mang chỉ là một tàn niệm hắn để lại làm mồi nhử. Chiếc nhẫn ngươi đang đeo là một cái kén — và có thể chính ngươi mới là thứ hắn nuôi để trùng sinh.'},
 {id:'pl_daothai',w:4,gate:()=>!!(S.flags.dao_body||S.flags.hongmeng_body),t:'Đạo Thai Chi Uyên',clues:['Thể chất gần với Đạo của ngươi cộng hưởng với một vực sâu nơi "đạo khí" nồng đến hữu hình.','Giữa vực lơ lửng một bào thai bằng ánh sáng đạo tắc, chưa từng được sinh ra.','Ngươi chạm vào nó và nghe: "Ngươi và ta là một. Ai sẽ tỉnh, ai sẽ ngủ?"'],reveal:'Đạo Thai Chi Uyên nuôi dưỡng một "phôi Đạo" — thứ mà thể chất Đạo Thể như ngươi vốn là một bản sao chưa hoàn chỉnh của nó. Sự thật lạnh người: những kẻ mang Đạo Thể sinh ra không phải để tu thành Đạo, mà để làm vỏ chứa hoàn thiện cho phôi này thức tỉnh. Ngươi là cái kén, hay là con bướm — điều đó do ngươi quyết.'},
 {id:'pl_vongxuyen',w:2,gate:()=>!!(S.flags.reborn||S.flags.reincarnation||S.flags.reborn_saint||S.flags.strongest_reborn||S.flags.emperor_soul),t:'Vong Xuyên Bỉ Ngạn Hoa',clues:['Là kẻ đã từng chết và trở lại, ngươi mơ thấy một dòng sông đỏ rực hoa bỉ ngạn.','Bên kia bờ sông, một bóng người quen thuộc đứng nhìn ngươi — chính là ngươi của kiếp trước.','"Ngươi trốn khỏi ta lần nữa," bóng người nói, "nhưng nợ luân hồi không xóa được đâu."'],reveal:'Bỉ Ngạn Hoa nở nơi ranh giới luân hồi, và với kẻ chuyển thế như ngươi, nó là lời nhắc: mỗi lần "trùng sinh" là một lần ngươi lách qua cỗ máy thu hoạch linh hồn, để lại một phần mình bị mắc kẹt bên kia bờ. Bóng người là phần ngươi bị bỏ lại. Càng chuyển thế nhiều, ngươi càng thiếu khuyết — và một ngày, phần bị bỏ lại ấy sẽ tới đòi.'},
 {id:'pl_thienmenh_dai',w:5,gate:()=>!!(S.flags.chosen_one||S.flags.prophecy_child),t:'Thiên Mệnh Chi Đài',clues:['Là kẻ mang thiên mệnh, ngươi bị dẫn tới một đài cao nơi vận mệnh cả một kỷ nguyên được định đoạt.','Trên đài, vô số sợi chỉ vàng nối tới vô số người — và tất cả hội tụ về một điểm: ngươi.','Nhưng nhìn kỹ, những sợi chỉ ấy không tỏa ra từ ngươi. Chúng cắm vào ngươi, từ trên cao.'],reveal:'Thiên Mệnh Chi Đài phơi bày bản chất của "thiên mệnh chi tử": ngươi không phải kẻ được số phận ưu ái, mà là điểm hội tụ được thiết kế để gom khí vận của cả một thời đại vào một thân — rồi bị "thu hoạch" trọn gói khi chín muồi. Mọi cơ duyên đổ về ngươi là đang vỗ béo một con lợn tế. Biết vậy, ngươi vẫn nhận thiên mệnh, hay cắt đứt những sợi chỉ trên cao?'},
];
function placeCount(id){return (S.placeClues&&S.placeClues[id])||0;}
function availPlaces(){return PLACE_MYSTERIES.filter(p=>p.w<=(S.world.tier||1)&&(!p.gate||p.gate()));}
function evPlaceMystery(){const pool=availPlaces().filter(p=>placeCount(p.id)<p.clues.length);if(!pool.length)return evFortune();const p=RNG.pick(pool);const idx=placeCount(p.id);S.placeClues=S.placeClues||{};S.placeClues[p.id]=idx+1;const done=idx+1>=p.clues.length;
  return{title:'ĐỊA BÍ · '+p.t,narr:`Trong lúc phiêu bạt qua ${esc(S.world.region||'vùng đất lạ')}, ngươi lần ra một dấu tích của một nơi chốn cổ xưa:\n\n"${p.clues[idx]}"\n\n(Địa bí: ${p.t} — dấu tích ${idx+1}/${p.clues.length})${done?'\n\n✦ Ngươi đã lần đủ dấu tích của nơi này!':''}`,choices:[
    {l:done?'Chiêm nghiệm chân tướng nơi này.':'Ghi nhớ, lần theo tiếp.',cls:'primary',act:()=>{if(done){S.flags['place_'+p.id]=true;if((S.placesFound||[]).indexOf(p.id)<0)(S.placesFound=S.placesFound||[]).push(p.id);S.dao=Math.min(100,S.dao+2);S.linhThach+=Math.round(Math.pow(10,1+(S.world.tier||1)*0.3));setResult('【'+p.t+'】\n\n'+p.reveal+'\n\n(Chân tướng địa phương đã ghi vào Địa Phương Bí Sử — tab Nhân Vật. Ngươi cũng nhặt được chút di trạch nơi này.)');}else setResult('Ngươi ghi khắc dấu tích vừa tìm được. Bức tranh về nơi này còn dang dở — nhưng ngươi đã đánh hơi thấy điều gì đó lớn lao ẩn dưới bề mặt.');}},
    {l:'Rời đi — có những nơi tốt nhất đừng đào sâu.',act:()=>{S.placeClues[p.id]=idx;setResult('Ngươi quyết định không đụng tới bí mật nơi này. Trực giác mách bảo: có những cánh cửa, mở ra là không đóng lại được.');}}]};}

◆ Linh căn: ${S.root.n}\n   ${S.root.d}

${l.id===0?'\nLão bỗng trầm giọng: "Nhưng thứ khiến lão phu lo nhất là khí vận của ngươi. Hắc vận. Tai họa sẽ bám theo ngươi như bóng với hình."':''}${S.hidden?'\n\nRồi lão sững người khi ngón tay chạm cổ tay ngươi: "Thì ra là vậy... '+S.hidden.desc+' Đây là cơ duyên của ngươi — cũng là tai họa. Cơ duyên và tai họa là hai mặt một đồng tiền."':''}`,
    choices:[{l:'Cúi đầu tạ ơn, bắt đầu con đường tu tiên.',act:()=>{log('— Con đường tu tiên bắt đầu tại '+S.world.name+' —','lore');setScene(null);TAB='story';}}]};}

  // Kiến lập thế lực (Kim Đan trở lên)

  const overdue=S.ledger.filter(x=>x.n<0).length;
  const narr=`Ngươi đứng giữa ${S.world.name}, cảnh giới ${realmName(S.ri,S.si)}. Thời gian trôi, thọ nguyên hao mòn từng khắc — và con đường phía trước dài tựa vô tận.\n\n${overdue>3?'Ngươi mơ hồ cảm thấy có những ánh mắt oán độc đang tìm kiếm ngươi trong bóng tối...':luckOf().id<=0?'Vận đen đeo bám; đi đâu ngươi cũng thấy điềm gở.':'Thiên địa tĩnh lặng một cách đáng ngờ.'}`;
  return{title:'Bế Quan',narr,choices:c,log:true};
}
function sceneNgoDao(){S.stats.ngodao++;const gain=0.1+RNG.range(0,0.2)*(S.cmp);const insight=RNG.chance(0.3+S.cmp*0.05);
  return{title:'Ngộ Đạo',narr:`Ngươi ngồi kiết già, gạt bỏ vạn niệm. Hơi thở chậm lại, chậm lại... cho tới khi ngươi không còn nghe thấy nó nữa.

${RNG.pick(['Một chiếc lá khô xoay tròn rơi xuống. Trong khoảnh khắc, ngươi như chạm được một tia đạo vận.','Ngươi thấy mình đứng giữa một bàn cờ trải khắp thiên địa, còn mình chỉ là một quân tốt nhỏ bé.','Dòng thời gian như ngưng đọng. Ngươi thấy sinh, thấy tử, thấy vạn vật tuần hoàn.','Ngươi thấy một hạt giống nứt vỏ, một vì sao tắt lịm, cả hai đều là một quy luật.','Trong hư vô, ngươi nghe thấy tiếng vọng của chính mình từ vô lượng kiếp trước.','Ngươi thấy mưa rơi ngược lên trời, và hiểu ra: cái gọi là quy luật cũng có thể bị bẻ cong.','Một giọt nước hòa vào biển lớn — ngươi ngộ ra thế nào là hữu ngã, thế nào là vô ngã.','Ngươi đối diện một tấm gương vô tận, trong đó có vô số cái tôi đang tu luyện, đang chết, đang tái sinh.'])}`,
    choices:[{l:'Đắm mình vào cảm ngộ.',act:()=>{S.progress=Math.min(1,S.progress+gain);S.dao=Math.min(100,S.dao+5);advance(RNG.int(1,5));if(insight){S.flags.ngoDao=0.12;log(`Tâm cảnh thăng hoa! Tiến độ +${Math.round(gain*100)}%, giữ được linh cảm cho đột phá tới.`,'good');}else log(`Ngươi lĩnh hội được đôi phần, tiến độ +${Math.round(gain*100)}%.`,'good');if(RNG.chance(0.15)&&insight){const t=genTech(clamp(3,1,maxGrade(S.world.tier)));S.techs.push(t);log('Trong cảm ngộ, ngươi lĩnh hội một môn công pháp: '+t.name+'!','good');}
      if(S.ri>=5&&insight&&RNG.chance(0.12+S.cmp*0.03)){const law=RNG.pick(LAWS);if(!(S.laws||[]).includes(law)){(S.laws=S.laws||[]).push(law);log('⚛ Ngươi lĩnh ngộ một tia ĐẠI ĐẠO PHÁP TẮC: «'+law+'»! Đây là nền tảng của cường giả cảnh cao.','good');}}afterAct();}},
    {l:'Ghi nhớ nhưng không sa đà.',act:()=>{advance(0.5);log('Ngươi cất cảm ngộ vào lòng rồi tiếp tục.','');afterAct();}}]};}

/* ---- EVENTS (5 loại + báo thù/đền đáp từ nhân quả) ---- */
function disasterChance(){const l=luckOf();let p=0.02;if(S.karma<0)p+=Math.min(0.4,-S.karma*0.01);p+=Math.min(0.4,S.att*0.005);p/=Math.max(0.5,l.surv);p*=l.att;return clamp(p,0.005,0.9);}
function fortuneChance(){const l=luckOf();let p=0.03*l.fort;if(S.karma>0)p+=Math.min(0.2,S.karma*0.005);return Math.min(0.6,p);}
function rollEvent(){worldPulse();
  // nhân quả: nếu có nợ máu, đôi khi bị báo thù
  const debts=S.ledger.filter(x=>x.n<=-2&&(x.tag.includes('giết')||x.tag.includes('cướp')||x.tag.includes('phản')||x.tag.includes('tà')||x.tag.includes('hắc')));
  if(debts.length&&RNG.chance(Math.min(0.5,0.15+debts.length*0.08)))return evRevenge();
  const goods=S.ledger.filter(x=>x.n>=2);
  if(goods.length&&RNG.chance(0.12))return evReward();
  // (D) CỐT TRUYỆN THEO XUẤT THÂN — các arc riêng kích hoạt dần khi tu luyện
  if(S.ri>=2&&RNG.chance(0.07)){const arc=evOriginArc();if(arc)return arc;}
  // (B) ĐẠO TÂM · tình kiếp — một niệm
  if(S.ri>=2&&RNG.chance(0.05))return evHeartTrial();
  // (A) THIÊN CƠ · manh mối bí ẩn ngàn năm
  if(RNG.chance(0.055))return evClue();
  // ĐỊA BÍ · bí ẩn theo từng nơi lớn / từng thế giới
  if(RNG.chance(0.06))return evPlaceMystery();
  // (C) TRƯỜNG SINH LỘ · càng cao/càng sâu, thiên đạo càng muốn diệt kẻ cầu trường sinh
  const peril=clamp((S.ri-6)*0.014+(S.world.tier-1)*0.02,0,0.32);
  if(peril>0&&RNG.chance(peril))return RNG.chance(0.5)?evHeavenSuppress():evForbiddenTruth();
  if(S.sect&&RNG.chance(0.24))return evSect();
  if(S.daolu&&RNG.chance(0.1))return evDaoluPeril();
  if(!S.daolu&&S.ri>=1&&S.dao>=45&&RNG.chance(0.06))return evDaolu();
  if(RNG.chance(0.05))return evWorldBoss();
  if(RNG.chance(0.05))return evForbiddenZone();
  if(RNG.chance(0.05))return evAuction();
  if(S.fame>=30&&RNG.chance(0.05))return evDaoConference();
  if(S.ri>=1&&RNG.chance(0.07))return evRival();
  if(Object.keys(S.npcs).some(i=>S.npcs[i].alive&&Math.abs(S.npcs[i].relation)>=40)&&RNG.chance(0.12))return evConsequence();
  if(RNG.chance(clamp(0.04+(S.taint>20?0.04:0)+(S.karma<0?0.03:0)+(S.dao<40?0.04:0),0.04,0.2)))return evInnerDemon();
  const dis=disasterChance(),fort=fortuneChance();const r=RNG.next();
  if(r<dis*0.6)return evCombat();if(r<dis)return evApoc();if(r<dis+fort)return evFortune();if(r<dis+fort+0.13)return sceneNgoDao();if(r<dis+fort+0.19&&Object.keys(S.npcs).length)return evBetray();if(r<dis+fort+0.24&&RNG.chance(0.5))return evBloodline();return RNG.pick([evFortune,evCombat])();}
const LEGENDS=['Nghe nói Thiên Kiêu của Thanh Vân Tông vừa đột phá Trúc Cơ khi mới mười sáu tuổi.','Đồn rằng một khí vận chi tử vừa bước ra từ bí cảnh, mang theo cả một truyền thừa.','Xa xôi nơi Đế Vực, hai vị Cổ Đế giao thủ, chấn nứt cả một tầng trời.','Một yêu nghiệt vô danh vừa đồ sát cả một tông môn chỉ vì một cây linh dược.','Có tin một bí cảnh vạn năm sắp mở ra ở Hoang Nguyên; vô số tu sĩ đang đổ về đó.','Người ta bảo Đan Vương các vừa ra giá trên trời cho một cây thiên niên linh dược.','Một vị lão tổ bế quan ngàn năm của Huyết Ma giáo vừa có động tĩnh — cả tu tiên giới nín thở.','Nghe đồn có kẻ luyện thành cấm thuật đoạt xá, chuyên chiếm thân xác thiên tài trẻ tuổi.','Một tán tu vô danh bỗng nổi danh sau một đêm vì chém chết một tên đệ tử đại tông môn.','Thương hội Vạn Bảo Lâu vừa treo thưởng truy nã một nữ tu trộm mất bảo vật trấn phái.','Linh mạch một vùng đột nhiên cạn kiệt, cả một tòa thành tu chân trong sớm chiều thành phế tích.','Đồn rằng nơi tận cùng tinh không có một cánh cửa cổ, mở ra là trường sinh, cũng có thể là diệt vong.'];
// Pháp tắc đại đạo: 55 bản nguyên × 6 tầng lĩnh ngộ = 330 pháp tắc phân biệt
const LAW_BASE=['Kim','Mộc','Thủy','Hỏa','Thổ','Lôi Đình','Cuồng Phong','Băng Sương','Viêm Diễm','Đại Địa','Quang Minh','Hắc Ám','Kịch Độc','Huyết Sát','Kiếm','Đao','Thương','Không Gian','Thời Gian','Trọng Lực','Sinh Mệnh','Tử Vong','Luân Hồi','Nhân Quả','Nghiệp Lực','Vận Mệnh','Hủy Diệt','Sáng Thế','Hỗn Độn','Âm','Dương','Ngũ Hành','Tinh Thần','Linh Hồn','Mộng Cảnh','Cấm Chế','Thôn Phệ','Bất Diệt','Hư Vô','Thực Tại','Nhật','Nguyệt','Tinh Thần','Sơn Nhạc','Thương Hải','Cương','Nhu','Tốc Độ','Phong Ấn','Ôn Dịch','Cổ Độc','Thần Lôi','Vẫn Tinh','Hồng Hoang','Chân Thực'];
const LAW_TIER=['chi Ý','chi Tắc','Tiểu Thành','Đại Thành','Bản Nguyên','Đại Đạo Viên Mãn'];
const LAWS=(function(){const o=[];for(const b of LAW_BASE)for(const t of LAW_TIER)o.push(b+' Pháp Tắc · '+t);return o;})();
// LỊCH SỬ THẾ GIỚI — thượng cổ sử, đại chiến, đế vương đã ngã, văn minh thất lạc
const WORLD_HISTORY=['【Sử】 Vô lượng kiếp trước, một vị Hồng Mông Đạo Tổ khai thiên tịch địa, chia hỗn độn thành tam thiên đại thiên thế giới — nơi ngươi đứng chỉ là một hạt bụi trong số đó.','【Sử】 Thượng Cổ Đại Chiến: Nhân tộc, Yêu tộc và Ma tộc giao phong ngàn vạn năm, máu nhuộm đỏ chín tầng trời, vô số Đại Đế cùng nhau tử chiến.','【Sử】 Người ta nói từng có một Đế Vương nghịch thiên cải mệnh, đoạt lấy trường sinh — rồi bị cả Thiên Đạo hợp lực nghiền thành tro bụi. Tên hắn bị xóa khỏi mọi điển tịch.','【Sử】 Một văn minh tu chân cổ xưa từng phồn thịnh vượt xa hiện tại, rồi biến mất chỉ sau một đêm. Chỉ còn lại những di tích rải rác khắp các cấm địa.','【Sử】 Truyền thuyết kể về Cửu Đỉnh trấn áp khí vận thiên hạ, thất lạc từ thời thượng cổ; ai gom đủ chín đỉnh sẽ nắm vận mệnh của cả một giới.','【Sử】 Từng có mười vị Cổ Đế cùng thời, sử gọi là Thập Đế Tranh Phong. Cuối cùng chỉ một người bước lên, chín người còn lại hóa thành xương trắng nơi tinh không.','【Sử】 Đại Đạo có khuyết, thọ nguyên hữu hạn — ngay cả Đại Đế cũng phải chết. Đó là bi ai lớn nhất của tu tiên giới, và cũng là động lực để vô số kẻ nghịch thiên.','【Sử】 Nghe nói phía trên chín tầng thế giới còn có Tiên Giới, Thần Giới, và tận cùng là Hồng Mông — nơi khởi nguyên của vạn đạo.','【Sử】 Một tòa Tiên Môn cổ từng mở ra nối liền phàm giới và tiên giới, rồi đóng sập, chôn vùi vô số kẻ nửa đường phi thăng giữa hai thế giới.','【Sử】 Ma Tổ bị phong ấn dưới Hoàng Tuyền vạn kiếp; đồn rằng phong ấn đang lỏng dần, và ngày nó vỡ, thiên hạ đại loạn.'];
function worldPulse(){const r=RNG.next();if(r<0.15)worldEvent();else if(r<0.4)log('· '+RNG.pick(LEGENDS),'lore');else if(r<0.5)log(RNG.pick(WORLD_HISTORY),'lore');}
// SỰ KIỆN THẾ GIỚI — xảy ra bất kể người chơi (quy tắc 5), có hệ quả thật lên trạng thái thế giới
function worldEvent(){const roll=RNG.next();
  if(roll<0.28){const up=RNG.chance(0.55);S.world.qiMod=up?(1.6+RNG.range(0,0.6)):(0.55-RNG.range(0,0.15));
    log(up?'『THẾ GIỚI』 ✦ LINH TRIỀU DÂNG TRÀO! Linh khí thiên địa nồng đậm khác thường — tu luyện thuận lợi bội phần một thời gian.':'『THẾ GIỚI』 ✧ Linh khí đại địa đột nhiên khô kiệt, mạch nguồn suy tàn. Tu luyện chậm hẳn cho tới khi hồi phục.',up?'good':'bad');}
  else if(roll<0.48){S.att+=1;log('『THẾ GIỚI』 '+RNG.pick(['Hai đại tông môn khai chiến ở phương xa, vô số tán tu bị cuốn vào vòng xoáy máu lửa.','Ma đạo trỗi dậy — chính ma đại chiến khiến cả một châu vực chìm trong tử khí.','Một vương triều tu chân ngàn năm sụp đổ chỉ sau một đêm binh biến.','Yêu tộc phương Nam khởi loạn, nhân tộc và yêu tộc lại vào một trận đại chiến.'])+' Thời cuộc loạn lạc, đi lại thêm phần hiểm nguy.','lore');}
  else if(roll<0.66){S.world.secretRealm=(S.world.secretRealm||0)+(8+RNG.int(0,10));log('『THẾ GIỚI』 ✦ MỘT BÍ CẢNH CỔ VỪA MỞ RA! Cơ duyên nghịch thiên và sát cơ chết người song hành — cửa chỉ mở trong một thời gian ngắn. (Xuất hiện lựa chọn thám hiểm ở Bế Quan.)','good');}
  else if(roll<0.84){const b=genBoss();log('『THẾ GIỚI』 '+b.name+' — một tồn tại cấp bậc kinh người vừa xuất thế nơi xa, thiên địa dị tượng, vạn linh khiếp phục.','lore');}
  else{S.linhThach+=Math.round(Math.pow(10,(S.ri||1)*0.4));log('『THẾ GIỚI』 Một tòa phường thị lớn mở hội đấu giá; giá linh thạch biến động, ngươi vô tình hưởng lợi chút đỉnh.','lore');}
}
function evSecretRealm(){S.world.secretRealm=0;const reward=RNG.pick(['treasure','tech','herb','formation','beast']);
  return{title:'BÍ CẢNH · Cổ Địa Hung Hiểm',narr:'Ngươi bước qua cửa bí cảnh. Bên trong là một phương thiên địa riêng — linh khí nồng đến ngạt thở, nhưng khắp nơi là xương trắng của những kẻ tới trước. Ở đây, cơ duyên và cái chết chỉ cách nhau một hơi thở.',choices:[
    {l:'Tiến sâu vào lõi bí cảnh.',hint:'Càng sâu càng nhiều kỳ trân — và càng dễ bỏ mạng.',act:()=>{const risk=0.35+S.att*0.005-(luckOf().surv-1)*0.1;if(RNG.chance(clamp(risk,0.15,0.85))){const y=8+RNG.int(0,20);deductLife(y,'trúng cổ cấm chế trong bí cảnh');if(!S.alive){setResult(S.cause);return;}setResult('Ngươi trúng một cổ cấm chế, trọng thương hộc máu (-'+y+' năm thọ), phải liều mạng rút ra tay trắng.');}else{const g=Math.min(12,maxGrade(S.world.tier)+1+RNG.int(0,1));let name='';if(reward==='treasure'){const t=genTreasure(g);S.treasures.push(t);name=t.name+' ('+t.gradeName+')';}else if(reward==='tech'){const t=genTech(g);S.techs.push(t);name='công pháp '+t.name+' (phẩm '+g+')';}else if(reward==='herb'){const h=genHerb(S.world.tier);h.grade=g;h.gradeName=PHAM[g-1].n;S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;name=h.name+' (phẩm '+g+')';}else if(reward==='formation'){const f=genFormation(g);(S.arrays=S.arrays||[]).push(f);name='trận đồ '+f.name+' (phẩm '+g+')';}else{const b=genBeast(g);(S.beasts=S.beasts||[]).push(b);name='linh thú '+b.name+' (phẩm '+g+')';}grantWithPrice(name,g);setResult('Xuyên qua vô số hiểm nguy, ngươi chạm tới lõi bí cảnh và đoạt được kỳ trân mà cả thế giới bên ngoài gần như không tồn tại: '+name+'!');}}},
    {l:'Chỉ nhặt nhạnh vòng ngoài rồi rút lui.',act:()=>{const g=loot(2);setResult('Ngươi khôn ngoan chỉ vơ vét vòng ngoài rồi rút trước khi lòng tham nuốt chửng mình. Thu được: '+g.join(', ')+'.');}}]};}
function evFortune(){const kind=RNG.pick(['herb','cave','relic','spring','merchant','corpse','beast','array']);
  if(kind==='herb'){const h=genHerb(S.world.tier);return{title:'CƠ DUYÊN · Linh Dược Hoang Dã',narr:`Giữa khe núi khuất, ngươi bắt gặp một cây ${h.name} — linh dược phẩm ${h.grade}, ~${h.age.toLocaleString('vi-VN')} năm tuổi. ${h.sentient?'Nó khẽ rung động — dường như đã có linh trí và đang cảnh giác!':'Linh khí tỏa ra thanh mát.'}`,choices:[
    {l:'Lập tức hái lấy.',act:()=>{if(h.sentient&&RNG.chance(0.5)){setResult('Nó bất ngờ nhổ rễ bỏ chạy, phun một làn độc vụ — ngươi chộp hụt, suýt trúng độc.');}else{S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;grantWithPrice(h.name,clamp(h.grade,1,5));setResult('Ngươi hái được '+h.name+'! Nhưng trời đạo luôn đòi lại cái giá của nó.');}}},
    {l:'Quan sát cạm bẫy/kẻ rình rồi mới quyết.',hint:'Thận trọng.',act:()=>{if(RNG.chance(0.4))setResult('Quả nhiên có một tu sĩ khác cũng đang rình. Ngươi lặng lẽ rút lui, giữ được cái mạng.');else{S.inv['herb_'+h.uid]=1;S.invMeta=S.invMeta||{};S.invMeta['herb_'+h.uid]=h;grantWithPrice(h.name,clamp(h.grade,1,4));setResult('An toàn, ngươi ung dung thu hoạch '+h.name+'.');}}},
    {l:'Bỏ qua. Cơ duyên nào cũng có giá.',act:()=>setResult('Ngươi rời đi — một quyết định tỉnh táo hiếm có ở tu tiên giới.')}]};}
  if(kind==='cave')return{title:'CƠ DUYÊN · Động Phủ Cổ Nhân',narr:'Một hang động ẩn sau thác nước cạn, bên trong có dấu vết bố trí của một tu sĩ đã viên tịch — có thể còn di vật.',choices:[
    {l:'Xông thẳng vào lấy đồ.',hint:'Có thể dính cấm chế.',act:()=>{if(RNG.chance(0.35)){const y=10+RNG.int(0,20);deductLife(y,'cấm chế còn sót');setResult(`Một cấm chế kích hoạt! Ngươi trúng đòn, hộc máu (-${y} năm thọ).`);}else{const t=genTreasure(clamp(1+RNG.int(0,3),1,maxGrade(S.world.tier)+1));S.treasures.push(t);grantWithPrice(t.name,t.grade);setResult('Ngươi tìm được di bảo: '+t.name+' ('+t.gradeName+')!');}}},
    {l:'Không mạo hiểm, rời đi.',act:()=>setResult('Ngươi quay lưng với hang động. Sống lâu mới là thắng.')}]};
  if(kind==='spring')return{title:'CƠ DUYÊN · Linh Tuyền',narr:'Sau một vách đá phủ rêu, một mạch suối linh khí trong vắt tuôn ra, hơi nước lấp lánh linh quang. Ngâm mình trong đó có thể tẩy tủy phạt mao — nhưng linh tuyền lộ thiên hiếm khi vô chủ.',choices:[
    {l:'Ngâm mình tẩy tủy.',hint:'Tẩy chướng tính, nhưng có thể lộ diện.',act:()=>{S.taint=Math.max(0,S.taint-15);S.dao=Math.min(100,S.dao+5);if(RNG.chance(0.35)){const n=makeNPC(RNG.int(0,3));remember(n,'bắt gặp ngươi lúc sơ hở',-5);S.att+=3;setResult('Ngươi tẩy sạch chướng tính, đạo tâm sáng tỏ. Nhưng khi mở mắt, '+n.name+' đã đứng chờ sẵn bên bờ suối, ánh mắt dò xét lạnh lẽo.');}else setResult('Ngươi tẩy tủy phạt mao. Chướng tính tiêu tan, kinh mạch thông thấu, đạo tâm sáng tỏ hơn hẳn.');}},
    {l:'Múc một ít mang đi rồi rời ngay.',act:()=>{S.taint=Math.max(0,S.taint-5);setResult('Ngươi thận trọng hứng chút linh tuyền vào bình rồi lặng lẽ rời đi. Cẩn tắc vô ưu.');}}]};
  if(kind==='merchant'){const it=RNG.chance(0.5)?genTech(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier))):genTreasure(clamp(2+RNG.int(0,2),1,maxGrade(S.world.tier)+1));const price=Math.round(Math.pow(10,1+S.ri*0.3)*(1+it.grade));return{title:'CƠ DUYÊN · Du Thương Bí Ẩn',narr:`Một lão nhân trùm áo choàng đen ngồi bên đống lửa tàn, trước mặt bày dăm món đồ. "Hữu duyên mới gặp. Món ${it.name} (${it.gradeName}) này, ${price.toLocaleString('vi-VN')} linh thạch, ta bán rẻ cho ngươi." Giọng lão khàn đục, chẳng rõ hảo tâm hay gài bẫy.`,choices:[
    {l:`Mua (${price.toLocaleString('vi-VN')} linh thạch).`,show:()=>S.linhThach>=price,act:()=>{S.linhThach-=price;if(it.type==='tech')S.techs.push(it);else S.treasures.push(it);if(RNG.chance(0.15)){addKarma(-1,'mua nhầm đồ vấy nhân quả');setResult('Ngươi mua được '+it.name+'. Nhưng đêm đó ngươi mộng thấy một oán hồn gào thét — món đồ này từng nhuốm máu vô số người.');}else setResult('Giao dịch xong, lão thương nhân thu tiền rồi tan vào màn đêm như chưa từng tồn tại. Ngươi được '+it.name+'.');}},
    {l:'Từ chối — du thương giữa chốn hoang vu hiếm khi lành.',act:()=>setResult('Ngươi lắc đầu bỏ đi. Sau lưng, lão nhân chỉ cười khẩy một tiếng lạnh người.')}]};}
  if(kind==='corpse')return{title:'CƠ DUYÊN · Di Hài Tu Sĩ',narr:'Một thi thể tu sĩ khô quắt tựa lưng vào gốc cổ thụ, tay vẫn nắm chặt một túi trữ vật. Trên gương mặt hắn đông cứng một vẻ kinh hoàng tột độ — hắn đã chết trong nỗi sợ khôn cùng.',choices:[
    {l:'Lục túi trữ vật.',hint:'Kẻ khiến hắn khiếp sợ có thể còn quanh đây.',act:()=>{if(RNG.chance(0.3)){const b=genBoss();const r=fight(b);setResult(r==='dead'?('Vừa chạm vào xác, một sát khí lạnh buốt ập tới sau gáy — '+b.name+', thứ đã giết hắn, vẫn chưa rời đi! '+S.cause):('Kẻ giết hắn, '+b.name+', vẫn rình gần đó và lao ra! Ngươi liều mạng chống trả ('+r+').'));}else{const g=loot(2);addKarma(-1,'lấy đồ người chết');setResult('Túi trữ vật còn nguyên. Ngươi thu được: '+g.join(', ')+'. Nhưng của cải người chết luôn đi kèm oán khí bám theo.');}}},
    {l:'Chôn cất tử tế rồi rời đi.',act:()=>{addKarma(2,'an táng cố nhân');if(RNG.chance(0.3)){const k=RNG.pick(['tho_dan','ho_menh']);S.inv[k]=(S.inv[k]||0)+1;setResult('Ngươi lập một nấm mộ cho người xấu số. Khi khâm liệm, trong túi áo hắn rơi ra một viên '+PILL_DEF[k].n+' — như một lời tạ ơn từ vong linh.');}else setResult('Ngươi chôn cất tử tế, cắm một nén hương. Một thoáng an yên hiếm hoi giữa tu tiên giới tàn khốc.');}}]};
  if(kind==='array'){const f=genFormation(rollGrade(S.world.tier));return{title:'CƠ DUYÊN · Trận Đồ Cổ',narr:`Trên vách một hang đá, ai đó đã khắc lại toàn bộ đồ hình của một ${f.name} — trận pháp phẩm ${f.grade} (${f.gradeName}). Nét khắc đã mờ, nhưng cốt lõi vẫn còn đọc được.`,choices:[
    {l:'Dùng thần thức chép lại toàn bộ trận đồ.',hint:'Nguyên thần yếu dễ bị phản chấn.',act:()=>{if(S.soul<2&&RNG.chance(0.4)){deductLife(4,'phản chấn khi lĩnh hội trận đồ');setResult('Trận văn quá thâm áo, thần thức ngươi bị phản chấn, đầu đau như nứt.');}else{(S.arrays=S.arrays||[]).push(f);grantWithPrice('trận đồ '+f.name,f.grade);setResult('Ngươi khắc ghi trọn vẹn '+f.name+' vào thần hồn! (Xem Túi đồ → Trận pháp.)');}}},
    {l:'Bỏ qua — trận pháp vô chủ thường là mồi nhử.',act:()=>setResult('Ngươi cảnh giác rời đi, không đụng vào đồ hình khả nghi.')}]};}

function usePill(k){const p=PILL_DEF[k];if(!p||(S.inv[k]||0)<=0)return;S.inv[k]--;const msg=p.use(S);S.pillToxin=(S.pillToxin||0)+p.g*0.5;log('Dùng '+p.n+': '+msg,'good');if(S.pillToxin>20&&RNG.chance((S.pillToxin-20)*0.03)){deductLife(S.pillToxin,'tích độc đan (nổ thân)');S.pillToxin*=0.5;}}

/* ---- free input parser ---- */
const INTENTS=[['attack',['giết','chém','đánh','tấn công','ra tay','diệt','động thủ','xuống tay','hạ sát']],['steal',['trộm','cắp','thó','móc túi','lén lấy','đạo tặc','cuỗm','cướp','cưỡng đoạt']],['threaten',['dọa','đe dọa','uy hiếp','hăm','ép buộc','cảnh cáo','thị uy']],['deceive',['lừa','gạt','dối','giả vờ','đóng giả','ngụy trang','hỏa mù','giả ngây','trá']],['ally',['kết giao','kết bạn','liên minh','bắt tay','chiêu mộ','thu nạp','kết thân','hợp tác']],['flee',['chạy','trốn','bỏ đi','rút lui','né','tẩu','thoát thân']],['sacrifice',['hi sinh','hy sinh','thí','vứt bỏ','bỏ của','buông bỏ','đánh đổi']],['gamble',['liều','đánh cược','mạo hiểm','thử vận','tất tay','đặt cược','cầu may']],['help',['cứu','giúp','bảo vệ','che chở','ứng cứu','xả thân']],['talk',['nói','thương lượng','hỏi','cầu xin','xin','thuyết phục','đàm phán']],['trade',['mua','bán','đổi','trao đổi','giao dịch','mặc cả','ngã giá']],['explore',['khám phá','dò xét','tìm kiếm','lục soát','lục lọi','thăm dò','đi sâu','soát']],['observe',['quan sát','chờ','đợi','nghe ngóng','ẩn','nấp','rình','theo dõi','án binh']],['cultivate',['tu luyện','thiền','ngộ','vận công','luyện công','tĩnh tọa']],['submit',['quỳ','lạy','cúi','nhẫn nhịn','cầu hòa','chịu thua']],['take',['nhặt','lấy','hái','thu','nhận','chộp','đoạt']],['pray',['khấn','cầu nguyện','van','khẩn cầu']],['refuse',['từ chối','mặc kệ','phớt','bỏ qua','ngó lơ','làm ngơ']]];
function parseIntent(t){t=t.toLowerCase();for(const[i,ks]of INTENTS)if(ks.some(k=>t.includes(k)))return i;return'improvise';}
// nhận diện MỌI ý định trong câu, theo thứ tự xuất hiện trong text (cho lối chơi kết hợp: "quan sát rồi ra tay")
function parseIntents(t){t=t.toLowerCase();const hits=[];for(const[i,ks]of INTENTS){let pos=-1;for(const k of ks){const p=t.indexOf(k);if(p>=0&&(pos<0||p<pos))pos=p;}if(pos>=0)hits.push([i,pos]);}hits.sort((a,b)=>a[1]-b[1]);return hits.map(h=>h[0]);}
function detectLetters(t){const toks=t.toUpperCase().split(/[^A-ZÀ-Ỹ]+/);const f=[];for(const x of toks)if(x.length===1&&'ABCDEF'.includes(x)&&!f.includes(x))f.push(x);return f;}
function matchChoice(intent,labels){const rules={attack:['nghênh chiến','chiến','ra tay','giết','lao vào','liều'],flee:['chạy','rút','trốn','rời đi','bỏ đi','bỏ qua'],talk:['thương lượng','mua','nói','cầu','xin'],help:['che chở','cứu','giúp','chắn'],observe:['quan sát','nghe ngóng','chờ','ẩn','nấp','thận trọng','đề phòng'],take:['hái','lấy','nhặt','thu','xông thẳng'],submit:['cúi','quỳ','nhẫn','tạ tội'],refuse:['từ chối','bỏ qua','rời đi','không']};const ks=rules[intent];if(!ks)return-1;for(let i=0;i<labels.length;i++)if(ks.some(k=>(labels[i]||'').toLowerCase().includes(k)))return i;return-1;}
function freeGeneric(intent,text){switch(intent){
  case'attack':S.att+=3;addKarma(-1,'manh động bạo lực');return'Ngươi manh động ra tay. Máu tanh khiến ánh mắt xung quanh chú ý tới ngươi hơn.';
  case'help':addKarma(2,'ra tay nghĩa hiệp');return'Ngươi chọn giúp đỡ dù chẳng lợi gì. Một tia thiện niệm hiếm hoi — nhân quả ghi nhận.';
  case'observe':return'Ngươi lùi vào bóng tối, kiên nhẫn quan sát. Kẻ sống lâu nhất thường ra tay sau cùng.';
  case'cultivate':S.progress=Math.min(1,S.progress+0.02);return'Ngươi lặng lẽ vận công. Tiến độ tu luyện nhích lên đôi chút.';
  case'submit':S.att=Math.max(0,S.att-1);return'Ngươi cúi đầu nhẫn nhịn. Mất mặt, nhưng cái mạng còn — và kẻ khác bớt để ý.';
  case'pray':return'Ngươi thầm khấn nguyện. Thiên đạo vô tình, nhưng thành tâm đôi khi lay động một tia khí vận mong manh.';
  case'take':return'Ngươi với tay lấy thứ trước mắt. Nhưng thứ dễ lấy nhất thường là cạm bẫy khéo giăng.';
  case'flee':return'Ngươi chọn rời đi. Bỏ lỡ cơ duyên, hay né được kiếp nạn — không ai biết trước.';
  case'steal':if(RNG.chance(0.45)){const g=Math.round(Math.pow(10,1+S.ri*0.2));S.linhThach+=g;S.att+=3;addKarma(-1,'trộm đạo');return`Ngươi ra tay nhanh như chớp, thó gọn ${g.toLocaleString('vi-VN')} linh thạch rồi biến vào đám đông. Nhưng trộm đạo tất để lại dấu vết, và ánh mắt dò xét bắt đầu tìm ngươi.`;}S.att+=6;addKarma(-1,'trộm cắp bị lộ');return'Ngươi bị phát giác giữa chừng! Tiếng hô hoán vang lên — giờ cả một vùng đều nhớ mặt kẻ cắp là ngươi.';

  case'sacrifice':S.att=Math.max(0,S.att-3);addKarma(1,'biết bỏ để giữ');return'Ngươi dứt khoát vứt bỏ thứ trong tay để thoát thân. Mất của, nhưng giữ được mạng và bớt bị dòm ngó — một cái đầu tỉnh táo.';

function doFree(){const inp=$('#freetext');const text=inp?inp.value.trim():'';if(!text)return;let sc=S.scene;if(!sc||sc.hub)sc=sceneHub();if(sc.result){render();return;}
  const intents=parseIntents(text);const intent=intents[0]||'improvise';const letters=detectLetters(text);
  const choices=(sc.choices||[]).filter(c=>!c.show||c.show());
  const combo=letters.length>=2||intents.length>=2; // lối chơi kết hợp / tư duy chiến thuật
  let idx=-1;if(letters.length){const vi=letters[0].charCodeAt(0)-65;if(vi>=0&&vi<choices.length)idx=vi;}
  if(idx<0)idx=matchChoice(intent,choices.map(c=>c.l));
  if(idx>=0&&choices[idx]){if(combo)addKarma(1,'lối chơi mưu trí phá cách');choices[idx].act();afterAct();return;}
  // Ứng biến tự do: mỗi ý định là một hệ quả THẬT; kết hợp nhiều ý định → nhiều hệ quả chồng lên nhau
  let res=freeGeneric(intent,text);
  if(combo&&intents.length>=2&&S.alive){addKarma(1,'lối chơi mưu trí phá cách');
    res='『Mưu kế liên hoàn』 '+res;
    for(let k=1;k<intents.length&&k<3&&S.alive;k++){res+=' — '+freeGeneric(intents[k],text);}}
  freeRes=res;render();save();}

/* ---- KẾT CỤC: tính từ nhân quả + lựa chọn + cảnh giới tích lũy cả đời ---- */
function computeEnding(){const k=S.karma,dao=S.dao,ri=S.ri,mut=S.mutations.length,kills=S.stats.kills,att=S.att,betray=S.stats.betray,ngo=S.stats.ngodao,age=Math.floor(S.age);
  const tier=ri>=100?5:ri>=80?4:ri>=50?3:ri>=20?2:ri>=5?1:0; // tầng vóc dáng đạo nghiệp
  const ascend=S.flags&&S.flags.ascended;
  // trục đạo đức: -2 đại ma, -1 tà, 0 trung, 1 chính, 2 đại thiện
  const moral=k<=-15?-2:k<=-4?-1:k>=15?2:k>=4?1:0;
  let title,epithet,tone='bad',poem;
  if(ascend||ri>=100){title='✧ PHI THĂNG THÀNH TIÊN ✧';tone='good';
    epithet=moral<=-1?'Ma Đạo Chân Tiên — cả tiên giới nghe tên biến sắc':moral>=1?'Thượng Cổ Chân Tiên, danh chấn Tam Thiên Đại Thiên Thế Giới':'Tiêu Dao Tán Tiên, đến đi không dấu vết';
    poem='Ngươi bước qua lôi kiếp cuối cùng. Thân xác tan thành vạn điểm tinh quang, bay lên khỏi phàm trần — nơi này đã không còn giữ nổi ngươi. Truyền thuyết về ngươi sẽ được kể mãi ở '+esc(S.world.name)+'.';}
  else if(mut>=8){title='☍ NHÂN TÍNH TIÊU VONG';epithet='Một dị vật không còn nhớ mình từng là người';tone='warn';
    poem=`Sau ${mut} lần dị biến, ngươi soi mình xuống mặt nước và không nhận ra thứ đang nhìn lại. Sức mạnh đã đổi bằng chính linh hồn ngươi. Cái chết này, có lẽ là một sự giải thoát.`;}
  else if(S.heart<=-12&&tier>=2){title='❄ VÔ TÌNH ĐẠO QUÂN';epithet='Kẻ đã chặt đứt mọi tình duyên để cầu đạo — đạo tâm băng lãnh, không còn là người';tone='';
    poem='Ngươi đã đoạn tuyệt hết thảy: ái, hận, bi, hoan. Đạo tâm ngươi trong suốt như băng vạn năm, không một gợn sóng. Trên đại đạo, ngươi đi rất xa. Nhưng khi nhắm mắt, không một ai rơi lệ — và ngươi cũng chẳng cần. Thành đạo, hay chỉ là đã chết từ lâu?';}
  else if(S.heart>=12&&tier>=2){title='❤ CHÂN TÌNH NHẬP ĐẠO';epithet='Kẻ giữ trọn phần người giữa con đường trường sinh cô độc, lấy tình chứng đạo';tone='good';
    poem='Người ta nói tu tiên phải vô tình. Ngươi chứng minh điều ngược lại: chính vì có kẻ để bảo vệ, có tình để gìn giữ, đạo tâm ngươi mới kiên định đến thế. Khi ngươi ra đi, có những người thật lòng khóc thương — thứ mà vô số Vô Tình Đạo Quân vĩnh viễn không có được.';}
  else if(tier>=3&&moral<=-2){title='☠ MA ĐẾ NGÃ XUỐNG';epithet=`Đại Ma Đầu tay nhuốm máu ${kills} sinh linh, bị chính đạo vây diệt`;tone='warn';
    poem='Ngươi đã đứng trên đỉnh bằng xương máu vô số kẻ khác. Nhưng nợ máu tất phải trả — vạn tu sĩ chính đạo hợp lực, và ngay cả ngươi cũng không chống nổi nhân quả của cả một thời đại.';}
  else if(tier>=3&&moral>=2){title='✦ ĐẠI NĂNG VIÊN TỊCH';epithet='Một vị chính đạo tiền bối được vạn người kính ngưỡng, ngồi hóa mà đi';tone='good';
    poem='Ngươi sống một đời quang minh, cứu vớt vô số sinh linh. Khi thọ nguyên cạn, ngươi mỉm cười ngồi kiết già hóa đi, để lại một truyền thừa và một cái tên sạch sẽ giữa tu tiên giới đầy bùn nhơ.';}
  else if(tier>=3){title='◈ NHẤT ĐẠI CƯỜNG GIẢ TẠ THẾ';epithet=`${esc(realmName(ri,S.si))} — kẻ đã đi rất xa trên đại đạo`;tone='good';
    poem='Ngươi đã leo tới nơi mà chín phần mười tu sĩ cả đời không mơ tới. Nhưng đại đạo vô tận, còn thọ nguyên thì hữu hạn. Ngươi ngã xuống, mắt vẫn hướng về đỉnh trời chưa với tới.';}
  else if(betray>=3&&moral<=-1){title='✎ CÔ GIA QUẢ NHÂN';epithet='Kẻ phản bội tất cả, rồi bị tất cả phản bội, chết trong cô độc';
    poem='Ngươi đã bán đứng bao nhiêu người để leo lên? Đến cuối, không một ai bên cạnh khi ngươi tắt thở. Cái chết cô quạnh này là nhân quả ngươi tự gieo.';}
  else if(age>=400&&tier<=1){title='☯ TÁN NHÂN ẨN THẾ';epithet=`Một lão nhân sống ${age} tuổi mà cảnh giới không cao — nhưng sống lâu hơn vô số thiên tài`;tone='';
    poem='Ngươi không có đại tài, cũng chẳng có đại vận. Nhưng ngươi cẩn trọng, nhẫn nại, và ngươi sống — sống lâu hơn cả những thiên kiêu từng khinh thường ngươi. Đôi khi, sống sót cũng là một loại đạo.';}
  else if(ngo>=5){title='❈ NGỘ ĐẠO NHI VONG';epithet='Kẻ mãi mê đại đạo mà quên mất tính mạng, đắc đạo trong khoảnh khắc lâm chung';
    poem='Ngươi dành cả đời truy cầu chân lý, có lẽ đã chạm được một tia. Trong khoảnh khắc cuối, ngươi mỉm cười — hiểu ra, rồi tan biến. Đạo ở trong tâm, không ở tuổi thọ.';}
  else if(tier>=1){title='⚔ VONG ĐỒ NƠI TU CHÂN GIỚI';epithet=`${esc(realmName(ri,S.si))} — một tu sĩ trung bình giữa dòng đời tàn khốc`;
    poem='Ngươi đã cố gắng. Ngươi đã tiến bộ. Nhưng con đường tu tiên chất đầy xương trắng, và ngươi trở thành một trong số đó. Không ai nhớ tên ngươi ngoài chính ngươi.';}
  else{title='☠ VÔ DANH CHI BỐI';epithet=att>10?'Lộ diện quá sớm, chết như một con kiến dưới chân người khác':'Một hạt bụi chưa kịp thấy bầu trời đã tắt lịm';
    poem='Con đường còn chưa bắt đầu đã kết thúc. Trong '+esc(S.world.name)+', mỗi ngày có hàng vạn kẻ như ngươi ngã xuống, không tiếng vang, không dấu vết. Thế giới không hề dừng lại vì ngươi.';}
  const balance=k>=8?'Cả đời ngươi tích thiện, nhân quả trong sạch.':k>=1?'Ngươi giữ được nhiều hơn phần thiện.':k<=-15?'Nợ máu ngập trời, oán khí chưa tan.':k<=-1?'Tay ngươi đã vấy không ít nghiệp chướng.':'Thiện ác cân bằng, một đời không nợ ai cũng chẳng ai nợ.';
  return{title,epithet,tone,poem,balance};}
function death(){
  // Pháp bảo GIỮ MẠNG: nghịch chuyển sinh tử, hồi sinh tại chỗ 1 lần (khác với trùng sinh)
  const li=(S.treasures||[]).findIndex(t=>t.lifesave);
  if(li>=0&&!(S.flags&&S.flags.lifesaveUsed)){const t=S.treasures[li];S.treasures.splice(li,1);S.alive=true;S.flags.lifesaveUsed=true;S.hp=Math.round(S.hpMax*0.4);if(S.life<20)S.life=20+RNG.int(0,30);S.taint=Math.max(0,S.taint-20);
    log('✧ «'+t.name+'» vỡ tan, nghịch chuyển sinh tử — ngươi bị kéo lại từ cửa quỷ môn quan!','good');
    setResult('Ngay khoảnh khắc hồn phách sắp tiêu tán, «'+t.name+'» bất ngờ nổ tung thành vạn điểm kim quang, cải tử hoàn sinh cho ngươi. Ngươi sống lại — nhưng bảo vật hộ mệnh vô giá đã không còn.');return;}
  $('#status').style.display='block';$('#tabbar').style.display='none';
  const E=computeEnding();const col=E.tone==='good'?'var(--gold)':E.tone==='warn'?'var(--cyan)':'var(--bad)';
  const R=computeRebirth();save();
  $('#view').innerHTML=`<div class="menu-wrap"><h1 style="color:${col}">${esc(E.title)}</h1>
   <p style="color:${col};font-weight:600;font-style:italic;margin:6px 0 2px">「 ${esc(E.epithet)} 」</p>
   <p class="bad" style="font-style:italic;margin:12px 0">${esc(S.cause||'Ngươi đã chết.')}</p>
   <p class="muted" style="font-size:.9rem;line-height:1.6;margin:12px 0">${esc(E.poem)}</p>
   <p class="muted" style="font-size:.84rem;font-style:italic">${esc(E.balance)}</p>
   <div class="muted" style="font-size:.82rem;border-top:1px solid var(--line);padding-top:10px;margin-top:12px">Ngã xuống ở <b>${esc(realmName(S.ri,S.si))}</b>, hưởng "thọ" ${Math.floor(S.age)} tuổi.<br>Giết ${S.stats.kills} · Đột phá ${S.stats.break} · Ngộ đạo ${S.stats.ngodao} · Bị phản bội ${S.stats.betray} · Nhân quả ${S.karma}.</div>
   ${R.ok?`<p class="good" style="font-weight:600;margin:14px 0 4px">☯ TRÙNG SINH! Một tia hồn phách ngươi thoát khỏi luân hồi, mang theo ${esc(R.legacy.desc)} sang kiếp sau.</p>`:'<p class="muted" style="font-size:.82rem;margin-top:12px;font-style:italic">Hồn phách tan vào luân hồi, ký ức kiếp này xóa sạch...</p>'}
   <button class="btn primary" data-m="new" style="margin-top:12px">${R.ok?'☯ Chuyển thế (mang theo di sản kiếp trước)':'Chuyển thế — bắt đầu lại từ hư vô'}</button></div>`;}

document.addEventListener('click',(e)=>{
  const card=e.target.closest('[data-o]');if(card){const id=card.getAttribute('data-o');const o=id==='__random__'?rollRandomOrigin():ORIGINS.find(x=>x.id===id);newState(o.id);setScene(sceneOrigin(o));return;}
  const m=e.target.closest('[data-m]');if(m){const a=m.getAttribute('data-m');
    if(a==='cont'){if(load()){TAB='story';render();}}
    else if(a==='new')chooseOrigin();
    return;}
  const tab=e.target.closest('[data-tab]');if(tab){TAB=tab.getAttribute('data-tab');render();return;}
  const use=e.target.closest('[data-use]');if(use){usePill(use.getAttribute('data-use'));render();save();return;}
  const tech=e.target.closest('[data-tech]');if(tech){const i=+tech.getAttribute('data-tech');const t=S.techs[i];if(t){if(!S.tech||confirm('Chuyển sang tu luyện '+t.name+' (phẩm '+t.grade+')? Công pháp cũ: '+(S.tech?S.tech.name:'không'))){const old=S.tech;S.tech=t;S.techs.splice(i,1);if(old&&old.name!=='Thanh Khí Quyết')S.techs.push(old);log('Chuyển sang tu luyện: '+t.name+'.','good');}}render();save();return;}
  const bi=e.target.closest('[data-i]');if(bi){const k=bi.getAttribute('data-i');
    if(k==='cont'){S.scene=null;render();save();return;}
    if(k==='free'){doFree();return;}
    const idx=+k;const ch=$('#view')._choices;if(ch&&ch[idx]){ch[idx].act();afterAct();}return;}
});
document.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&e.target&&e.target.id==='freetext'){e.preventDefault();doFree();}});

/* khởi động — chờ DOM sẵn sàng (đề phòng script chạy trước khi #view tồn tại trong iframe Artifact) */
window.addEventListener('error',function(ev){try{const v=document.getElementById('view');if(v&&!v.innerHTML.trim())v.innerHTML='<div class="menu-wrap"><h1>Lỗi tải</h1><p class="muted">Có lỗi khi khởi động. Thử tải lại trang. Nếu vẫn lỗi, báo lại giúp: '+(ev.message||'')+'</p><button class="btn" data-m="new">✦ Bắt đầu</button></div>';}catch(_){}});
function __boot(){try{render();}catch(e){try{document.getElementById('view').innerHTML='<div class="menu-wrap"><h1>TU TIÊN</h1><p class="muted">Không khởi động được ('+(e&&e.message||e)+'). Bấm để bắt đầu.</p><button class="btn primary" data-m="new">✦ Bắt đầu</button></div>';}catch(_){}}}
if(document.getElementById('view')){__boot();}
else if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',__boot);}
else{__boot();}
</script>
